<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1b2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AviGest">
    <meta name="mobile-web-app-capable" content="yes">
    <title>AviGest v26</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- ═══ SUPABASE SDK ═══ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg:#0d1b2a; --bg2:#142233; --bg3:#1a2d40;
            --border:rgba(255,255,255,0.08);
            --text:#f0f4f8; --text2:#8fa8c0;
            --green:#00c896; --blue:#0099ff;
            --orange:#ff9d00; --red:#ff4444; --purple:#c084fc;
        }
        *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:Lexend,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

        .screen { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; }
        .screen.hidden { display:none !important; }

        .role-logo { font-size:52px; margin-bottom:8px; }
        .role-title { font-size:30px; font-weight:800; letter-spacing:-0.5px; margin-bottom:4px; }
        .role-sub { font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:40px; }
        .role-btns { display:flex; gap:22px; margin-bottom:48px; }
        .role-btn { display:flex; flex-direction:column; align-items:center; gap:10px; cursor:pointer; -webkit-tap-highlight-color:transparent; touch-action:manipulation; transition:transform .15s; }
        .role-btn:active { transform:scale(.92); }
        .role-btn-circle { width:84px; height:84px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:34px; border:2px solid transparent; }
        .rbc-gerant    { background:rgba(96,165,250,.15); border-color:rgba(96,165,250,.4); }
        .rbc-agent     { background:rgba(74,222,128,.15); border-color:rgba(74,222,128,.4); }
        .rbc-partenaire{ background:rgba(192,132,252,.15); border-color:rgba(192,132,252,.4); }
        .role-btn-label { font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.8px; }
        .role-sortir { display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; -webkit-tap-highlight-color:transparent; opacity:.7; }
        .role-sortir-circle { width:58px; height:58px; border-radius:50%; background:rgba(255,68,68,.12); border:2px solid rgba(255,68,68,.3); display:flex; align-items:center; justify-content:center; font-size:24px; }
        .role-sortir-label { font-size:10px; font-weight:700; color:var(--red); text-transform:uppercase; }

        .pin-logo  { font-size:48px; margin-bottom:8px; }
        .pin-title { font-size:26px; font-weight:800; }
        .pin-sub   { font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:1.5px; margin:4px 0 28px; }
        .pin-display { display:flex; gap:14px; margin-bottom:8px; }
        .pin-dot { width:18px; height:18px; border-radius:50%; background:var(--bg3); border:2px solid var(--border); transition:background .15s,border-color .15s,transform .15s; }
        .pin-dot.filled { background:var(--blue); border-color:var(--blue); transform:scale(1.2); }
        .pin-pad { display:grid; grid-template-columns:repeat(3,72px); grid-template-rows:repeat(4,72px); gap:12px; margin-top:8px; }
        .pin-key { width:72px; height:72px; border-radius:50%; border:none; background:var(--bg2); color:var(--text); font-family:Lexend,sans-serif; font-size:22px; font-weight:600; cursor:pointer; -webkit-tap-highlight-color:transparent; touch-action:manipulation; transition:background .12s,transform .1s; display:flex; align-items:center; justify-content:center; user-select:none; }
        .pin-key:active { background:var(--bg3); transform:scale(.91); }
        .pin-key.key-del { background:rgba(255,68,68,.12); color:var(--red); font-size:16px; }
        .pin-key.key-ok  { background:rgba(0,200,150,.15); color:var(--green); font-size:16px; font-weight:800; }
        .pin-key.key-ok.ready { background:var(--green); color:#0d1b2a; box-shadow:0 0 20px rgba(0,200,150,.4); }
        .pin-err { height:20px; font-size:12px; color:var(--red); text-align:center; margin-bottom:12px; opacity:0; transition:opacity .2s; }
        .pin-err.show { opacity:1; }
        .pin-loading { display:none; flex-direction:column; align-items:center; gap:14px; position:absolute; }
        .pin-loading.show { display:flex; }
        .spinner { width:38px; height:38px; border:3px solid var(--bg3); border-top-color:var(--blue); border-radius:50%; animation:spin .8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
        .pin-display.shake { animation:shake .4s ease; }

        #app-main { display:none; min-height:100vh; }
        .header { background:var(--bg2); border-bottom:1px solid var(--border); padding:12px 16px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
        .header-left { display:flex; align-items:center; gap:8px; }
        #btn-back { display:none; background:rgba(255,255,255,.08); border:none; color:var(--text); font-size:22px; line-height:1; cursor:pointer; padding:4px 10px; border-radius:8px; font-family:inherit; }
        #btn-back:active { background:rgba(255,255,255,.18); }
        #tb-role { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.8px; }
        #tb-name { font-size:14px; font-weight:700; }
        .offline-badge { display:none; background:var(--red); color:#fff; font-size:9px; font-weight:700; padding:3px 8px; border-radius:10px; }
        .offline-badge.show { display:inline-block; }
        #btn-logout { background:rgba(255,68,68,.12); border:1px solid rgba(255,68,68,.35); color:var(--red); border-radius:10px; padding:5px 12px; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; }

        #app-container { padding:12px; max-width:500px; margin:0 auto; padding-bottom:28px; transition:padding-bottom .2s; }

        .toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--bg2); color:var(--text); padding:12px 22px; border-radius:40px; font-size:13px; font-weight:600; z-index:99999; border:1px solid var(--border); opacity:0; transition:opacity .25s,transform .25s; white-space:nowrap; max-width:90vw; text-align:center; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast.error   { background:var(--red); color:#fff; border-color:transparent; }
        .toast.success { background:var(--green); color:#0d1b2a; border-color:transparent; }
        .toast.warning { background:var(--orange); color:#0d1b2a; border-color:transparent; }
        body.nav-visible .toast { bottom:calc(72px + env(safe-area-inset-bottom) + 12px); }

        .tuile { border-radius:18px; padding:18px 20px; margin-bottom:10px; display:flex; align-items:center; gap:16px; cursor:pointer; border:1px solid rgba(255,255,255,.07); transition:transform .15s,opacity .15s; -webkit-tap-highlight-color:transparent; touch-action:manipulation; user-select:none; }
        .tuile:active { transform:scale(.97); opacity:.85; }
        .tuile-icon { font-size:28px; flex-shrink:0; }
        .tuile-label { font-size:16px; font-weight:800; }
        .tuile-sub { font-size:11px; opacity:.7; margin-top:2px; }
        .tuile-arrow { margin-left:auto; font-size:18px; opacity:.4; }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
        .section-title { font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:1.2px; margin:20px 4px 10px; }
        .card { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:10px; }
        .card-title { font-size:13px; font-weight:800; margin-bottom:12px; display:flex; align-items:center; gap:8px; }

        .kpi-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:10px; }
        .kpi-box { background:var(--bg3); border-radius:12px; padding:12px 8px; text-align:center; border:1px solid var(--border); }
        .kpi-val   { font-size:20px; font-weight:800; display:block; }
        .kpi-label { font-size:9px; color:var(--text2); text-transform:uppercase; letter-spacing:.8px; margin-top:3px; display:block; }

        .tache-card { background:var(--bg3); border-radius:12px; padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:12px; border:1px solid var(--border); }
        .tache-card.urgente { border-color:rgba(255,68,68,.4); background:rgba(255,68,68,.05); }
        .tache-card.accomplie .tache-titre { text-decoration:line-through; color:var(--text2); }
        .tache-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
        .dot-red { background:var(--red); } .dot-orange { background:var(--orange); } .dot-blue { background:var(--blue); } .dot-green { background:var(--green); }
        .tache-titre { font-size:13px; font-weight:700; flex:1; }
        .tache-meta  { font-size:10px; color:var(--text2); margin-top:2px; }
        .tache-badge { font-size:9px; font-weight:700; padding:2px 7px; border-radius:8px; white-space:nowrap; }
        .tb-abattage { background:rgba(255,68,68,.2); color:var(--red); }
        .tb-quotidien{ background:rgba(0,153,255,.2); color:var(--blue); }
        .tb-hebdo    { background:rgba(255,157,0,.2); color:var(--orange); }

        .btn-fait { background:rgba(0,153,255,.15); border:1px solid rgba(0,153,255,.4); color:var(--blue); border-radius:10px; padding:6px 14px; font-size:11px; font-weight:800; cursor:pointer; font-family:Lexend,sans-serif; transition:all .2s; white-space:nowrap; }
        .btn-fait.confirmer { background:rgba(255,157,0,.25); border-color:rgba(255,157,0,.8); color:var(--orange); animation:pulse 1s infinite; }
        .btn-fait.done { background:rgba(0,200,150,.15); border-color:rgba(0,200,150,.4); color:var(--green); pointer-events:none; }

        .f-label { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.8px; font-weight:700; margin-bottom:6px; display:block; }
        .f-input  { width:100%; padding:13px 14px; background:var(--bg3); border:1px solid var(--border); border-radius:12px; color:var(--text); font-family:Lexend,sans-serif; font-size:15px; margin-bottom:10px; outline:none; transition:border-color .15s; }
        .f-input:focus { border-color:var(--blue); }
        .btn-action { width:100%; padding:14px; border:none; border-radius:14px; font-family:Lexend,sans-serif; font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:8px; transition:opacity .15s,transform .1s; -webkit-tap-highlight-color:transparent; }
        .btn-action:active { transform:scale(.97); opacity:.85; }
        .btn-green { background:var(--green); color:#0d1b2a; }
        .btn-blue  { background:var(--blue); color:#fff; }
        .btn-orange{ background:var(--orange); color:#0d1b2a; }
        .btn-red   { background:var(--red); color:#fff; }
        .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text2); }

        .stepper { display:flex; gap:6px; margin-bottom:20px; }
        .step-dot { flex:1; height:3px; border-radius:2px; background:var(--bg3); transition:background .3s; }
        .step-dot.active { background:var(--blue); }
        .step-dot.done   { background:var(--green); }
        .form-step { display:none; }
        .form-step.active { display:block; }

        .journal-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); font-size:12px; }
        .journal-row:last-child { border-bottom:none; }
        .rapport-ligne { display:flex; justify-content:space-between; font-size:13px; padding:5px 0; }
        .rapport-ligne span:last-child { font-weight:700; }
        .bande-header { background:linear-gradient(135deg,var(--bg2),var(--bg3)); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:10px; }
        .bande-name { font-size:18px; font-weight:800; }
        .bande-meta { font-size:11px; color:var(--text2); margin-top:4px; }

        .prog-bar  { height:5px; background:var(--bg3); border-radius:3px; overflow:hidden; margin-top:6px; }
        .prog-fill { height:100%; border-radius:3px; background:var(--green); transition:width .5s; }
        .prog-fill.orange { background:var(--orange); }
        .prog-fill.red    { background:var(--red); }

        textarea { width:100%; padding:12px; background:var(--bg3); border:1px solid var(--border); border-radius:12px; color:var(--text); font-family:inherit; font-size:13px; resize:none; outline:none; margin-top:6px; }
        textarea:focus { border-color:var(--blue); }

        .tuile-session-active { border-color:rgba(0,153,255,.5)!important; box-shadow:0 0 0 1px rgba(0,153,255,.25),0 0 18px rgba(0,153,255,.18); animation:session-glow 2.5s ease-in-out infinite; }
        @keyframes session-glow { 0%,100%{box-shadow:0 0 0 1px rgba(0,153,255,.25),0 0 18px rgba(0,153,255,.18)} 50%{box-shadow:0 0 0 2px rgba(0,153,255,.45),0 0 32px rgba(0,153,255,.32)} }
        .session-active-badge { display:inline-block; font-size:9px; font-weight:800; color:#0d1b2a; background:var(--blue); padding:2px 8px; border-radius:20px; margin-left:8px; text-transform:uppercase; animation:pulse 2s infinite; }

        /* NAVBAR */
        #nav-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:500px; z-index:500; display:none; background:var(--bg2); border-top:1px solid var(--border); padding:6px 0 calc(6px + env(safe-area-inset-bottom,0px)); }
        #nav-bar.visible { display:flex; }
        .nav-tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; padding:4px 2px; border:none; background:transparent; -webkit-tap-highlight-color:transparent; position:relative; min-height:54px; font-family:Lexend,sans-serif; }
        .nav-tab .nav-bg { position:absolute; inset:2px 5px; border-radius:12px; background:transparent; transition:background .2s; z-index:0; }
        .nav-tab.active .nav-bg { background:rgba(0,153,255,.18); }
        .nav-tab-icon { font-size:22px; line-height:1; position:relative; z-index:1; transition:transform .2s; }
        .nav-tab.active .nav-tab-icon { transform:scale(1.12); }
        .nav-tab-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text2); position:relative; z-index:1; }
        .nav-tab.active .nav-tab-label { color:var(--blue); }
        .nav-badge { position:absolute; top:2px; right:calc(50% - 20px); min-width:16px; height:16px; background:var(--red); color:#fff; font-size:9px; font-weight:800; border-radius:8px; display:flex; align-items:center; justify-content:center; padding:0 3px; border:2px solid var(--bg2); z-index:2; }

        .choice-btn { padding:20px 12px; border-radius:16px; border:2px solid var(--border); background:var(--bg3); color:var(--text); font-family:Lexend,sans-serif; font-size:13px; font-weight:700; cursor:pointer; text-align:center; transition:border-color .15s,background .15s; }
        .choice-btn:active { border-color:var(--blue); background:rgba(0,153,255,.1); }

        /* ═══ NOTIFICATIONS REALTIME ═══ */
        #notif-container {
            position: fixed;
            top: 64px; /* sous le header */
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 24px);
            max-width: 476px;
            z-index: 800;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .notif-banner {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            pointer-events: all;
            cursor: pointer;
            animation: notifSlideIn .3s ease;
            box-shadow: 0 4px 24px rgba(0,0,0,.4);
        }
        @keyframes notifSlideIn {
            from { opacity:0; transform:translateY(-12px); }
            to   { opacity:1; transform:translateY(0); }
        }
        @keyframes notifSlideOut {
            from { opacity:1; transform:translateY(0); }
            to   { opacity:0; transform:translateY(-12px); }
        }
        .notif-banner.hiding { animation: notifSlideOut .3s ease forwards; }
        .notif-tache    { background:rgba(0,153,255,.18);   border-color:rgba(0,153,255,.4); }
        .notif-session  { background:rgba(0,200,150,.18);   border-color:rgba(0,200,150,.4); }
        .notif-abattage { background:rgba(255,68,68,.18);   border-color:rgba(255,68,68,.4); }
        .notif-valide   { background:rgba(0,200,150,.18);   border-color:rgba(0,200,150,.4); }
        .notif-icon  { font-size:22px; flex-shrink:0; }
        .notif-body  { flex:1; }
        .notif-title { font-size:13px; font-weight:800; }
        .notif-sub   { font-size:11px; color:var(--text2); margin-top:2px; }
        .notif-close { font-size:16px; color:var(--text2); flex-shrink:0; padding:4px; }
        .notif-close:hover { color:var(--text); }

        /* Badge persistant sur onglet avec animation */
        .nav-badge { animation: badgePop .3s ease; }
        @keyframes badgePop {
            0%   { transform:scale(0); }
            70%  { transform:scale(1.3); }
            100% { transform:scale(1); }
        }

        /* REALTIME indicator */
        /* ═══ CYCLE VIE BANDE ═══ */
        .cycle-tabs {
            display: flex;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 14px;
            overflow: hidden;
        }
        .cycle-tab {
            flex: 1;
            padding: 10px 6px;
            border: none;
            background: transparent;
            border-bottom: 3px solid transparent;
            color: var(--text2);
            font-family: 'Lexend', sans-serif;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: .6px;
            transition: all .2s;
            -webkit-tap-highlight-color: transparent;
        }
        .cycle-tab.active {
            color: var(--blue);
            border-bottom-color: var(--blue);
            background: rgba(0,153,255,.06);
        }
        .cycle-tab.disabled {
            opacity: .25;
            pointer-events: none;
        }
        .checklist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--bg2);
            transition: all .15s;
            -webkit-tap-highlight-color: transparent;
        }
        .checklist-item.checked {
            background: rgba(0,200,150,.05);
            border-color: rgba(0,200,150,.3);
        }
        .checklist-check {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
            transition: all .15s;
        }
        .checklist-item.checked .checklist-check {
            background: var(--green);
            border-color: var(--green);
        }
        .prog-bande {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 12px;
        }
        .realtime-dot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; margin-left:6px; animation:pulse 2s infinite; }
    </style>
</head>
<body>

<!-- ÉCRAN 1 — SÉLECTION DU RÔLE -->
<div id="screen-role" class="screen">
    <div class="role-logo">🐔</div>
    <div class="role-title">AviGest</div>
    <div class="role-sub">Smartfarm — Qui êtes-vous ?</div>
    <div class="role-btns">
        <div class="role-btn" onclick="choisirRole('GERANT')">
            <div class="role-btn-circle rbc-gerant">🧑‍💼</div>
            <span class="role-btn-label">Gérant</span>
        </div>
        <div class="role-btn" onclick="choisirRole('AGENT')">
            <div class="role-btn-circle rbc-agent">👷</div>
            <span class="role-btn-label">Agent</span>
        </div>
        <div class="role-btn" onclick="choisirRole('PARTENAIRE')">
            <div class="role-btn-circle rbc-partenaire">🤝</div>
            <span class="role-btn-label">Partenaire</span>
        </div>
    </div>
    <div class="role-sortir" onclick="doLogoutFromRole()">
        <div class="role-sortir-circle">🚪</div>
        <span class="role-sortir-label">Sortir</span>
    </div>
</div>

<!-- ÉCRAN 2 — LOGIN PIN -->
<div id="screen-pin" class="screen hidden">
    <div class="pin-logo">🐔</div>
    <div class="pin-title">AviGest</div>
    <div class="pin-sub" id="pin-label">Accès sécurisé</div>
    <div class="pin-display" id="pin-display">
        <div class="pin-dot" id="dot-0"></div>
        <div class="pin-dot" id="dot-1"></div>
        <div class="pin-dot" id="dot-2"></div>
        <div class="pin-dot" id="dot-3"></div>
    </div>
    <div class="pin-err" id="pin-err"></div>
    <div class="pin-pad">
        <button class="pin-key" onclick="pinTap('1')">1</button>

/* ── Lecture générique avec cache ──────── */
async function sbGet(table, filters={}, options={}) {
    if (!isSessionValid()) { handleExpired(); return null; }
    try {
        let query = sb.from(table).select(options.select || '*');
        Object.entries(filters).forEach(([col, val]) => {
            query = query.eq(col, val);
        });
        if (options.order) query = query.order(options.order, { ascending: options.asc ?? true });
        if (options.limit) query = query.limit(options.limit);
        const { data, error } = await query;
        if (error) { console.error('sbGet error:', error); return null; }
        return data;
    } catch(e) {
        console.error('sbGet exception:', e);
        updateOffline();
        return null;
    }
}

/* ── Écriture générique ──────────────── */
async function sbInsert(table, payload) {
    if (!isSessionValid()) { handleExpired(); return null; }
    try {
        const { data, error } = await sb.from(table).insert({
            ...payload,
            ferme_id: FERME_ID
        }).select().single();
        if (error) { console.error('sbInsert error:', error); return null; }
        return data;
    } catch(e) {
        if (!App.isOnline) {
            queueRequest({ table, payload });
            return { queued: true };
        }
        return null;
    }
}

/* ── Mise à jour ─────────────────────── */
async function sbUpdate(table, id, payload) {
    if (!isSessionValid()) { handleExpired(); return null; }
    try {
        const { data, error } = await sb.from(table).update(payload).eq('id', id).select().single();
        if (error) { console.error('sbUpdate error:', error); return null; }
        return data;
    } catch(e) { return null; }
}

/* ════════════════════════════════════════════
   ÉTAGE 5 — OFFLINE QUEUE
════════════════════════════════════════════ */
function queueRequest(payload) {
    const exists = App.offlineQueue.some(i => JSON.stringify(i) === JSON.stringify(payload));
    if (exists) return;
    App.offlineQueue.push({ ...payload, ts: Date.now(), retries: 0 });
    localStorage.setItem('av_queue', JSON.stringify(App.offlineQueue));
    updateOffline();
    showToast('📴 Sauvegardé — envoi dès connexion', 'warning', 3500);
}

async function processQueue() {
    if (!App.offlineQueue.length || !App.isOnline) return;
    showToast('🔄 Synchronisation…', 'info', 2000);
    const queue = [...App.offlineQueue];
    const failed = [];
    for (const item of queue) {
        const { table, payload } = item;
        const { error } = await sb.from(table).insert({ ...payload, ferme_id: FERME_ID });
        if (error) { item.retries = (item.retries||0)+1; if (item.retries < 5) failed.push(item); }
    }
    App.offlineQueue = failed;
    localStorage.setItem('av_queue', JSON.stringify(failed));
    updateOffline();
    if (!failed.length) showToast('✅ Données synchronisées', 'success', 3000);
}

function updateOffline() {
    const b = document.getElementById('offline-badge');
    if (!b) return;
    const nb = App.offlineQueue.length;
    if (!App.isOnline) {
        b.classList.add('show');
        b.textContent = nb ? `📴 HORS LIGNE · ${nb}` : '📴 HORS LIGNE';
    } else {
        b.classList.remove('show');
    }
}

/* ── Vibration cross-platform ─────────── */
function _vibrateDevice() {
    /* Android Chrome : API Vibration standard */
    if (navigator.vibrate) {
        navigator.vibrate([150, 80, 150]);
        return;
    }
    /* iOS Safari : pas d'API vibration — feedback audio léger */
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.15);
    } catch(_) {}
}

function showNotif(type, icon, titre, sub, onClick) {
    const container = document.getElementById('notif-container');
    if (!container) return;

    /* Vibration — fonctionne sur Android, son sur iOS */
    _vibrateDevice();

    const id = 'notif-' + Date.now();
    const div = document.createElement('div');
    div.id = id;
    div.className = `notif-banner notif-${type}`;
    div.innerHTML = `
        <div class="notif-icon">${icon}</div>
        <div class="notif-body" onclick="${onClick||''}">
            <div class="notif-title">${esc(titre)}</div>

        </div>
        <div class="notif-close" onclick="_fermerNotif('${id}')">✕</div>`;
    container.appendChild(div);

    /* Auto-dismiss après 5 secondes */
    setTimeout(() => _fermerNotif(id), 5000);

    /* Stocker dans l'historique local */
    _sauvegarderNotif({ type, icon, titre, sub, ts: Date.now() });
}

function _sauvegarderNotif(notif) {
    const key = 'av_notifs_' + _dateAujourd_hui();
    const list = JSON.parse(localStorage.getItem(key) || '[]');
    list.unshift(notif);

function _getNotifsAujourdhui() {

/* ── Centre de notifications (historique) ── */
function renderCentreNotifications() {
    const z = zone(); if (!z) return;
    const notifs = _getNotifsAujourdhui();
    z.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">

            <button class="btn-action btn-ghost" style="width:auto;margin:0;padding:6px 12px;font-size:11px"
                onclick="_effacerNotifs()">Tout effacer</button>
        </div>
        ${notifs.length ? (() => {
            /* Grouper par titre — ne garder que la plus récente de chaque type */
            const grouped = {};
            notifs.forEach(n => {
                const key = n.titre + '|' + (n.sub||'');
                if (!grouped[key]) grouped[key] = { ...n, count: 1 };
                else grouped[key].count++;
            });
            return Object.values(grouped).map(n => `
            <div style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:8px">

                <div style="flex:1">
                    <div style="display:flex;align-items:center;gap:8px">
                        <div style="font-size:13px;font-weight:700">${esc(n.titre)}</div>
                        ${n.count > 1 ? '<span style="background:var(--blue);color:#0d1b2a;font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px">×'+n.count+'</span>' : ''}
                    </div>
                    ${n.sub ? '<div style="font-size:11px;color:var(--text2);margin-top:2px">'+esc(n.sub)+'</div>' : ''}
                    <div style="font-size:10px;color:var(--text2);margin-top:4px">${new Date(n.ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
                </div>
            </div>`).join('');
        })()
        : '<div style="color:var(--text2);font-size:13px;padding:20px;text-align:center">Aucune notification aujourd\'hui</div>'}
        <button class="btn-action btn-ghost" onclick="Nav.back()" style="margin-top:8px">← Retour</button>`;

function _effacerNotifs() {
    localStorage.removeItem('av_notifs_' + _dateAujourd_hui());
    renderCentreNotifications();
    _setNotifBadgeHeader(0);

/* ── Badge cloche dans le header ─────── */

/* ══ INIT REALTIME — Version robuste ════
   Filtre sur ferme_id uniquement (pas bande_id)
   pour couvrir toutes les bandes de la ferme.
   Appelé une seule fois au startApp.
════════════════════════════════════════ */
function initRealtime() {
    /* Nettoyer les anciens canaux */
    if (App._realtimeChannels) {
        App._realtimeChannels.forEach(ch => {
            try { sb.removeChannel(ch); } catch(e) {}
        });
    }
    App._realtimeChannels = [];

    console.log('[Realtime] Initialisation pour rôle:', App.role);

    if (App.role === 'AGENT') {
        /* ── Canal A1 : Nouvelles tâches → Agent ── */
        const chTachesAgent = sb
            .channel('rt-agent-taches-' + App.userId)
            .on('postgres_changes', {
                event:  'INSERT',
                schema: 'public',
                table:  'taches'
            }, payload => {
                const t = payload.new;
                /* Vérifier ferme_id si présent dans le payload */
                if (t.ferme_id && t.ferme_id !== FERME_ID) return;
                /* Ignorer si créé par l'agent lui-même */
                if (t.cree_par === App.userId) return;

                /* Anti-doublon Realtime : ignorer si déjà notifié */
                const rtKey = 'av_rt_notif_' + t.id;
                if (localStorage.getItem(rtKey)) return;
                localStorage.setItem(rtKey, '1');

                const isAbattage = t.type_tache === 'ABATTAGE';
                const isPrep     = t.type_tache === 'BANDE';
                /* Passer tacheId pour marquage VUE au clic */
                showNotifTache(
                    isAbattage ? 'abattage' : 'tache',
                    isAbattage ? '🔪' : isPrep ? '🔧' : '📋',
                    isAbattage ? '🔪 Abattage planifié'
                              : isPrep ? '🔧 Tâche de préparation'
                              : '📋 Nouvelle tâche assignée',
                    t.titre,
                    t.id
                );
                _vibrateDevice();

                /* Màj données locales */
                if (!App.data.tachesAgent) App.data.tachesAgent = [];
                App.data.tachesAgent.push(t);

                /* Màj badge onglet Tâches */
                const nb = App.data.tachesAgent.filter(ta =>
                    ta.statut === 'A FAIRE' && !localStorage.getItem('av_done_'+ta.id)
                ).length;
                _setNavBadge('taches', nb);
                _setNotifBadgeHeader(_getNotifsAujourdhui().length);

                console.log('[Realtime] Agent reçoit tâche:', t.titre);
            })
            .subscribe(status => {
                console.log('[Realtime] Agent canal tâches:', status);
                _log('Agent canal tâches : ' + status, status==='SUBSCRIBED'?'ok':'err');
            });
        App._realtimeChannels.push(chTachesAgent);

        /* ── Canal A2 : Validation/Rejet → Agent ── */
        const chValidation = sb
            .channel('rt-agent-validation-' + App.userId)
            .on('postgres_changes', {
                event:  'UPDATE',
                schema: 'public',
                table:  'taches'
            }, payload => {
                const t = payload.new;
                if (t.ferme_id && t.ferme_id !== FERME_ID) return;
                /* Ignorer si c'est l'agent qui a fait le changement */
                if (t.statut !== 'VALIDEE' && t.statut !== 'REJETEE') return;

                const rtKey = 'av_rt_val_' + t.id;
                if (localStorage.getItem(rtKey)) return;
                localStorage.setItem(rtKey, '1');

                const isValidee = t.statut === 'VALIDEE';
                showNotif(
                    isValidee ? 'valide' : 'abattage',
                    isValidee ? '✅' : '❌',
                    isValidee ? 'Tâche validée par le gérant'
                              : 'Tâche rejetée par le gérant',
                    t.titre + (t.note && !isValidee ? ' — ' + t.note : '')
                );
                _vibrateDevice();
                _setNotifBadgeHeader(_getNotifsAujourdhui().length);
            })
            .subscribe(status => {
                _log('Agent canal validation : ' + status, status==='SUBSCRIBED'?'ok':'err');
            });
        App._realtimeChannels.push(chValidation);
    }

    if (App.role === 'GERANT') {
        /* ── Canal G1 : Tâches terminées → Gérant ── */
        const chTerminees = sb
            .channel('rt-gerant-taches-' + App.userId)
            .on('postgres_changes', {
                event:  'UPDATE',
                schema: 'public',
                table:  'taches'
            }, payload => {
                const t = payload.new;
                const ancienStatut = payload.old?.statut;

                /* Gérer les différentes transitions de statut */
                if (t.statut === 'VUE' && ancienStatut !== 'VUE') {
                    /* Agent a vu la notification */
                    const vueKey = 'av_rt_vue_' + t.id;
                    if (!localStorage.getItem(vueKey)) {
                        localStorage.setItem(vueKey, '1');
                        showNotif('session', '👁️',
                            'Notification vue par l\'agent', t.titre);
                        _vibrateDevice();
                        _setNotifBadgeHeader(_getNotifsAujourdhui().length);
                    }
                } else if (t.statut === 'TERMINEE' && ancienStatut !== 'TERMINEE') {
                    /* Agent a exécuté la tâche */
                    const doneKey = 'av_rt_done_' + t.id;
                    if (!localStorage.getItem(doneKey)) {
                        localStorage.setItem(doneKey, '1');
                        /* Notification avec bouton Valider/Rejeter */
                        showNotifValidation(t);
                        _vibrateDevice();
                        _setNotifBadgeHeader(_getNotifsAujourdhui().length);
                    }
                }

                console.log('[Realtime] Gérant reçoit UPDATE statut:', t.statut);
            })
            .subscribe(status => {
                console.log('[Realtime] Gérant canal tâches:', status);
                _log('Gérant canal tâches : ' + status, status==='SUBSCRIBED'?'ok':'err');
            });
        App._realtimeChannels.push(chTerminees);

        /* ── Canal G2 : Sessions agent → Gérant ── */
        const chSaisies = sb
            .channel('rt-gerant-saisies-' + App.userId)
            .on('postgres_changes', {
                event:  'INSERT',
                schema: 'public',
                table:  'saisies_techniques'
            }, payload => {
                const s = payload.new;
                if (s.ferme_id && s.ferme_id !== FERME_ID) return;
                if (s.agent_id === App.userId) return;

                /* Une seule notif par session */
                const key = 'av_rt_s_' + s.bande_id + '_' + s.date_saisie + '_' + s.session;
                if (localStorage.getItem(key)) return;
                localStorage.setItem(key, '1');

                const icons = {Matin:'🌅', Midi:'☀️', PM:'🌤️', Nuit:'🌙'};
                showNotif('session',
                    icons[s.session] || '📊',
                    'Session ' + (s.session||'') + ' envoyée',
                    'Données terrain reçues — ' + s.date_saisie
                );
                _vibrateDevice();
                _setNotifBadgeHeader(_getNotifsAujourdhui().length);

                /* Rafraîchir accueil gérant si on y est */
                if (Nav.stack[0]?.fn === 'renderGerant') {
                    setTimeout(() => renderGerant(), 1500);
                }
                console.log('[Realtime] Gérant reçoit session:', s.session);
            })
            .subscribe(status => {
                console.log('[Realtime] Gérant canal saisies:', status);
                _log('Gérant canal saisies : ' + status, status==='SUBSCRIBED'?'ok':'err');
            });
        App._realtimeChannels.push(chSaisies);
    }
}

/* ════════════════════════════════════════════
   ÉTAGE 9 — NAVIGATION
════════════════════════════════════════════ */
const Nav = {
    stack: [],
    push(fn, params) {
        Nav.stack.push({fn, params});
        history.pushState({fn, params}, '');
        Nav._run(fn, params);
        Nav._upBtn();
    },
    back() {
        if (Nav.stack.length <= 1) {
            Nav.stack = [];
            renderHome();
            Nav._upBtn();
            _navbarSetVisible(true);
            _setNavActive('accueil');
            return;
        }
        Nav.stack.pop();
        const prev = Nav.stack[Nav.stack.length - 1];
        Nav._run(prev.fn, prev.params);
        Nav._upBtn();
    },
    home() {
        Nav.stack = [];
        renderHome();
        Nav._upBtn();
        _navbarSetVisible(true);
        _setNavActive('accueil');
    },
    replace(fn, params) {
        if (Nav.stack.length) Nav.stack[Nav.stack.length-1] = {fn, params};
        else Nav.stack.push({fn, params});
        Nav._run(fn, params);
        Nav._upBtn();
    },
    _run(fn, params) {
        try {
            if (typeof window[fn] === 'function') {
                const res = window[fn](params);
                if (res && typeof res.catch === 'function') {
                    res.catch(e => { console.error('Nav async error:', e); showToast("Erreur d'affichage",'error'); });
                }
            } else {
                console.error('Nav: fonction inconnue:', fn);
                renderHome();
            }
        } catch(e) {
            console.error('Nav error:', e);
            showToast("Erreur d'affichage",'error');
        }
    },
    _upBtn() {
        const btn = document.getElementById('btn-back');
        if (btn) btn.style.display = Nav.stack.length > 1 ? 'inline-block' : 'none';
    }
};

/* ════════════════════════════════════════════
   ÉTAGE 10 — LOGIN (via Supabase)
════════════════════════════════════════════ */
let _pin = '';
let _loginBusy = false;
let _loginRole = '';

function choisirRole(role) {
    _loginRole = role;
    const labels = {GERANT:'🧑‍💼 Gérant — PIN', AGENT:'👷 Agent — PIN', PARTENAIRE:'🤝 Partenaire — PIN'};
    document.getElementById('pin-label').textContent = labels[role] || 'PIN';
    _pin = ''; _updateDots();
    document.getElementById('key-ok').classList.remove('ready');
    _hideErr();
    document.getElementById('screen-role').classList.add('hidden');
    document.getElementById('screen-pin').classList.remove('hidden');
}

function pinTap(digit) {
    if (_loginBusy || _pin.length >= 4) return;
    _pin += digit; _updateDots();
    if (_pin.length === 4) document.getElementById('key-ok').classList.add('ready');
    _hideErr();
}
function pinDel() {
    if (_loginBusy || !_pin.length) return;
    _pin = _pin.slice(0,-1);
    document.getElementById('key-ok').classList.remove('ready');
    _updateDots(); _hideErr();
}
function _updateDots() {
    for (let i=0; i<4; i++) {
        const d = document.getElementById('dot-'+i);
        if (d) d.classList.toggle('filled', i < _pin.length);
    }
}
function _showErr(msg) {
    const e = document.getElementById('pin-err'), d = document.getElementById('pin-display');
    if (e) { e.textContent = msg; e.classList.add('show'); }
    if (d) { d.classList.add('shake'); setTimeout(()=>d.classList.remove('shake'),450); }
}
function _hideErr() {
    const e = document.getElementById('pin-err');
    if (e) e.classList.remove('show');
}

async function doLogin() {
    if (_loginBusy) return;
    if (_pin.length !== 4) { _showErr('Saisissez 4 chiffres'); return; }
    _loginBusy = true;
    document.getElementById('pin-loading').classList.add('show');

    try {
        /* Recherche directe dans Supabase par PIN + rôle + ferme */
        const { data, error } = await sb
            .from('utilisateurs')
            .select('id, role, nom, id_partenaire')
            .eq('ferme_id', FERME_ID)
            .eq('pin', _pin)
            .eq('role', _loginRole)
            .eq('actif', true)
            .single();

        if (error || !data) {
            _showErr('PIN incorrect');
            _pin = ''; _updateDots();
            document.getElementById('key-ok').classList.remove('ready');
        } else {
            /* Mettre à jour last_login */
            await sb.from('utilisateurs').update({ last_login: new Date().toISOString() }).eq('id', data.id);

            App.userId    = data.id;
            App.role      = data.role;
            App.nom       = data.nom;
            App.idPart    = data.id_partenaire || '';
            App.loginTime = Date.now();

            localStorage.setItem('av_user_id', data.id);
            localStorage.setItem('av_role',    data.role);
            localStorage.setItem('av_nom',     data.nom);
            localStorage.setItem('av_idpart',  data.id_partenaire || '');
            localStorage.setItem('av_lt',      String(App.loginTime));

            document.getElementById('screen-pin').classList.add('hidden');
            document.getElementById('app-main').style.display = 'block';
            startApp();
        }
    } catch(e) {
        _showErr('Erreur réseau — réessayez');
        console.error('doLogin:', e);
    } finally {
        _loginBusy = false;
        document.getElementById('pin-loading').classList.remove('show');
    }
}

async function doLogout() {
    ['av_user_id','av_role','av_nom','av_idpart','av_lt','av_bande'].forEach(k => localStorage.removeItem(k));
    if (App._realtimeChannel) sb.removeChannel(App._realtimeChannel);
    App.userId = null; App.role = null; App.nom = ''; App.loginTime = 0;
    location.reload();
}

async function doLogoutFromRole() {
    if (App.userId) await doLogout();
    else setTimeout(() => location.reload(), 400);
}

async function renderGerant() {

        /* CRU = total dépenses / effectif vivants actuels */

        const totalDepenses   = fi.totalDepenses || 0;
        const cru             = totalDepenses > 0 ? Math.round(totalDepenses / effectifVivants) : 0;
        const cruColor        = cru > 3500 ? 'var(--red)' : cru > 2500 ? 'var(--orange)' : cru > 0 ? 'var(--green)' : 'var(--text2)';

const TACHES_QUOTIDIENNES = [
    { titre:'Nettoyage abreuvoirs et eau',   typeTache:'QUOTIDIEN' },
    { titre:'Relevé ambiance (T° + hygro)',  typeTache:'QUOTIDIEN' },
    { titre:'Mortalité matin',               typeTache:'QUOTIDIEN' },
    { titre:'Compteur eau matin',            typeTache:'QUOTIDIEN' },
    { titre:'Aliment distribué (kg)',        typeTache:'QUOTIDIEN' },
    { titre:'Relevé ambiance Midi',          typeTache:'QUOTIDIEN' },
    { titre:'Relevé ambiance PM',            typeTache:'QUOTIDIEN' },
    { titre:'Mortalité soir',               typeTache:'QUOTIDIEN' },
    { titre:'Compteur eau soir',             typeTache:'QUOTIDIEN' },
    { titre:'Santé générale du lot',         typeTache:'QUOTIDIEN' },
];

async function envoyerTachesQuotidiennes(bandeId, dateStr) {
    if (!bandeId) { showToast('Aucune bande active','warning'); return; }

    /* Vérification double côté localStorage */
    const key = 'av_taches_envoyees_'+bandeId+'_'+dateStr;
    if (localStorage.getItem(key) === 'true') {
        showToast('Tâches déjà envoyées pour cette date','warning'); return;
    }
    if (!guardDouble('envoi_taches_'+bandeId+'_'+dateStr)) return;

    /* Vérification double côté DB — évite les doublons si localStorage effacé */
    const { data: existing } = await sb
        .from('taches')
        .select('id')
        .eq('ferme_id', FERME_ID)
        .eq('bande_id', bandeId)
        .eq('date_prevue', dateStr)
        .eq('type_tache', 'QUOTIDIEN')
        .limit(1);

    if (existing && existing.length > 0) {
        localStorage.setItem(key, 'true');
        showToast('Tâches déjà envoyées pour cette date','warning');
        return;
    }

    showToast('⏳ Envoi des tâches…','info',2000);
    let nb = 0;
    for (const t of TACHES_QUOTIDIENNES) {
        const r = await creerTache(t.titre, bandeId, t.typeTache, dateStr);
        if (r && !r.queued) nb++;
    }
    localStorage.setItem(key, 'true');
    showToast('✅ '+nb+' tâches envoyées à l\'agent','success',4000);
}

async function _validerCreerBande() {
    const batId = document.getElementById('nb-bat')?.value;
    const id    = document.getElementById('nb-id')?.value.trim();
    const race  = document.getElementById('nb-race')?.value;
    if (!batId) { showToast('Choisissez un poulailler','warning'); return; }
    if (!id)    { showToast('ID de bande obligatoire','warning'); return; }
    if (!guardDouble('creer_bande')) return;

    /* Créer la bande en statut PREPARATION — le bâtiment reste LIBRE */
    const today = _dateAujourd_hui();
    const { data: nouvBande, error } = await sb.from('bandes').insert({
        ferme_id:         FERME_ID,
        batiment_id:      batId,
        id_bande:         id,
        date_arrivee:     today,
        effectif_initial: 1,   /* provisoire — remplacé à "Démarrer la bande" */
        race:             race,
        statut:           'PREPARATION'
    }).select().single();

    if (error) { showToast('Erreur création bande','error'); console.error(error); return; }
    /* Le bâtiment reste LIBRE jusqu'au clic "Démarrer la bande" */

    showToast('✅ Bande créée — phase Préparation','success');
    App.activeBande = nouvBande.id;
    localStorage.setItem('av_bande', nouvBande.id);

    /* Aller directement à la phase Préparation */
    Nav.replace('renderCycleVie', nouvBande.id);
}

   3 phases séquentielles :
   PRÉPARATION → GESTION → ABATTAGE

════════════════════════════════════════════ */

    { id:'desinfect',   icon:'🧴', label:'Désinfection sols et murs' },
    { id:'litiere',     icon:'🌾', label:'Mise en place litière propre' },

async function renderCycleVie(bandeId) {
    const z = zone(); if (!z) return;
    if (!bandeId) { Nav.back(); return; }
    App.activeBande = bandeId;
    localStorage.setItem('av_bande', bandeId);
    z.innerHTML = `<div style="text-align:center;padding:40px"><div class="spinner"></div></div>`;

    /* Charger la bande + bâtiment */
    const { data: bande, error } = await sb
        .from('bandes')
        .select('*, batiments(id, numero, nom, statut)')
        .eq('id', bandeId)
        .single();

    if (error || !bande) { showToast('Bande introuvable','error'); Nav.back(); return; }

    /* Déterminer la phase active selon statut de la BANDE (pas du bâtiment) */
    const bandeStatut = bande.statut || 'PREPARATION';
    const batStatut   = bande.batiments?.statut || 'LIBRE';

    /* Vérifier s'il existe une tâche ABATTAGE */
    const { data: tachesAb } = await sb
        .from('taches')
        .select('id, statut')
        .eq('bande_id', bandeId)
        .eq('type_tache', 'ABATTAGE')
        .in('statut', ['A FAIRE', 'TERMINEE']);

    const hasAbattage = (tachesAb || []).length > 0;

    /* Phase active — basée sur le statut de la BANDE */
    let phaseActive = 'preparation';
    if (bandeStatut === 'EN COURS') {
        phaseActive = hasAbattage ? 'abattage' : 'gestion';
    } else if (bandeStatut === 'CLOTURE') {
        phaseActive = 'cloture';
    }
    /* bandeStatut === 'PREPARATION' → phaseActive reste 'preparation' */

    /* Construire les onglets */
    const tabs = [
        { id:'preparation', icon:'🔧', label:'Prépa.',  disabled: bandeStatut === 'EN COURS' || bandeStatut === 'CLOTURE' },
        { id:'gestion',     icon:'🐔', label:'Gestion', disabled: bandeStatut === 'PREPARATION' || bandeStatut === 'LIBRE' },
        { id:'abattage',    icon:'🔪', label:'Abattage',disabled: !hasAbattage },
    ];

    const tabsHTML = tabs.map(t => {
        const cls     = 'cycle-tab' + (phaseActive===t.id?' active':'') + (t.disabled?' disabled':'');
        const onclick = t.disabled ? '' : `onclick="_switchCycleTab('${t.id}','${bandeId}','${batStatut}',${hasAbattage})"`;
        return '<button class="' + cls + '" ' + onclick + '>'
             + '<div style="font-size:16px;margin-bottom:3px">' + t.icon + '</div>'
             + t.label
             + '</button>';
    }).join('');

    /* Header bande */
    const batNum = bande.batiments?.numero || '?';
    const ageJours = Math.floor((new Date() - new Date(bande.date_arrivee)) / 86400000);

    z.innerHTML = `
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px 16px;margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
                <div>
                    <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Poulailler ${batNum}</div>
                    <div style="font-weight:800;font-size:17px">${esc(bande.id_bande)}</div>
                    <div style="font-size:11px;color:var(--text2);margin-top:3px">${esc(bandeStatut)}${bande.race?' · '+esc(bande.race):''}${bandeStatut==='EN COURS'?' · J'+ageJours:''}</div>
                </div>
                <button onclick="Nav.push('_supprimerBande','${bande.id}|${bande.id_bande}')"
                        style="background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);color:var(--red);border-radius:10px;padding:6px 10px;font-size:10px;font-weight:700;cursor:pointer;font-family:Lexend,sans-serif;-webkit-tap-highlight-color:transparent">
                    🗑️
                </button>
            </div>
        </div>
        <div class="cycle-tabs">${tabsHTML}</div>
        <div id="cycle-content"></div>`;

    /* Render du contenu de la phase active */
    _renderCycleContenu(phaseActive, bande, hasAbattage);
}

/* ── Suppression bande (soft delete) ── */
async function _supprimerBande(params) {
    /* params peut être "bandeId|idBande" (depuis Nav.push) ou deux args séparés */
    let bandeId, idBande;
    if (typeof params === 'string' && params.includes('|')) {
        [bandeId, idBande] = params.split('|');
    } else {
        bandeId = params; idBande = params;
    }
    const z = zone(); if (!z) return;
    z.innerHTML = `
        <div class="card" style="border:2px solid rgba(255,68,68,.4);margin-top:20px">
            <div class="card-title" style="color:var(--red)">⚠️ Supprimer la bande</div>
            <div style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:16px;
                        background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.2);
                        border-radius:12px;padding:12px">
                La bande <strong style="color:var(--text)">${esc(idBande)}</strong> sera
                retirée de l'application.<br>
                <strong style="color:var(--green)">Les données restent en base de données</strong>
                et pourront être consultées par l'administrateur.<br><br>
                Tapez <strong style="color:var(--text)">SUPPRIMER</strong> pour confirmer.
            </div>
            <input class="f-input" type="text" id="confirm-suppr"
                   placeholder="Tapez SUPPRIMER"
                   style="text-transform:uppercase;letter-spacing:2px;text-align:center;font-weight:800">
            <button class="btn-action btn-red" onclick="_confirmerSuppression('${bandeId}','${esc(idBande)}')">
                🗑️ Confirmer la suppression
            </button>
            <button class="btn-action btn-ghost" onclick="Nav.back()">Annuler</button>
        </div>`;
    Nav.stack.push({fn:'_supprimerBande', params:bandeId}); Nav._upBtn();
}

async function _confirmerSuppression(bandeId, idBande) {
    const val = document.getElementById('confirm-suppr')?.value.trim().toUpperCase();
    if (val !== 'SUPPRIMER') { showToast('Tapez exactement SUPPRIMER','warning'); return; }
    if (!guardDouble('suppr_bande')) return;

    /* Soft delete : is_deleted = true */
    const { error } = await sb
        .from('bandes')
        .update({ is_deleted: true })
        .eq('id', bandeId);

    if (error) { showToast('Erreur suppression','error'); console.error(error); return; }

    /* Libérer le bâtiment */
    const { data: b } = await sb.from('bandes').select('batiment_id').eq('id', bandeId).single();
    if (b?.batiment_id) {
        await sb.from('batiments').update({ statut: 'LIBRE' }).eq('id', b.batiment_id);
    }

    showToast('✅ Bande supprimée de l\'application','success',4000);
    Nav.home();
}

function _switchCycleTab(tabId, bandeId, batStatut, hasAbattage) {
    /* Mettre à jour les onglets visuellement */
    document.querySelectorAll('.cycle-tab').forEach((btn, i) => {
        const ids = ['preparation','gestion','abattage'];
        btn.classList.toggle('active', ids[i] === tabId);
    });
    /* Recharger le contenu */
    sb.from('bandes').select('*, batiments(id,numero,nom,statut)').eq('id', bandeId).single()
        .then(({data:bande}) => { if (bande) _renderCycleContenu(tabId, bande, hasAbattage); });
}

function _renderCycleContenu(phase, bande, hasAbattage) {
    const cc = document.getElementById('cycle-content');
    if (!cc) return;
    if (phase === 'preparation') _renderTabPreparation(bande, cc);
    else if (phase === 'gestion') _renderTabGestion(bande, cc);
    else if (phase === 'abattage') _renderTabAbattage(bande, cc);
}

/* ── Envoyer tâches de préparation à l'agent ── */
async function _envoyerTachesPreparation(bandeId) {
    if (!guardDouble('taches_prep_'+bandeId)) return;

    const date = _dateAujourd_hui();

    /* Vérification DB — évite les doublons */
    const { data: existingPrep } = await sb
        .from('taches')
        .select('id')
        .eq('ferme_id', FERME_ID)
        .eq('bande_id', bandeId)
        .eq('type_tache', 'BANDE')
        .limit(1);

    if (existingPrep && existingPrep.length > 0) {
        localStorage.setItem('av_taches_prep_envoyees_' + bandeId, 'true');
        showToast('Tâches de préparation déjà envoyées','warning');
        return;
    }

    let nb = 0;
    for (const item of CHECKLIST_PREP) {
        const r = await creerTache(item.label, bandeId, 'BANDE', date);
        if (r && !r.queued) nb++;
    }

    localStorage.setItem('av_taches_prep_envoyees_' + bandeId, 'true');
    showToast('✅ ' + nb + ' tâches envoyées à l\'agent','success', 4000);

    /* Recharger l'onglet préparation */
    const { data: bande } = await sb
        .from('bandes')
        .select('*, batiments(id,numero,nom,statut)')
        .eq('id', bandeId).single();
    if (bande) _renderTabPreparation(bande, document.getElementById('cycle-content'));
}

function _toggleCheck(bandeId, itemId) {
    const key = 'av_prep_' + bandeId;
    let st = {}; try { st = JSON.parse(localStorage.getItem(key)||'{}'); } catch(_) {}
    st[itemId] = !st[itemId];
    localStorage.setItem(key, JSON.stringify(st));
    /* Recharger l'onglet préparation */
    sb.from('bandes').select('*, batiments(id,numero,nom,statut)').eq('id', bandeId).single()
        .then(({data:bande}) => { if (bande) _renderTabPreparation(bande, document.getElementById('cycle-content')); });
}

function _saveInv(bandeId, itemId, value) {
    const key = 'av_prep_' + bandeId;
    let st = {}; try { st = JSON.parse(localStorage.getItem(key)||'{}'); } catch(_) {}
    st[itemId] = isNaN(parseFloat(value)) ? value : parseFloat(value)||0;
    localStorage.setItem(key, JSON.stringify(st));
}

/* ── Dépenses de préparation ─────────── */
function _ouvrirDepensePrep(bandeId, itemId) {
    const key = 'av_prep_' + bandeId;
    let st = {}; try { st = JSON.parse(localStorage.getItem(key)||'{}'); } catch(_) {}
    st._depenseActive = itemId;
    localStorage.setItem(key, JSON.stringify(st));
    /* Recharger l'onglet pour afficher le formulaire */
    sb.from('bandes').select('*, batiments(id,numero,nom,statut)')
        .eq('id', bandeId).single()
        .then(({data:bande}) => {
            if (bande) _renderTabPreparation(bande, document.getElementById('cycle-content'));
        });
}

function _fermerDepensePrep(bandeId) {
    const key = 'av_prep_' + bandeId;
    let st = {}; try { st = JSON.parse(localStorage.getItem(key)||'{}'); } catch(_) {}
    delete st._depenseActive;
    localStorage.setItem(key, JSON.stringify(st));
    sb.from('bandes').select('*, batiments(id,numero,nom,statut)')
        .eq('id', bandeId).single()
        .then(({data:bande}) => {
            if (bande) _renderTabPreparation(bande, document.getElementById('cycle-content'));
        });
}

async function _validerDepensePrep(bandeId, itemId, itemLabel) {
    const montant = parseFloat(document.getElementById('dep-montant-'+itemId)?.value);
    const desc    = document.getElementById('dep-desc-'+itemId)?.value.trim();
    if (!montant || montant <= 0) { showToast('Saisissez un montant valide','warning'); return; }
    if (!guardDouble('dep_prep_'+itemId)) return;

    /* Enregistrer dans le journal */
    const r = await ecritureJournal(
        bandeId,
        'DEPENSE',
        'Préparation bâtiment',
        desc || itemLabel,
        montant,
        { unite:'forfait', quantite:1, prixUnitaire:montant }
    );

    if (!r) { showToast('Erreur enregistrement journal','error'); return; }

    /* Sauvegarder la dépense localement + fermer le formulaire */
    const key = 'av_prep_' + bandeId;
    let st = {}; try { st = JSON.parse(localStorage.getItem(key)||'{}'); } catch(_) {}
    st['dep_'+itemId] = { montant, desc: desc || itemLabel, journalId: r.id };
    delete st._depenseActive;
    localStorage.setItem(key, JSON.stringify(st));

    showToast('✅ Dépense de '+fmt(montant)+' FCFA enregistrée dans le journal','success',4000);

    /* Recharger */
    sb.from('bandes').select('*, batiments(id,numero,nom,statut)')
        .eq('id', bandeId).single()
        .then(({data:bande}) => {
            if (bande) _renderTabPreparation(bande, document.getElementById('cycle-content'));
        });
}

async function _demarrerBande(bandeId) {
    if (!guardDouble('demarrer_bande')) return;
    const key = 'av_prep_' + bandeId;
    let st = {}; try { st = JSON.parse(localStorage.getItem(key)||'{}'); } catch(_) {}

    const effectif = parseInt(st.effectif);
    const dateArrivee = st.dateArrivee;

    if (!effectif || effectif <= 0) { showToast('Saisissez l\'effectif attendu','warning'); return; }
    if (!dateArrivee) { showToast('Saisissez la date d\'arrivée','warning'); return; }

    /* Mettre à jour la bande : effectif réel + date + statut EN COURS */
    const { error: errBande } = await sb
        .from('bandes')
        .update({
            effectif_initial: effectif,
            date_arrivee:     dateArrivee,
            statut:           'EN COURS'
        })
        .eq('id', bandeId);

    if (errBande) { showToast('Erreur démarrage bande','error'); console.error(errBande); return; }

    /* Mettre à jour le bâtiment EN COURS maintenant */
    const { data: bandePourBat } = await sb
        .from('bandes').select('batiment_id').eq('id', bandeId).single();
    if (bandePourBat?.batiment_id) {
        await sb.from('batiments')
            .update({ statut: 'EN COURS' })
            .eq('id', bandePourBat.batiment_id);
    }

    showToast('🚀 Bande démarrée — phase Gestion activée','success',4000);
    Nav.replace('renderCycleVie', bandeId);
}

/* ── Journal ─────────────────────────── */
async function renderJournal(bandeId) {
    const z = zone(); if (!z) return;
    const bid = bandeId || App.activeBande;
    if (!bid) { showToast('Aucune bande active','warning'); return; }
    z.innerHTML = `<div style="text-align:center;padding:40px"><div class="spinner"></div></div>`;
    const lignes = await getJournal(bid);
    let solde = 0;
    /* Récupérer l'effectif vivant pour le CRU */
    const { data: bandePourCRU } = await sb
        .from('bandes').select('effectif_initial').eq('id', bid).single();
    const { data: mortsData } = await sb
        .from('saisies_techniques')
        .select('valeur')
        .eq('bande_id', bid)
        .in('categorie', ['MortaliteMatin','MortaliteSoir']);
    const totalMorts = (mortsData||[]).reduce((s,m) => s+(parseFloat(m.valeur)||0), 0);
    const effectifVivants = Math.max(1, (bandePourCRU?.effectif_initial||1) - totalMorts);

    let soldeCumul = 0;
    const lignesHTML = lignes.length ? lignes.map(l => {
        const isDep = l.type_ecriture === 'DEPENSE';
        const mnt = parseFloat(l.montant)||0;
        soldeCumul += isDep ? -mnt : mnt;
        const soldeC = soldeCumul>=0?'var(--green)':'var(--red)';
        /* CRU à cet instant = total dépenses cumulées / effectif vivants */
        const depCumul = lignes.slice(0, lignes.indexOf(l)+1)
            .filter(x => x.type_ecriture==='DEPENSE')
            .reduce((s,x) => s+(parseFloat(x.montant)||0), 0);
        const cruInstant = depCumul > 0 ? Math.round(depCumul / effectifVivants) : 0;
        return `<div style="border-bottom:1px solid var(--border);padding:10px 0">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
                <div style="flex:1">
                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
                        <span style="font-size:9px;font-weight:800;padding:2px 6px;border-radius:6px;background:${isDep?'rgba(255,68,68,.15)':'rgba(0,200,150,.15)'};color:${isDep?'var(--red)':'var(--green)'}">${isDep?'DEP':'REC'}</span>
                        <span style="font-size:12px;font-weight:700">${esc(l.libelle||l.categorie)}</span>
                    </div>
                    <div style="font-size:10px;color:var(--text2)">${esc(l.date_ecriture)}</div>
                </div>
                <div style="text-align:right">
                    <div style="font-size:13px;font-weight:800;color:${isDep?'var(--red)':'var(--green)'}">${isDep?'−':'+'}${fmt(l.montant)} F</div>
                    <div style="font-size:9px;color:${soldeC}">Solde : ${soldeCumul>=0?'+':''}${fmt(soldeCumul)} F</div>
                    ${cruInstant>0?`<div style="font-size:9px;color:var(--text2)">CRU : ${fmt(cruInstant)} F/sujet</div>`:''}
                </div>
            </div>
        </div>`;
    }).join('') : '<div style="color:var(--text2);font-size:13px;padding:16px 0;text-align:center">Aucune écriture</div>';

    const totalDep   = lignes.filter(l=>l.type_ecriture==='DEPENSE').reduce((s,l)=>s+(parseFloat(l.montant)||0),0);
    const totalRec   = lignes.filter(l=>l.type_ecriture==='RECETTE').reduce((s,l)=>s+(parseFloat(l.montant)||0),0);
    const soldeFinal = totalRec - totalDep;
    const soldeColor = soldeFinal>=0?'var(--green)':'var(--red)';
    const cruFinal   = totalDep > 0 ? Math.round(totalDep / effectifVivants) : 0;
    const cruFinalColor = cruFinal > 3500?'var(--red)':cruFinal > 2500?'var(--orange)':'var(--green)';

    z.innerHTML = `
        <div class="card" style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
                <div><div style="font-weight:800;font-size:15px">📒 Journal</div><div style="font-size:11px;color:var(--text2)">${lignes.length} écriture${lignes.length>1?'s':''}</div></div>
                <div style="text-align:right"><div style="font-size:14px;font-weight:800;color:${soldeColor}">${soldeFinal>=0?'+':''}${fmt(soldeFinal)} FCFA</div></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
                <div style="background:var(--bg3);border-radius:10px;padding:10px;text-align:center">
                    <div style="font-size:12px;font-weight:800;color:var(--red)">−${fmt(totalDep)} F</div>
                    <div style="font-size:10px;color:var(--text2);margin-top:2px">Dépenses</div>
                </div>
                <div style="background:var(--bg3);border-radius:10px;padding:10px;text-align:center">
                    <div style="font-size:12px;font-weight:800;color:var(--green)">+${fmt(totalRec)} F</div>
                    <div style="font-size:10px;color:var(--text2);margin-top:2px">Recettes</div>
                </div>
                <div style="background:var(--bg3);border-radius:10px;padding:10px;text-align:center;border:1px solid ${cruFinal>0?cruFinalColor.replace(')',', .3)').replace('var(--','rgba('):'var(--border)'}">
                    <div style="font-size:12px;font-weight:800;color:${cruFinalColor}">${cruFinal>0?fmt(cruFinal)+' F':'—'}</div>
                    <div style="font-size:10px;color:var(--text2);margin-top:2px">CRU/sujet</div>
                </div>
            </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
            <button class="btn-action btn-red" style="margin:0;font-size:11px" onclick="Nav.push('renderNouvelleEcriture',JSON.stringify({bandeId:'${bid}',type:'DEPENSE'}))">📤 Dépense</button>
            <button class="btn-action btn-green" style="margin:0;font-size:11px" onclick="Nav.push('renderNouvelleEcriture',JSON.stringify({bandeId:'${bid}',type:'RECETTE'}))">📥 Recette</button>
        </div>
        <div class="card">${lignesHTML}</div>`;
}

function renderNouvelleEcriture(paramsStr) {
    const z = zone(); if (!z) return;
    let params = {}; try { params = JSON.parse(paramsStr); } catch(_) {}
    const { bandeId, type } = params;
    const isDep = type === 'DEPENSE';
    const categories = isDep
        ? ['Aliment','Poussin','Vaccin/Médicament','Main d\'œuvre','Eau','Électricité','Transport','Autre dépense']
        : ['Vente poulet vif','Vente poulet abattu','Remboursement','Autre recette'];
    z.innerHTML = `
        <div class="card">
            <div class="card-title" style="color:${isDep?'var(--red)':'var(--green)'}">${isDep?'📤 Nouvelle dépense':'📥 Nouvelle recette'}</div>
            <label class="f-label">Catégorie</label>
            <select class="f-input" id="ec-cat"><option value="">-- Choisir --</option>${categories.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('')}</select>
            <label class="f-label">Libellé</label>
            <input class="f-input" type="text" id="ec-libelle" placeholder="Détail de l'opération">
            <label class="f-label">Montant (FCFA)</label>
            <input class="f-input" type="number" id="ec-montant" placeholder="Ex: 15000" inputmode="numeric">
            <button class="btn-action ${isDep?'btn-red':'btn-green'}" onclick="_validerEcriture('${esc(bandeId)}','${type}')">✅ Enregistrer</button>

        </div>`;
}

async function _validerEcriture(bandeId, type) {
    const cat     = document.getElementById('ec-cat')?.value;
    const libelle = document.getElementById('ec-libelle')?.value.trim();
    const montant = parseFloat(document.getElementById('ec-montant')?.value);
    if (!cat)               { showToast('Choisissez une catégorie','warning'); return; }
    if (!montant || montant<=0) { showToast('Montant invalide','warning'); return; }
    if (!guardDouble('ecriture')) return;
    const r = await ecritureJournal(bandeId, type, cat, libelle||cat, montant);
    if (r) { showToast('✅ Écriture enregistrée','success'); Nav.back(); }
    else   { showToast('Erreur enregistrement','error'); }
}

                + '<input class="f-input" type="text" id="tdep-desc-'+tid+'" placeholder="Description" style="margin-bottom:8px">'
                + '<div style="display:flex;gap:8px">'
                + '<button class="btn-action btn-green" style="margin:0;padding:10px;font-size:12px;flex:1"'

        + types.map(t => '<div class="choice-btn" style="padding:14px 8px;text-align:center"'

/* ── Valider / Rejeter tâche depuis la fiche bande ── */
async function _validerTacheBande(tacheId) {
    if (!guardDouble('val_'+tacheId)) return;

        showToast('✅ Tâche validée — agent notifié','success',4000);

function _rejeterTacheBande(tacheId, titre) {
    const formId = 'form-rejet-' + tacheId;
    let ex = document.getElementById(formId); if (ex) { ex.remove(); return; }
    const form = document.createElement('div');
    form.id = formId;
    form.style.cssText = 'position:fixed;bottom:80px;left:12px;right:12px;background:var(--bg2);'
        + 'border:1px solid var(--red);border-radius:16px;padding:16px;z-index:900;'
        + 'box-shadow:0 4px 24px rgba(0,0,0,.5)';
    form.innerHTML = '<div style="font-weight:800;font-size:13px;color:var(--red);margin-bottom:8px">❌ Rejeter : ' + esc(titre) + '</div>'
        + '<textarea id="motif-'+tacheId+'" rows="3" placeholder="Motif du rejet (obligatoire)" '
        + 'style="width:100%;padding:10px;background:var(--bg3);border:1px solid var(--border);'
        + 'border-radius:10px;color:var(--text);font-family:Lexend,sans-serif;font-size:13px;'
        + 'resize:none;outline:none;margin-bottom:10px"></textarea>'
        + '<div style="display:flex;gap:8px">'
        + '<button onclick="_confirmerRejetBande(\''+tacheId+'\',\''+formId+'\')" '
        + 'style="flex:1;padding:10px;border:none;border-radius:10px;background:var(--red);'
        + 'color:#fff;font-family:Lexend,sans-serif;font-size:12px;font-weight:800;cursor:pointer">Confirmer</button>'
        + '<button onclick="document.getElementById(\''+formId+'\').remove()" '
        + 'style="padding:10px;border:1px solid var(--border);border-radius:10px;background:transparent;'
        + 'color:var(--text2);font-family:Lexend,sans-serif;font-size:12px;cursor:pointer">Annuler</button>'
        + '</div>';
    document.body.appendChild(form);
}

async function _confirmerRejetBande(tacheId, formId) {
    const motif = document.getElementById('motif-'+tacheId)?.value.trim();
    if (!motif) { showToast('Saisissez un motif','warning'); return; }
    document.getElementById(formId)?.remove();
    const r = await rejeterTache(tacheId, motif);
    if (r) { showToast('❌ Tâche rejetée — agent notifié','warning',4000); Nav.replace('renderTachesBande', App.activeBande); }
    else   { showToast('Erreur rejet','error'); }
}

/* ── Dépenses liées aux tâches ──────── */
function _ouvrirDepenseTache(bandeId, tacheId) {
    localStorage.setItem('av_dep_active_'+bandeId, tacheId);
    Nav.replace('renderTachesBande', bandeId);
}

async function _validerDepenseTache(bandeId, tacheId, titreTache) {
    const montant = parseFloat(document.getElementById('tdep-montant-'+tacheId)?.value);
    const desc    = document.getElementById('tdep-desc-'+tacheId)?.value.trim();
    if (!montant || montant <= 0) { showToast('Saisissez un montant valide','warning'); return; }
    if (!guardDouble('dep_tache_'+tacheId)) return;

    /* Enregistrer dans le journal de la bande */
    const r = await ecritureJournal(
        bandeId,
        'DEPENSE',
        titreTache,
        desc || titreTache,
        montant,
        { unite:'forfait', quantite:1, prixUnitaire:montant }
    );

    if (!r) { showToast('Erreur enregistrement journal','error'); return; }

    /* Sauvegarder localement */
    const key  = 'av_dep_taches_'+bandeId;
    const deps = JSON.parse(localStorage.getItem(key) || '{}');
    deps[tacheId] = { montant, desc: desc || titreTache, journalId: r.id };
    localStorage.setItem(key, JSON.stringify(deps));
    localStorage.removeItem('av_dep_active_'+bandeId);

    showToast('✅ Dépense de '+fmt(montant)+' FCFA enregistrée dans le journal','success',4000);
    Nav.replace('renderTachesBande', bandeId);
}

async function renderPlanAbattage(bandeId) {

async function _validerAbattage(bandeId) {
    const nb     = parseInt(document.getElementById('ab-nb')?.value);
    const date   = document.getElementById('ab-date')?.value;
    const client = document.getElementById('ab-client')?.value.trim();
    if (!nb || nb<=0) { showToast('Nombre de sujets requis','warning'); return; }
    if (!date) { showToast('Date requise','warning'); return; }
    if (!guardDouble('abattage')) return;
    const titre = `Abattage ${nb} sujets${client?' — '+client:''}`;
    const r = await creerTache(titre, bandeId, 'ABATTAGE', date);
    if (r) { showToast('✅ Abattage planifié — agent notifié','success'); Nav.back(); }
    else   { showToast('Erreur planification','error'); }
}

/* ── Double appui tâche ──────────────── */
const _tacheTimers = {};
function _tachePremierAppui(idTache, titre) {
    const btn = document.getElementById('btn-fait-'+idTache);
    if (!btn) return;
    if (btn.dataset.confirming === 'true') { _tacheDeuxiemeAppui(idTache, titre); return; }
    btn.dataset.confirming = 'true';
    btn.classList.add('confirmer');
    btn.textContent = '✅ Confirmer ? (3s)';
    let countdown = 3;
    const iv = setInterval(() => {
        countdown--;
        if (btn.dataset.confirming === 'true' && countdown > 0) btn.textContent = `✅ Confirmer ? (${countdown}s)`;
        else clearInterval(iv);
    }, 1000);
    _tacheTimers[idTache] = setTimeout(() => {
        clearInterval(iv);
        if (btn && btn.dataset.confirming === 'true') {
            btn.dataset.confirming = 'false';
            btn.classList.remove('confirmer');
            btn.textContent = 'À FAIRE';
        }
    }, 3000);
}

async function _tacheDeuxiemeAppui(idTache, titre) {
    if (_tacheTimers[idTache]) { clearTimeout(_tacheTimers[idTache]); delete _tacheTimers[idTache]; }
    const btn  = document.getElementById('btn-fait-'+idTache);
    const card = document.getElementById('tcard-'+idTache);
    if (btn)  { btn.dataset.confirming='false'; btn.classList.remove('confirmer'); btn.classList.add('done'); btn.textContent='✅ FAIT'; btn.onclick=null; }
    if (card) card.classList.add('accomplie');
    localStorage.setItem('av_done_'+idTache, 'true');
    _vibrateDevice();
    const r = await terminerTache(idTache);
    if (r) showToast('✅ Tâche accomplie — gérant notifié','success');
    else   showToast('📴 Tâche sauvegardée localement','warning');
}
