function _validerAmbiance(etapeId) { const temp=_pavGet('temp'),hygro=_pavGet('hygro'); if(temp===null){showToast('Saisissez la température','warning');return;} if(hygro===null){showToast("Saisissez l'hygrométrie",'warning');return;} if(App._session._litiereScore===null){showToast("Sélectionnez l'état de la litière",'warning');return;} App._session.reponses[etapeId]={temp,hygro,litiere:App._session._litiereScore}; delete App._pavBuffers['temp']; delete App._pavBuffers['hygro']; App._session.etapeIdx++; _renderEtape(); }
function _repNumber(etapeId,unite,min,max) { const val=_pavGet('val_'+etapeId); if(val===null){showToast('Saisissez une valeur','warning');return;} const v=sanitizeNum(val,min,max); if(v===null){showToast(`Valeur invalide (${min}–${max} ${unite})`,'warning');return;} App._session.reponses[etapeId]=val; delete App._pavBuffers['val_'+etapeId]; _etapeSuivante(val,val+' '+unite); }
function _repPesee() { const val=_pavGet('pesee_val'); if(val===null){showToast('Saisissez le poids moyen','warning');return;} App._session.reponses['pesee']=val; delete App._pavBuffers['pesee_val']; _etapeSuivante(val,val+' g'); }
function _selectSanteColor(couleur) { App._session._santeScore=couleur==='vert'?5:couleur==='orange'?3:1; App._session._santeCouleur=couleur; ['vert','orange','rouge'].forEach(c=>{const btn=document.getElementById('sante-'+c);if(!btn)return;const isDef=c!==couleur;btn.style.opacity=isDef?'.5':'1';btn.style.transform=isDef?'scale(1)':'scale(1.02)';}); }
function _repSante() { if(!App._session._santeScore){showToast('Sélectionnez un état de santé','warning');return;} const obs=document.getElementById('sante-obs')?.value||''; const label=App._session._santeCouleur==='vert'?'🟢 BON':App._session._santeCouleur==='orange'?'🟡 MOYEN':'🔴 MAUVAIS'; App._session.reponses['sante']={score:App._session._santeScore,couleur:App._session._santeCouleur,label,obs}; _etapeSuivante(App._session._santeScore,label); }
function _etapeSuivante(valeur,label) { const sid=App._session.id,idx=App._session.etapeIdx; const e=(SESSION_ETAPES[sid]||[])[idx]; if(e)App._session.reponses[e.id]=valeur; App._session.etapeIdx++; _renderEtape(); }

function _renderSessionResume() {
    const z=zone();if(!z)return;
    const sid=App._session.id,rep=App._session.reponses,etapes=SESSION_ETAPES[sid]||[];
    const labels={Matin:'🌅 Matin',Midi:'☀️ Midi',PM:'🌤️ PM',Nuit:'🌙 Nuit'};
    if(_verrouSessionExists(sid)){z.innerHTML=`<div class="card" style="text-align:center;padding:32px 20px"><div style="font-size:40px;margin-bottom:12px">🔒</div><div style="font-weight:800;font-size:16px">Session déjà envoyée</div><button class="btn-action btn-ghost" style="margin-top:16px" onclick="Nav.home()">← Retour</button></div>`;return;}
    const lignesHTML = etapes.map(e => {
        const val = rep[e.id]; let affiche = '—';
        if(val!==null&&val!==undefined){
            if(e.type==='ambiance') affiche=`${val.temp}°C · ${val.hygro}% · Litière ${val.litiere}/5`;
            else if(e.type==='sante'||e.type==='sante_color') affiche=`${val.label||'Score '+val.score}${val.obs?' — '+val.obs.slice(0,30):''}`;
            else affiche=String(val);
        }
        return `<div class="rapport-ligne"><span style="color:var(--text2)">${esc(e.label)}</span><span>${esc(String(affiche))}</span></div>`;
    }).join('');
    z.innerHTML=`<div class="card">
        <div class="card-title" style="color:var(--orange)">⚠️ Vérification avant envoi</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:16px;background:rgba(255,157,0,.08);border:1px solid rgba(255,157,0,.2);border-radius:12px;padding:12px">
            📌 Une fois confirmées, ces données seront verrouillées.
        </div>
        <div class="card-title">📋 Résumé — ${esc(labels[sid])}</div>
        ${lignesHTML}
    </div>
    <button class="btn-action btn-green" onclick="_confirmerEtEnvoyer()">✅ Je confirme — Envoyer</button>
    <button class="btn-action btn-ghost" onclick="Nav.back()">↩ Revenir et corriger</button>`;
}

async function _confirmerEtEnvoyer() {
    const sid=App._session.id,rep=App._session.reponses,etapes=SESSION_ETAPES[sid]||[];
    const z=zone();if(!z)return;
    z.innerHTML=`<div style="text-align:center;padding:60px 20px"><div class="spinner" style="width:36px;height:36px"></div><div style="color:var(--text2);font-size:14px;margin-top:12px">Envoi en cours…</div></div>`;

    /* Envoyer chaque saisie dans Supabase */
    const envois = [];
    etapes.forEach(e => {
        const val = rep[e.id];
        if (val === null || val === undefined) return;
        if (e.type === 'ambiance') {
            envois.push(saisieTechnique(App.activeBande, 'Temperature', val.temp, sid));
            envois.push(saisieTechnique(App.activeBande, 'Hygrometrie', val.hygro, sid));
            envois.push(saisieTechnique(App.activeBande, 'Litiere', val.litiere, sid));
        } else if (e.type === 'sante' || e.type === 'sante_color') {
            envois.push(saisieTechnique(App.activeBande, 'SanteGeneral', val.score, sid, val.label + (val.obs?' | '+val.obs:'')));
        } else if (e.type === 'number') {
            const catMap = { mortalite_m:'MortaliteMatin', mortalite_n:'MortaliteSoir', eau_m:'EauMatin', eau_n:'EauSoir', aliment_kg:'Alimentation' };
            const cat = catMap[e.id];
            if (cat) envois.push(saisieTechnique(App.activeBande, cat, val, sid));
        } else if (e.type === 'pesee' && val !== null) {
            envois.push(saisieTechnique(App.activeBande, 'PoidsMoyen', val, sid));
        }
    });

    await Promise.all(envois);

    /* Créer une tâche "Session envoyée" */
    const titreSession = ({Matin:'🌅 Session Matin envoyée',Midi:'☀️ Session Midi envoyée',PM:'🌤️ Session PM envoyée',Nuit:'🌙 Session Nuit envoyée'})[sid]||sid;
    await creerTache(titreSession, App.activeBande, 'QUOTIDIEN', _dateAujourd_hui());

    _poserVerrouSession(sid);
    showToast('✅ Session envoyée','success',4000);
    _navbarSetVisible(true);
    Nav.home();
}

/* Buffer de logs en mémoire (max 50 lignes) */
App._logs = [];
function _log(msg, type='info') {
    const ts = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    const entry = { ts, msg, type };
    App._logs.unshift(entry);
    if (App._logs.length > 50) App._logs.pop();
    /* Mettre à jour le panneau si ouvert */
    const panel = document.getElementById('diag-logs');
    if (panel) _refreshDiagLogs(panel);
}

/* Intercepter console.log pour capturer les logs Realtime */
const _origLog = console.log.bind(console);
console.log = function(...args) {
    _origLog(...args);
    const msg = args.join(' ');
    if (msg.includes('[Realtime]')) _log(msg, 'rt');
};

function _refreshDiagLogs(panel) {
    panel.innerHTML = App._logs.map(e => {
        const color = e.type==='rt' ? 'var(--blue)'
                    : e.type==='ok' ? 'var(--green)'
                    : e.type==='err' ? 'var(--red)'
                    : 'var(--text2)';
        return '<div style="padding:4px 0;border-bottom:1px solid var(--border);font-size:11px">'
             + '<span style="color:var(--text2);margin-right:8px">' + e.ts + '</span>'
             + '<span style="color:' + color + '">' + e.msg + '</span>'
             + '</div>';
    }).join('') || '<div style="color:var(--text2);font-size:12px;padding:8px">Aucun log</div>';
}

async function renderDiagnostic() {
    const z = zone(); if (!z) return;
    Nav.stack.push({fn:'renderDiagnostic', params:null}); Nav._upBtn();

    /* État des canaux Realtime */
    const nbCanaux = (App._realtimeChannels || []).length;

    /* Test de connexion Supabase */
    let pingMs = '—', pingOk = false;
    try {
        const t0 = Date.now();
        const { error } = await sb.from('fermes').select('id').eq('id', FERME_ID).single();
        pingMs = (Date.now() - t0) + 'ms';
        pingOk = !error;
        _log('Ping Supabase : ' + pingMs + (pingOk ? ' ✅' : ' ❌'), pingOk ? 'ok' : 'err');
    } catch(e) {
        pingMs = 'Erreur';
        _log('Ping Supabase : ERREUR — ' + e.message, 'err');
    }

    /* Test d'écriture Realtime */
    z.innerHTML = `
        <div style="font-weight:800;font-size:16px;margin-bottom:16px">🔧 Diagnostic Realtime</div>

        <div class="card" style="margin-bottom:12px">
            <div class="card-title">📡 État de la connexion</div>
            <div class="rapport-ligne">
                <span style="color:var(--text2)">Rôle connecté</span>
                <span style="font-weight:700">${App.role || '—'}</span>
            </div>
            <div class="rapport-ligne">
                <span style="color:var(--text2)">Utilisateur</span>
                <span style="font-weight:700">${App.nom || '—'}</span>
            </div>
            <div class="rapport-ligne">
                <span style="color:var(--text2)">Ping Supabase</span>
                <span style="font-weight:700;color:${pingOk?'var(--green)':'var(--red)'}">${pingMs}</span>
            </div>
            <div class="rapport-ligne">
                <span style="color:var(--text2)">Canaux Realtime</span>
                <span style="font-weight:700;color:${nbCanaux>0?'var(--green)':'var(--red)'}">${nbCanaux} canal${nbCanaux>1?'x':''} actif${nbCanaux>1?'s':''}</span>
            </div>
            <div class="rapport-ligne">
                <span style="color:var(--text2)">Ferme ID</span>
                <span style="font-size:10px;color:var(--text2)">${FERME_ID.slice(0,18)}…</span>
            </div>
        </div>

        <div class="card" style="margin-bottom:12px">
            <div class="card-title">🧪 Test Realtime</div>
            <div style="font-size:12px;color:var(--text2);margin-bottom:10px">
                Appuie sur le bouton — si le Realtime fonctionne, une notification
                apparaîtra sur <strong style="color:var(--text)">l'autre appareil</strong>
                dans les 2 secondes.
            </div>
            <button class="btn-action btn-blue" onclick="_testRealtimePing()">
                📡 Envoyer un test Realtime
            </button>
        </div>

        <div class="card">
            <div class="card-title">📋 Logs</div>
            <button class="btn-action btn-ghost" style="margin-bottom:10px;font-size:11px;padding:8px"
                    onclick="_reinitRealtime()">🔄 Réinitialiser les canaux</button>
            <div id="diag-logs" style="max-height:300px;overflow-y:auto"></div>
        </div>

        <button class="btn-action btn-ghost" onclick="Nav.back()" style="margin-top:8px">← Retour</button>`;

    _refreshDiagLogs(document.getElementById('diag-logs'));
    _log('Panneau diagnostic ouvert — ' + nbCanaux + ' canal(x) actif(s)', 'info');
}

async function _testRealtimePing() {
    if (!guardDouble('rt_ping')) return;
    _log('Test Realtime envoyé…', 'info');
    showToast('📡 Test envoyé — attends la notification sur l\'autre appareil', 'info', 5000);

    /* Créer une tâche de test qui déclenchera le Realtime */
    const bandeId = App.activeBande;
    if (!bandeId) { showToast('Aucune bande active pour le test', 'warning'); return; }

    const { error } = await sb.from('taches').insert({
        ferme_id:    FERME_ID,
        bande_id:    bandeId,
        titre:       '🔧 Test Realtime — ' + new Date().toLocaleTimeString('fr-FR'),
        type_tache:  'QUOTIDIEN',
        statut:      'A FAIRE',
        date_prevue: _dateAujourd_hui(),
        cree_par:    App.userId
    });

    if (error) {
        _log('Erreur test : ' + error.message, 'err');
        showToast('Erreur test Realtime', 'error');
    } else {
        _log('Tâche test insérée en DB ✅', 'ok');
    }
}

function _reinitRealtime() {
    _log('Réinitialisation des canaux…', 'info');
    initRealtime();
    _log('Canaux réinitialisés — ' + (App._realtimeChannels||[]).length + ' canal(x)', 'ok');
    showToast('🔄 Canaux Realtime réinitialisés', 'success', 3000);
    /* Recharger le panneau */
    setTimeout(() => renderDiagnostic(), 500);
}

}

    updateOffline();
    _majTopbar();
    processQueue();

    const notifs = _getNotifsAujourdhui();

window.onload = function() {
    if (App.userId && isSessionValid()) {
        document.getElementById('screen-role').classList.add('hidden');
        document.getElementById('screen-pin').classList.add('hidden');
        document.getElementById('app-main').style.display = 'block';
        startApp();
    } else if (App.userId && !isSessionValid()) {
        ['av_user_id','av_lt'].forEach(k => localStorage.removeItem(k));
        App.userId = null; App.loginTime = 0;
        showToast('Session expirée — reconnectez-vous','warning',4000);
    }
};
