function _pavHTML(bufferId,displayId,unite){return `<div style="text-align:center;margin-bottom:8px"><div style="background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:inline-flex;align-items:baseline;gap:8px;min-width:160px;justify-content:center"><span id="disp-${displayId}" style="font-size:36px;font-weight:800;color:var(--text);min-width:80px;text-align:right">—</span><span style="font-size:14px;color:var(--text2)">${esc(unite)}</span></div></div><div class="pin-pad" style="margin:0 auto 8px;grid-template-rows:repeat(4,60px);grid-template-columns:repeat(3,60px);gap:10px">${['1','2','3','4','5','6','7','8','9'].map(d=>`<button class="pin-key" style="width:60px;height:60px;font-size:18px" onclick="_pavTap('${bufferId}','${displayId}','${d}')">${d}</button>`).join('')}<button class="pin-key key-del" style="width:60px;height:60px;font-size:13px" onclick="_pavDel('${bufferId}','${displayId}')">⌫</button><button class="pin-key" style="width:60px;height:60px;font-size:18px" onclick="_pavTap('${bufferId}','${displayId}','0')">0</button><button class="pin-key" style="width:60px;height:60px;font-size:13px" onclick="_pavTap('${bufferId}','${displayId}','.')">.</button></div>`;}
function _pavTap(b,d,digit){let buf=App._pavBuffers[b]||'';if(digit==='.'&&buf.includes('.'))return;if(digit==='.'&&buf==='')buf='0';buf+=digit;App._pavBuffers[b]=buf;const el=document.getElementById('disp-'+d);if(el)el.textContent=buf;}
function _pavDel(b,d){let buf=App._pavBuffers[b]||'';buf=buf.slice(0,-1);App._pavBuffers[b]=buf;const el=document.getElementById('disp-'+d);if(el)el.textContent=buf||'—';}
function _pavGet(b){return parseFloat(App._pavBuffers[b]||'')||null;}
function _repBool(idx,label){_etapeSuivante(idx===0?1:0,label);}
function _repLitiere(score,etapeId){App._session._litiereScore=score;for(let i=1;i<=5;i++){const btn=document.getElementById('lit-'+i);if(btn)btn.style.borderColor=i===score?'var(--blue)':'var(--border)';}}
function _validerAmbiance(etapeId){const temp=_pavGet('temp'),hygro=_pavGet('hygro');if(temp===null){showToast('Saisissez la température','warning');return;}if(hygro===null){showToast("Saisissez l'hygrométrie",'warning');return;}if(App._session._litiereScore===null){showToast("Sélectionnez l'état de la litière",'warning');return;}App._session.reponses[etapeId]={temp,hygro,litiere:App._session._litiereScore};delete App._pavBuffers['temp'];delete App._pavBuffers['hygro'];App._session.etapeIdx++;_renderEtape();}
function _repNumber(etapeId,unite,min,max){const val=_pavGet('val_'+etapeId);if(val===null){showToast('Saisissez une valeur','warning');return;}const v=sanitizeNum(val,min,max);if(v===null){showToast(`Valeur invalide (${min}–${max} ${unite})`,'warning');return;}App._session.reponses[etapeId]=val;delete App._pavBuffers['val_'+etapeId];_etapeSuivante(val,val+' '+unite);}

function renderHome() {
    _majTopbar();
    if (App.role === 'GERANT')      { const fn='renderGerant';     Nav.stack=[{fn,params:null}]; Nav._upBtn(); renderGerant(); }
    else if (App.role === 'AGENT')  { const fn='renderAgent';      Nav.stack=[{fn,params:null}]; Nav._upBtn(); renderAgent(); }
    else if (App.role === 'PARTENAIRE') { const fn='renderPartenaire'; Nav.stack=[{fn,params:null}]; Nav._upBtn(); renderPartenaire(); }
    else { doLogout(); }
    _setNavActive('accueil');
}

async function chargerBandeActive() {
    _restaurerCache();
    try {
        const d = await apiGet({action:'getAccueil', idBande: App.activeBande||''});
        if (!d.success) return;
        if (d.batiments) App.batiments = d.batiments || [];
        if (d.performance || d.terrain) App.data = d;
        const enc = App.batiments.find(b => b.statut === 'EN COURS');
        if (enc) { App.activeBande = enc.idBande; localStorage.setItem('av_bande', App.activeBande); }
        _sauvegarderCache(d);
    } catch(e) { console.error('chargerBandeActive:', e); }
}

function _sauvegarderCache(data) {
    try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({
            ts: Date.now(),
            batiments: data.batiments || App.batiments,
            data,
            idBande: App.activeBande
        }));
    } catch(e) { console.warn('[Cache global] écriture ignorée:', e.message); }
}
function _restaurerCache() {
    try {
        const raw = localStorage.getItem(CACHE_KEY); if (!raw) return;
        const cache = JSON.parse(raw);
        /* Cache global accepté jusqu'à 8h */
        if (Date.now() - cache.ts > CACHE_TTL_MS) return;
        if (cache.batiments) App.batiments = cache.batiments;
        if (cache.data)      App.data      = cache.data;
        if (cache.idBande && !App.activeBande) App.activeBande = cache.idBande;
    } catch(e) {}
}

async function startApp() {
    updateOffline();
    _majTopbar();
    /* Démarrer la sonde réseau dès le début */
    _startProbeLoop();
    /* Restaurer le cache immédiatement avant tout rendu */
    _restaurerCache();
    _prechargerDonnees();
    if (App.role === 'AGENT') await chargerBandeActive();
    renderHome();
    /* initialiser la navbar APRÈS renderHome pour que les onglets soient synchronisés */
    initNavbar();
    _initPWA();
}

async function _prechargerDonnees() {
    if (!isSessionValid()) return;
    try {
        const d = await apiGet({action:'getAccueil', idBande: App.activeBande||''});
        if (d.success) {
            if (d.batiments) App.batiments = d.batiments;
            if (d.performance || d.terrain) App.data = d;
            if (!App.activeBande && d.batiments) {
                const enc = d.batiments.find(b => b.statut === 'EN COURS');
                if (enc) { App.activeBande = enc.idBande; localStorage.setItem('av_bande', enc.idBande); }
            }
            _sauvegarderCache(d);
        }
    } catch(e) { console.warn('[Préchargement] ignoré :', e.message); }
}

async function _initPWA() {
    if ('serviceWorker' in navigator) {
        try { await navigator.serviceWorker.register('sw.js', { scope: '/AVIGEST4/' }); } catch(e) { console.warn('[SW] échec :', e.message); }
    }
    try {
        await _waitForOneSignal();
        await OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({appId:'8a6d7ad0-e39a-4e29-b187-26f9f5f4eae3', autoResubscribe:true, notifyButton:{enable:false}, welcomeNotification:{disable:true}});
            if (App.role === 'GERANT') {
                const permission = await OneSignal.Notifications.permission;
                if (!permission) { setTimeout(async () => { try { await OneSignal.Notifications.requestPermission(); } catch(_) {} }, 3000); }
            }
        });
    } catch(e) { console.warn('[OneSignal] init ignorée :', e.message); }
}
function _waitForOneSignal(maxWait=8000) {
    return new Promise((resolve, reject) => {
        if (window.OneSignalDeferred) { resolve(); return; }
        const start = Date.now();
        const iv = setInterval(() => {
            if (window.OneSignalDeferred) { clearInterval(iv); resolve(); }
            else if (Date.now() - start > maxWait) { clearInterval(iv); reject(new Error('OneSignal SDK non chargé')); }
        }, 200);
    });
}

window.onload = function() {
    if (App.token && isSessionValid()) {
        document.getElementById('screen-role').classList.add('hidden');
        document.getElementById('screen-pin').classList.add('hidden');
        document.getElementById('app-main').style.display = 'block';
        startApp();
    } else if (App.token && !isSessionValid()) {
        ['av_token','av_lt'].forEach(k => localStorage.removeItem(k));
        App.token = null; App.loginTime = 0;
        showToast('Session expirée — reconnectez-vous','warning',4000);
    }
};
