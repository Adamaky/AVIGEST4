<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1b2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AviGest v24</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- ═══════════════════════════════════════════
         ÉTAGE 0 — FONDATIONS : HTML + CSS
         Tout le style est ici, zéro style inline
         de mise en page.
    ═══════════════════════════════════════════ -->
    <style>
        /* ── Variables ── */
        :root {
            --bg:      #0d1b2a;
            --bg2:     #142233;
            --bg3:     #1a2d40;
            --border:  rgba(255,255,255,0.08);
            --text:    #f0f4f8;
            --text2:   #8fa8c0;
            --green:   #00c896;
            --blue:    #0099ff;
            --orange:  #ff9d00;
            --red:     #ff4444;
            --purple:  #c084fc;
        }

        /* ── Reset ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Lexend', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ══════════════════════════════════════
           ÉCRAN LOGIN
        ══════════════════════════════════════ */
        #login-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .login-logo {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            font-size: 12px;
            color: var(--text2);
            margin-top: 4px;
            margin-bottom: 32px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Afficheur PIN — 4 cases */
        .pin-display {
            display: flex;
            gap: 14px;
            margin-bottom: 36px;
        }

        .pin-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--bg3);
            border: 2px solid var(--border);
            transition: background 0.15s, border-color 0.15s, transform 0.15s;
        }

        .pin-dot.filled {
            background: var(--blue);
            border-color: var(--blue);
            transform: scale(1.2);
        }

        /* Pavé numérique */
        .pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 72px);
            grid-template-rows: repeat(4, 72px);
            gap: 12px;
        }

        .pin-key {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: none;
            background: var(--bg2);
            color: var(--text);
            font-family: 'Lexend', sans-serif;
            font-size: 22px;
            font-weight: 600;
            cursor: pointer;
            /* Touch : pas de délai sur mobile */
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            transition: background 0.12s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Pour pointer events dans tous les navigateurs */
            user-select: none;
            -webkit-user-select: none;
        }

        .pin-key:active,
        .pin-key.pressed {
            background: var(--bg3);
            transform: scale(0.91);
        }

        /* Touche C — effacer */
        .pin-key.key-clear {
            background: rgba(255,68,68,0.12);
            color: var(--red);
            font-size: 16px;
        }

        .pin-key.key-clear:active,
        .pin-key.key-clear.pressed {
            background: rgba(255,68,68,0.25);
        }

        /* Touche OK — valider */
        .pin-key.key-ok {
            background: rgba(0,200,150,0.15);
            color: var(--green);
            font-size: 16px;
            font-weight: 800;
        }

        .pin-key.key-ok:active,
        .pin-key.key-ok.pressed {
            background: rgba(0,200,150,0.3);
        }

        .pin-key.key-ok.ready {
            background: var(--green);
            color: #0d1b2a;
            box-shadow: 0 0 20px rgba(0,200,150,0.4);
        }

        /* Touche vide (placeholder de grille) */
        .pin-key.key-empty {
            background: transparent;
            cursor: default;
            pointer-events: none;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg2);
            color: var(--text);
            padding: 12px 22px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            z-index: 99999;
            border: 1px solid var(--border);
            opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
            white-space: nowrap;
            max-width: 90vw;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error   { background: var(--red);    color: white; border-color: transparent; }
        .toast.success { background: var(--green);  color: #0d1b2a; border-color: transparent; }
        .toast.warning { background: var(--orange); color: #0d1b2a; border-color: transparent; }

        /* ── Loading overlay ── */
        .login-loading {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            position: absolute;
        }

        .login-loading.show { display: flex; }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--bg3);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-size: 13px;
            color: var(--text2);
        }

        /* ── Message erreur PIN ── */
        .pin-error-msg {
            height: 20px;
            font-size: 12px;
            color: var(--red);
            text-align: center;
            margin-top: -20px;
            margin-bottom: 16px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .pin-error-msg.show { opacity: 1; }

        /* ── Shake animation ── */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-8px); }
            40%      { transform: translateX(8px); }
            60%      { transform: translateX(-6px); }
            80%      { transform: translateX(6px); }
        }

        .pin-display.shake { animation: shake 0.4s ease; }

        /* ══════════════════════════════════════
           ÉCRAN APP PRINCIPALE (placeholder)
        ══════════════════════════════════════ */
        #app-main {
            display: none;
            min-height: 100vh;
        }

        .header {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #btn-back {
            display: none;
            background: rgba(255,255,255,0.08);
            border: none;
            color: var(--text);
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 8px;
            font-family: inherit;
            transition: background 0.15s;
        }

        #btn-back:active { background: rgba(255,255,255,0.18); }

        #tb-role {
            font-size: 10px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        #tb-name {
            font-size: 14px;
            font-weight: 700;
        }

        .offline-indicator {
            display: none;
            background: var(--red);
            color: white;
            font-size: 9px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 10px;
        }

        .offline-indicator.visible { display: inline-block; }

        #btn-logout {
            background: none;
            border: 1px solid var(--border);
            color: var(--text2);
            border-radius: 10px;
            padding: 5px 10px;
            font-size: 10px;
            cursor: pointer;
            font-family: inherit;
            transition: border-color 0.15s, color 0.15s;
        }

        #btn-logout:active { border-color: var(--red); color: var(--red); }

        #app-container {
            padding: 12px;
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 24px;
        }

        /* ══════════════════════════════════════
           COMPOSANTS GÉRANT
        ══════════════════════════════════════ */

        /* ── Tuiles accueil gérant ── */
        .tuile {
            border-radius: 18px;
            padding: 18px 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.07);
            transition: transform 0.15s, opacity 0.15s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }
        .tuile:active { transform: scale(0.97); opacity: 0.85; }
        .tuile-icon { font-size: 28px; flex-shrink: 0; }
        .tuile-label { font-size: 16px; font-weight: 800; }
        .tuile-sub   { font-size: 11px; opacity: 0.7; margin-top: 2px; }
        .tuile-arrow { margin-left: auto; font-size: 18px; opacity: 0.4; }

        /* Couleurs des 5 tuiles gérant */
        .t-superviser { background: linear-gradient(135deg, #0d2240, #0a3060); border-color: rgba(96,165,250,0.2); }
        .t-planifier  { background: linear-gradient(135deg, #0d2a1a, #0a3320); border-color: rgba(74,222,128,0.2); }
        .t-compta     { background: linear-gradient(135deg, #2a1f0d, #3a2800); border-color: rgba(251,191,36,0.2); }
        .t-analyser   { background: linear-gradient(135deg, #1e0d2a, #2a1040); border-color: rgba(192,132,252,0.2); }
        .t-bandes     { background: linear-gradient(135deg, #2a0d1a, #3a1028); border-color: rgba(249,168,212,0.2); }

        /* ── Badge alerte ── */
        .badge-alerte {
            background: var(--red);
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
            animation: pulse-badge 2s infinite;
        }
        @keyframes pulse-badge { 0%,100%{opacity:1} 50%{opacity:0.6} }

        /* ── Section titre ── */
        .section-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin: 20px 4px 10px;
        }

        /* ── Carte générique ── */
        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 10px;
        }
        .card-title {
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ── Grille bâtiments ── */
        .bat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .bat-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 12px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .bat-card:active { transform: scale(0.95); }
        .bat-card.libre   { border-style: dashed; opacity: 0.6; }
        .bat-card.encours { background: rgba(0,200,150,0.08); border-color: rgba(0,200,150,0.3); }
        .bat-card.cloture { background: rgba(255,157,0,0.08); border-color: rgba(255,157,0,0.3); }
        .bat-num    { font-size: 10px; color: var(--text2); font-weight: 600; margin-bottom: 4px; }
        .bat-icon   { font-size: 22px; margin-bottom: 4px; }
        .bat-name   { font-size: 12px; font-weight: 700; }
        .bat-info   { font-size: 10px; color: var(--text2); margin-top: 3px; }
        .bat-statut { font-size: 10px; font-weight: 700; margin-top: 4px; }
        .bat-statut.encours { color: var(--green); }
        .bat-statut.libre   { color: var(--text2); }
        .bat-statut.cloture { color: var(--orange); }

        /* ── KPI bar ── */
        .kpi-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .kpi-box {
            background: var(--bg3);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .kpi-val   { font-size: 20px; font-weight: 800; display: block; }
        .kpi-label { font-size: 9px; color: var(--text2); text-transform: uppercase;
                     letter-spacing: 0.8px; margin-top: 3px; display: block; }

        /* ── Progress bar ── */
        .prog-bar  { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-top: 6px; }
        .prog-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width 0.5s; }
        .prog-fill.orange { background: var(--orange); }
        .prog-fill.red    { background: var(--red); }

        /* ── Tâche card ── */
        .tache-card {
            background: var(--bg3);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--border);
        }
        .tache-card.urgente { border-color: rgba(255,68,68,0.35); background: rgba(255,68,68,0.05); }
        .tache-card.done    { opacity: 0.5; }
        .tache-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .tache-dot.red    { background: var(--red); }
        .tache-dot.orange { background: var(--orange); }
        .tache-dot.green  { background: var(--green); }
        .tache-dot.blue   { background: var(--blue); }
        .tache-titre { font-size: 13px; font-weight: 700; flex: 1; }
        .tache-meta  { font-size: 10px; color: var(--text2); margin-top: 2px; }
        .tache-badge { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 8px; white-space: nowrap; }
        .tache-badge.abattage { background: rgba(255,68,68,0.2);  color: var(--red); }
        .tache-badge.quotidien{ background: rgba(0,153,255,0.2);  color: var(--blue); }
        .tache-badge.hebdo    { background: rgba(255,157,0,0.2);  color: var(--orange); }
        .tache-badge.cloture  { background: rgba(192,132,252,0.2);color: var(--purple); }

        /* ── Alerte card ── */
        .alerte {
            border-radius: 12px;
            padding: 11px 14px;
            margin-bottom: 8px;
            display: flex;
            gap: 10px;
            align-items: flex-start;
            font-size: 12px;
        }
        .alerte.critique { background: rgba(255,68,68,0.08);  border: 1px solid rgba(255,68,68,0.25); }
        .alerte.warning  { background: rgba(255,157,0,0.08); border: 1px solid rgba(255,157,0,0.25); }
        .alerte-kpi { font-weight: 800; font-size: 11px; }
        .alerte.critique .alerte-kpi { color: var(--red); }
        .alerte.warning  .alerte-kpi { color: var(--orange); }
        .alerte-msg { color: var(--text2); margin-top: 2px; line-height: 1.4; }

        /* ── Bouton action ── */
        .btn-action {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-family: 'Lexend', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
            transition: opacity 0.15s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-action:active { transform: scale(0.97); opacity: 0.85; }
        .btn-green  { background: var(--green);  color: #0d1b2a; }
        .btn-blue   { background: var(--blue);   color: white; }
        .btn-orange { background: var(--orange); color: #0d1b2a; }
        .btn-red    { background: var(--red);    color: white; }
        .btn-ghost  { background: transparent; border: 1px solid var(--border); color: var(--text2); }

        /* ── Journal row ── */
        .journal-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }
        .journal-row:last-child { border-bottom: none; }
        .journal-cat  { color: var(--text2); flex: 1; }
        .journal-mont { font-weight: 800; }
        .journal-mont.dep { color: var(--red); }
        .journal-mont.rec { color: var(--green); }

        /* ── Formulaire séquentiel ── */
        .form-step {
            display: none;
        }
        .form-step.active { display: block; }
        .form-step-title {
            font-size: 12px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
            font-weight: 700;
        }
        .form-choice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }
        .choice-btn {
            padding: 20px 12px;
            border-radius: 16px;
            border: 2px solid var(--border);
            background: var(--bg3);
            color: var(--text);
            font-family: 'Lexend', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: border-color 0.15s, background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .choice-btn:active,
        .choice-btn.selected { border-color: var(--blue); background: rgba(0,153,255,0.1); }
        .choice-btn .choice-icon { font-size: 24px; display: block; margin-bottom: 6px; }

        /* ── Input style ── */
        .f-input {
            width: 100%;
            padding: 13px 14px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Lexend', sans-serif;
            font-size: 15px;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.15s;
        }
        .f-input:focus { border-color: var(--blue); }
        .f-label {
            font-size: 10px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 700;
            margin-bottom: 6px;
            display: block;
        }

        /* ── Stepper ── */
        .stepper {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
        }
        .step-dot {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: var(--bg3);
            transition: background 0.3s;
        }
        .step-dot.active   { background: var(--blue); }
        .step-dot.done     { background: var(--green); }

        /* ── Rapport ── */
        .rapport-section { margin-bottom: 16px; }
        .rapport-titre {
            font-size: 10px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }
        .rapport-ligne {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 5px 0;
        }
        .rapport-ligne span:last-child { font-weight: 700; }

        /* ── Bande détail ── */
        .bande-header {
            background: linear-gradient(135deg, var(--bg2), var(--bg3));
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 10px;
        }
        .bande-name { font-size: 18px; font-weight: 800; }
        .bande-meta { font-size: 11px; color: var(--text2); margin-top: 4px; }

        /* ── Utilisateur item ── */
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 14px;
            background: var(--bg3);
            border-radius: 12px;
            margin-bottom: 6px;
            border: 1px solid var(--border);
        }
        .user-name  { font-size: 13px; font-weight: 700; }
        .user-pin   { font-size: 10px; color: var(--text2); font-family: monospace; margin-top: 2px; }
        .user-badge { font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 8px; }
        .badge-actif  { background: rgba(0,200,150,0.2);  color: var(--green); }
        .badge-inactif{ background: rgba(255,68,68,0.2);  color: var(--red); }
        .badge-gerant { background: rgba(96,165,250,0.2); color: #60a5fa; }
        .badge-agent  { background: rgba(74,222,128,0.2); color: #4ade80; }
        .badge-partenaire { background: rgba(192,132,252,0.2); color: var(--purple); }

        /* ── Vente card ── */
        .vente-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 8px;
        }
        .vente-top  { display: flex; justify-content: space-between; align-items: center; }
        .vente-nom  { font-size: 13px; font-weight: 700; }
        .vente-mont { font-size: 15px; font-weight: 800; color: var(--green); }
        .vente-meta { font-size: 10px; color: var(--text2); margin-top: 4px; }
        .vente-statut {
            font-size: 9px; font-weight: 700; padding: 2px 8px;
            border-radius: 8px; margin-top: 6px; display: inline-block;
        }
        .vs-solde    { background: rgba(0,200,150,0.2);  color: var(--green); }

<!-- ═══════════════════════════════════════════════════════════
     JAVASCRIPT — ORDRE STRICT DES 8 ÉTAGES
     Règle absolue : chaque fonction n'utilise QUE ce qui est
     défini AVANT elle dans ce fichier.
════════════════════════════════════════════════════════════ -->
<script>
'use strict';

/* ════════════════════════════════════════════════════════════
   ÉTAGE 1 — VARIABLES GLOBALES
   Tout ce qui est global vit ICI et nulle part ailleurs.
════════════════════════════════════════════════════════════ */

const API      = 'https://script.google.com/macros/s/AKfycbxN3dVH77nGS4YWzHtryqmeVQKf8inqBlyIp7tV6-VJZ2Y0Pt1rG1UkWujQIP7dIESV-g/exec';
const SESSION_MS  = 12 * 3600 * 1000;  // 12 heures en ms
const TIMEOUT_MS  = 10000;             // 10 secondes
const MAX_RETRY   = 3;

const App = {
    token:       localStorage.getItem('av_token')     || null,
    role:        localStorage.getItem('av_role')      || null,
    nom:         localStorage.getItem('av_nom')       || '',
    idPart:      localStorage.getItem('av_idpart')    || '',
    loginTime:   parseInt(localStorage.getItem('av_lt') || '0'),
    activeBande: localStorage.getItem('av_bande')     || '',
    data:        {},
    clients:     [],
    batiments:   [],
    isOnline:    navigator.onLine,
    offlineQueue: JSON.parse(localStorage.getItem('av_queue') || '[]')
};


/* ════════════════════════════════════════════════════════════
   ÉTAGE 2 — UTILITAIRES PURS
   Fonctions sans dépendances — esc, fmt, showToast,
   setLoad, guardDouble, sanitizeNum
════════════════════════════════════════════════════════════ */

/** Échappe HTML pour prévenir XSS */
function esc(t) {
    if (t == null) return '';
    return String(t)
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/"/g,  '&quot;')
        .replace(/'/g,  '&#39;')
        .replace(/\//g, '&#x2F;');
}

/** Formate un montant FCFA avec séparateur espace */
function fmt(n) {
    return Math.round(n || 0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '\u00a0');
}

/** Affiche un toast (message flottant) */
let _toastTimer = null;
function showToast(msg, type = 'info', duration = 3000) {
    const el = document.getElementById('toast-global');
    if (!el) return;
    if (_toastTimer) clearTimeout(_toastTimer);
    el.textContent = msg;
    el.className   = 'toast ' + type + ' show';
    _toastTimer = setTimeout(() => {
        el.classList.remove('show');
    }, duration);
}

/** Active/désactive le spinner sur un bouton */
function setLoad(btn, loading) {
    if (!btn) return;
    if (loading) {
        btn.dataset.orig = btn.innerHTML;
        btn.innerHTML    = '⏳';
        btn.disabled     = true;
    } else {
        btn.innerHTML = btn.dataset.orig || btn.innerHTML;
        btn.disabled  = false;
    }
}

/** Anti double-soumission — retourne false si déjà en cours */
const _guards = new Set();
function guardDouble(key) {
    if (_guards.has(key)) { showToast('Opération en cours…', 'warning'); return false; }
    _guards.add(key);
    setTimeout(() => _guards.delete(key), 3000);
    return true;
}

/** Valide et retourne un nombre dans [min, max], null sinon */
function sanitizeNum(v, min = 0, max = Infinity) {
    const n = parseFloat(v);
    if (isNaN(n) || n < min || n > max) return null;
    return n;
}

/** Détecte la session de la journée selon l'heure */
function detectSession() {
    const h = new Date().getHours();
    if (h >= 5  && h < 10) return 'Matin';
    if (h >= 10 && h < 14) return 'Midi';
    if (h >= 14 && h < 19) return 'PM';
    return 'Nuit';
}


/* ════════════════════════════════════════════════════════════
   ÉTAGE 3 — SÉCURITÉ & SESSION
   Dépend : App, SESSION_MS, showToast (Étage 2)
════════════════════════════════════════════════════════════ */

function isSessionValid() {
    if (!App.token || !App.loginTime) return false;
    return (Date.now() - App.loginTime) < SESSION_MS;
}

function handleExpired() {
    showToast('Session expirée. Reconnectez-vous.', 'error', 4000);
    setTimeout(() => {
        localStorage.removeItem('av_token');
        localStorage.removeItem('av_lt');
        App.token     = null;
        App.loginTime = 0;
        location.reload();
    }, 2500);
}

/** Vérification périodique toutes les 60 secondes */
let _warnedExpiry = false;
setInterval(() => {
    if (!App.loginTime) return;
    const remaining = SESSION_MS - (Date.now() - App.loginTime);
    if (remaining < 3_600_000 && !_warnedExpiry) {
        _warnedExpiry = true;
        showToast('⚠️ Session expire dans moins d\'1h', 'warning', 6000);
    }
    if (remaining <= 0) {
        handleExpired();
    }
}, 60_000);


/* ════════════════════════════════════════════════════════════
   ÉTAGE 4 — RÉSEAU & API
   Dépend : API, TIMEOUT_MS, MAX_RETRY, App, showToast,
            isSessionValid, handleExpired (Étages 1-3)
════════════════════════════════════════════════════════════ */

/** Fetch avec timeout via AbortController */
async function fetchT(url, opts = {}, ms = TIMEOUT_MS) {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), ms);
    try {
        const r = await fetch(url, { ...opts, signal: ctrl.signal });
        clearTimeout(tid);
        return r;
    } catch (e) {
        clearTimeout(tid);
        if (e.name === 'AbortError') throw new Error('TIMEOUT');
        throw e;
    }
}

/** GET avec retry — retourne l'objet JSON ou cache */
async function apiGet(params = {}) {
    if (params.action !== 'login' && !isSessionValid()) {
        handleExpired();
        return { success: false };
    }
    const url = new URL(API);
    if (App.token) url.searchParams.set('token', App.token);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    try {
        const r = await fetchT(url.toString());
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const d = await r.json();
        if (d.error && d.error.includes('Session')) { handleExpired(); return { success: false }; }
        return d;
    } catch (e) {
        if (e.message === 'TIMEOUT') showToast('Connexion lente — données en cache', 'warning');
        return (App.data && App.data.success) ? App.data : { success: false, error: e.message };
    }
}

/** POST avec retry x3 et délai croissant */
async function apiPost(payload) {
    if (!isSessionValid()) { handleExpired(); return { success: false }; }
    payload.token = App.token;
    if (!App.isOnline) { queueRequest(payload); return { success: true, queued: true }; }

    for (let i = 1; i <= MAX_RETRY; i++) {
        try {
            const r = await fetchT(API, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(payload)
            });
            if (!r.ok) throw new Error('HTTP ' + r.status);
            const d = await r.json();
            if (d.error && d.error.includes('Session')) { handleExpired(); return { success: false }; }
            return d;
        } catch (e) {
            if (i < MAX_RETRY) {
                showToast('Réseau lent · Tentative ' + (i + 1) + '/' + MAX_RETRY + '…', 'warning', 2000);
                await new Promise(res => setTimeout(res, 1500 * i));
            }
        }
    }
    queueRequest(payload);
    return { success: true, queued: true };
}

/** Sauvegarde une requête en file d'attente hors ligne */
function queueRequest(payload) {
    const p = { ...payload };
    delete p.token;
    App.offlineQueue.push({ payload: p, ts: Date.now() });
    localStorage.setItem('av_queue', JSON.stringify(App.offlineQueue));
    updateOffline();
    showToast('📴 Donnée sauvegardée localement', 'warning');
}

/** Synchronise la file hors ligne au retour en ligne */
async function processQueue() {
    if (!App.offlineQueue.length || !App.isOnline || App.isSyncing) return;
    if (!isSessionValid()) {
        showToast('Session expirée — reconnectez-vous pour sync', 'warning', 5000);
        return;
    }
    App.isSyncing = true;
    showToast('Synchronisation de ' + App.offlineQueue.length + ' enregistrement(s)…', 'info');
    const failed = [];
    for (const item of App.offlineQueue) {
        try {
            const r = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...item.payload, token: App.token })
            });
            const d = await r.json();
            if (!d.success && d.error && d.error.includes('Session')) failed.push(item);
        } catch { failed.push(item); }
    }
    App.offlineQueue = failed;
    localStorage.setItem('av_queue', JSON.stringify(failed));
    App.isSyncing = false;
    updateOffline();
    if (!failed.length) { showToast('✅ Toutes les données synchronisées', 'success'); }
    else showToast(failed.length + ' élément(s) en attente', 'warning');
}

/** Met à jour l'indicateur hors-ligne dans le header */
function updateOffline() {
    const badge = document.getElementById('offline-badge');
    if (badge) badge.className = 'offline-indicator' + (App.isOnline ? '' : ' visible');
}

window.addEventListener('online',  () => {
    App.isOnline = true;
    updateOffline();
    showToast('🌐 Connexion rétablie', 'success');
    processQueue();
});
window.addEventListener('offline', () => {
    App.isOnline = false;
    updateOffline();
    showToast('📴 Mode hors ligne activé', 'warning');
});


/* ════════════════════════════════════════════════════════════
   ÉTAGE 5 — NAVIGATION
   Dépend : showToast, App (Étages 1-2)
   renderHome() est déclarée ici mais définie à l'Étage 7.
════════════════════════════════════════════════════════════ */

const Nav = {
    stack: [],

    push(fn, params) {
        Nav.stack.push({ fn, params });
        Nav._run(fn, params);
        Nav._upBtn();
    },

    back() {
        if (Nav.stack.length <= 1) { Nav.stack = []; renderHome(); Nav._upBtn(); return; }
        Nav.stack.pop();
        const prev = Nav.stack[Nav.stack.length - 1];
        Nav._run(prev.fn, prev.params);
        Nav._upBtn();
    },

    home() { Nav.stack = []; renderHome(); Nav._upBtn(); },

    replace(fn, params) {
        if (Nav.stack.length) Nav.stack[Nav.stack.length - 1] = { fn, params };
        else Nav.stack.push({ fn, params });
        Nav._run(fn, params);
        Nav._upBtn();
    },

    _run(fn, params) {
        try {
            if (typeof window[fn] === 'function') window[fn](params);
            else { console.error('Nav: fonction inconnue :', fn); renderHome(); }
        } catch (e) {
            console.error('Nav error (' + fn + '):', e);
            showToast('Erreur d\'affichage', 'error');
        }
    },

    _upBtn() {
        const btn = document.getElementById('btn-back');
        if (btn) btn.style.display = Nav.stack.length > 1 ? 'inline-block' : 'none';
    }
};

/** Renvoie l'élément conteneur principal */
function zone() { return document.getElementById('app-container'); }


/* ════════════════════════════════════════════════════════════
   ÉTAGE 6 — LOGIN
   Dépend : App, API, SESSION_MS, showToast, isSessionValid,
            Nav, zone (Étages 1-5)
════════════════════════════════════════════════════════════ */

let _pin = '';          // Buffer PIN en cours de saisie
let _loginBusy = false; // Verrouillage pendant l'appel API

/**
 * Appelée par chaque touche numérique du pavé.
 * Ajoute le chiffre si < 4 caractères,
 * met à jour l'afficheur, active le bouton OK à 4 chiffres.
 */
function pinTap(digit) {
    if (_loginBusy) return;
    if (_pin.length >= 4) return;

    _pin += digit;
    _updateDots();

    // Feedback visuel immédiat sur la touche
    // (la classe .pressed est retirée automatiquement)
    // — géré par :active en CSS, pas besoin de JS ici.

    // À 4 chiffres : allumer le bouton OK
    if (_pin.length === 4) {
        document.getElementById('key-ok').classList.add('ready');
    }

    // Masquer l'éventuel message d'erreur précédent
    _hideError();
}

/**
 * Efface le dernier chiffre saisi (touche ⌫).
 */
function pinDel() {
    if (_loginBusy) return;
    if (!_pin.length) return;
    _pin = _pin.slice(0, -1);
    document.getElementById('key-ok').classList.remove('ready');
    _updateDots();
    _hideError();
}

/**
 * Met à jour les 4 points de l'afficheur PIN.
 * Rempli = bleu, vide = fond sombre.
 */
function _updateDots() {
    for (let i = 0; i < 4; i++) {
        const dot = document.getElementById('dot-' + i);
        if (dot) dot.classList.toggle('filled', i < _pin.length);
    }
}

/** Affiche le message d'erreur + animation shake */
function _showError(msg) {
    const errEl = document.getElementById('pin-error-msg');
    const displ = document.getElementById('pin-display');
    if (errEl) { errEl.textContent = msg; errEl.classList.add('show'); }
    if (displ) {
        displ.classList.add('shake');
        setTimeout(() => displ.classList.remove('shake'), 450);
    }
}

function _hideError() {
    const errEl = document.getElementById('pin-error-msg');
    if (errEl) errEl.classList.remove('show');
}

/**
 * Lance l'authentification contre le backend.
 * Appelée par onclick="doLogin()" sur le bouton OK,
 * et aussi automatiquement quand _pin atteint 4 chiffres
 * si on le souhaite (option : auto-submit).
 */
async function doLogin() {
    if (_loginBusy) return;
    if (_pin.length !== 4) { _showError('Saisissez 4 chiffres'); return; }
    if (!guardDouble('login')) return;

    _loginBusy = true;

    // Masquer le pavé, afficher le spinner
    document.getElementById('login-loading').classList.add('show');

    try {
        const res = await fetchT(API + '?action=login&pin=' + _pin);

        if (!res.ok) throw new Error('HTTP ' + res.status);

        const d = await res.json();

        if (d.success) {
            // Stocker la session
            App.token     = d.token;
            App.role      = d.role;
            App.nom       = d.nom       || '';
            App.idPart    = d.idPartenaire || '';
            App.loginTime = Date.now();

            localStorage.setItem('av_token',  d.token);
            localStorage.setItem('av_role',   d.role);
            localStorage.setItem('av_nom',    d.nom       || '');
            localStorage.setItem('av_idpart', d.idPartenaire || '');
            localStorage.setItem('av_lt',     String(App.loginTime));

            // Transition login → app
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-main').style.display     = 'block';

            startApp();

        } else {
            // PIN incorrect
            _showError(d.error || 'PIN incorrect');
            _pin = '';
            _updateDots();
            document.getElementById('key-ok').classList.remove('ready');
        }

    } catch (e) {
        _showError('Erreur réseau — réessayez');
        console.error('doLogin error:', e);
    } finally {
        _loginBusy = false;
        document.getElementById('login-loading').classList.remove('show');
    }
}

/**
 * Déconnexion : purge session, recharge la page.
 */
async function doLogout() {
    try { await apiGet({ action: 'logout' }); } catch (_) {}
    ['av_token','av_role','av_nom','av_idpart','av_lt'].forEach(k => localStorage.removeItem(k));
    App.token = null; App.role = null; App.nom = ''; App.loginTime = 0;
    location.reload();
}

function jrnChoisirType(type) {
    App._saisie.type = type;
    document.getElementById('jchoix-dep')?.classList.toggle('selected', type === 'DEPENSE');
    document.getElementById('jchoix-rec')?.classList.toggle('selected', type === 'RECETTE');
    jrnStep(2);
}

function jrnChoisirUnite(unite) {
    App._saisie.unite = unite;
    jrnStep(4);
}

function jrnStep(n) {
    for (let i = 1; i <= 5; i++) {
        const form = document.getElementById('jstep-form-' + i);
        const dot  = document.getElementById('jstep-' + i);
        if (form) form.classList.toggle('active', i === n);
        if (dot)  {
            dot.classList.remove('active','done');
            if (i === n) dot.classList.add('active');
            else if (i < n) dot.classList.add('done');
        }
    }
    if (n === 5) _jrnBuildResume();
}

function _jrnBuildResume() {
    const s   = App._saisie;
    const qte = parseFloat(document.getElementById('jrn-qte')?.value || '0');
    const pu  = parseFloat(document.getElementById('jrn-pu')?.value  || '0');
    const m   = parseFloat(document.getElementById('jrn-montant')?.value || '0');
    s.montant = m || (qte * pu) || 0;
    s.libelle = document.getElementById('jrn-libelle')?.value || '';
    const el  = document.getElementById('jrn-resume');
    if (!el) return;
    el.innerHTML = `
        <div class="rapport-ligne"><span>Type</span><span>${esc(s.type)}</span></div>
        <div class="rapport-ligne"><span>Libellé</span><span>${esc(s.libelle)}</span></div>
        <div class="rapport-ligne"><span>Unité</span><span>${esc(s.unite)}</span></div>
        <div class="rapport-ligne"><span>Montant</span>
            <span style="color:${s.type==='DEPENSE'?'var(--red)':'var(--green)'};font-size:16px">
                ${s.type==='DEPENSE'?'−':'+'}${fmt(s.montant)} FCFA
            </span>
        </div>
    `;
}

function jrnValider() {
    const s = App._saisie;
    if (!s.montant || s.montant <= 0) { showToast('Montant invalide', 'warning'); return; }
    // Simulation — en Phase 3 : apiPost({action:'ECRITURE_JOURNAL', ...})
    showToast('✅ Écriture enregistrée (démo)', 'success');
    Nav.back();
}

    const lignesHTML = App._fabLignes.map((l, i) => `
        <div class="fab-ligne">
            <input class="f-input" type="text"   placeholder="Ingrédient" value="${esc(l.nom)}"
                   oninput="App._fabLignes[${i}].nom=this.value">
            <input class="f-input" type="number" placeholder="Qté (kg)" value="${l.qte}"
                   style="max-width:80px" inputmode="numeric"
                   oninput="App._fabLignes[${i}].qte=this.value">
            <input class="f-input" type="number" placeholder="PU (F)" value="${l.pu}"
                   style="max-width:90px" inputmode="numeric"
                   oninput="App._fabLignes[${i}].pu=this.value">
        </div>
    `).join('');

    z.innerHTML = `
        <div class="card">
            <div class="card-title">⚙️ Fabrication aliment</div>
            <label class="f-label">Stade</label>
            <select class="f-input" id="fab-stade">
                <option value="DEMARRAGE">Démarrage (J1–J10)</option>
                <option value="CROISSANCE">Croissance (J11–J28)</option>
                <option value="FINITION">Finition (J29+)</option>
            </select>
            <label class="f-label">Bande</label>
            <select class="f-input" id="fab-bande">
                ${DEMO.batiments.filter(b=>b.statut==='encours')
                    .map(b=>`<option value="${b.bande}">${esc(b.bande)}</option>`).join('')}
            </select>

            <div class="section-title" style="margin-top:4px">Ingrédients</div>
            <div id="fab-lignes">${lignesHTML}</div>
            <button class="btn-action btn-ghost" onclick="fabAjouterLigne()">＋ Ajouter un ingrédient</button>

            <div class="fab-total" id="fab-total">
                <span>Total</span><span>—</span>
            </div>
            <button class="btn-action btn-green" onclick="fabCalculer()">🔢 Calculer</button>
            <button class="btn-action btn-blue"  onclick="fabValider()">✅ Enregistrer le lot</button>
        </div>
    `;
}

function fabAjouterLigne() {
    App._fabLignes.push({ nom: '', qte: '', pu: '' });
    _renderFabForm();
}

function fabCalculer() {
    let totalKg = 0, totalF = 0;
    App._fabLignes.forEach(l => {
        const q = parseFloat(l.qte) || 0;
        const p = parseFloat(l.pu)  || 0;
        totalKg += q;
        totalF  += q * p;
    });
    const el = document.getElementById('fab-total');
    if (el) el.innerHTML = `
        <span>${fmt(totalKg)} kg</span>
        <span>${fmt(totalF)} FCFA · ${totalKg > 0 ? fmt(Math.round(totalF/totalKg)) : '—'} F/kg</span>
    `;
    showToast('Calcul mis à jour', 'success');
}

function fabValider() {
    showToast('✅ Lot de fabrication enregistré (démo)', 'success');
    Nav.back();
}

/** Initialise l'app après login réussi */
async function startApp() {
    updateOffline();
    renderHome();
}

/** Point d'entrée au chargement de la page */
window.onload = function () {
    if (App.token && isSessionValid()) {
        // Session encore valide : passer directement à l'app
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-main').style.display     = 'block';
        startApp();
    } else if (App.token && !isSessionValid()) {
        // Token expiré : nettoyer silencieusement
        localStorage.removeItem('av_token');
        localStorage.removeItem('av_lt');
        App.token     = null;
        App.loginTime = 0;
        showToast('Session expirée — reconnectez-vous', 'warning', 4000);
        // L'écran login reste visible (display par défaut)
    }
    // Sinon : aucun token → écran login visible par défaut
};
</script>
