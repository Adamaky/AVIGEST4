<!DOCTYPE html>
<html lang="fr">
<head>

    <style>
        :root { --primary: #1a2a3a; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --accent: #3498db; --bg: #f8fafc; }
        * { box-sizing: border-box; }
        body { font-family: 'Lexend', sans-serif; margin: 0; background: var(--bg); padding-bottom: 16px; }
        .header { background: var(--primary); color: white; padding: 14px 16px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { padding: 12px; max-width: 500px; margin: 0 auto; }
        .card { background: white; padding: 16px; border-radius: 20px; margin-bottom: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .stat-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .stat-box { background: white; padding: 15px; border-radius: 18px; text-align: center; border-bottom: 4px solid var(--primary); }
        .stat-val { font-size: 22px; font-weight: 800; display: block; color: var(--primary); }
        .stat-val-sm { font-size: 16px; font-weight: 800; display: block; color: var(--primary); }
        .stat-label { font-size: 9px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .chart-container { position: relative; height: 220px; width: 100%; margin-top: 10px; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; height: 75px; border-top: 1px solid #e2e8f0; z-index: 1000; }
        .nav-bottom button { flex: 1; border: none; background: none; font-size: 11px; font-weight: 700; color: #94a3b8; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .nav-bottom button.active { color: var(--accent); }
        #login-screen { position: fixed; inset: 0; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-box { background: white; width: 85%; max-width: 320px; padding: 30px; border-radius: 28px; text-align: center; }
        .pin-pad { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 25px; }
        .pin-pad button { background: #f1f5f9; border: none; border-radius: 15px; padding: 18px; font-size: 22px; font-weight: 700; color: var(--primary); cursor: pointer; transition: 0.15s; }
        .pin-pad button:active { transform: scale(0.93); }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 15px; color: white; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
        .btn:disabled { opacity: 0.6; cursor: wait; }
        .btn-primary { background: var(--primary); }
        .btn-accent  { background: var(--accent); }
        .btn-success { background: var(--success); }
        .btn-danger  { background: var(--danger); }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #cbd5e1; font-family: inherit; font-size: 16px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
        label { display: block; margin: 10px 0 4px 2px; font-weight: 600; font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .task-card { background: #fff5f5; border-left: 5px solid var(--danger); padding: 14px; border-radius: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .task-card.done { background: #f0fff4; border-left-color: var(--success); }
        .task-title { font-weight: 700; font-size: 14px; flex: 1; }
        .task-meta { font-size: 11px; color: #64748b; margin-top: 4px; }
        .task-compta { background: white; border: 1.5px solid #e2e8f0; padding: 14px; border-radius: 14px; margin-bottom: 10px; }
        .toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 14px 20px; border-radius: 14px; font-size: 13px; font-weight: 600; z-index: 10001; box-shadow: 0 8px 24px rgba(0,0,0,0.2); animation: slideDown 0.3s ease; max-width: 90%; text-align: center; }

        /* ── HEADER TOPBAR V24 ── */

<script>
// ============================================================
// SÉCURITÉ & NAVIGATION V24
// ============================================================

const API_TIMEOUT = 10000;

// ── Navigation centralisée ──
const Nav = {
    stack: [],
    push: function(fn, params) {
        Nav.stack.push({ fn, params });
        Nav._exec(fn, params);
        Nav._updateBtn();
    },
    back: function() {
        if (Nav.stack.length <= 1) { Nav.stack=[]; renderHome(); Nav._updateBtn(); return; }
        Nav.stack.pop();
        const p = Nav.stack[Nav.stack.length-1];
        Nav._exec(p.fn, p.params);
        Nav._updateBtn();
    },
    home: function() { Nav.stack=[]; renderHome(); Nav._updateBtn(); },
    _exec: function(fn, params) {
        try {
            if (typeof window[fn]==='function') window[fn](params);
            else { console.error('Nav: inconnu:', fn); renderHome(); }
        } catch(e) { console.error('Nav error:', fn, e); showToast('Erreur d\'affichage','error'); }
    },
    _updateBtn: function() {
        const b = document.getElementById('btn-back');
        if (b) b.style.display = Nav.stack.length>1 ? 'inline-block' : 'none';
    }
};

// ── Fetch avec timeout ──
async function fetchWithTimeout(url, opts={}, ms=API_TIMEOUT) {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), ms);
    try {
        const r = await fetch(url, {...opts, signal: ctrl.signal});
        clearTimeout(t);
        return r;
    } catch(e) { clearTimeout(t); if(e.name==='AbortError') throw new Error('TIMEOUT'); throw e; }
}

// ── API robuste avec retry ──
async function apiPostWithRetry(payload, maxTry=3) {
    if (!isSessionValid()) { handleExpired(); return {success:false}; }
    payload.token = App.token;
    if (!App.isOnline) { queueRequest(payload); return {success:true,queued:true}; }
    for (let i=1; i<=maxTry; i++) {
        try {
            const r = await fetchWithTimeout(URL_API, {
                method:'POST', body:JSON.stringify(payload),
                headers:{'Content-Type':'application/json'}
            }, i===1 ? 10000 : 15000);
            if (!r.ok) throw new Error('HTTP '+r.status);
            const d = await r.json();
            if (d.error && d.error.includes('Session')) { handleExpired(); return {success:false}; }
            return d;
        } catch(e) {
            if (e.message==='TIMEOUT' && i<maxTry) {
                showToast('Réseau lent · Tentative '+(i+1)+'/'+maxTry+'...','warning',2000);
                await new Promise(r=>setTimeout(r, 1500*i));
            } else {
                if (i===maxTry) { queueRequest(payload); return {success:true,queued:true}; }
            }
        }
    }
    queueRequest(payload); return {success:true,queued:true};
}

// ── API GET avec timeout ──
async function apiGetWithTimeout(params={}, ms=8000) {
    if (params.action!=='login' && !isSessionValid()) { handleExpired(); return {success:false}; }
    const url = new URL(URL_API);
    url.searchParams.append('token', App.token||'');
    Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
    try {
        const r = await fetchWithTimeout(url.toString(), {}, ms);
        if (!r.ok) throw new Error('HTTP '+r.status);
        const d = await r.json();
        if (d.error && d.error.includes('Session')) { handleExpired(); return {success:false}; }
        return d;
    } catch(e) {
        if (e.message==='TIMEOUT') showToast('Connexion lente · données en cache','warning');
        return App.data && App.data.success ? App.data : {success:false, error:e.message};
    }
}

// ── Session valide ──
function isSessionValid() {
    if (!App.token || !App.loginTime) return false;
    if ((Date.now()-App.loginTime) >= SESSION_MS) return false;
    return true;
}

// ── Avertissement expiration session ──
let _sessWarn = false;
setInterval(function() {
    if (!App.loginTime) return;
    const rem = SESSION_MS - (Date.now()-App.loginTime);
    if (rem < 3600000 && !_sessWarn) {
        _sessWarn = true;
        showToast('⚠️ Session expire dans moins d\'1h','warning',6000);
    }
    if (rem <= 0) { showToast('Session expirée','error',4000); setTimeout(()=>{ localStorage.clear(); location.reload(); },3000); }
}, 60000);

// ── Anti double-soumission ──
const _pending = new Set();
function guardDouble(key) {
    if (_pending.has(key)) { showToast('Opération en cours...','warning'); return false; }
    _pending.add(key); setTimeout(()=>_pending.delete(key),3000); return true;
}

// ── Sanitisation ──
function sanitizeNumber(val, min=0, max=Infinity) {
    const n = parseFloat(val);
    if (isNaN(n)||n<min||n>max) return null;
    return n;
}

// ── XSS : escapeHtml robuste ──
function escapeHtml(t) {
    if (t==null) return '';
    return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/\//g,'&#47;');
}

// ── formatMontant ──
function formatMontant(n) {
    return Math.round(n||0).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ');
}

    showToast('Session expirée. Reconnexion requise.','error',4000);

// ============================================================
// OFFLINE QUEUE — token injecté au moment de l'envoi
// ============================================================

function queueRequest(payload) {
    const p = Object.assign({}, payload);
    delete p.token; // Le token sera ajouté frais au moment de la sync
    App.offlineQueue.push({ payload: p, timestamp: Date.now(), id: 'Q' + Date.now() });
    localStorage.setItem('aviQueue_v23', JSON.stringify(App.offlineQueue));
    updateOfflineUI();
    showToast('📴 Donnée sauvegardée localement.', 'warning');
}

async function processQueue() {
    if (App.offlineQueue.length === 0 || !App.isOnline || App.isSyncing) return;
    if (!isSessionValid()) {
        showToast('Session expirée. Reconnectez-vous pour synchroniser ' + App.offlineQueue.length + ' enregistrement(s).', 'warning', 6000);
        return;
    }
    App.isSyncing = true;
    showToast('Synchronisation de ' + App.offlineQueue.length + ' enregistrement(s)...', 'info');

    const failed = [];
    for (const item of App.offlineQueue) {
        try {
            const payload = Object.assign({}, item.payload, { token: App.token });
            const res  = await fetch(URL_API, { method: 'POST', body: JSON.stringify(payload) });
            const data = await res.json();
            if (!data.success && data.error && data.error.includes('Session')) failed.push(item);
        } catch (e) {
            failed.push(item);
        }
    }

    App.offlineQueue = failed;
    localStorage.setItem('aviQueue_v23', JSON.stringify(failed));
    App.isSyncing = false;
    updateOfflineUI();
    if (failed.length === 0) { showToast('✅ Toutes les données synchronisées', 'success'); sync(); }
    else showToast(failed.length + ' élément(s) en attente', 'warning');
}

function updateOfflineUI() {
    const badge  = document.getElementById('offline-badge');
    const qBadge = document.getElementById('queue-badge');
    if (badge)  badge.className  = 'offline-indicator' + (App.isOnline ? '' : ' visible');
    if (qBadge) {
        const n = App.offlineQueue.length;
        qBadge.textContent = n > 9 ? '9+' : n;
        qBadge.className   = 'queue-badge' + (n > 0 ? ' visible' : '');
    }
}

let pinBuffer = '';
function pin(d) {
    if (pinBuffer.length < 4) {
        pinBuffer += d;
        document.getElementById('pin-display').innerText = pinBuffer.split('').map(() => '•').join('').padEnd(4, '_');
    }
}
function pinClear() { pinBuffer = ''; document.getElementById('pin-display').innerText = '____'; }

async function login() {
    if (pinBuffer.length !== 4) return;
    const btn = document.querySelector('.pin-pad button:last-child');
    btn.disabled = true;
    try {
        // PIN envoyé comme chaîne — le backend fait .toString().trim()
        const res = await fetch(`${URL_API}?action=login&pin=${pinBuffer}`);
        const d   = await res.json();
        if (d.success) {
            App.token     = d.token;
            App.role      = d.role;
            App.loginTime = Date.now();
            localStorage.setItem('aviToken',    d.token);
            localStorage.setItem('aviRole',     d.role);
            localStorage.setItem('aviNom',      d.nom || '');
            localStorage.setItem('aviLoginTime', String(App.loginTime));
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-main').style.display     = 'block';
            showApp();
        } else {
            showToast(d.error || 'PIN incorrect', 'error');
            pinClear();
        }
    } catch (e) {
        showToast('Erreur réseau. Vérifiez votre connexion.', 'error');
    } finally {
        btn.disabled = false;
    }
}

async function chiffrerEcriture(id) {
    const montant = document.getElementById('price-' + id)?.value;
    const type    = document.getElementById('type-' + id)?.value;
    if (!montant || isNaN(montant) || Number(montant) <= 0) { showToast('Montant invalide', 'warning'); return; }

    const data    = tachesComptaMap[id] || {};
    const idBande = data.idBande || App.activeBande || 'GENERAL';

    const d = await apiPost({ action: 'GERANT_COMPTA', idRow: id, montant: Number(montant), typeEcriture: type, titre: data.titre || '', idBande });
    if (d.success || d.queued) {
        if (d.alert) showToast(d.alert, 'warning', 5000);
        showToast(d.queued ? 'Écriture sauvegardée (hors ligne)' : (d.message || 'Validé ✅'), 'success');
        if (!d.offline) sync();
    } else showToast(d.error || 'Erreur', 'error');
}

async function envoyerStockEntree() {
    const produit = document.getElementById('st-produit').value.trim();
    const qte     = document.getElementById('st-qte').value;
    const unite   = document.getElementById('st-unite').value;
    const cout    = document.getElementById('st-cout').value;
    const fourn   = document.getElementById('st-fourn').value.trim();

    if (!produit) { showToast('Nom du produit requis', 'warning'); return; }
    if (!qte || isNaN(qte) || Number(qte) <= 0) { showToast('Quantité invalide', 'warning'); return; }

    let qteKg = Number(qte);
    if (unite === 'sac50') qteKg *= 50;

    const btn = document.getElementById('btn-stock');
    setLoading(btn, true);
    try {
        const d = await apiPost({ action: 'STOCK_ENTREE', idBande: App.activeBande || 'GENERAL', produit, quantite: qteKg, unite: 'kg', coutTotal: Number(cout) || 0, fournisseur: fourn });
        if (d.success || d.queued) {
            showToast(d.queued ? 'Stock sauvegardé (hors ligne)' : (d.message || 'Stock enregistré ✅'), 'success');
            ['st-produit','st-qte','st-cout','st-fourn'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
            if (!d.offline) sync();
        } else showToast(d.error || 'Erreur', 'error');
    } catch (e) { showToast('Erreur réseau', 'error'); }
    finally { setLoading(btn, false); }
}

    t.className   = 'toast ' + type;
    t.textContent = msg;
    document.body.appendChild(t);

    if (!btn) return;
    if (loading) { btn.dataset.orig = btn.innerHTML; btn.innerHTML = '⏳ Chargement...'; btn.disabled = true; }

    const etapes = etapesParSession[session] || [];
    let html = `<div class="section-title" style="margin-top:16px;">📋 Guide ${session} — ${etapes.length} étapes</div><div class="card">`;

    etapes.forEach((e, idx) => {
        const cls = e.blocked ? 'blocked' : idx === 0 ? 'active' : 'pending';
        html += `<div class="etape" id="etape-${e.id}">
            <div class="etape-num ${cls}">${idx + 1}</div>
            <div style="flex:1;">
                <div class="etape-titre">${e.emoji} ${e.titre}${e.tag ? `<span class="etape-tag ${e.tag}">${e.tag === 'urgent' ? 'URGENT' : 'CONDITIONNEL'}</span>` : ''}</div>
                <div class="etape-desc">${e.desc}</div>
                ${e.blocked ? `<div style="font-size:11px;color:var(--danger);font-weight:700;margin-top:3px;">${e.blockedMsg}</div>` : ''}
                ${e.champ && !e.blocked ? renderChampsEtape(e.champ, e.id) : ''}
            </div>
        </div>`;
    });

    return html + '</div>';
}

function renderChampsEtape(type, id) {
    if (type === 'toggle') return `<div class="aliment-toggle">
        <button class="aliment-btn on" onclick="setAlimentStatut('ON',this)">✅ SERVI</button>
        <button class="aliment-btn off" onclick="setAlimentStatut('OFF',this)">❌ RETIRÉ</button></div>`;
    if (type === 'ambiance') return `<div style="margin-top:8px;">
        <div class="stat-grid">
            <div><label>Temp (°C)</label><input type="number" id="v-temp-${id}" placeholder="32" inputmode="decimal"></div>
            <div><label>Hygro (%)</label><input type="number" id="v-hygro-${id}" placeholder="65" inputmode="decimal"></div>
        </div>
        <div class="stat-grid">
            <div><label>Litière (1-5)</label><select id="v-lit-${id}"><option value="">--</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>
            <div><label>Air (m/s)</label><input type="number" id="v-air-${id}" placeholder="0.5" inputmode="decimal"></div>
        </div>
        <button class="btn btn-primary" onclick="saisirAmbiance('${id}')" style="padding:11px;font-size:13px;">💾 ENREGISTRER</button></div>`;
    if (type === 'mort-matin') return `<div style="margin-top:8px;"><label>Morts matin</label><input type="number" id="v-mort-matin" placeholder="0" inputmode="numeric" min="0">
        <button class="btn btn-danger" onclick="saisirMortalite('MortaliteMatin','v-mort-matin')" style="padding:11px;font-size:13px;">💀 ENREGISTRER</button></div>`;
    if (type === 'mort-soir') return `<div style="margin-top:8px;"><label>Morts soir</label><input type="number" id="v-mort-soir" placeholder="0" inputmode="numeric" min="0">
        <button class="btn btn-danger" onclick="saisirMortalite('MortaliteSoir','v-mort-soir')" style="padding:11px;font-size:13px;">💀 ENREGISTRER</button></div>`;
    if (type === 'eau-matin') return `<div style="margin-top:8px;"><label>Compteur matin (L)</label><input type="number" id="v-eau-matin" placeholder="1200" inputmode="numeric">
        <button class="btn btn-accent" onclick="saisirEau('EauMatin','v-eau-matin')" style="padding:11px;font-size:13px;">💧 ENREGISTRER</button></div>`;
    if (type === 'eau-soir') return `<div style="margin-top:8px;"><label>Compteur soir (L)</label><input type="number" id="v-eau-soir" placeholder="1580" inputmode="numeric">
        <button class="btn btn-accent" onclick="saisirEau('EauSoir','v-eau-soir')" style="padding:11px;font-size:13px;">💧 ENREGISTRER</button></div>`;
    if (type === 'aliment') return `<div style="margin-top:8px;"><label>Aliment distribué (kg)</label><input type="number" id="v-aliment" placeholder="45" inputmode="decimal">
        <button class="btn btn-success" onclick="saisirAliment()" style="padding:11px;font-size:13px;">🌾 ENREGISTRER</button></div>`;
    if (type === 'pesee') return `<div style="margin-top:8px;"><div class="stat-grid-3">
        <div><label>Moy (g)</label><input type="number" id="v-pmoy" placeholder="185" inputmode="numeric"></div>
        <div><label>Min (g)</label><input type="number" id="v-pmin" placeholder="140" inputmode="numeric"></div>
        <div><label>Max (g)</label><input type="number" id="v-pmax" placeholder="230" inputmode="numeric"></div></div>
        <button class="btn btn-primary" onclick="saisirPesee()" style="padding:11px;font-size:13px;">⚖️ PESÉE</button></div>`;
    if (type === 'sante') return `<div style="margin-top:8px;"><label>Score santé (1-5)</label>
        <select id="v-sante"><option value="">--</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
        <label>Observation</label><textarea id="v-sante-note" rows="2" placeholder="Respiration, comportement..."></textarea>
        <button class="btn btn-success" onclick="saisirSante()" style="padding:11px;font-size:13px;">🫁 ENREGISTRER</button></div>`;
    return '';
}

// ── Saisies agent ──

async function saisirAmbiance(etapeId) {
    if (!App.activeBande) { showToast('Sélectionnez une bande', 'warning'); return; }
    const temp   = document.getElementById('v-temp-'  + etapeId)?.value;
    const hygro  = document.getElementById('v-hygro-' + etapeId)?.value;
    const lit    = document.getElementById('v-lit-'   + etapeId)?.value;
    const air    = document.getElementById('v-air-'   + etapeId)?.value;
    const saisies = [];
    if (temp)  saisies.push({ cat:'Temperature', val1:temp });
    if (hygro) saisies.push({ cat:'Hygrometrie', val1:hygro });
    if (lit)   saisies.push({ cat:'Litiere',     val1:lit });
    if (air)   saisies.push({ cat:'VitesseAir',  val1:air });
    if (!saisies.length) { showToast('Saisissez au moins une valeur', 'warning'); return; }
    let alerte = null;
    for (const s of saisies) {
        const d = await apiPost({ action:'SAISIE_TECH', idBande:App.activeBande, ...s });
        if (d.alert) alerte = d.alert;
    }
    marquerEtapeFaite(etapeId);
    showToast(alerte || 'Ambiance enregistrée ✅', alerte ? 'warning' : 'success', alerte ? 5000 : 3000);
    if (temp || hygro) sync();
}

async function saisirMortalite(cat, inputId) {
    if (!App.activeBande) { showToast('Sélectionnez une bande', 'warning'); return; }
    const val = document.getElementById(inputId)?.value;
    if (val === '' || val === undefined) { showToast('Saisissez une valeur', 'warning'); return; }
    const d = await apiPost({ action:'SAISIE_TECH', idBande:App.activeBande, cat, val1:val });
    if (d.success || d.queued) {
        showToast(d.alert || 'Mortalité enregistrée ✅', d.alert ? 'warning' : 'success', d.alert ? 5000 : 3000);
        document.getElementById(inputId).value = '';
        sync();
    } else showToast(d.error || 'Erreur', 'error');
}

async function saisirEau(cat, inputId) {
    if (!App.activeBande) { showToast('Sélectionnez une bande', 'warning'); return; }
    const val = document.getElementById(inputId)?.value;
    if (!val) { showToast('Saisissez la valeur du compteur', 'warning'); return; }
    const d = await apiPost({ action:'SAISIE_TECH', idBande:App.activeBande, cat, val1:val });
    if (d.success || d.queued) { showToast('Compteur enregistré ✅', 'success'); document.getElementById(inputId).value = ''; sync(); }
    else showToast(d.error || 'Erreur', 'error');
}

async function saisirAliment() {
    if (!App.activeBande) { showToast('Sélectionnez une bande', 'warning'); return; }
    const val = document.getElementById('v-aliment')?.value;
    if (!val) { showToast('Saisissez la quantité', 'warning'); return; }
    const d = await apiPost({ action:'SAISIE_TECH', idBande:App.activeBande, cat:'Alimentation', val1:val });
    if (d.success || d.queued) { showToast('Aliment enregistré ✅', 'success'); document.getElementById('v-aliment').value = ''; sync(); }
    else showToast(d.error || 'Erreur', 'error');
}

async function saisirPesee() {
    if (!App.activeBande) { showToast('Sélectionnez une bande', 'warning'); return; }
    const moy = document.getElementById('v-pmoy')?.value;
    if (!moy) { showToast('Poids moyen obligatoire', 'warning'); return; }
    for (const [cat, id] of [['PoidsMoyen','v-pmoy'],['PoidsMin','v-pmin'],['PoidsMax','v-pmax']]) {
        const val = document.getElementById(id)?.value;
        if (val) await apiPost({ action:'SAISIE_TECH', idBande:App.activeBande, cat, val1:val });
    }
    showToast('Pesée enregistrée ✅', 'success');
    ['v-pmoy','v-pmin','v-pmax'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
    sync();
}

async function saisirSante() {
    if (!App.activeBande) { showToast('Sélectionnez une bande', 'warning'); return; }
    const score = document.getElementById('v-sante')?.value;
    const note  = document.getElementById('v-sante-note')?.value;
    if (!score) { showToast('Saisissez un score', 'warning'); return; }
    const d = await apiPost({ action:'SAISIE_TECH', idBande:App.activeBande, cat:'SanteGeneral', val1:score, note });
    if (d.success || d.queued) { showToast('Santé enregistrée ✅', 'success'); sync(); }
    else showToast(d.error || 'Erreur', 'error');
}

async function setAlimentStatut(statut, btn) {
    if (!App.activeBande) { showToast('Sélectionnez une bande', 'warning'); return; }
    btn.parentElement.querySelectorAll('.aliment-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    await apiPost({ action:'SAISIE_TECH', idBande:App.activeBande, cat:'AlimentStatut', val1:0, note:statut });
    showToast('Aliment : ' + statut, statut === 'ON' ? 'success' : 'warning');
}

function marquerEtapeFaite(etapeId) {
    const el = document.getElementById('etape-' + etapeId);
    if (!el) return;
    const num = el.querySelector('.etape-num');
    const titre = el.querySelector('.etape-titre');
    if (num) { num.className = 'etape-num done'; num.textContent = '✓'; }
    if (titre) titre.classList.add('done');
}

// ── Clôture & Rapport ──

async function lancerCloture() {
    if (!App.activeBande) { showToast('Sélectionnez une bande', 'warning'); return; }
    if (!confirm('Lancer la clôture de ' + App.activeBande + ' ?')) return;
    const d = await apiPost({ action:'LANCER_CLOTURE', idBande:App.activeBande });
    if (d.success) { showToast(d.message || 'Clôture lancée ✅', 'success'); changeTab('cloture'); }
    else showToast(d.error || 'Erreur', 'error');
}

async function chargerCloture() {
    const div = document.getElementById('cloture-content');
    if (!div || !App.activeBande) return;
    const d = await apiGet({ action:'getCloture', idBande:App.activeBande });
    if (!d.success || !d.phases || !d.phases.length) {
        div.innerHTML = '<div style="text-align:center;padding:30px;color:#94a3b8;">Aucune clôture en cours.</div>'; return;
    }
    const icons = { ABATTAGE:'🔪', EVACUATION:'🚛', NETTOYAGE:'🧹', DESINFECTION:'🧴', VIDE_SANITAIRE:'⏳', PREPARATION:'🐣' };
    div.innerHTML = d.phases.map(ph => `<div class="phase-card">
        <div style="font-size:22px;">${icons[ph.phase]||'📋'}</div>
        <div style="flex:1;">
            <div style="font-weight:700;font-size:13px;">${escapeHtml(ph.label)}</div>
            <div style="font-size:11px;color:#64748b;">Prévue : ${escapeHtml(ph.datePrevue)}${ph.dateReelle?' · Réalisée : '+escapeHtml(ph.dateReelle):''}</div>
            <span class="phase-statut ${ph.statut}">${ph.statut.replace('_',' ')}</span>
        </div>
        ${ph.statut !== 'VALIDEE' ? `<button class="btn btn-success" style="width:auto;padding:8px 12px;margin-bottom:0;font-size:12px;" onclick="validerPhase('${escapeHtml(ph.idCloture)}','${escapeHtml(ph.phase)}','${escapeHtml(App.activeBande)}')">✓</button>` : ''}
    </div>`).join('');
}

async function validerPhase(idCloture, phase, idBande) {
    if (!confirm('Valider la phase ' + phase + ' ?')) return;
    const d = await apiPost({ action:'VALIDER_PHASE', idCloture, phase, idBande });
    if (d.success) { showToast(d.clotureComplete ? '🎉 Clôture terminée !' : 'Phase validée ✅', 'success'); chargerCloture(); }
    else showToast(d.error || 'Erreur', 'error');
}

async function chargerRapport() {
    const div = document.getElementById('rapport-content');
    if (!div || !App.activeBande) { if(div) div.innerHTML='<div style="text-align:center;padding:30px;color:#94a3b8;">Sélectionnez une bande.</div>'; return; }

    if (!d.success) { div.innerHTML = '<div style="padding:20px;color:var(--danger);">Erreur : ' + escapeHtml(d.error) + '</div>'; return; }
    div.innerHTML = `
    <div class="card"><div class="section-title" style="margin:0 0 10px;">🐔 Zootechnie — ${escapeHtml(d.idBande)}</div>
        <div class="compta-row"><span>Effectif initial</span><strong>${formatMontant(d.effectifInitial)} sujets</strong></div>
        <div class="compta-row"><span>Mortalité</span><strong style="color:var(--danger)">${formatMontant(d.mortaliteCumulee)} sujets</strong></div>
        <div class="compta-row"><span>Taux de survie</span><strong style="color:var(--success)">${d.tauxSurvie}%</strong></div>
        <div class="compta-row"><span>Poids moyen final</span><strong>${d.poidsMoyenFinal} g</strong></div>
        <div class="compta-row"><span>IC global</span><strong>${d.icGlobal || '--'}</strong></div>
    </div>
    <div class="card"><div class="section-title" style="margin:0 0 10px;">💰 Finance</div>
        <div class="compta-row"><span>Total dépenses</span><strong style="color:var(--danger)">${formatMontant(d.totalDepenses)} FCFA</strong></div>
        <div class="compta-row"><span>Total recettes</span><strong style="color:var(--success)">${formatMontant(d.totalRecettes)} FCFA</strong></div>
        <div class="compta-row" style="font-size:15px;"><span>Marge nette</span><strong style="color:${d.margeNette>=0?'var(--success)':'var(--danger)'}">${formatMontant(d.margeNette)} FCFA</strong></div>
    </div>
    <div class="card"><div class="section-title" style="margin:0 0 10px;">📦 Coûts</div>
        <div class="compta-row"><span>Coût/kg vif</span><strong>${formatMontant(d.coutKiloVif)} FCFA</strong></div>
        <div class="compta-row"><span>Coût/kg carcasse</span><strong>${formatMontant(d.coutKiloCarcasse)} FCFA</strong></div>
    </div>
    <div class="card"><div class="section-title" style="margin:0 0 10px;">🛒 Ventes</div>
        <div class="compta-row"><span>Total ventes</span><strong>${formatMontant(d.totalVentes)} FCFA</strong></div>
        <div class="compta-row"><span>Créances ouvertes</span><strong style="color:${d.creancesOuvertes>0?'var(--warning)':'var(--success)'}">${formatMontant(d.creancesOuvertes)} FCFA</strong></div>
    </div>
    <div style="text-align:center;font-size:11px;color:#94a3b8;">Rapport généré le ${d.dateGeneration}</div>`;
}

    </div>`;
    html += '<button class="btn btn-accent" onclick="changeTab(\'more\')" style="margin-top:4px;">← Retour</button>';

    setTimeout(() => {
        const fc = document.getElementById('chartFinance');
        if (fc) new Chart(fc, { type:'doughnut', data:{ labels:['Aliment','Poussins','Santé',"M. d'œuvre",'Divers'], datasets:[{ data:[f.alimentation||0,f.poussins||0,f.sante||0,f.main_oeuvre||0,f.divers||0], backgroundColor:['#3498db','#f1c40f','#e74c3c','#27ae60','#94a3b8'], borderWidth:0 }]}, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom' } } }});
        const pc = document.getElementById('chartPoids');
        if (pc && g.poidsStd && g.poidsStd.length) new Chart(pc, { type:'line', data:{ datasets:[{ label:'Standard', data:g.poidsStd, borderColor:'#cbd5e1', borderDash:[5,5], pointRadius:0, fill:false },{ label:'Réel', data:g.poidsReel, borderColor:'#27ae60', backgroundColor:'rgba(39,174,96,0.1)', fill:true, tension:0.4 }]}, options:{ responsive:true, maintainAspectRatio:false, scales:{ x:{ type:'linear' } }, plugins:{ legend:{ position:'bottom' } } }});

}

function calcMontantJournal() {
    const q = parseFloat(document.getElementById('j-qte')?.value) || 0;
    const p = parseFloat(document.getElementById('j-prix')?.value) || 0;
    if (q > 0 && p > 0) { const el = document.getElementById('j-montant'); if(el) el.value = Math.round(q * p); }
}

async function ecrireJournal() {
    const cat = document.getElementById('j-cat')?.value;
    const montant = document.getElementById('j-montant')?.value;
    if (!cat) { showToast('Catégorie obligatoire', 'warning'); return; }
    if (!montant || Number(montant) <= 0) { showToast('Montant invalide', 'warning'); return; }
    if (!App.activeBande) { showToast('Sélectionnez une bande', 'warning'); return; }
    const btn = document.getElementById('btn-journal');
    setLoading(btn, true);
    try {
        const d = await apiPost({ action:'ECRITURE_JOURNAL', idBande:App.activeBande,
            typeEcriture:document.getElementById('j-type')?.value,
            categorie:cat, beneficiaire:document.getElementById('j-benef')?.value||'',
            quantite:document.getElementById('j-qte')?.value||'1',
            prixUnitaire:document.getElementById('j-prix')?.value||'0',
            montant:Number(montant), note:document.getElementById('j-note')?.value||'' });
        if (d.success || d.queued) { showToast(d.queued?'Sauvegardé (hors ligne)':(d.message||'Enregistré ✅'), 'success'); }

async function chargerListeUsers() {
    const d = await apiGet({ action: 'getUtilisateurs' });

    if (!el) return;
    if (!d.success || !d.utilisateurs.length) { el.innerHTML = '<div style="text-align:center;color:#64748b;padding:16px;">Aucun utilisateur</div>'; return; }
    const roles = { GERANT: 'Gérants (max 2)', AGENT: 'Agents (max 2)', PARTENAIRE: 'Partenaires' };
    let html = '';
    ['GERANT','AGENT','PARTENAIRE'].forEach(role => {
        const liste = d.utilisateurs.filter(u => u.role === role);
        if (!liste.length) return;
        html += `<div style="font-size:10px;color:#64748b;text-transform:uppercase;margin:10px 0 4px;letter-spacing:1px;">${roles[role]}</div>`;
        liste.forEach(u => {
            html += `<div class="user-item">
                <div>
                    <div class="user-name">${escapeHtml(u.nom)}</div>
                    <div class="user-pin">PIN : ${escapeHtml(u.pin)}</div>

                    <button class="btn btn-accent btn-sm" onclick="toggleUserExt('${escapeHtml(u.pin)}')">${u.actif ? 'Désactiver' : 'Activer'}</button>
                </div>
            </div>`;
        });
    });
    el.innerHTML = html;
}

async function ajouterUtilisateur() {
    const nom  = document.getElementById('u-nom')?.value.trim();
    const pin  = document.getElementById('u-pin')?.value.trim();
    const role = document.getElementById('u-role')?.value;
    if (!nom || !pin) { showToast('Nom et PIN obligatoires', 'warning'); return; }
    if (pin.length !== 4 || isNaN(pin)) { showToast('PIN : 4 chiffres exactement', 'warning'); return; }
    const btn = document.getElementById('btn-add-user');
    setLoading(btn, true);
    const d = await apiPost({ action: 'CREER_UTILISATEUR', pin, role, nom });
    if (d.success) { showToast(d.message || 'Utilisateur créé ✅', 'success'); chargerListeUsers(); document.getElementById('u-nom').value=''; document.getElementById('u-pin').value=''; }
    else showToast(d.error || 'Erreur', 'error');
    setLoading(btn, false);
}

async function toggleUserExt(pin) {
    const d = await apiPost({ action: 'TOGGLE_UTILISATEUR', pin });
    if (d.success) { showToast(d.message || 'Mis à jour', 'success'); chargerListeUsers(); }
    else showToast(d.error || 'Erreur', 'error');
}

        {icon:'🍗', titre:'Poids total poulets entiers', unit:'kg'},

    const et = etapes[e-1];

    let html = ``;
    html += `<div style="background:rgba(231,76,60,0.08);border:1px solid rgba(231,76,60,0.2);border-radius:14px;padding:12px;margin-bottom:14px;">

    html += `<div class="steps-prog"><div class="sp-dot ${e>=1?'d':''}"></div><div class="sp-dot ${e>=2?'d':''}"></div><div class="sp-dot ${e>=3?'d':''}"></div></div>`;

        <span class="num-big" id="abat-disp">${window._abatVals[e]||'--'}</span>
        <span class="num-unit">${et.unit}</span>
    </div>`;

    html += `<div id="abat-numpad" class="numpad-grid"></div>`;

    zone.innerHTML = html;
    buildAbatNumpadV24();
}

function buildAbatNumpadV24() {
    const zone = document.getElementById('abat-numpad');
    if (!zone) return;
    let buf = String(window._abatVals[window._abatEtape]||'').replace('--','');
    const upd = () => { const d=document.getElementById('abat-disp'); if(d) d.textContent=buf||'--'; };
    [['1','2','3'],['4','5','6'],['7','8','9'],['⌫','0','OK']].forEach(row => {
        row.forEach(v => {
            const btn = document.createElement('button');
            btn.className = 'npg-btn' + (v==='⌫'?' del':v==='OK'?' ok':'');
            btn.textContent = v;
            btn.onclick = () => {
                if (v==='⌫') { buf=buf.slice(0,-1); upd(); }
                else if (v==='OK') {
                    if (!buf) { showToast('Saisissez une valeur','error'); return; }
                    window._abatVals[window._abatEtape] = buf;
                    if (window._abatEtape < 3) { window._abatEtape++; renderAbatEtapeV24(); }
                    else { afficherResumeAbat(); }
                } else { if(buf.length<7){buf+=v;upd();} }
            };
            zone.appendChild(btn);
        });
    });
}

// Actions gérant
async function validerQteG(cat, qte, unite, prixId) {
    const prix = parseFloat(document.getElementById(prixId)?.value);
    if (!prix||prix<=0) { showToast('Saisissez le prix unitaire','warning'); return; }
    if (!App.activeBande) { showToast('Sélectionnez une bande','warning'); return; }
    const d = await apiPost({action:'VALIDER_QUANTITE', idBande:App.activeBande, categorie:cat, quantite:qte, unite, prixUnitaire:prix});
    if (d.success) showToast(d.message||'Validé ✅','success');
    else showToast(d.error||'Erreur','error');
}

async function comptabiliserTacheG(id) {
    const mnt  = parseFloat(document.getElementById('mnt-'+id)?.value);
    const type = document.getElementById('type-'+id)?.value;
    if (!mnt||mnt<=0) { showToast('Montant invalide','warning'); return; }
    if (!App.activeBande) { showToast('Sélectionnez une bande','warning'); return; }
    const d = await apiPost({action:'VALIDER_QUANTITE', idRow:id, montant:mnt, typeEcriture:type, idBande:App.activeBande, categorie:'Tâche'});
    if (d.success||d.queued) { showToast('Validé ✅','success'); await sync(); renderGerantTab('accueil'); }
    else showToast(d.error||'Erreur','error');
}

async function creerTacheG() {
    const titre = document.getElementById('p-titre')?.value;
    const date  = document.getElementById('p-date')?.value;
    const type  = document.getElementById('p-type')?.value;
    if (!titre||!date) { showToast('Titre et date obligatoires','warning'); return; }
    if (!App.activeBande) { showToast('Sélectionnez une bande','warning'); return; }
    const btn = document.getElementById('btn-planif');
    setLoading(btn, true);
    const d = await apiPost({action:'CREER_TACHE', titre, date, idBande:App.activeBande, typeTache:type});
    if (d.success||d.queued) { showToast('Tâche planifiée ✅','success'); document.getElementById('p-titre').value=''; }
    else showToast(d.error||'Erreur','error');
    setLoading(btn, false);
}

function calcJrnG() {
    const q = parseFloat(document.getElementById('j-qte')?.value)||0;
    const p = parseFloat(document.getElementById('j-prix')?.value)||0;
    if (q>0&&p>0) { const el=document.getElementById('j-montant'); if(el) el.value=Math.round(q*p); }
}

async function ecrireJrnG() {
    const cat = document.getElementById('j-cat')?.value;
    const mnt = parseFloat(document.getElementById('j-montant')?.value);
    if (!cat) { showToast('Catégorie obligatoire','warning'); return; }
    if (!mnt||mnt<=0) { showToast('Montant invalide','warning'); return; }
    if (!App.activeBande) { showToast('Sélectionnez une bande','warning'); return; }
    const btn = document.getElementById('btn-jrn');
    setLoading(btn, true);
    const d = await apiPost({action:'ECRITURE_JOURNAL', idBande:App.activeBande,
        typeEcriture:document.getElementById('j-type')?.value,
        categorie:cat, beneficiaire:document.getElementById('j-benef')?.value||'',
        quantite:document.getElementById('j-qte')?.value||1,
        prixUnitaire:document.getElementById('j-prix')?.value||0, montant:mnt});
    if (d.success||d.queued) { showToast(d.message||'Enregistré ✅','success'); }
    else showToast(d.error||'Erreur','error');
    setLoading(btn, false);
}

async function envoyerStockG() {
    const produit = document.getElementById('st-produit')?.value.trim();
    const qte = parseFloat(document.getElementById('st-qte')?.value);
    const cout= parseFloat(document.getElementById('st-cout')?.value)||0;
    if (!produit||!qte) { showToast('Produit et quantité requis','warning'); return; }
    if (!App.activeBande) { showToast('Sélectionnez une bande','warning'); return; }
    const btn = document.getElementById('btn-stock');
    setLoading(btn, true);
    const d = await apiPost({action:'STOCK_ENTREE', idBande:App.activeBande, produit, quantite:qte, coutTotal:cout});
    if (d.success||d.queued) { showToast(d.message||'Stock enregistré ✅','success'); }
    else showToast(d.error||'Erreur','error');
    setLoading(btn, false);
}

function renderJournalGerant() {
    const zone = document.getElementById('app-container');
    if (!zone) return;
    const f = App.data.finance || {};
    const bandes = App.data.listeBandes || [];
    let html = '';

    // Sélecteur bande
    html += `<select onchange="changerBande(this.value)" style="width:100%;padding:12px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.1);font-family:inherit;font-size:14px;background:#1a2d40;color:white;margin-bottom:14px;">
        <option value="">-- Sélectionner une bande --</option>
        ${bandes.map(b=>`<option value="${escapeHtml(b)}" ${b===App.activeBande?'selected':''}>${escapeHtml(b)}</option>`).join('')}
    </select>`;

    // Solde
    const solde = f.solde || 0;
    html += `<div style="background:linear-gradient(135deg,#142233,#1a2d40);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px;margin-bottom:14px;text-align:center;">
        <div style="font-size:10px;color:#8fa8c0;text-transform:uppercase;letter-spacing:1px;">Solde net · ${escapeHtml(App.activeBande||'--')}</div>
        <div style="font-size:26px;font-weight:900;color:${solde>=0?'var(--success)':'var(--danger)'};">${formatMontant(solde)} FCFA</div>
    </div>`;

    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">
        <div style="background:#1a2d40;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px;text-align:center;">
            <div style="font-size:18px;font-weight:800;color:var(--danger);">${formatMontant(f.totalDepenses||0)}</div>
            <div style="font-size:9px;color:#8fa8c0;text-transform:uppercase;">Dépenses FCFA</div>
        </div>
        <div style="background:#1a2d40;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px;text-align:center;">
            <div style="font-size:18px;font-weight:800;color:var(--success);">${formatMontant(f.recettes||0)}</div>
            <div style="font-size:9px;color:#8fa8c0;text-transform:uppercase;">Recettes FCFA</div>
        </div>
    </div>`;

    // Actions comptables
    const btnStyle = 'width:100%;padding:14px;border:none;border-radius:12px;font-weight:800;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;font-family:inherit;';
    html += `<button style="${btnStyle}background:var(--success);color:#000;" onclick="Nav.push('renderJournalSaisie',null)">+ Nouvelle écriture au journal</button>`;
    html += `<button style="${btnStyle}background:var(--accent);color:white;" onclick="Nav.push('renderVentes',null)">🛒 Gérer les ventes</button>`;
    html += `<button style="${btnStyle}background:#1a2d40;border:1px solid rgba(255,255,255,0.1);color:white;" onclick="Nav.push('renderFabrication',null)">🌾 Fabrication aliment</button>`;
    html += `<button style="${btnStyle}background:#1a2d40;border:1px solid rgba(255,255,255,0.1);color:white;" onclick="Nav.push('renderRapport',null)">📄 Rapport de bande</button>`;

    zone.innerHTML = html;
}

        <select id="v-pmt" style="width:100%;padding:11px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:#1a2d40;color:white;font-family:inherit;font-size:13px;margin-bottom:10px;" onchange="toggleEchNav(this.value)">
            <option value="COMPTANT">💵 Comptant</option>
            <option value="CREDIT">📄 Crédit</option>
        </select>

            <div style="font-size:11px;color:#8fa8c0;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">Date d'échéance</div>
            <input type="date" id="v-ech" style="width:100%;padding:11px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:#1a2d40;color:white;font-family:inherit;font-size:14px;">

        <button id="btn-vente-nav" onclick="enregistrerVenteNav()" style="width:100%;padding:14px;border:none;border-radius:12px;background:var(--success);color:#000;font-weight:800;cursor:pointer;font-size:13px;font-family:inherit;">💰 ENREGISTRER LA VENTE</button>

function updateProduitsVenteNav(type) {
    const sel = document.getElementById('v-produit');
    if (!sel) return;
    const opts = type==='VIF' ? [['POULET_VIF','Poulet vif (kg)']] :
        [['POULET_ENTIER','Poulet entier (kg)'],['GESIER_FOIE','Gésier + Foie (kg)'],['TETES_PATTES','Têtes + Pattes (sujet)']];
    sel.innerHTML = opts.map(([v,l])=>`<option value="${v}">${l}</option>`).join('');
}

function calcVenteNav() {
    const q = parseFloat(document.getElementById('v-qte')?.value)||0;
    const p = parseFloat(document.getElementById('v-prix')?.value)||0;
    const el = document.getElementById('v-mnt-nav');
    if (el) el.textContent = q>0&&p>0 ? formatMontant(Math.round(q*p))+' FCFA' : '';
}

function toggleEchNav(v) {
    const d = document.getElementById('v-ech-nav');
    if (d) d.style.display = v==='CREDIT'?'block':'none';
}

async function enregistrerVenteNav() {
    const idClient = document.getElementById('v-client')?.value;
    const type     = document.getElementById('v-type')?.value;
    const produit  = document.getElementById('v-produit')?.value;
    const qte      = parseFloat(document.getElementById('v-qte')?.value);
    const prix     = parseFloat(document.getElementById('v-prix')?.value);
    const pmt      = document.getElementById('v-pmt')?.value;
    const ech      = document.getElementById('v-ech')?.value;
    if (!idClient) { showToast('Sélectionnez un client','warning'); return; }
    if (!qte||!prix) { showToast('Quantité et prix obligatoires','warning'); return; }
    if (!App.activeBande) { showToast('Sélectionnez une bande','warning'); return; }
    const btn = document.getElementById('btn-vente-nav');
    setLoading(btn, true);
    const d = await apiPost({action:'CREER_VENTE', idBande:App.activeBande, idClient, typeVente:type, produit, quantite:qte, prixUnitaire:prix, unite:'kg', modePaiement:pmt, dateEcheance:ech||''});
    if (d.success||d.queued) { showToast(d.queued?'Sauvegardé (hors ligne)':d.message||'Vente enregistrée ✅','success'); }
    else showToast(d.error||'Erreur','error');
    setLoading(btn, false);
}

function renderNewClient() {
    const zone = document.getElementById('app-container');
    if (!zone) return;
    const inputStyle = 'width:100%;padding:11px 14px;margin-bottom:10px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);font-family:inherit;font-size:14px;background:#1a2d40;color:white;';
    zone.innerHTML = `<div class="card">
        <div style="font-weight:700;margin-bottom:12px;">👤 Nouveau client</div>
        <div style="font-size:11px;color:#8fa8c0;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">Nom *</div>
        <input type="text" id="c-nom" placeholder="Nom complet" style="${inputStyle}">
        <div style="font-size:11px;color:#8fa8c0;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">Téléphone *</div>
        <input type="tel" id="c-tel" placeholder="Ex: 70 00 00 00" inputmode="tel" style="${inputStyle}">
        <div style="font-size:11px;color:#8fa8c0;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">Adresse</div>
        <input type="text" id="c-adr" placeholder="Quartier, ville..." style="${inputStyle}">
        <div style="font-size:11px;color:#8fa8c0;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">Type</div>
        <select id="c-type" style="${inputStyle}">
            <option value="PARTICULIER">Particulier</option>
            <option value="MAQUIS">Maquis / Restaurant</option>
            <option value="REVENDEUR">Revendeur</option>
            <option value="AUTRE">Autre</option>
        </select>
        <button id="btn-nc" onclick="creerClientNav()" style="width:100%;padding:14px;border:none;border-radius:12px;background:var(--success);color:#000;font-weight:800;cursor:pointer;font-size:13px;font-family:inherit;">👤 ENREGISTRER</button>
    </div>`;
}

async function creerClientNav() {
    const nom = document.getElementById('c-nom')?.value.trim();
    const tel = document.getElementById('c-tel')?.value.trim();
    if (!nom||!tel) { showToast('Nom et téléphone obligatoires','warning'); return; }
    const btn = document.getElementById('btn-nc');
    setLoading(btn, true);
    const d = await apiPost({action:'CREER_CLIENT', nom, telephone:tel, adresse:document.getElementById('c-adr')?.value||'', typeClient:document.getElementById('c-type')?.value});
    if (d.success) {
        showToast(d.message||'Client créé ✅','success');
        await chargerClients();
        Nav.back();
    } else showToast(d.error||'Erreur','error');
    setLoading(btn, false);
}

async function initClotureNav(idBande) {
    if (!idBande) idBande = App.activeBande;
    if (!confirm('Lancer la clôture de ' + idBande + ' ? Cette action est irréversible.')) return;
    const d = await apiPost({action:'LANCER_CLOTURE', idBande});
    if (d.success) {
        showToast(d.message||'Clôture lancée ✅','success');
        await chargerBatiments();
        Nav.push('chargerClotureExt', idBande);
    } else showToast(d.error||'Erreur','error');
}

function renderFabrication() {
    renderMore();
}

function renderRapport() {
    chargerRapport();
}

window.onload = () => {
    if (App.token && isSessionValid()) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-main').style.display     = 'block';
        document.getElementById('tb-role').textContent = App.role;
        document.getElementById('tb-name').textContent = App.nom;
        showApp();
    } else if (App.token && !isSessionValid()) {
        localStorage.removeItem('aviToken');
        localStorage.removeItem('aviLoginTime');
        App.token = null;
        showToast('Session expirée. Reconnectez-vous.', 'warning');
    }
};
