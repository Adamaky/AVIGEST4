<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1b2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AviGest">
    <meta name="mobile-web-app-capable" content="yes">
    <title>AviGest v25</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:#0d1b2a; --bg2:#142233; --bg3:#1a2d40;
            --border:rgba(255,255,255,0.08);
            --text:#f0f4f8; --text2:#8fa8c0;
            --green:#00c896; --blue:#0099ff;
            --orange:#ff9d00; --red:#ff4444; --purple:#c084fc;
        }
        *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'Lexend',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

        .screen { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; }
        .screen.hidden { display:none !important; }

        .role-logo { font-size:52px; margin-bottom:8px; }
        .role-title { font-size:30px; font-weight:800; letter-spacing:-0.5px; margin-bottom:4px; }
        .role-sub { font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:40px; }
        .role-btns { display:flex; gap:22px; margin-bottom:48px; }
        .role-btn { display:flex; flex-direction:column; align-items:center; gap:10px; cursor:pointer;
                    -webkit-tap-highlight-color:transparent; touch-action:manipulation; transition:transform .15s; }
        .role-btn:active { transform:scale(.92); }
        .role-btn-circle { width:84px; height:84px; border-radius:50%; display:flex; align-items:center;
                           justify-content:center; font-size:34px; border:2px solid transparent; }
        .rbc-gerant    { background:rgba(96,165,250,.15); border-color:rgba(96,165,250,.4); }
        .rbc-agent     { background:rgba(74,222,128,.15); border-color:rgba(74,222,128,.4); }
        .rbc-partenaire{ background:rgba(192,132,252,.15); border-color:rgba(192,132,252,.4); }
        .role-btn-label { font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.8px; }
        .role-sortir { display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer;
                       -webkit-tap-highlight-color:transparent; opacity:.7; transition:opacity .15s; }
        .role-sortir:active { opacity:1; }
        .role-sortir-circle { width:58px; height:58px; border-radius:50%; background:rgba(255,68,68,.12);
                              border:2px solid rgba(255,68,68,.3); display:flex; align-items:center; justify-content:center; font-size:24px; }
        .role-sortir-label { font-size:10px; font-weight:700; color:var(--red); text-transform:uppercase; }

        .pin-logo  { font-size:48px; margin-bottom:8px; }
        .pin-title { font-size:26px; font-weight:800; }
        .pin-sub   { font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:1.5px; margin:4px 0 28px; }
        .pin-display { display:flex; gap:14px; margin-bottom:8px; }
        .pin-dot { width:18px; height:18px; border-radius:50%; background:var(--bg3);
                   border:2px solid var(--border); transition:background .15s,border-color .15s,transform .15s; }
        .pin-dot.filled { background:var(--blue); border-color:var(--blue); transform:scale(1.2); }
        .pin-pad { display:grid; grid-template-columns:repeat(3,72px); grid-template-rows:repeat(4,72px); gap:12px; margin-top:8px; }
        .pin-key { width:72px; height:72px; border-radius:50%; border:none; background:var(--bg2);
                   color:var(--text); font-family:'Lexend',sans-serif; font-size:22px; font-weight:600;
                   cursor:pointer; -webkit-tap-highlight-color:transparent; touch-action:manipulation;
                   transition:background .12s,transform .1s; display:flex; align-items:center;
                   justify-content:center; user-select:none; -webkit-user-select:none; }
        .pin-key:active,.pin-key.pressed { background:var(--bg3); transform:scale(.91); }
        .pin-key.key-del { background:rgba(255,68,68,.12); color:var(--red); font-size:16px; }
        .pin-key.key-ok  { background:rgba(0,200,150,.15); color:var(--green); font-size:16px; font-weight:800; }
        .pin-key.key-ok.ready { background:var(--green); color:#0d1b2a; box-shadow:0 0 20px rgba(0,200,150,.4); }
        .pin-key.key-empty { background:transparent; cursor:default; pointer-events:none; }
        .pin-err { height:20px; font-size:12px; color:var(--red); text-align:center; margin-bottom:12px;
                   opacity:0; transition:opacity .2s; }
        .pin-err.show { opacity:1; }
        .pin-loading { display:none; flex-direction:column; align-items:center; gap:14px; position:absolute; }
        .pin-loading.show { display:flex; }
        .spinner { width:38px; height:38px; border:3px solid var(--bg3); border-top-color:var(--blue);
                   border-radius:50%; animation:spin .8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
        .pin-display.shake { animation:shake .4s ease; }

        #app-main { display:none; min-height:100vh; }
        .header { background:var(--bg2); border-bottom:1px solid var(--border); padding:12px 16px;
                  display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
        .header-left { display:flex; align-items:center; gap:8px; }
        #btn-back { display:none; background:rgba(255,255,255,.08); border:none; color:var(--text);
                    font-size:22px; line-height:1; cursor:pointer; padding:4px 10px; border-radius:8px;
                    font-family:inherit; transition:background .15s; }
        #btn-back:active { background:rgba(255,255,255,.18); }
        #tb-role { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.8px; }
        #tb-name { font-size:14px; font-weight:700; }
        .offline-badge { display:none; background:var(--red); color:#fff; font-size:9px; font-weight:700;
                         padding:3px 8px; border-radius:10px; }
        .offline-badge.show { display:inline-block; }
        #btn-logout { background:rgba(255,68,68,.12); border:1px solid rgba(255,68,68,.35); color:var(--red);
                      border-radius:10px; padding:5px 12px; font-size:11px; font-weight:700; cursor:pointer;
                      font-family:inherit; -webkit-tap-highlight-color:transparent; }
        #btn-logout:active { background:rgba(255,68,68,.28); }

        /* ── padding container : géré dynamiquement par JS ── */
        #app-container {
            padding:12px;
            max-width:500px;
            margin:0 auto;
            padding-bottom:28px; /* défaut sans navbar */
            transition: padding-bottom .2s;
        }

        .toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%) translateY(20px);
                 background:var(--bg2); color:var(--text); padding:12px 22px; border-radius:40px;
                 font-size:13px; font-weight:600; z-index:99999; border:1px solid var(--border);
                 opacity:0; transition:opacity .25s,transform .25s; white-space:nowrap;
                 max-width:90vw; text-align:center; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast.error   { background:var(--red); color:#fff; border-color:transparent; }
        .toast.success { background:var(--green); color:#0d1b2a; border-color:transparent; }
        .toast.warning { background:var(--orange); color:#0d1b2a; border-color:transparent; }

        /* quand navbar visible, toast remonte au-dessus */
        body.nav-visible .toast { bottom: calc(72px + env(safe-area-inset-bottom) + 12px); }

        .tuile { border-radius:18px; padding:18px 20px; margin-bottom:10px; display:flex; align-items:center;
                 gap:16px; cursor:pointer; border:1px solid rgba(255,255,255,.07);
                 transition:transform .15s,opacity .15s; -webkit-tap-highlight-color:transparent;
                 touch-action:manipulation; user-select:none; }
        .tuile:active { transform:scale(.97); opacity:.85; }
        .tuile-icon { font-size:28px; flex-shrink:0; }
        .tuile-label { font-size:16px; font-weight:800; }
        .tuile-sub { font-size:11px; opacity:.7; margin-top:2px; }
        .tuile-arrow { margin-left:auto; font-size:18px; opacity:.4; }
        .t-superviser { background:linear-gradient(135deg,#0d2240,#0a3060); border-color:rgba(96,165,250,.2); }
        .t-planifier  { background:linear-gradient(135deg,#0d2a1a,#0a3320); border-color:rgba(74,222,128,.2); }
        .t-compta     { background:linear-gradient(135deg,#2a1f0d,#3a2800); border-color:rgba(251,191,36,.2); }
        .t-analyser   { background:linear-gradient(135deg,#1e0d2a,#2a1040); border-color:rgba(192,132,252,.2); }
        .t-bandes     { background:linear-gradient(135deg,#2a0d1a,#3a1028); border-color:rgba(249,168,212,.2); }

        .badge { font-size:10px; font-weight:800; padding:2px 8px; border-radius:20px; margin-left:8px; }
        .badge-red    { background:var(--red); color:#fff; animation:pulse 2s infinite; }
        .badge-blue   { background:var(--blue); color:#fff; animation:pulse 2s infinite; }
        .badge-green  { background:var(--green); color:#0d1b2a; }
        .badge-orange { background:var(--orange); color:#0d1b2a; animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

        .section-title { font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase;
                         letter-spacing:1.2px; margin:20px 4px 10px; }
        .card { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:10px; }
        .card-title { font-size:13px; font-weight:800; margin-bottom:12px; display:flex; align-items:center; gap:8px; }

        .kpi-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:10px; }
        .kpi-box { background:var(--bg3); border-radius:12px; padding:12px 8px; text-align:center; border:1px solid var(--border); }
        .kpi-val   { font-size:20px; font-weight:800; display:block; }
        .kpi-label { font-size:9px; color:var(--text2); text-transform:uppercase; letter-spacing:.8px; margin-top:3px; display:block; }

        .tache-card { background:var(--bg3); border-radius:12px; padding:12px 14px; margin-bottom:8px;
                      display:flex; align-items:center; gap:12px; border:1px solid var(--border); }
        .tache-card.urgente { border-color:rgba(255,68,68,.4); background:rgba(255,68,68,.05); }
        .tache-card.accomplie .tache-titre { text-decoration:line-through; color:var(--text2); }
        .tache-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
        .dot-red    { background:var(--red); }
        .dot-orange { background:var(--orange); }
        .dot-blue   { background:var(--blue); }
        .dot-green  { background:var(--green); }
        .tache-titre { font-size:13px; font-weight:700; flex:1; }
        .tache-meta  { font-size:10px; color:var(--text2); margin-top:2px; }
        .tache-badge { font-size:9px; font-weight:700; padding:2px 7px; border-radius:8px; white-space:nowrap; }
        .tb-abattage { background:rgba(255,68,68,.2); color:var(--red); }
        .tb-quotidien{ background:rgba(0,153,255,.2); color:var(--blue); }
        .tb-hebdo    { background:rgba(255,157,0,.2); color:var(--orange); }
        .tb-cloture  { background:rgba(192,132,252,.2); color:var(--purple); }
        .tb-bande    { background:rgba(249,168,212,.2); color:#f9a8d4; }

        .btn-fait { background:rgba(0,153,255,.15); border:1px solid rgba(0,153,255,.4); color:var(--blue);
                    border-radius:10px; padding:6px 14px; font-size:11px; font-weight:800; cursor:pointer;
                    font-family:'Lexend',sans-serif; transition:all .2s; white-space:nowrap;
                    -webkit-tap-highlight-color:transparent; }
        .btn-fait.confirmer { background:rgba(255,157,0,.25); border-color:rgba(255,157,0,.8);
                              color:var(--orange); animation:pulse 1s infinite; }
        .btn-fait.done { background:rgba(0,200,150,.15); border-color:rgba(0,200,150,.4);
                         color:var(--green); pointer-events:none; }

        .btn-valider-tache { background:rgba(0,200,150,.2); border:1px solid rgba(0,200,150,.5); color:var(--green);
                             border-radius:10px; padding:6px 14px; font-size:11px; font-weight:800; cursor:pointer;
                             font-family:'Lexend',sans-serif; white-space:nowrap;
                             -webkit-tap-highlight-color:transparent; animation:pulse 1.5s infinite; }
        .btn-valider-tache:active { background:var(--green); color:#0d1b2a; }
        .btn-valider-tache.validated { background:rgba(255,255,255,.06); border-color:var(--border);
                                       color:var(--text2); pointer-events:none; animation:none; }

        @keyframes banniere-pulse {
            0%,100% { box-shadow:0 0 0 0 rgba(0,153,255,.4); border-color:rgba(0,153,255,.4); }
            50%      { box-shadow:0 0 0 6px rgba(0,153,255,0); border-color:rgba(0,153,255,.9); }
        }
        .banniere { border-radius:14px; padding:14px 16px; margin-bottom:12px; cursor:pointer;
                    animation:banniere-pulse 1.8s ease-in-out infinite; }
        .banniere-agent  { background:rgba(0,153,255,.12); border:2px solid rgba(0,153,255,.4); }
        .banniere-gerant { background:rgba(0,200,150,.12); border:2px solid rgba(0,200,150,.4);
                           animation-name:none; }
        .banniere-validation { background:rgba(255,157,0,.12); border:2px solid rgba(255,157,0,.5);
                               animation-duration:1s; }

        .alerte { border-radius:12px; padding:11px 14px; margin-bottom:8px; display:flex; gap:10px; align-items:flex-start; font-size:12px; }
        .alerte.critique { background:rgba(255,68,68,.08); border:1px solid rgba(255,68,68,.25); }
        .alerte.warning  { background:rgba(255,157,0,.08);  border:1px solid rgba(255,157,0,.25); }
        .alerte-kpi { font-weight:800; font-size:11px; }
        .alerte.critique .alerte-kpi { color:var(--red); }
        .alerte.warning  .alerte-kpi { color:var(--orange); }
        .alerte-msg { color:var(--text2); margin-top:2px; line-height:1.4; }

        .tuile-session-active { border-color:rgba(0,153,255,.5)!important;
                                box-shadow:0 0 0 1px rgba(0,153,255,.25),0 0 18px rgba(0,153,255,.18);
                                animation:session-glow 2.5s ease-in-out infinite; }
        @keyframes session-glow {
            0%,100%{box-shadow:0 0 0 1px rgba(0,153,255,.25),0 0 18px rgba(0,153,255,.18)}
            50%{box-shadow:0 0 0 2px rgba(0,153,255,.45),0 0 32px rgba(0,153,255,.32)}
        }
        .session-active-badge { display:inline-block; font-size:9px; font-weight:800; color:#0d1b2a;
                                background:var(--blue); padding:2px 8px; border-radius:20px; margin-left:8px;
                                text-transform:uppercase; letter-spacing:.5px; animation:pulse 2s infinite; }

        .f-label  { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.8px;
                    font-weight:700; margin-bottom:6px; display:block; }
        .f-input  { width:100%; padding:13px 14px; background:var(--bg3); border:1px solid var(--border);
                    border-radius:12px; color:var(--text); font-family:'Lexend',sans-serif; font-size:15px;
                    margin-bottom:10px; outline:none; transition:border-color .15s; }
        .f-input:focus { border-color:var(--blue); }
        .btn-action { width:100%; padding:14px; border:none; border-radius:14px; font-family:'Lexend',sans-serif;
                      font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center;
                      justify-content:center; gap:8px; margin-bottom:8px;
                      transition:opacity .15s,transform .1s; -webkit-tap-highlight-color:transparent; }
        .btn-action:active { transform:scale(.97); opacity:.85; }
        .btn-green { background:var(--green); color:#0d1b2a; }
        .btn-blue  { background:var(--blue); color:#fff; }
        .btn-orange{ background:var(--orange); color:#0d1b2a; }
        .btn-red   { background:var(--red); color:#fff; }
        .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text2); }
        .choice-btn { padding:20px 12px; border-radius:16px; border:2px solid var(--border);
                      background:var(--bg3); color:var(--text); font-family:'Lexend',sans-serif;
                      font-size:13px; font-weight:700; cursor:pointer; text-align:center;
                      transition:border-color .15s,background .15s; -webkit-tap-highlight-color:transparent; }
        .choice-btn:active,.choice-btn.selected { border-color:var(--blue); background:rgba(0,153,255,.1); }
        .choice-icon { font-size:24px; display:block; margin-bottom:6px; }
        .form-choice-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
        .stepper { display:flex; gap:6px; margin-bottom:20px; }
        .step-dot { flex:1; height:3px; border-radius:2px; background:var(--bg3); transition:background .3s; }
        .step-dot.active { background:var(--blue); }
        .step-dot.done   { background:var(--green); }
        .form-step { display:none; }
        .form-step.active { display:block; }
        .form-step-title { font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:1px;
                           margin-bottom:14px; font-weight:700; }

        .journal-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0;
                       border-bottom:1px solid var(--border); font-size:12px; }
        .journal-row:last-child { border-bottom:none; }
        .journal-cat { color:var(--text2); flex:1; }
        .journal-mont { font-weight:800; }
        .journal-mont.dep { color:var(--red); }
        .journal-mont.rec { color:var(--green); }
        .rapport-section { margin-bottom:16px; }
        .rapport-titre { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:1px;
                         font-weight:700; margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--border); }
        .rapport-ligne { display:flex; justify-content:space-between; font-size:13px; padding:5px 0; }
        .rapport-ligne span:last-child { font-weight:700; }
        .bande-header { background:linear-gradient(135deg,var(--bg2),var(--bg3)); border:1px solid var(--border);
                        border-radius:16px; padding:16px; margin-bottom:10px; }
        .bande-name { font-size:18px; font-weight:800; }
        .bande-meta { font-size:11px; color:var(--text2); margin-top:4px; }
        .bat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .bat-card { background:var(--bg3); border:1px solid var(--border); border-radius:14px;
                    padding:14px 12px; text-align:center; cursor:pointer; transition:transform .15s;
                    -webkit-tap-highlight-color:transparent; }
        .bat-card:active { transform:scale(.95); }
        .bat-card.libre   { border-style:dashed; opacity:.6; }
        .bat-card.encours { background:rgba(0,200,150,.08); border-color:rgba(0,200,150,.3); }
        .bat-card.cloture { background:rgba(255,157,0,.08); border-color:rgba(255,157,0,.3); }
        .bat-num    { font-size:10px; color:var(--text2); font-weight:600; margin-bottom:4px; }
        .bat-icon   { font-size:22px; margin-bottom:4px; }
        .bat-name   { font-size:12px; font-weight:700; }
        .bat-info   { font-size:10px; color:var(--text2); margin-top:3px; }
        .bat-statut { font-size:10px; font-weight:700; margin-top:4px; }
        .bat-statut.encours { color:var(--green); }
        .bat-statut.libre   { color:var(--text2); }
        .bat-statut.cloture { color:var(--orange); }
        .user-item { display:flex; justify-content:space-between; align-items:center; padding:11px 14px;
                     background:var(--bg3); border-radius:12px; margin-bottom:6px; border:1px solid var(--border); }
        .user-name { font-size:13px; font-weight:700; }
        .user-pin  { font-size:10px; color:var(--text2); font-family:monospace; margin-top:2px; }
        .user-badge { font-size:9px; font-weight:700; padding:2px 8px; border-radius:8px; }
        .badge-actif    { background:rgba(0,200,150,.2); color:var(--green); }
        .badge-inactif  { background:rgba(255,68,68,.2); color:var(--red); }
        .badge-gerant   { background:rgba(96,165,250,.2); color:#60a5fa; }
        .badge-agent    { background:rgba(74,222,128,.2); color:#4ade80; }
        .badge-partenaire{ background:rgba(192,132,252,.2); color:var(--purple); }
        .vente-card { background:var(--bg3); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:8px; }
        .phase-card { display:flex; align-items:center; gap:12px; padding:12px 14px; background:var(--bg3);
                      border-radius:12px; margin-bottom:8px; border:1px solid var(--border); }
        .phase-statut-badge { margin-left:auto; font-size:9px; font-weight:700; padding:3px 9px; border-radius:8px; }
        .ps-validee { background:rgba(0,200,150,.2); color:var(--green); }
        .ps-encours { background:rgba(0,153,255,.2); color:var(--blue); }
        .ps-attente { background:rgba(255,255,255,.06); color:var(--text2); }
        .fab-ligne { display:flex; gap:8px; margin-bottom:8px; align-items:center; }
        .fab-ligne .f-input { margin-bottom:0; flex:1; }
        .fab-total { display:flex; justify-content:space-between; padding:12px; background:var(--bg3);
                     border-radius:12px; margin-top:8px; font-weight:700; }
        .prog-bar  { height:5px; background:var(--bg3); border-radius:3px; overflow:hidden; margin-top:6px; }
        .prog-fill { height:100%; border-radius:3px; background:var(--green); transition:width .5s; }
        .prog-fill.orange { background:var(--orange); }
        .prog-fill.red    { background:var(--red); }
        textarea { width:100%; padding:12px; background:var(--bg3); border:1px solid var(--border);
                   border-radius:12px; color:var(--text); font-family:inherit; font-size:13px;
                   resize:none; outline:none; margin-top:6px; }
        textarea:focus { border-color:var(--blue); }

        /* ═══════════════════════════════════════
           NAVBAR — styles
        ═══════════════════════════════════════ */
        #nav-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            z-index: 500;
            display: none;
            background: var(--bg2);
            border-top: 1px solid var(--border);
            padding: 6px 0 calc(6px + env(safe-area-inset-bottom, 0px));
        }
        #nav-bar.visible { display: flex; }

        .nav-tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            cursor: pointer;
            padding: 4px 2px;
            border: none;
            background: transparent;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            position: relative;
            min-height: 54px;
            font-family: 'Lexend', sans-serif;
        }
        .nav-tab:active { opacity: .7; }

        /* fond coloré iOS sur onglet actif */
        .nav-tab .nav-bg {
            position: absolute;
            inset: 2px 5px;
            border-radius: 12px;
            background: transparent;
            transition: background .2s;
            z-index: 0;
        }
        .nav-tab.active .nav-bg {
            background: rgba(0,153,255,.18);
        }

        .nav-tab-icon {
            font-size: 22px;
            line-height: 1;
            position: relative;
            z-index: 1;
            transition: transform .2s;
        }
        .nav-tab.active .nav-tab-icon { transform: scale(1.12); }

        .nav-tab-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .6px;
            color: var(--text2);
            position: relative;
            z-index: 1;
            transition: color .2s;
        }
        .nav-tab.active .nav-tab-label { color: var(--blue); }

        /* badge rouge style iOS */
        .nav-badge {
            position: absolute;
            top: 2px;
            right: calc(50% - 20px);
            min-width: 16px;
            height: 16px;
            background: var(--red);
            color: #fff;
            font-size: 9px;
            font-weight: 800;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 3px;
            border: 2px solid var(--bg2);
            z-index: 2;
            font-family: 'Lexend', sans-serif;
        }

        /* sous-menu sessions agent */
        #sessions-submenu {
            position: fixed;
            bottom: calc(66px + env(safe-area-inset-bottom, 0px));
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 24px);
            max-width: 476px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 14px 12px;
            z-index: 600;
            display: none;
            box-shadow: 0 -8px 32px rgba(0,0,0,.4);
            animation: submenuUp .2s ease;
        }
        #sessions-submenu.open { display: block; }
        @keyframes submenuUp {
            from { opacity:0; transform: translateX(-50%) translateY(8px); }
            to   { opacity:1; transform: translateX(-50%) translateY(0); }
        }
        .submenu-title {
            font-size: 10px;
            font-weight: 700;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            padding: 0 4px;
        }
        .submenu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 12px;
            border-radius: 13px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background .15s;
            margin-bottom: 4px;
        }
        .submenu-item:last-child { margin-bottom: 0; }
        .submenu-item:active { background: var(--bg3); }
        .submenu-item-icon  { font-size: 20px; flex-shrink: 0; }
        .submenu-item-info  { flex: 1; }
        .submenu-item-label { font-size: 13px; font-weight: 800; }
        .submenu-item-sub   { font-size: 10px; color: var(--text2); margin-top: 2px; }
        .submenu-item-status{ font-size: 18px; flex-shrink: 0; }

        /* overlay transparent pour fermer le sous-menu */
        #submenu-overlay {
            position: fixed;
            inset: 0;
            z-index: 590;
            display: none;
        }
        #submenu-overlay.open { display: block; }
        /* ═══ CYCLE VIE — onglets ═══ */
.cycle-tab { transition: border-bottom-color .2s, color .2s; }
.cycle-tab:active { opacity: .7; }
.cycle-tab-disabled { pointer-events: none; }
    </style>
</head>

<script>
'use strict';

/* ════════════════════════════════════════════
   ÉTAGE 1 — VARIABLES GLOBALES
════════════════════════════════════════════ */
const API        = 'https://script.google.com/macros/s/AKfycbxN3dVH77nGS4YWzHtryqmeVQKf8inqBlyIp7tV6-VJZ2Y0Pt1rG1UkWujQIP7dIESV-g/exec';
const SESSION_MS = 12 * 3600 * 1000;
/* Timeouts courts pour détecter vite une connexion faible */
const TIMEOUT_FAST_MS  = 3000;   /* sonde de connectivité */
const TIMEOUT_GET_MS   = 8000;   /* requêtes lecture */
const TIMEOUT_POST_MS  = 12000;  /* requêtes écriture (plus critique) */
const MAX_RETRY        = 3;
/* Cache long : les données restent utilisables 8h hors ligne */
const CACHE_KEY        = 'av_cache_data';
const CACHE_FULL_KEY   = 'av_cache_full';   /* cache par action+bande */
const CACHE_TTL_MS     = 8 * 60 * 60 * 1000;

const App = {
    token:       localStorage.getItem('av_token')  || null,
    role:        localStorage.getItem('av_role')   || null,
    nom:         localStorage.getItem('av_nom')    || '',
    idPart:      localStorage.getItem('av_idpart') || '',
    loginTime:   parseInt(localStorage.getItem('av_lt') || '0'),
    activeBande: localStorage.getItem('av_bande')  || '',
    data:        {},
    clients:     [],
    batiments:   [],
    isOnline:    navigator.onLine,
    offlineQueue: JSON.parse(localStorage.getItem('av_queue') || '[]'),
    _saisie:     {},
    _fabLignes:  [],
    _session:    { id:null, etapeIdx:0, reponses:{} },
    _abattage:   { etape:1, poidsEntier:null, poidsGesier:null, nbAbattu:null },
    _pavBuffers: {}
};

/* ════════════════════════════════════════════
   NAVBAR — Configuration et logique
   Intégrée proprement : ne touche pas à Nav.stack
   Gère padding et visibilité via CSS class
════════════════════════════════════════════ */
const NAVBAR_CONFIG = {
    GERANT: [
        { id:'accueil',  icon:'🏠', label:'Accueil',  fn:'renderGerant'      },
        { id:'bandes',   icon:'🐔', label:'Bandes',   fn:'renderGererBandes' },
        { id:'analyser', icon:'📈', label:'Analyses', fn:'renderAnalyser'    },
    ],
    AGENT: [
        { id:'accueil', icon:'🏠', label:'Accueil', fn:'renderAgent'    },
        { id:'taches',  icon:'📋', label:'Tâches',  fn:'_navTachesAgent' },
    ],
    PARTENAIRE: [
        { id:'bandes',    icon:'🐔', label:'Mes Bandes', fn:'renderPartenaire'           },
        { id:'resultats', icon:'📊', label:'Résultats',  fn:'_navPartenaireResultats'    },
        { id:'creances',  icon:'💳', label:'Créances',   fn:'_navPartenaireCreances'     },
    ],
};

/* Écrans sans navbar (saisies agent full-screen) */
const _SCREENS_SANS_NAV = new Set([
    'renderSession','_renderEtape','_renderSessionResume','_confirmerEtEnvoyer',
    'renderAbattage','_renderEtapeAbattage','_renderResumeAbattage'
]);
/* Écrans qui rétablissent la navbar */
const _SCREENS_AVEC_NAV = new Set([
    'renderGerant','renderAgent','renderPartenaire',
    'renderSuperviser','renderPlanifier','renderAnalyser','renderGererBandes',
    'renderCompta','renderJournal','renderRapportBande','renderAnalyser',
    'renderPartenaireBande','renderPartenaireResultats','renderPartenaireEtat','renderPartenaireCreances',
    'renderStock','renderPlanAbattage','renderCreerBande','renderDetailBatiment',
    'renderCycleVie', 'renderValidationTaches','renderPhaseCloture',
    '_navTachesAgent','_navAbattageAgent','_navPartenaireResultats','_navPartenaireCreances'
]);

let _navActiveId = 'accueil';

function initNavbar() {
    const cfg = NAVBAR_CONFIG[App.role];
    if (!cfg) return;
    const bar = document.getElementById('nav-bar');
    if (!bar) return;
    bar.innerHTML = cfg.map(tab => `
        <button class="nav-tab${tab.id === _navActiveId ? ' active' : ''}"
                id="navtab-${tab.id}"
                onclick="_navTap('${tab.id}','${tab.fn}',${tab.submenu ? 'true' : 'false'})"
                aria-label="${tab.label}">
            <div class="nav-bg"></div>
            <div class="nav-tab-icon">${tab.icon}</div>
            <span class="nav-tab-label">${tab.label}</span>
        </button>`
    ).join('');
    _navbarSetVisible(true);
}

function _navTap(id, fn, isSubmenu) {
    if (isSubmenu) { _ouvrirSubmenuSessions(); return; }
    _setNavActive(id);
    /* Navigation propre : réinitialise la pile SANS appeler Nav.back()
       évite tout conflit avec l'historique existant */
    Nav.stack = [];
    Nav._upBtn();
    if (typeof window[fn] === 'function') {
        Nav.stack.push({ fn, params: null });
        Nav._upBtn();
        window[fn]();
    }
}

function _setNavActive(id) {
    _navActiveId = id;
    document.querySelectorAll('.nav-tab').forEach(btn => {
        btn.classList.toggle('active', btn.id === 'navtab-' + id);
    });
}

function _setNavBadge(id, count) {
    const tab = document.getElementById('navtab-' + id);
    if (!tab) return;
    const ex = tab.querySelector('.nav-badge');
    if (ex) ex.remove();
    if (count > 0) {
        const b = document.createElement('div');
        b.className = 'nav-badge';
        b.textContent = count > 99 ? '99+' : String(count);
        tab.appendChild(b);
    }
}

function _navbarSetVisible(visible) {
    const bar = document.getElementById('nav-bar');
    const container = document.getElementById('app-container');
    if (!bar) return;
    if (visible) {
        bar.classList.add('visible');
        /* padding-bottom = hauteur navbar + safe area + marge */
        if (container) container.style.paddingBottom = 'calc(66px + env(safe-area-inset-bottom, 0px) + 16px)';
        document.body.classList.add('nav-visible');
    } else {
        bar.classList.remove('visible');
        if (container) container.style.paddingBottom = '28px';
        document.body.classList.remove('nav-visible');
    }
}

/* Sous-menu Sessions Agent */
function _ouvrirSubmenuSessions() {
    const menu    = document.getElementById('sessions-submenu');
    const overlay = document.getElementById('submenu-overlay');
    if (!menu) return;
    const sessions = [
        { id:'Matin', icon:'🌅', label:'Session Matin', heure:'5H – 10H',  nb:6 },
        { id:'Midi',  icon:'☀️', label:'Session Midi',  heure:'10H – 14H', nb:3 },
        { id:'PM',    icon:'🌤️', label:'Session PM',    heure:'14H – 19H', nb:3 },
        { id:'Nuit',  icon:'🌙', label:'Session Nuit',  heure:'19H – 5H',  nb:4 },
    ];
    const sessionActive = detectSession();
    menu.innerHTML = `<div class="submenu-title">Sessions du jour</div>` +
        sessions.map(s => {
            const verrouille = _verrouSessionExists ? _verrouSessionExists(s.id) : false;
            const actif = s.id === sessionActive;
            const statusIcon = verrouille ? '✅' : actif ? '⏳' : '○';
            return `
            <div class="submenu-item"
                 onclick="fermerSubmenuSessions();Nav.push('renderSession','${s.id}')">
                <div class="submenu-item-icon">${s.icon}</div>
                <div class="submenu-item-info">
                    <div class="submenu-item-label" style="color:${actif?'var(--blue)':verrouille?'var(--text2)':'var(--text)'}">
                        ${s.label}${actif?` <span style="font-size:9px;background:var(--blue);color:#0d1b2a;padding:2px 6px;border-radius:10px">EN COURS</span>`:''}
                    </div>
                    <div class="submenu-item-sub">${s.heure} · ${s.nb} étapes</div>
                </div>
                <div class="submenu-item-status">${statusIcon}</div>
            </div>`;
        }).join('');
    menu.classList.add('open');
    overlay.classList.add('open');
    _setNavActive('sessions');
}

function fermerSubmenuSessions() {
    document.getElementById('sessions-submenu')?.classList.remove('open');
    document.getElementById('submenu-overlay')?.classList.remove('open');
}

/* Raccourcis Agent */
function _navTachesAgent() {
    _setNavActive('taches');
    const sessionActive = detectSession();
    const sessions = [
        {id:'Matin', icon:'🌅', heure:'5H–10H', nb:6},
        {id:'Midi',  icon:'☀️', heure:'10H–14H', nb:3},
        {id:'PM',    icon:'🌤️', heure:'14H–19H', nb:3},
        {id:'Nuit',  icon:'🌙', heure:'19H–5H',  nb:4},
    ];
    const sessionCourante = sessions.find(s => s.id === sessionActive);
    const autresSessions  = sessions.filter(s => s.id !== sessionActive);
    const verrouille = _verrouSessionExists(sessionActive);
    const sessionHTML = `
        <div class="section-title">⏰ Session en cours</div>
        <div class="tuile tuile-session-active" style="background:var(--bg2);margin-bottom:8px" onclick="Nav.push('renderSession','${sessionCourante.id}')">
            <div class="tuile-icon">${sessionCourante.icon}</div>
            <div style="flex:1">
                <div class="tuile-label">${sessionCourante.id} <span class="session-active-badge">▶ EN COURS</span></div>
                <div class="tuile-sub">${sessionCourante.heure} · ${sessionCourante.nb} étapes</div>
            </div>
            <div style="font-size:20px">${verrouille ? '✅' : '⏳'}</div>
        </div>
        <div style="display:flex;gap:6px;margin-bottom:16px">
            ${autresSessions.map(s => {
                const v = _verrouSessionExists(s.id);
                return `<button onclick="Nav.push('renderSession','${s.id}')" style="flex:1;padding:8px 4px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);font-family:'Lexend',sans-serif;font-size:10px;font-weight:700;color:${v?'var(--green)':'var(--text2)'};cursor:pointer;-webkit-tap-highlight-color:transparent">${s.icon} ${s.id}<br><span style="font-size:9px">${v?'✅ Fait':'○'}</span></button>`;
            }).join('')}
        </div>`;
    const taches = (App.data?.tachesAgent || []);
    const tachesFiltrees = taches;
    const z = zone(); if (!z) return;
    
    z.innerHTML = `
        <div style="display:flex;gap:8px;margin-bottom:14px;padding:0 2px">
            ${['TOUTES','QUOTIDIEN','HEBDO','ABATTAGE'].map(f => `<button onclick="App._filtreTaches='${f}';_navTachesAgent()" style="flex:1;padding:8px 4px;border-radius:12px;border:2px solid ${filtreActif===f?'var(--blue)':'var(--border)'};background:${filtreActif===f?'rgba(0,153,255,.15)':'var(--bg3)'};color:${filtreActif===f?'var(--blue)':'var(--text2)'};font-family:'Lexend',sans-serif;font-size:10px;font-weight:700;cursor:pointer">${f==='TOUTES'?'Toutes':f==='QUOTIDIEN'?'Quotid.':f==='HEBDO'?'Hebdo':'🔪 Abatt.'}</button>`).join('')}
        </div>
        ${sessionHTML}
        <div class="section-title">📋 Tâches assignées</div>
        ${tachesFiltrees.length ? tachesFiltrees.map(t => {
            const done = t.statut==='TERMINEE'||t.statut==='COMPTABILISEE'||localStorage.getItem('av_done_'+t.id)==='true';
            return `
            <div class="tache-card ${done?'accomplie':''}" id="tcard-${esc(t.id)}">
                <div class="tache-dot dot-${t.typeTache==='HEBDO'?'orange':'blue'}"></div>
                <div style="flex:1">
                    <div class="tache-titre">${esc(t.titre)}</div>
                    <div class="tache-meta">${esc(t.idBande)} · ${esc(t.date)}</div>
                </div>
                ${done
                    ? `<button class="btn-fait done">✅ FAIT</button>`
                    : `<button class="btn-fait" id="btn-fait-${esc(t.id)}"
                               onclick="_tachePremierAppui('${esc(t.id)}','${esc(t.titre)}')">À FAIRE</button>`}
            </div>`;
        }).join('') : '<div style="color:var(--text2);font-size:13px;padding:20px;text-align:center">Aucune tâche assignée aujourd\'hui</div>'}`;
    Nav.stack = [{ fn:'_navTachesAgent', params:null }];
    Nav._upBtn();
}

function _navAbattageAgent() {
    _setNavActive('abattage');
    const abattages = (App.data?.tachesAgent||[]).filter(t => t.typeTache==='ABATTAGE' && t.statut!=='COMPTABILISEE');
    if (!abattages.length) { showToast('Aucun abattage planifié','warning'); return; }
    if (abattages.length === 1) { Nav.push('renderAbattage', abattages[0].id); return; }
    const z = zone(); if (!z) return;
    z.innerHTML = `
        <div class="section-title">🔪 Abattages planifiés</div>
        ${abattages.map(t=>`
            <div class="tache-card urgente" onclick="Nav.push('renderAbattage','${esc(t.id)}')" style="cursor:pointer">
                <div class="tache-dot dot-red"></div>
                <div style="flex:1"><div class="tache-titre">${esc(t.titre)}</div><div class="tache-meta">${esc(t.date)}</div></div>
                <span class="tache-badge tb-abattage">🔪</span>
            </div>`).join('')}`;
    Nav.stack = [{ fn:'_navAbattageAgent', params:null }];
    Nav._upBtn();
}

/* Raccourcis Partenaire */
function _navPartenaireResultats() {
    _setNavActive('resultats');
    const bandes = App.data?.bandes || [];
    if (bandes.length === 1) Nav.push('renderPartenaireResultats', bandes[0].idBande);
    else Nav.push('renderPartenaire', null);
}
function _navPartenaireCreances() {
    _setNavActive('creances');
    const bandes = App.data?.bandes || [];
    if (bandes.length === 1) Nav.push('renderPartenaireCreances', bandes[0].idBande);
    else Nav.push('renderPartenaire', null);
}

/* ════════════════════════════════════════════
   ÉTAGE 2 — UTILITAIRES PURS
════════════════════════════════════════════ */
function esc(t) {
    if (t == null) return '';
    return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                    .replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/\//g,'&#x2F;');
}
function fmt(n) {

let _toastTimer = null;

/* ════════════════════════════════════════════
   ÉTAGE 3 — SÉCURITÉ & SESSION
════════════════════════════════════════════ */
function isSessionValid() {
    if (!App.token || !App.loginTime) return false;
    return (Date.now() - App.loginTime) < SESSION_MS;
}
function handleExpired() {

}

    if (remaining < 3_600_000 && !_warnedExpiry) { _warnedExpiry = true; showToast("⚠️ Session expire dans moins d'1h",'warning',6000); }

/* ════════════════════════════════════════════
   ÉTAGE 4 — RÉSEAU & API  (Cache-First)
   Stratégie :
   • apiGet → affiche le cache IMMÉDIATEMENT,
     puis rafraîchit en arrière-plan si en ligne
   • Connexion faible détectée en 3s → bascule
     silencieusement en mode cache
   • apiPost → queue locale si hors ligne ou
     connexion trop lente, sync en parallèle
     dès que le réseau revient
   • Détection connexion faible via sonde ping
════════════════════════════════════════════ */

/* ── Qualité de connexion ─────────────────
   'good'  = réseau normal
   'slow'  = réseau présent mais lent (< 3s timeout)
   'none'  = pas de réseau
───────────────────────────────────────────*/
App.connQuality = 'good';
App._probeTimer = null;

async function _probeConnection() {
    if (!navigator.onLine) { _setConnQuality('none'); return; }
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), TIMEOUT_FAST_MS);
    try {
        /* sonde légère : juste les en-têtes, pas le corps */
        await fetchT(API + '?action=ping&t=' + Date.now(), {}, TIMEOUT_FAST_MS);
        clearTimeout(tid);
        _setConnQuality('good');
    } catch(e) {
        clearTimeout(tid);
        _setConnQuality(navigator.onLine ? 'slow' : 'none');
    }
}

function _setConnQuality(q) {
    const prev = App.connQuality;
    App.connQuality = q;
    App.isOnline    = q !== 'none';
    updateOffline();
    if (q === 'none'  && prev !== 'none')  showToast('📴 Hors ligne — données en cache', 'warning', 4000);
    if (q === 'slow'  && prev === 'good')  showToast('📶 Connexion faible — mode cache activé', 'warning', 4000);
    if (q === 'good'  && prev !== 'good') { showToast('🌐 Connexion rétablie', 'success', 3000); processQueue(); }
}

/* Sonde toutes les 30s pour détecter les changements de qualité */
function _startProbeLoop() {
    _probeConnection();
    App._probeTimer = setInterval(_probeConnection, 30_000);
}

/* ── Cache granulaire par action+bande ───*/
function _cacheKey(params) {
    const action = params.action || 'unknown';
    const bande  = params.idBande || App.activeBande || 'global';
    return `av_c_${action}_${bande}`;
}
function _cacheSet(params, data) {
    try {
        const key = _cacheKey(params);
        const entry = { ts: Date.now(), data };
        localStorage.setItem(key, JSON.stringify(entry));
        /* aussi mettre à jour le cache global pour restauration rapide */
        if (params.action === 'getAccueil' || params.action === 'dashboard') {
            _sauvegarderCache(data);
        }
    } catch(e) { console.warn('[Cache] écriture ignorée:', e.message); }
}
function _cacheGet(params) {
    try {
        const key  = _cacheKey(params);
        const raw  = localStorage.getItem(key);
        if (!raw) return null;
        const entry = JSON.parse(raw);
        if (Date.now() - entry.ts > CACHE_TTL_MS) return null;
        return entry.data;
    } catch(_) { return null; }
}

/* ── fetchT : timeout configurable ──────*/
async function fetchT(url, opts={}, ms=TIMEOUT_GET_MS) {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), ms);
    try {
        const r = await fetch(url, {...opts, signal: ctrl.signal});
        clearTimeout(tid); return r;
    } catch(e) {
        clearTimeout(tid);
        if (e.name === 'AbortError') throw new Error('TIMEOUT');
        throw e;
    }
}

/* ── apiGet : Cache-First ────────────────
   1. Retourne le cache IMMÉDIATEMENT si disponible
   2. Lance la requête réseau en parallèle
   3. Si réseau répond → met à jour le cache
   4. Si réseau échoue → le cache est déjà affiché, rien à faire
   Résultat : affichage instantané, données fraîches dès que possible
─────────────────────────────────────────*/
async function apiGet(params={}) {
    if (params.action !== 'login' && !isSessionValid()) { handleExpired(); return {success:false}; }

    const cached = _cacheGet(params);

    /* Connexion absente ou lente → cache immédiat, pas d'appel réseau */
    if (App.connQuality !== 'good') {
        if (cached) return cached;
        /* pas de cache et pas de réseau → erreur claire */
        return { success: false, error: 'Hors ligne — aucune donnée en cache' };
    }

    /* Réseau disponible : lancer la requête en arrière-plan */
    const url = new URL(API);
    if (App.token) url.searchParams.set('token', App.token);
    Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));

    /* Si cache dispo → le retourner tout de suite ET lancer le réseau */
    if (cached) {
        /* rafraîchissement silencieux en arrière-plan */
        fetchT(url.toString(), {}, TIMEOUT_GET_MS)
            .then(r => r.ok ? r.json() : null)
            .then(d => {
                if (d && d.success) {
                    _cacheSet(params, d);
                    /* mise à jour App.data si c'est la bande active */
                    if (params.idBande === App.activeBande) App.data = d;
                }
            })
            .catch(() => _setConnQuality(navigator.onLine ? 'slow' : 'none'));
        return cached;
    }

    /* Pas de cache → attendre le réseau normalement */
    try {
        const r = await fetchT(url.toString(), {}, TIMEOUT_GET_MS);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const d = await r.json();
        if (d.error && d.error.includes('Session')) { handleExpired(); return {success:false}; }
        _cacheSet(params, d);
        return d;
    } catch(e) {
        if (e.message === 'TIMEOUT') _setConnQuality('slow');
        /* dernier recours : cache global */
        if (App.data && App.data.success) return App.data;
        return { success: false, error: 'Connexion impossible' };
    }
}

/* ── apiPost : queue intelligente ────────
   Connexion faible → mise en queue immédiate
   + tentative réseau en arrière-plan avec timeout court
   Connexion bonne → envoi normal, fallback queue
─────────────────────────────────────────*/
async function apiPost(payload) {
    if (!isSessionValid()) { handleExpired(); return {success:false}; }
    payload.token = App.token;

    /* Hors ligne → queue directe, pas de tentative réseau */
    if (!App.isOnline) {
        queueRequest(payload);
        return { success: true, queued: true };
    }

    /* Connexion faible → mettre en queue ET tenter en arrière-plan */
    if (App.connQuality === 'slow') {
        queueRequest(payload);
        /* tentative silencieuse en arrière-plan */
        _tentativeEnvoi({...payload}).then(ok => {
            if (ok) {
                /* retirer de la queue si envoyé avec succès */
                const p = {...payload}; delete p.token;
                App.offlineQueue = App.offlineQueue.filter(
                    item => JSON.stringify(item.payload) !== JSON.stringify(p)
                );
                localStorage.setItem('av_queue', JSON.stringify(App.offlineQueue));
                updateOffline();
            }
        }).catch(() => {});
        return { success: true, queued: true };
    }

    /* Connexion normale → envoi direct avec retry */
    for (let i = 1; i <= MAX_RETRY; i++) {
        try {
            const r = await fetchT(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }, TIMEOUT_POST_MS);
            if (!r.ok) throw new Error('HTTP ' + r.status);
            const d = await r.json();
            if (d.error && d.error.includes('Session')) { handleExpired(); return {success:false}; }
            return d;
        } catch(e) {
            if (i < MAX_RETRY) {
                await new Promise(res => setTimeout(res, 1000 * i));
            }
        }
    }
    /* Échec après retry → queue locale */
    queueRequest(payload);
    _setConnQuality('slow');
    return { success: true, queued: true };
}

async function _tentativeEnvoi(payload) {
    try {
        const ctrl = new AbortController();
        const tid  = setTimeout(() => ctrl.abort(), TIMEOUT_POST_MS);
        const r = await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            signal: ctrl.signal
        });
        clearTimeout(tid);
        const d = await r.json();
        return d && d.success;
    } catch(_) { return false; }
}

/* ── Queue hors ligne ────────────────────*/
function queueRequest(payload) {
    const p = {...payload}; delete p.token;
    /* Éviter les doublons stricts */
    const exists = App.offlineQueue.some(
        item => JSON.stringify(item.payload) === JSON.stringify(p)
    );
    if (exists) return;
    App.offlineQueue.push({ payload: p, ts: Date.now(), retries: 0 });
    localStorage.setItem('av_queue', JSON.stringify(App.offlineQueue));
    updateOffline();
    showToast('📴 Sauvegardé — envoi automatique dès connexion', 'warning', 3500);
}

/* ── Synchronisation parallèle ───────────
   Envoie tous les éléments en parallèle (max 3 simultanés)
   au lieu d'un par un → beaucoup plus rapide
─────────────────────────────────────────*/
async function processQueue() {
    if (!App.offlineQueue.length || !App.isOnline || App.isSyncing) return;
    if (!isSessionValid()) {
        showToast('Session expirée — reconnectez-vous pour synchroniser', 'warning', 5000);
        return;
    }
    App.isSyncing = true;
    updateOffline();
    showToast('🔄 Synchronisation en cours…', 'info', 2000);

    const queue   = [...App.offlineQueue];
    const failed  = [];
    const BATCH   = 3; /* max 3 envois simultanés */

    for (let i = 0; i < queue.length; i += BATCH) {
        const batch = queue.slice(i, i + BATCH);
        const results = await Promise.allSettled(
            batch.map(item =>
                fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...item.payload, token: App.token })
                })
                .then(r => r.json())
                .then(d => ({ ok: d.success, item }))
                .catch(() => ({ ok: false, item }))
            )
        );
        results.forEach(r => {
            if (r.status === 'fulfilled' && r.value.ok) {
                /* succès — ne pas remettre dans la queue */
            } else {
                const it = r.status === 'fulfilled' ? r.value.item : r.reason?.item;
                if (it) {
                    it.retries = (it.retries || 0) + 1;
                    if (it.retries < 5) failed.push(it);
                    /* après 5 tentatives → abandonner silencieusement */
                }
            }
        });
    }

    App.offlineQueue = failed;
    localStorage.setItem('av_queue', JSON.stringify(failed));
    App.isSyncing = false;
    updateOffline();

    if (!failed.length) showToast('✅ Toutes les données synchronisées', 'success', 4000);
    else showToast(failed.length + ' élément(s) en attente de sync', 'warning', 4000);
}

/* ── Indicateur hors-ligne ───────────────*/
function updateOffline() {
    const b = document.getElementById('offline-badge');
    if (!b) return;
    const nb = App.offlineQueue.length;
    if (!App.isOnline) {
        b.classList.add('show');
        b.textContent = nb ? `📴 HORS LIGNE · ${nb} en attente` : '📴 HORS LIGNE';
    } else if (App.connQuality === 'slow') {
        b.classList.add('show');
        b.style.background = 'var(--orange)';
        b.textContent = nb ? `📶 LENT · ${nb} en attente` : '📶 CONNEXION FAIBLE';
    } else {
        b.classList.remove('show');
        b.style.background = '';
    }
}

window.addEventListener('online',  () => { _probeConnection(); });

/* ════════════════════════════════════════════
   ÉTAGE 5 — NAVIGATION
   Intégration navbar : _run() détecte l'écran
   et ajuste la visibilité sans toucher à la pile
════════════════════════════════════════════ */
const Nav = {
    stack: [],
    push(fn, params) {
        Nav.stack.push({fn, params});
        history.pushState({fn, params}, '');
        Nav._run(fn, params);
        Nav._upBtn();
    },
    back() {
        /* Comportement original préservé exactement */
        if (Nav.stack.length <= 1) {
            Nav.stack = [];
            renderHome();
            Nav._upBtn();
            /* retour à l'accueil → navbar visible + onglet accueil actif */
            _navbarSetVisible(true);
            _setNavActive('accueil');
            return;
        }
        Nav.stack.pop();
        const prev = Nav.stack[Nav.stack.length - 1];
        Nav._run(prev.fn, prev.params);
        Nav._upBtn();
    },
    home() {
        Nav.stack = [];
        renderHome();
        Nav._upBtn();
        _navbarSetVisible(true);
        _setNavActive('accueil');
    },
    replace(fn, params) {
        if (Nav.stack.length) Nav.stack[Nav.stack.length-1] = {fn, params};
        else Nav.stack.push({fn, params});
        Nav._run(fn, params);
        Nav._upBtn();
    },
    _run(fn, params) {
        /* ── Gestion navbar : sans modifier la pile ── */
        if (_SCREENS_SANS_NAV.has(fn)) {
            _navbarSetVisible(false);
        } else if (_SCREENS_AVEC_NAV.has(fn)) {
            _navbarSetVisible(true);
            /* Synchroniser l'onglet actif selon la fonction */
            const tabMap = {
                renderGerant:'accueil', renderAgent:'accueil', renderPartenaire:'bandes',
                renderAnalyser:'analyser', renderGererBandes:'bandes',
                renderCycleVie:'bandes', renderDetailBatiment:'bandes',
                renderJournal:'bandes', renderStock:'bandes',
                renderPlanAbattage:'bandes', renderGererPartenaires:'bandes', renderAnalyseBande:'analyser', renderTachesBande:'bandes',
                renderValidationTaches:'bandes', renderPhaseCloture:'bandes',
                renderPartenaireResultats:'resultats', renderPartenaireEtat:'resultats',
                renderPartenaireCreances:'creances',
                _navTachesAgent:'taches', _navAbattageAgent:'abattage',
                _navPartenaireResultats:'resultats', _navPartenaireCreances:'creances',
            };
            const tabId = tabMap[fn];
            if (tabId) _setNavActive(tabId);
        }
        /* ── Exécution originale préservée ── */
        try {
            if (typeof window[fn] === 'function') {
                const res = window[fn](params);
                if (res && typeof res.catch === 'function') {
                    res.catch(e => {
                        console.error('Nav async error ('+fn+'):', e);
                        showToast("Erreur d'affichage", 'error');
                    });
                }
            } else {
                console.error('Nav: fonction inconnue:', fn);
                renderHome();
            }
        } catch(e) {
            console.error('Nav error ('+fn+'):', e);
            showToast("Erreur d'affichage", 'error');
        }
    },
    _upBtn() {
        const btn = document.getElementById('btn-back');
        if (btn) btn.style.display = Nav.stack.length > 1 ? 'inline-block' : 'none';
    }
};

let _pin = '';
let _loginBusy = false;

function choisirRole(role) {
    const labels = {GERANT:'🧑‍💼 Gérant — entrez votre PIN', AGENT:'👷 Agent — entrez votre PIN', PARTENAIRE:'🤝 Partenaire — entrez votre PIN'};
    const el = document.getElementById('pin-label');
    if (el) el.textContent = labels[role] || 'Entrez votre PIN';
    _pin = ''; _updateDots();
    document.getElementById('key-ok').classList.remove('ready');
    _hideErr();
    document.getElementById('screen-role').classList.add('hidden');
    document.getElementById('screen-pin').classList.remove('hidden');
}
function pinTap(digit) {
    if (_loginBusy || _pin.length >= 4) return;
    _pin += digit; _updateDots();
    if (_pin.length === 4) document.getElementById('key-ok').classList.add('ready');
    _hideErr();
}
function pinDel() {
    if (_loginBusy || !_pin.length) return;
    _pin = _pin.slice(0, -1);
    document.getElementById('key-ok').classList.remove('ready');
    _updateDots(); _hideErr();
}
function _updateDots() {
    for (let i=0; i<4; i++) {
        const d = document.getElementById('dot-'+i);
        if (d) d.classList.toggle('filled', i < _pin.length);
    }
}
function _showErr(msg) {
    const e = document.getElementById('pin-err'), d = document.getElementById('pin-display');
    if (e) { e.textContent = msg; e.classList.add('show'); }
    if (d) { d.classList.add('shake'); setTimeout(()=>d.classList.remove('shake'), 450); }
}
function _hideErr() {
    const e = document.getElementById('pin-err');
    if (e) e.classList.remove('show');
}
async function doLogin() {
    if (_loginBusy) return;
    if (_pin.length !== 4) { _showErr('Saisissez 4 chiffres'); return; }
    if (!guardDouble('login')) return;
    _loginBusy = true;
    document.getElementById('pin-loading').classList.add('show');
    try {
        const res = await fetchT(API+'?action=login&pin='+_pin);
        if (!res.ok) throw new Error('HTTP '+res.status);
        const d = await res.json();
        if (d.success) {
            App.token=d.token; App.role=d.role; App.nom=d.nom||'';
            App.idPart=d.idPartenaire||''; App.loginTime=Date.now();
            localStorage.setItem('av_token',d.token);
            localStorage.setItem('av_role',d.role);
            localStorage.setItem('av_nom',d.nom||'');
            localStorage.setItem('av_idpart',d.idPartenaire||'');
            localStorage.setItem('av_lt',String(App.loginTime));
            document.getElementById('screen-pin').classList.add('hidden');
            document.getElementById('app-main').style.display = 'block';
            startApp();
        } else {
            _showErr(d.error || 'PIN incorrect');
            _pin = ''; _updateDots();
            document.getElementById('key-ok').classList.remove('ready');
        }
    } catch(e) {
        _showErr('Erreur réseau — réessayez');
        console.error('doLogin:', e);
    } finally {
        _loginBusy = false;
        document.getElementById('pin-loading').classList.remove('show');
    }
}
async function doLogout() {
    try { await apiGet({action:'logout'}); } catch(_) {}
    ['av_token','av_role','av_nom','av_idpart','av_lt'].forEach(k => localStorage.removeItem(k));
    App.token=null; App.role=null; App.nom=''; App.loginTime=0; location.reload();
}

}

const _tacheTimers = {};
function _tachePremierAppui(idTache, titre) {
    const btn = document.getElementById('btn-fait-'+idTache);
    if (!btn) return;
    if (btn.dataset.confirming === 'true') { _tacheDeuxiemeAppui(idTache, titre); return; }
    btn.dataset.confirming = 'true';
    btn.classList.add('confirmer');
    btn.textContent = '✅ Confirmer ? (3s)';
    let countdown = 3;
    const iv = setInterval(() => {
        countdown--;
        if (btn.dataset.confirming === 'true' && countdown > 0) btn.textContent = `✅ Confirmer ? (${countdown}s)`;
        else clearInterval(iv);
    }, 1000);
    _tacheTimers[idTache] = setTimeout(() => {
        clearInterval(iv);
        if (btn && btn.dataset.confirming === 'true') { btn.dataset.confirming = 'false'; btn.classList.remove('confirmer'); btn.textContent = 'À FAIRE'; }
        delete _tacheTimers[idTache];
    }, 3000);
}
async function _tacheDeuxiemeAppui(idTache, titre) {
    if (_tacheTimers[idTache]) { clearTimeout(_tacheTimers[idTache]); delete _tacheTimers[idTache]; }
    const btn  = document.getElementById('btn-fait-'+idTache);
    const card = document.getElementById('tcard-'+idTache);
    if (btn)  { btn.dataset.confirming='false'; btn.classList.remove('confirmer'); btn.classList.add('done'); btn.textContent='✅ FAIT'; btn.onclick=null; }
    if (card) card.classList.add('accomplie');
    localStorage.setItem('av_done_'+idTache, 'true');
    const r = await apiPost({action:'AGENT_TERMINE', idRow: idTache});
    if (r.queued) showToast('📴 Tâche sauvegardée — envoi dès retour en ligne','warning',4000);
    else if (r.success) showToast('✅ Tâche marquée comme faite — gérant notifié','success');
    else showToast(r.error || 'Erreur envoi tâche','error');
    _notifierGerantTacheAccomplie(idTache, titre, App.activeBande);
}

async function _confirmerEnvoiTaches(idBande, dateStr) {
    const btn = document.getElementById('btn-confirmer-envoi');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Envoi en cours…'; }
    let nb = 0;
    for (const t of TACHES_QUOTIDIENNES) { const r = await apiPost({action:'CREER_TACHE',titre:t.titre,date:dateStr,idBande,typeTache:t.typeTache}); if (r.success) nb++; }

async function validerCreerTache(type) {
    const titre=document.getElementById('tache-titre')?.value.trim();
    const date=document.getElementById('tache-date')?.value;
    const bande=document.getElementById('tache-bande')?.value;
    if(!titre){showToast('Le titre est obligatoire','warning');return;}
    if(!date){showToast('La date est obligatoire','warning');return;}
    if(!bande){showToast('Sélectionnez une bande','warning');return;}
    const r=await apiPost({action:'CREER_TACHE',titre,date,idBande:bande,typeTache:type});
    if(r.success){_notifierAgent(titre,type,bande);showToast('✅ Tâche créée — agent notifié','success');Nav.back();}
    else showToast(r.error||'Erreur création tâche','error');
}

function ecritureChoisirCat(cat){App._saisie.categorie=cat;App._saisie.libelle=cat;const el=document.getElementById('e-libelle');if(el)el.value=cat;ecritureStep(2);}
function ecritureChoisirUnite(u){App._saisie.unite=u;ecritureStep(4);}
function ecritureStep(n){for(let i=1;i<=5;i++){const f=document.getElementById('ef-'+i),d=document.getElementById('es-'+i);if(f)f.classList.toggle('active',i===n);if(d){d.classList.remove('active','done');if(i===n)d.classList.add('active');else if(i<n)d.classList.add('done');}}if(n===5)_ecriBuildResume();}
function _ecriBuildResume(){const s=App._saisie;const q=parseFloat(document.getElementById('e-qte')?.value||'0');const p=parseFloat(document.getElementById('e-pu')?.value||'0');const m=parseFloat(document.getElementById('e-montant')?.value||'0');s.qte=q||null;s.pu=p||null;s.montant=m||(q*p)||0;s.libelle=document.getElementById('e-libelle')?.value||s.categorie;s.benef=document.getElementById('e-benef')?.value||'';const isDep=s.type==='DEPENSE';const el=document.getElementById('e-resume');if(!el)return;el.innerHTML=`<div class="rapport-ligne"><span>Type</span><span style="color:${isDep?'var(--red)':'var(--green)'};font-weight:800">${s.type}</span></div><div class="rapport-ligne"><span>Catégorie</span><span>${esc(s.categorie)}</span></div><div class="rapport-ligne"><span>Libellé</span><span>${esc(s.libelle)}</span></div><div class="rapport-ligne"><span>Unité</span><span>${esc(s.unite)}</span></div>${s.qte?`<div class="rapport-ligne"><span>Quantité</span><span>${s.qte}</span></div>`:''}${s.pu?`<div class="rapport-ligne"><span>Prix unitaire</span><span>${fmt(s.pu)} FCFA</span></div>`:''}<div class="rapport-ligne"><span>Montant</span><span style="color:${isDep?'var(--red)':'var(--green)'};font-size:16px;font-weight:800">${isDep?'−':'+'}${fmt(s.montant)} FCFA</span></div>${s.benef?`<div class="rapport-ligne"><span>Bénéficiaire</span><span>${esc(s.benef)}</span></div>`:''}`;
}

x;color:var(--text2);margin-bottom:6px">📤 Total dépenses</div><div style="font-size:18px;font-weight:800;color:var(--red)">−${fmt(totalDep)}</div><div style="font-size:10px;color:var(--text2)">FCFA</div></div><div class="card" style="text-align:center;border-left:3px solid var(--green)"><div style="font-size:11px;color:var(--text2);margin-bottom:6px">📥 Total recettes</div><div style="font-size:18px;font-weight:800;color:var(--green)">+${fmt(totalRec)}</div><div style="font-size:10px;color:var(--text2)">FCFA</div></div></div><div class="card" style="margin-bottom:12px"><div class="card-title">Détail par catégorie</div>${detailHTML||'<div style="color:var(--text2);font-size:13px">Aucune écriture</div>'}</div><button class="btn-action btn-green" onclick="partagerWhatsApp()">📲 Partager sur WhatsApp</button>`;}

async function _validerCreerBandeNouveau() {
    const num  = document.getElementById('nb-poulailler')?.value;
    const id   = document.getElementById('nb-id')?.value.trim();
    const eff  = parseInt(document.getElementById('nb-eff')?.value);
    const date = document.getElementById('nb-date')?.value;
    const race = document.getElementById('nb-race')?.value;
    if (!num)            { showToast('Choisissez un poulailler','warning'); return; }
    if (!id)             { showToast('ID de bande obligatoire','warning'); return; }
    if (!eff || eff <= 0){ showToast('Effectif invalide','warning'); return; }
    if (!guardDouble('creer_bande')) return;
    const r = await apiPost({action:'CREER_BANDE', idBande:id, batiment:'Batiment-'+num, dateArrivee:date, effectif:eff, race});
    if (r.success || r.queued) {
        showToast(r.queued?'📴 Bande sauvegardée':'✅ Bande créée', r.queued?'warning':'success');
        App.activeBande = id;
        localStorage.setItem('av_bande', id);
        const bd = await apiGet({action:'getBatiments'});
        if (bd.success) App.batiments = bd.batiments || [];
        Nav.home();
    } else {
        showToast(r.error || 'Erreur création bande', 'error');
    }
}


function renderCycleVie(num) {
    const z = zone(); if (!z) return;
    const b = App.batiments.find(x => x.num === parseInt(num));
    if (!b) { showToast('Poulailler introuvable', 'error'); Nav.back(); return; }
    const statMap = { 'EN COURS':'gestion', 'LIBRE':'preparation', 'VIDE':'preparation', 'CLOTURE':'cloture' };
    const defTab   = statMap[b.statut] || 'preparation';
    const savedTab = localStorage.getItem('av_cycletab_' + num) || defTab;
    const tabOk =
        (savedTab==='preparation' && (b.statut==='LIBRE'||b.statut==='VIDE')) ||
        (savedTab==='gestion'     &&  b.statut==='EN COURS') ||
        (savedTab==='cloture'     &&  b.statut==='CLOTURE');
    const activeTab = tabOk ? savedTab : defTab;
    const tabs = [
        { id:'preparation', icon:'🔧', label:'Préparation', disabled: b.statut==='EN COURS'||b.statut==='CLOTURE' },
        { id:'gestion',     icon:'🐔', label:'Gestion',     disabled: b.statut==='LIBRE'||b.statut==='VIDE' },
        { id:'cloture',     icon:'🔒', label:'Clôture',     disabled: b.statut!=='CLOTURE' },
    ];
    const tabsHTML = tabs.map(t => {
        const isActive = activeTab === t.id;
        const click    = t.disabled ? '' : `onclick="_switchCycleTab(${num},'${t.id}')"`;
        return `<button class="cycle-tab${t.disabled?' cycle-tab-disabled':''}" ${click}
            style="flex:1;padding:10px 6px;border:none;background:transparent;
                   border-bottom:3px solid ${isActive?'var(--blue)':'transparent'};
                   color:${isActive?'var(--blue)':t.disabled?'rgba(255,255,255,.2)':'var(--text2)'};
                   font-family:'Lexend',sans-serif;font-size:11px;font-weight:700;
                   cursor:${t.disabled?'default':'pointer'};text-transform:uppercase;letter-spacing:.6px;
                   -webkit-tap-highlight-color:transparent;transition:all .2s">
            <div style="font-size:18px;margin-bottom:3px">${t.icon}</div>${t.label}
        </button>`;
    }).join('');
    z.innerHTML = `
        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px 16px;margin-bottom:12px">
            <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Poulailler ${num}</div>
            <div style="font-weight:800;font-size:17px">${esc(b.idBande||'Libre')}</div>
            <div style="font-size:11px;color:var(--text2);margin-top:3px">${esc(b.statut)}${b.race?' · '+esc(b.race):''}${b.ageJours?' · J'+b.ageJours:''}</div>
        </div>
        <div style="display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden">
            ${tabsHTML}
        </div>
        <div id="cycle-content"></div>`;
    _renderCycleTabContent(num, activeTab, b);
}

function _switchCycleTab(num, tabId) {
    localStorage.setItem('av_cycletab_' + num, tabId);
    document.querySelectorAll('.cycle-tab').forEach((btn, i) => {
        const ids      = ['preparation','gestion','cloture'];
        const isActive = ids[i] === tabId;
        const isDis    = btn.classList.contains('cycle-tab-disabled');
        btn.style.borderBottomColor = isActive ? 'var(--blue)' : 'transparent';
        btn.style.color = isActive ? 'var(--blue)' : isDis ? 'rgba(255,255,255,.2)' : 'var(--text2)';
    });
    const b  = App.batiments.find(x => x.num === parseInt(num));
    const cc = document.getElementById('cycle-content');
    if (b && cc) _renderCycleTabContent(num, tabId, b);
}

function _renderCycleTabContent(num, tabId, b) {
    const cc = document.getElementById('cycle-content');
    if (!cc) return;
    if      (tabId === 'preparation') _renderTabPreparation(num, b, cc);
    else if (tabId === 'gestion')     _renderTabGestion(num, b, cc);
    else if (tabId === 'cloture')     _renderTabCloture(num, b, cc);
}

function _renderTabPreparation(num, b, container) {
    const prepKey  = 'av_prep_' + num;
    let st = {};
    try { st = JSON.parse(localStorage.getItem(prepKey)||'{}'); } catch(_) {}
    const dejaEnvoye = st._envoye === true;
    const nbCoches   = CHECKLIST_PREP.filter(c => st[c.id]).length;

function _toggleChecklistItem(num, itemId) {
    const prepKey = 'av_prep_' + num;
    let st = {};
    try { st = JSON.parse(localStorage.getItem(prepKey)||'{}'); } catch(_) {}
    st[itemId] = !st[itemId];
    localStorage.setItem(prepKey, JSON.stringify(st));
    const b  = App.batiments.find(x => x.num === parseInt(num));
    const cc = document.getElementById('cycle-content');
    if (b && cc) _renderTabPreparation(num, b, cc);
}

function _saveInventaire(num, itemId, value) {
    const prepKey = 'av_prep_' + num;
    let st = {};
    try { st = JSON.parse(localStorage.getItem(prepKey)||'{}'); } catch(_) {}
    st['inv_'+itemId] = parseInt(value)||0;
    localStorage.setItem(prepKey, JSON.stringify(st));
}

async function _envoyerPreparation(num) {
    const prepKey = 'av_prep_' + num;
    let st = {};
    try { st = JSON.parse(localStorage.getItem(prepKey)||'{}'); } catch(_) {}
    const b = App.batiments.find(x => x.num === parseInt(num));
    const checklistResults  = CHECKLIST_PREP.map(c  => ({ id:c.id,  label:c.label,  fait:!!st[c.id] }));
    const inventaireResults = INVENTAIRE_ITEMS.map(i => ({ id:i.id,  label:i.label,  quantite:st['inv_'+i.id]||0 }));
    const nbFait = checklistResults.filter(c => c.fait).length;
    const note   = `Checklist: ${nbFait}/${CHECKLIST_PREP.length} · ` +
                   inventaireResults.map(i => i.label.split(' ')[0]+':'+i.quantite).join(' · ');
    if (!guardDouble('envoi_preparation')) return;
    const r = await apiPost({
        action:     'SAISIE_PREPARATION',
        batiment:   'Batiment-' + num,
        idBande:    b?.idBande || '',
        checklist:  JSON.stringify(checklistResults),
        inventaire: JSON.stringify(inventaireResults),
        nbFait,
        nbTotal:    CHECKLIST_PREP.length,
        note
    });
    if (r.success || r.queued) {
        st._envoye = true;
        localStorage.setItem(prepKey, JSON.stringify(st));
        showToast(r.queued
            ? '📴 Checklist sauvegardée — envoi dès retour en ligne'
            : '✅ Checklist envoyée au gérant',
            r.queued ? 'warning' : 'success', 4000);
        const cc = document.getElementById('cycle-content');
        if (b && cc) _renderTabPreparation(num, b, cc);
    } else {
        showToast(r.error || 'Erreur envoi', 'error');
    }
}

async function _validerMouvementStock(idBande,type){const produit=document.getElementById('mv-produit')?.value;const qte=parseFloat(document.getElementById('mv-qte')?.value);const unite=document.getElementById('mv-unite')?.value;const pu=parseFloat(document.getElementById('mv-pu')?.value||'0');const note=document.getElementById('mv-note')?.value.trim();if(!qte||qte<=0){showToast('Quantité invalide','warning');return;}if(!guardDouble('mouvement_stock'))return;const r=await apiPost({action:'MOUVEMENT_STOCK',idBande,produit,type,unite:unite||'kg',quantite:qte,prixUnitaire:pu||0,montant:Math.round(qte*(pu||0)),note:note||''});if(r.success){showToast(type==='ENTREE'?'✅ Achat enregistré':'✅ Utilisation enregistrée','success');Nav.back();}else showToast(r.error||'Erreur','error');}

function renderCreerUtilisateur(){const z=zone();if(!z)return;z.innerHTML=`<div class="card"><div class="card-title">👤 Créer un utilisateur</div><label class="f-label">PIN (4 chiffres)</label><input class="f-input" type="number" id="nu-pin" placeholder="Ex: 4321" inputmode="numeric" maxlength="4"><label class="f-label">Nom</label><input class="f-input" type="text" id="nu-nom" placeholder="Prénom Nom"><label class="f-label">Rôle</label><select class="f-input" id="nu-role"><option value="AGENT">Agent</option><option value="PARTENAIRE">Partenaire</option><option value="GERANT">Gérant</option></select><button class="btn-action btn-green" onclick="validerCreerUtilisateur()">✅ Créer</button><button class="btn-action btn-ghost" onclick="Nav.back()">Annuler</button></div>`;}

        <button class="btn-action btn-ghost" onclick="renderResetApp()">Annuler</button>

function _resetConfirmer() {
    const val = document.getElementById('reset-confirm-input')?.value.trim().toUpperCase();
    if (val !== 'RESET') { showToast('Tapez exactement RESET pour confirmer', 'warning'); return; }
    /* Effacer toutes les clés av_ du localStorage */
    const keys = Object.keys(localStorage).filter(k => k.startsWith('av_'));
    keys.forEach(k => localStorage.removeItem(k));
    /* Réinitialiser App en mémoire */
    App.token = null; App.role = null; App.nom = ''; App.idPart = '';
    App.loginTime = 0; App.activeBande = ''; App.data = {};
    App.batiments = []; App.offlineQueue = []; App.connQuality = 'good';
    showToast('✅ Cache effacé — redirection dans 2s…', 'success', 2500);
    setTimeout(() => location.reload(), 2200);
}

                            style="width:34px;height:34px;border-radius:50%;border:2px solid ${isFail?'var(--red)':'var(--border)'};background:${isFail?'rgba(255,68,68,.2)':'transparent'};font-size:16px;cursor:pointer;-webkit-tap-highlight-color:transparent">❌</button>
                    </div>

        }).join('')}
    `).join('')}
    <div style="height:16px"></div>

    <button class="btn-action btn-ghost" onclick="Nav.back()">← Retour</button>`;

    /* Fonctions de callback globales pour les boutons inline */
    window._tbSetResult = (id, val) => {

}

function renderSession(sessionId) {

    App._tachesAssignees = (App.data?.tachesAgent || []).filter(t =>
        t.statut !== 'TERMINEE' && t.statut !== 'COMPTABILISEE' &&
        !localStorage.getItem('av_done_'+t.id)
    );

    App._tachesAssignees = (App.data?.tachesAgent || []).filter(t =>
        t.statut !== 'TERMINEE' && t.statut !== 'COMPTABILISEE' &&
        !localStorage.getItem('av_done_'+t.id)
    );

}
function _renderEtape(){
