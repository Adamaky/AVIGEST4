/* ── Pavé numérique ── */
function _pavHTML(bufferId, displayId, unite) {
    return `
    <div style="text-align:center;margin-bottom:8px">
        <div style="background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:inline-flex;align-items:baseline;gap:8px;min-width:160px;justify-content:center">
            <span id="disp-${displayId}" style="font-size:36px;font-weight:800;color:var(--text);min-width:80px;text-align:right">—</span>
            <span style="font-size:14px;color:var(--text2)">${esc(unite)}</span>
        </div>
    </div>
    <div class="pin-pad" style="margin:0 auto 8px;grid-template-rows:repeat(4,60px);grid-template-columns:repeat(3,60px);gap:10px">
        ${['1','2','3','4','5','6','7','8','9'].map(d=>`<button class="pin-key" style="width:60px;height:60px;font-size:18px" onclick="_pavTap('${bufferId}','${displayId}','${d}')">${d}</button>`).join('')}
        <button class="pin-key key-del" style="width:60px;height:60px;font-size:13px" onclick="_pavDel('${bufferId}','${displayId}')">⌫</button>
        <button class="pin-key" style="width:60px;height:60px;font-size:18px" onclick="_pavTap('${bufferId}','${displayId}','0')">0</button>
        <button class="pin-key" style="width:60px;height:60px;font-size:13px" onclick="_pavTap('${bufferId}','${displayId}','.')">.</button>
    </div>`;
}
function _pavTap(b,d,digit){ let buf=App._pavBuffers[b]||''; if(digit==='.'&&buf.includes('.'))return; if(digit==='.'&&buf==='')buf='0'; buf+=digit; App._pavBuffers[b]=buf; const el=document.getElementById('disp-'+d);if(el)el.textContent=buf; }
function _pavDel(b,d){ let buf=App._pavBuffers[b]||''; buf=buf.slice(0,-1); App._pavBuffers[b]=buf; const el=document.getElementById('disp-'+d);if(el)el.textContent=buf||'—'; }
function _pavGet(b){ return parseFloat(App._pavBuffers[b]||'')||null; }

/* ── Réponses étapes ── */
function _repBool(idx,label){ _etapeSuivante(idx===0?1:0,label); }
function _repLitiere(score,etapeId){ App._session._litiereScore=score; for(let i=1;i<=5;i++){const btn=document.getElementById('lit-'+i);if(btn)btn.style.borderColor=i===score?'var(--blue)':'var(--border)';} }
function _validerAmbiance(etapeId){
    const temp=_pavGet('temp'),hygro=_pavGet('hygro');
    if(temp===null){showToast('Saisissez la température','warning');return;}
    if(hygro===null){showToast("Saisissez l'hygrométrie",'warning');return;}
    if(App._session._litiereScore===null){showToast("Sélectionnez l'état de la litière",'warning');return;}
    App._session.reponses[etapeId]={temp,hygro,litiere:App._session._litiereScore};
    delete App._pavBuffers['temp']; delete App._pavBuffers['hygro'];
    App._session.etapeIdx++; _renderEtape();
}
function _repNumber(etapeId,unite,min,max){
    const val=_pavGet('val_'+etapeId);
    if(val===null){showToast('Saisissez une valeur','warning');return;}
    const v=sanitizeNum(val,min,max); if(v===null){showToast(`Valeur invalide (${min}–${max} ${unite})`,'warning');return;}
    App._session.reponses[etapeId]=val; delete App._pavBuffers['val_'+etapeId]; _etapeSuivante(val,val+' '+unite);
}
function _repPesee(){
    const val=_pavGet('pesee_val'); if(val===null){showToast('Saisissez le poids moyen','warning');return;}
    App._session.reponses['pesee']=val; delete App._pavBuffers['pesee_val']; _etapeSuivante(val,val+' g');
}
function _selectSanteColor(couleur){
    App._session._santeScore=couleur==='vert'?5:couleur==='orange'?3:1;
    App._session._santeCouleur=couleur;
    ['vert','orange','rouge'].forEach(c=>{
        const btn=document.getElementById('sante-'+c);if(!btn)return;
        const cfg={vert:{sel:'rgba(0,200,150,.6)','bgSel':'rgba(0,200,150,.2)',def:'rgba(0,200,150,.3)',bg:'rgba(0,200,150,.08)'},orange:{sel:'rgba(255,157,0,.6)',bgSel:'rgba(255,157,0,.2)',def:'rgba(255,157,0,.3)',bg:'rgba(255,157,0,.08)'},rouge:{sel:'rgba(255,68,68,.6)',bgSel:'rgba(255,68,68,.2)',def:'rgba(255,68,68,.3)',bg:'rgba(255,68,68,.08)'}}[c];
        btn.style.borderColor=c===couleur?cfg.sel:cfg.def;
        btn.style.background=c===couleur?cfg.bgSel:cfg.bg;
        btn.style.transform=c===couleur?'scale(1.02)':'scale(1)';

}
function _repSante(){
    if(App._session._santeScore===null||App._session._santeScore===undefined){showToast('Sélectionnez un état de santé','warning');return;}
    const obs=document.getElementById('sante-obs')?.value||'';

    App._session.reponses['sante']={score:App._session._santeScore,couleur:App._session._santeCouleur,label,obs};
    _etapeSuivante(App._session._santeScore,label);
}
function _etapeSuivante(valeur,label){
    const sid=App._session.id,idx=App._session.etapeIdx;
    const e=(SESSION_ETAPES[sid]||[])[idx];

async function _confirmerEtEnvoyer(){
    const sid=App._session.id,rep=App._session.reponses,etapes=SESSION_ETAPES[sid]||[];
    const z=zone();if(!z)return;
    z.innerHTML=`<div style="text-align:center;padding:60px 20px"><div class="spinner" style="width:36px;height:36px"></div><div style="color:var(--text2);font-size:14px;margin-top:12px">Envoi en cours…</div></div>`;
    const catMap={mortalite_m:'MortaliteMatin',mortalite_n:'MortaliteSoir',eau_m:'EauMatin',eau_n:'EauSoir',aliment_kg:'Alimentation'};
    const envois=[];
    etapes.forEach(e=>{
        const val=rep[e.id]; if(val===null||val===undefined)return;
        if(e.type==='ambiance'){
            envois.push(apiPost({action:'SAISIE_TECH',idBande:App.activeBande,cat:'Temperature',val1:val.temp,note:sid}));
            envois.push(apiPost({action:'SAISIE_TECH',idBande:App.activeBande,cat:'Hygrometrie',val1:val.hygro,note:sid}));
            envois.push(apiPost({action:'SAISIE_TECH',idBande:App.activeBande,cat:'Litiere',val1:val.litiere,note:sid}));
        } else if(e.type==='sante'||e.type==='sante_color'){
            envois.push(apiPost({action:'SAISIE_TECH',idBande:App.activeBande,cat:'SanteGeneral',val1:val.score,note:(val.label||'')+(val.obs?' | '+val.obs:'')}));
        } else if(e.type==='number'){
            const cat=catMap[e.id]; if(cat) envois.push(apiPost({action:'SAISIE_TECH',idBande:App.activeBande,cat,val1:val,note:sid}));
        } else if(e.type==='pesee'&&val!==null){
            envois.push(apiPost({action:'SAISIE_TECH',idBande:App.activeBande,cat:'PoidsMoyen',val1:val,note:sid}));
        }
    });
    try { await Promise.all(envois); } catch(_) {}
    // Créer une tâche TERMINEE pour chaque session envoyée
    const titreSession = ({Matin:'🌅 Session Matin envoyée',Midi:'☀️ Session Midi envoyée',PM:'🌤️ Session PM envoyée',Nuit:'🌙 Session Nuit envoyée'})[sid]||sid;
    await apiPost({action:'CREER_TACHE',titre:titreSession,date:_dateAujourd_hui(),idBande:App.activeBande,typeTache:'QUOTIDIEN'});
    // Notifier le gérant — il devra valider
    _notifierGerantTacheAccomplie('session_'+sid, titreSession, App.activeBande);
    _poserVerrouSession(sid);
    showToast('✅ Session verrouillée — gérant notifié','success',4000);
    Nav.home();
}

function _nextAbattage(etape,bufferId){

    const effectifActuel = Math.max(0, p.effectifInitial - (p.morts||0) - (p.sorties||0));
    const surv=p.effectifInitial>0?Math.round((effectifActuel/p.effectifInitial)*1000)/10:0;
    z.innerHTML=`
        <div style="padding:16px">
            <div style="font-weight:800;font-size:16px;margin-bottom:16px">🐔 État du lot — ${esc(idBande)}</div>
            <div class="card" style="margin-bottom:12px">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:center">
                    <div><div style="font-size:10px;color:var(--text2);margin-bottom:4px">Effectif initial</div><div style="font-size:18px;font-weight:800">${p.effectifInitial.toLocaleString('fr')}</div></div>
                    <div><div style="font-size:10px;color:var(--green);margin-bottom:4px">Présents estimés</div><div style="font-size:18px;font-weight:800;color:var(--green)">${effectifActuel.toLocaleString('fr')}</div></div>
                </div>
            </div>
            <div class="card" style="text-align:center;margin-bottom:12px">
                <div style="font-size:12px;color:var(--text2);margin-bottom:6px">Taux de survie</div>
                <div style="font-size:32px;font-weight:800;color:${surv>=97?'var(--green)':surv>=94?'var(--orange)':'var(--red)'}">${surv}%</div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                <div class="card" style="text-align:center"><div style="font-size:11px;color:var(--text2);margin-bottom:4px">⚖️ Poids moyen</div><div style="font-size:18px;font-weight:800">${t.poidsMoyen||'–'} g</div></div>
                <div class="card" style="text-align:center"><div style="font-size:11px;color:var(--text2);margin-bottom:4px">📊 IC</div><div style="font-size:18px;font-weight:800">${t.ic||'–'}</div></div>
            </div>
        </div>`;
}
async function renderPartenaireCreances(idBande){
    const z=zone();if(!z)return;
    z.innerHTML=`<div style="text-align:center;padding:60px 20px"><div class="spinner" style="width:32px;height:32px"></div></div>`;
    const d=await apiGet({action:'getVentes',idBande});
    if(!d.success){z.innerHTML=`<div style="text-align:center;padding:40px"><div style="font-size:28px">⚠️</div></div>`;return;}
    const cr=(d.ventes||[]).filter(v=>v.montantRestant>0);
    if(!cr.length){z.innerHTML=`<div style="padding:16px;text-align:center"><div style="font-size:40px;margin-bottom:12px">✅</div><div style="font-weight:700;font-size:15px">Aucune créance en cours</div></div>`;return;}
    const tot=Math.round(cr.reduce((s,v)=>s+v.montantRestant,0));
    z.innerHTML=`
        <div style="padding:16px">
            <div style="margin-bottom:16px"><div style="font-weight:800;font-size:16px">💳 Mes créances — ${esc(idBande)}</div><div style="color:var(--text2);font-size:12px;margin-top:4px">${cr.length} client(s) en attente</div></div>
            <div class="card" style="text-align:center;margin-bottom:16px;background:rgba(255,157,0,.08)">
                <div style="font-size:12px;color:var(--text2);margin-bottom:6px">💰 Total à recevoir</div>
                <div style="font-size:26px;font-weight:800;color:var(--orange)">${fmt(tot)} FCFA</div>
            </div>
            ${cr.map(v=>`
            <div class="card" style="margin-bottom:10px">
                <div style="display:flex;justify-content:space-between;margin-bottom:6px"><div style="font-weight:700;font-size:14px">${esc(v.idClient)}</div><span style="font-size:11px;color:var(--orange)">${v.statutPaiement}</span></div>
                <div style="font-size:14px;font-weight:700;color:var(--orange)">${fmt(v.montantRestant)} FCFA restants</div>
            </div>`).join('')}
        </div>`;
}

/* ════════════════════════════════════════════
   ÉTAGE 8 — DÉMARRAGE
════════════════════════════════════════════ */

/** renderHome — DÉFINIE ICI. C'est le dispatcher selon le rôle. */
function renderHome() {
    _majTopbar();
    if (App.role === 'GERANT')     { const fn='renderGerant';     Nav.stack=[{fn,params:null}]; Nav._upBtn(); renderGerant(); }
    else if (App.role === 'AGENT') { const fn='renderAgent';      Nav.stack=[{fn,params:null}]; Nav._upBtn(); renderAgent(); }
    else if (App.role === 'PARTENAIRE') { const fn='renderPartenaire'; Nav.stack=[{fn,params:null}]; Nav._upBtn(); renderPartenaire(); }
    else { doLogout(); }
}

async function chargerBandeActive() {
    try {
        const d = await apiGet({action:'getBatiments'});
        if (!d.success) return;
        App.batiments = d.batiments || [];
        const enc = App.batiments.find(b => b.statut === 'EN COURS');
        if (enc) { App.activeBande = enc.idBande; localStorage.setItem('av_bande', App.activeBande); }
    } catch(e) { console.error('chargerBandeActive:', e); }
}

async function startApp() {
    updateOffline();
    _majTopbar();
    if (App.role === 'AGENT') await chargerBandeActive();
    renderHome();
    // Init PWA + notifications (silencieux, en arrière-plan)
    _initPWA();
}

/* ════════════════════════════════════════════
   PWA — Service Worker + OneSignal
   Enregistrement silencieux après login
   La demande de permission n'apparaît PAS
   au démarrage — elle se fait après renderHome
════════════════════════════════════════════ */
async function _initPWA() {
    // 1. Service Worker
    if ('serviceWorker' in navigator) {
        try {
            const reg = await navigator.serviceWorker.register('sw.js', { scope: '/AVIGEST4/' });
            console.log('[SW] enregistré :', reg.scope);
        } catch(e) {
            console.warn('[SW] échec enregistrement :', e.message);
        }
    }

    // 2. OneSignal — init silencieuse
    // On attend que le SDK soit chargé (script defer)
    try {
        await _waitForOneSignal();
        await OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId            : '8a6d7ad0-e39a-4e29-b187-26f9f5f4eae3',
                // Pas de popup automatique — on demande la permission
                // uniquement si l'utilisateur est gérant
                autoResubscribe  : true,
                notifyButton     : { enable: false },
                welcomeNotification: { disable: true }
            });
            // Demander la permission uniquement au gérant
            if (App.role === 'GERANT') {
                const permission = await OneSignal.Notifications.permission;
                if (!permission) {
                    // Délai de 3s pour ne pas bloquer l'affichage
                    setTimeout(async () => {
                        try {
                            await OneSignal.Notifications.requestPermission();
                        } catch(_) {}
                    }, 3000);
                }
            }
            // Enregistrer l'ID d'abonnement pour debug
            const subId = await OneSignal.User.PushSubscription.id;
            if (subId) console.log('[OneSignal] abonné :', subId);
        });
    } catch(e) {
        console.warn('[OneSignal] init ignorée :', e.message);
    }
}

/** Attend que window.OneSignalDeferred soit disponible (SDK defer) */
function _waitForOneSignal(maxWait=8000) {
    return new Promise((resolve, reject) => {
        if (window.OneSignalDeferred) { resolve(); return; }
        const start = Date.now();
        const iv = setInterval(() => {
            if (window.OneSignalDeferred) { clearInterval(iv); resolve(); }
            else if (Date.now() - start > maxWait) { clearInterval(iv); reject(new Error('OneSignal SDK non chargé')); }
        }, 200);
    });
}

window.onload = function() {
    // Si session valide : aller directement à l'app
    if (App.token && isSessionValid()) {
        document.getElementById('screen-role').classList.add('hidden');
        document.getElementById('screen-pin').classList.add('hidden');
        document.getElementById('app-main').style.display = 'block';
        startApp();
    } else if (App.token && !isSessionValid()) {
        // Session expirée : nettoyer et rester sur écran rôle
        ['av_token','av_lt'].forEach(k => localStorage.removeItem(k));
        App.token = null; App.loginTime = 0;
        showToast('Session expirée — reconnectez-vous','warning',4000);
        // Écran rôle déjà visible par défaut
    }
    // Sinon : écran rôle déjà visible par défaut (display:flex dans .screen)
};
