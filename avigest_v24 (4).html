<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1b2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AviGest">
    <meta name="mobile-web-app-capable" content="yes">
    <title>AviGest v24</title>

    <!-- PWA — manifest + icône Apple -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- OneSignal SDK (notifications push) -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- ════════════════════════════════════
         FONDATIONS — CSS COMPLET
    ════════════════════════════════════ -->
    <style>
        :root {
            --bg:#0d1b2a; --bg2:#142233; --bg3:#1a2d40;
            --border:rgba(255,255,255,0.08);
            --text:#f0f4f8; --text2:#8fa8c0;
            --green:#00c896; --blue:#0099ff;
            --orange:#ff9d00; --red:#ff4444; --purple:#c084fc;
        }
        *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'Lexend',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

        /* ── Overlay écrans ── */
        .screen { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; }
        .screen.hidden { display:none !important; }

        /* ── Sélection rôle ── */
        .role-logo { font-size:52px; margin-bottom:8px; }
        .role-title { font-size:30px; font-weight:800; letter-spacing:-0.5px; margin-bottom:4px; }
        .role-sub { font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:40px; }
        .role-btns { display:flex; gap:22px; margin-bottom:48px; }
        .role-btn { display:flex; flex-direction:column; align-items:center; gap:10px; cursor:pointer;
                    -webkit-tap-highlight-color:transparent; touch-action:manipulation; transition:transform .15s; }
        .role-btn:active { transform:scale(.92); }
        .role-btn-circle { width:84px; height:84px; border-radius:50%; display:flex; align-items:center;
                           justify-content:center; font-size:34px; border:2px solid transparent; }
        .rbc-gerant    { background:rgba(96,165,250,.15); border-color:rgba(96,165,250,.4); }
        .rbc-agent     { background:rgba(74,222,128,.15); border-color:rgba(74,222,128,.4); }
        .rbc-partenaire{ background:rgba(192,132,252,.15); border-color:rgba(192,132,252,.4); }
        .role-btn-label { font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.8px; }
        .role-sortir { display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer;
                       -webkit-tap-highlight-color:transparent; opacity:.7; transition:opacity .15s; }
        .role-sortir:active { opacity:1; }
        .role-sortir-circle { width:58px; height:58px; border-radius:50%; background:rgba(255,68,68,.12);
                              border:2px solid rgba(255,68,68,.3); display:flex; align-items:center; justify-content:center; font-size:24px; }
        .role-sortir-label { font-size:10px; font-weight:700; color:var(--red); text-transform:uppercase; }

        /* ── PIN ── */
        .pin-logo  { font-size:48px; margin-bottom:8px; }
        .pin-title { font-size:26px; font-weight:800; }
        .pin-sub   { font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:1.5px; margin:4px 0 28px; }
        .pin-display { display:flex; gap:14px; margin-bottom:8px; }
        .pin-dot { width:18px; height:18px; border-radius:50%; background:var(--bg3);
                   border:2px solid var(--border); transition:background .15s,border-color .15s,transform .15s; }
        .pin-dot.filled { background:var(--blue); border-color:var(--blue); transform:scale(1.2); }
        .pin-pad { display:grid; grid-template-columns:repeat(3,72px); grid-template-rows:repeat(4,72px); gap:12px; margin-top:8px; }
        .pin-key { width:72px; height:72px; border-radius:50%; border:none; background:var(--bg2);
                   color:var(--text); font-family:'Lexend',sans-serif; font-size:22px; font-weight:600;
                   cursor:pointer; -webkit-tap-highlight-color:transparent; touch-action:manipulation;
                   transition:background .12s,transform .1s; display:flex; align-items:center;
                   justify-content:center; user-select:none; -webkit-user-select:none; }
        .pin-key:active,.pin-key.pressed { background:var(--bg3); transform:scale(.91); }
        .pin-key.key-del { background:rgba(255,68,68,.12); color:var(--red); font-size:16px; }
        .pin-key.key-ok  { background:rgba(0,200,150,.15); color:var(--green); font-size:16px; font-weight:800; }
        .pin-key.key-ok.ready { background:var(--green); color:#0d1b2a; box-shadow:0 0 20px rgba(0,200,150,.4); }
        .pin-key.key-empty { background:transparent; cursor:default; pointer-events:none; }
        .pin-err { height:20px; font-size:12px; color:var(--red); text-align:center; margin-bottom:12px;
                   opacity:0; transition:opacity .2s; }
        .pin-err.show { opacity:1; }
        .pin-loading { display:none; flex-direction:column; align-items:center; gap:14px; position:absolute; }
        .pin-loading.show { display:flex; }
        .spinner { width:38px; height:38px; border:3px solid var(--bg3); border-top-color:var(--blue);
                   border-radius:50%; animation:spin .8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
        .pin-display.shake { animation:shake .4s ease; }

        /* ── App principale ── */
        #app-main { display:none; min-height:100vh; }
        .header { background:var(--bg2); border-bottom:1px solid var(--border); padding:12px 16px;
                  display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
        .header-left { display:flex; align-items:center; gap:8px; }
        #btn-back { display:none; background:rgba(255,255,255,.08); border:none; color:var(--text);
                    font-size:22px; line-height:1; cursor:pointer; padding:4px 10px; border-radius:8px;
                    font-family:inherit; transition:background .15s; }
        #btn-back:active { background:rgba(255,255,255,.18); }
        #tb-role { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.8px; }
        #tb-name { font-size:14px; font-weight:700; }
        .offline-badge { display:none; background:var(--red); color:#fff; font-size:9px; font-weight:700;
                         padding:3px 8px; border-radius:10px; }
        .offline-badge.show { display:inline-block; }
        #btn-logout { background:rgba(255,68,68,.12); border:1px solid rgba(255,68,68,.35); color:var(--red);
                      border-radius:10px; padding:5px 12px; font-size:11px; font-weight:700; cursor:pointer;
                      font-family:inherit; -webkit-tap-highlight-color:transparent; }
        #btn-logout:active { background:rgba(255,68,68,.28); }
        #app-container { padding:12px; max-width:500px; margin:0 auto; padding-bottom:28px; }

        /* ── Composants UI ── */
        .toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%) translateY(20px);
                 background:var(--bg2); color:var(--text); padding:12px 22px; border-radius:40px;
                 font-size:13px; font-weight:600; z-index:99999; border:1px solid var(--border);
                 opacity:0; transition:opacity .25s,transform .25s; white-space:nowrap;
                 max-width:90vw; text-align:center; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast.error   { background:var(--red); color:#fff; border-color:transparent; }
        .toast.success { background:var(--green); color:#0d1b2a; border-color:transparent; }
        .toast.warning { background:var(--orange); color:#0d1b2a; border-color:transparent; }

        .tuile { border-radius:18px; padding:18px 20px; margin-bottom:10px; display:flex; align-items:center;
                 gap:16px; cursor:pointer; border:1px solid rgba(255,255,255,.07);
                 transition:transform .15s,opacity .15s; -webkit-tap-highlight-color:transparent;
                 touch-action:manipulation; user-select:none; }
        .tuile:active { transform:scale(.97); opacity:.85; }
        .tuile-icon { font-size:28px; flex-shrink:0; }
        .tuile-label { font-size:16px; font-weight:800; }
        .tuile-sub { font-size:11px; opacity:.7; margin-top:2px; }
        .tuile-arrow { margin-left:auto; font-size:18px; opacity:.4; }
        .t-superviser { background:linear-gradient(135deg,#0d2240,#0a3060); border-color:rgba(96,165,250,.2); }
        .t-planifier  { background:linear-gradient(135deg,#0d2a1a,#0a3320); border-color:rgba(74,222,128,.2); }
        .t-compta     { background:linear-gradient(135deg,#2a1f0d,#3a2800); border-color:rgba(251,191,36,.2); }
        .t-analyser   { background:linear-gradient(135deg,#1e0d2a,#2a1040); border-color:rgba(192,132,252,.2); }
        .t-bandes     { background:linear-gradient(135deg,#2a0d1a,#3a1028); border-color:rgba(249,168,212,.2); }

        .badge { font-size:10px; font-weight:800; padding:2px 8px; border-radius:20px; margin-left:8px; }
        .badge-red    { background:var(--red); color:#fff; animation:pulse 2s infinite; }
        .badge-blue   { background:var(--blue); color:#fff; animation:pulse 2s infinite; }
        .badge-green  { background:var(--green); color:#0d1b2a; }
        .badge-orange { background:var(--orange); color:#0d1b2a; animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

        .section-title { font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase;
                         letter-spacing:1.2px; margin:20px 4px 10px; }
        .card { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:10px; }
        .card-title { font-size:13px; font-weight:800; margin-bottom:12px; display:flex; align-items:center; gap:8px; }

        .kpi-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:10px; }
        .kpi-box { background:var(--bg3); border-radius:12px; padding:12px 8px; text-align:center; border:1px solid var(--border); }
        .kpi-val   { font-size:20px; font-weight:800; display:block; }
        .kpi-label { font-size:9px; color:var(--text2); text-transform:uppercase; letter-spacing:.8px; margin-top:3px; display:block; }

        /* ── Tâches ── */
        .tache-card { background:var(--bg3); border-radius:12px; padding:12px 14px; margin-bottom:8px;
                      display:flex; align-items:center; gap:12px; border:1px solid var(--border); }
        .tache-card.urgente { border-color:rgba(255,68,68,.4); background:rgba(255,68,68,.05); }
        .tache-card.accomplie .tache-titre { text-decoration:line-through; color:var(--text2); }
        .tache-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
        .dot-red    { background:var(--red); }
        .dot-orange { background:var(--orange); }
        .dot-blue   { background:var(--blue); }
        .dot-green  { background:var(--green); }
        .tache-titre { font-size:13px; font-weight:700; flex:1; }
        .tache-meta  { font-size:10px; color:var(--text2); margin-top:2px; }
        .tache-badge { font-size:9px; font-weight:700; padding:2px 7px; border-radius:8px; white-space:nowrap; }
        .tb-abattage { background:rgba(255,68,68,.2); color:var(--red); }
        .tb-quotidien{ background:rgba(0,153,255,.2); color:var(--blue); }
        .tb-hebdo    { background:rgba(255,157,0,.2); color:var(--orange); }
        .tb-cloture  { background:rgba(192,132,252,.2); color:var(--purple); }
        .tb-bande    { background:rgba(249,168,212,.2); color:#f9a8d4; }

        /* Bouton FAIT double-appui */
        .btn-fait { background:rgba(0,153,255,.15); border:1px solid rgba(0,153,255,.4); color:var(--blue);
                    border-radius:10px; padding:6px 14px; font-size:11px; font-weight:800; cursor:pointer;
                    font-family:'Lexend',sans-serif; transition:all .2s; white-space:nowrap;
                    -webkit-tap-highlight-color:transparent; }
        .btn-fait.confirmer { background:rgba(255,157,0,.25); border-color:rgba(255,157,0,.8);
                              color:var(--orange); animation:pulse 1s infinite; }
        .btn-fait.done { background:rgba(0,200,150,.15); border-color:rgba(0,200,150,.4);
                         color:var(--green); pointer-events:none; }

        /* Bouton VALIDER gérant */
        .btn-valider-tache { background:rgba(0,200,150,.2); border:1px solid rgba(0,200,150,.5); color:var(--green);
                             border-radius:10px; padding:6px 14px; font-size:11px; font-weight:800; cursor:pointer;
                             font-family:'Lexend',sans-serif; white-space:nowrap;
                             -webkit-tap-highlight-color:transparent; animation:pulse 1.5s infinite; }
        .btn-valider-tache:active { background:var(--green); color:#0d1b2a; }
        .btn-valider-tache.validated { background:rgba(255,255,255,.06); border-color:var(--border);
                                       color:var(--text2); pointer-events:none; animation:none; }

        /* Bannière alertes */
        @keyframes banniere-pulse {
            0%,100% { box-shadow:0 0 0 0 rgba(0,153,255,.4); border-color:rgba(0,153,255,.4); }
            50%      { box-shadow:0 0 0 6px rgba(0,153,255,0); border-color:rgba(0,153,255,.9); }
        }
        .banniere { border-radius:14px; padding:14px 16px; margin-bottom:12px; cursor:pointer;
                    animation:banniere-pulse 1.8s ease-in-out infinite; }
        .banniere-agent  { background:rgba(0,153,255,.12); border:2px solid rgba(0,153,255,.4); }
        .banniere-gerant { background:rgba(0,200,150,.12); border:2px solid rgba(0,200,150,.4);
                           animation-name:none; }
        .banniere-validation { background:rgba(255,157,0,.12); border:2px solid rgba(255,157,0,.5);
                               animation-duration:1s; }

        /* ── Alertes ── */
        .alerte { border-radius:12px; padding:11px 14px; margin-bottom:8px; display:flex; gap:10px; align-items:flex-start; font-size:12px; }
        .alerte.critique { background:rgba(255,68,68,.08); border:1px solid rgba(255,68,68,.25); }
        .alerte.warning  { background:rgba(255,157,0,.08);  border:1px solid rgba(255,157,0,.25); }
        .alerte-kpi { font-weight:800; font-size:11px; }
        .alerte.critique .alerte-kpi { color:var(--red); }
        .alerte.warning  .alerte-kpi { color:var(--orange); }
        .alerte-msg { color:var(--text2); margin-top:2px; line-height:1.4; }

        /* ── Sessions ── */
        .tuile-session-active { border-color:rgba(0,153,255,.5)!important;
                                box-shadow:0 0 0 1px rgba(0,153,255,.25),0 0 18px rgba(0,153,255,.18);
                                animation:session-glow 2.5s ease-in-out infinite; }
        @keyframes session-glow {
            0%,100%{box-shadow:0 0 0 1px rgba(0,153,255,.25),0 0 18px rgba(0,153,255,.18)}
            50%{box-shadow:0 0 0 2px rgba(0,153,255,.45),0 0 32px rgba(0,153,255,.32)}
        }
        .session-active-badge { display:inline-block; font-size:9px; font-weight:800; color:#0d1b2a;
                                background:var(--blue); padding:2px 8px; border-radius:20px; margin-left:8px;
                                text-transform:uppercase; letter-spacing:.5px; animation:pulse 2s infinite; }

        /* ── Formulaires ── */
        .f-label  { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.8px;
                    font-weight:700; margin-bottom:6px; display:block; }
        .f-input  { width:100%; padding:13px 14px; background:var(--bg3); border:1px solid var(--border);
                    border-radius:12px; color:var(--text); font-family:'Lexend',sans-serif; font-size:15px;
                    margin-bottom:10px; outline:none; transition:border-color .15s; }
        .f-input:focus { border-color:var(--blue); }
        .btn-action { width:100%; padding:14px; border:none; border-radius:14px; font-family:'Lexend',sans-serif;
                      font-size:13px; font-weight:700; cursor:pointer; display:flex; align-items:center;
                      justify-content:center; gap:8px; margin-bottom:8px;
                      transition:opacity .15s,transform .1s; -webkit-tap-highlight-color:transparent; }
        .btn-action:active { transform:scale(.97); opacity:.85; }
        .btn-green { background:var(--green); color:#0d1b2a; }
        .btn-blue  { background:var(--blue); color:#fff; }
        .btn-orange{ background:var(--orange); color:#0d1b2a; }
        .btn-red   { background:var(--red); color:#fff; }
        .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--text2); }
        .choice-btn { padding:20px 12px; border-radius:16px; border:2px solid var(--border);
                      background:var(--bg3); color:var(--text); font-family:'Lexend',sans-serif;
                      font-size:13px; font-weight:700; cursor:pointer; text-align:center;
                      transition:border-color .15s,background .15s; -webkit-tap-highlight-color:transparent; }
        .choice-btn:active,.choice-btn.selected { border-color:var(--blue); background:rgba(0,153,255,.1); }
        .choice-icon { font-size:24px; display:block; margin-bottom:6px; }
        .form-choice-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
        .stepper { display:flex; gap:6px; margin-bottom:20px; }
        .step-dot { flex:1; height:3px; border-radius:2px; background:var(--bg3); transition:background .3s; }
        .step-dot.active { background:var(--blue); }
        .step-dot.done   { background:var(--green); }
        .form-step { display:none; }
        .form-step.active { display:block; }
        .form-step-title { font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:1px;
                           margin-bottom:14px; font-weight:700; }

        /* ── Rapports & listes ── */
        .journal-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0;
                       border-bottom:1px solid var(--border); font-size:12px; }
        .journal-row:last-child { border-bottom:none; }
        .journal-cat { color:var(--text2); flex:1; }
        .journal-mont { font-weight:800; }
        .journal-mont.dep { color:var(--red); }
        .journal-mont.rec { color:var(--green); }
        .rapport-section { margin-bottom:16px; }
        .rapport-titre { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:1px;
                         font-weight:700; margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--border); }
        .rapport-ligne { display:flex; justify-content:space-between; font-size:13px; padding:5px 0; }
        .rapport-ligne span:last-child { font-weight:700; }
        .bande-header { background:linear-gradient(135deg,var(--bg2),var(--bg3)); border:1px solid var(--border);
                        border-radius:16px; padding:16px; margin-bottom:10px; }
        .bande-name { font-size:18px; font-weight:800; }
        .bande-meta { font-size:11px; color:var(--text2); margin-top:4px; }
        .bat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .bat-card { background:var(--bg3); border:1px solid var(--border); border-radius:14px;
                    padding:14px 12px; text-align:center; cursor:pointer; transition:transform .15s;
                    -webkit-tap-highlight-color:transparent; }
        .bat-card:active { transform:scale(.95); }
        .bat-card.libre   { border-style:dashed; opacity:.6; }
        .bat-card.encours { background:rgba(0,200,150,.08); border-color:rgba(0,200,150,.3); }
        .bat-card.cloture { background:rgba(255,157,0,.08); border-color:rgba(255,157,0,.3); }
        .bat-num    { font-size:10px; color:var(--text2); font-weight:600; margin-bottom:4px; }
        .bat-icon   { font-size:22px; margin-bottom:4px; }
        .bat-name   { font-size:12px; font-weight:700; }
        .bat-info   { font-size:10px; color:var(--text2); margin-top:3px; }
        .bat-statut { font-size:10px; font-weight:700; margin-top:4px; }
        .bat-statut.encours { color:var(--green); }
        .bat-statut.libre   { color:var(--text2); }
        .bat-statut.cloture { color:var(--orange); }
        .user-item { display:flex; justify-content:space-between; align-items:center; padding:11px 14px;
                     background:var(--bg3); border-radius:12px; margin-bottom:6px; border:1px solid var(--border); }
        .user-name { font-size:13px; font-weight:700; }
        .user-pin  { font-size:10px; color:var(--text2); font-family:monospace; margin-top:2px; }
        .user-badge { font-size:9px; font-weight:700; padding:2px 8px; border-radius:8px; }
        .badge-actif    { background:rgba(0,200,150,.2); color:var(--green); }
        .badge-inactif  { background:rgba(255,68,68,.2); color:var(--red); }
        .badge-gerant   { background:rgba(96,165,250,.2); color:#60a5fa; }
        .badge-agent    { background:rgba(74,222,128,.2); color:#4ade80; }
        .badge-partenaire{ background:rgba(192,132,252,.2); color:var(--purple); }
        .vente-card { background:var(--bg3); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:8px; }
        .phase-card { display:flex; align-items:center; gap:12px; padding:12px 14px; background:var(--bg3);
                      border-radius:12px; margin-bottom:8px; border:1px solid var(--border); }
        .phase-statut-badge { margin-left:auto; font-size:9px; font-weight:700; padding:3px 9px; border-radius:8px; }
        .ps-validee { background:rgba(0,200,150,.2); color:var(--green); }
        .ps-encours { background:rgba(0,153,255,.2); color:var(--blue); }
        .ps-attente { background:rgba(255,255,255,.06); color:var(--text2); }
        .fab-ligne { display:flex; gap:8px; margin-bottom:8px; align-items:center; }
        .fab-ligne .f-input { margin-bottom:0; flex:1; }
        .fab-total { display:flex; justify-content:space-between; padding:12px; background:var(--bg3);
                     border-radius:12px; margin-top:8px; font-weight:700; }
        .prog-bar  { height:5px; background:var(--bg3); border-radius:3px; overflow:hidden; margin-top:6px; }
        .prog-fill { height:100%; border-radius:3px; background:var(--green); transition:width .5s; }
        .prog-fill.orange { background:var(--orange); }
        .prog-fill.red    { background:var(--red); }
        textarea { width:100%; padding:12px; background:var(--bg3); border:1px solid var(--border);
                   border-radius:12px; color:var(--text); font-family:inherit; font-size:13px;
                   resize:none; outline:none; margin-top:6px; }
        textarea:focus { border-color:var(--blue); }
    </style>
</head>
<body>

<!-- ════════════════════════════════════════
     ÉCRAN 1 — SÉLECTION DU RÔLE
════════════════════════════════════════ -->
<div id="screen-role" class="screen">
    <div class="role-logo">🐔</div>
    <div class="role-title">AviGest</div>
    <div class="role-sub">Qui êtes-vous ?</div>
    <div class="role-btns">

<!-- ════════════════════════════════════════
     ÉCRAN 2 — LOGIN PIN
════════════════════════════════════════ -->
<div id="screen-pin" class="screen hidden">
    <div class="pin-logo">🐔</div>
    <div class="pin-title">AviGest</div>
    <div class="pin-sub" id="pin-label">Accès sécurisé</div>
    <div class="pin-display" id="pin-display">
        <div class="pin-dot" id="dot-0"></div>
        <div class="pin-dot" id="dot-1"></div>
        <div class="pin-dot" id="dot-2"></div>
        <div class="pin-dot" id="dot-3"></div>
    </div>
    <div class="pin-err" id="pin-err"></div>
    <div class="pin-pad">
        <button class="pin-key" onclick="pinTap('1')">1</button>
        <button class="pin-key" onclick="pinTap('2')">2</button>
        <button class="pin-key" onclick="pinTap('3')">3</button>
        <button class="pin-key" onclick="pinTap('4')">4</button>
        <button class="pin-key" onclick="pinTap('5')">5</button>
        <button class="pin-key" onclick="pinTap('6')">6</button>
        <button class="pin-key" onclick="pinTap('7')">7</button>
        <button class="pin-key" onclick="pinTap('8')">8</button>
        <button class="pin-key" onclick="pinTap('9')">9</button>
        <button class="pin-key key-del" onclick="pinDel()">⌫</button>
        <button class="pin-key" onclick="pinTap('0')">0</button>

    </div>
    <div class="pin-loading" id="pin-loading">
        <div class="spinner"></div>
        <div style="font-size:13px;color:var(--text2)">Connexion…</div>
    </div>
</div>

<!-- ════════════════════════════════════════
     APP PRINCIPALE
════════════════════════════════════════ -->
<div id="app-main">
    <div class="header">
        <div class="header-left">
            <button id="btn-back" onclick="Nav.back()">‹</button>
            <div>
                <div id="tb-role">--</div>
                <div id="tb-name">--</div>
            </div>
        </div>
        <span class="offline-badge" id="offline-badge">📴 HORS LIGNE</span>
        <button id="btn-logout" onclick="doLogout()">🚪 Sortir</button>
    </div>
    <div id="app-container"></div>
</div>

<div class="toast" id="toast-global"></div>

<script>
'use strict';

/* ════════════════════════════════════════════
   ÉTAGE 1 — VARIABLES GLOBALES
════════════════════════════════════════════ */
const API        = 'https://script.google.com/macros/s/AKfycbxN3dVH77nGS4YWzHtryqmeVQKf8inqBlyIp7tV6-VJZ2Y0Pt1rG1UkWujQIP7dIESV-g/exec';
const SESSION_MS = 12 * 3600 * 1000;
const TIMEOUT_MS = 10000;
const MAX_RETRY  = 3;

const App = {
    token:       localStorage.getItem('av_token')  || null,
    role:        localStorage.getItem('av_role')   || null,
    nom:         localStorage.getItem('av_nom')    || '',
    idPart:      localStorage.getItem('av_idpart') || '',
    loginTime:   parseInt(localStorage.getItem('av_lt') || '0'),
    activeBande: localStorage.getItem('av_bande')  || '',
    data:        {},
    clients:     [],
    batiments:   [],
    isOnline:    navigator.onLine,
    offlineQueue: JSON.parse(localStorage.getItem('av_queue') || '[]'),
    _saisie:     {},
    _fabLignes:  [],
    _session:    { id:null, etapeIdx:0, reponses:{} },
    _abattage:   { etape:1, poidsEntier:null, poidsGesier:null, nbAbattu:null },
    _pavBuffers: {}
};

/* ════════════════════════════════════════════
   ÉTAGE 2 — UTILITAIRES PURS
════════════════════════════════════════════ */
function esc(t) {
    if (t == null) return '';
    return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                    .replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/\//g,'&#x2F;');
}
function fmt(n) {
    return Math.round(n||0).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'\u00a0');
}
let _toastTimer = null;
function showToast(msg, type='info', duration=3000) {
    const el = document.getElementById('toast-global');
    if (!el) return;
    if (_toastTimer) clearTimeout(_toastTimer);
    el.textContent = msg;
    el.className   = 'toast ' + type + ' show';
    _toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}
function setLoad(btn, loading) {
    if (!btn) return;
    if (loading) { btn.dataset.orig = btn.innerHTML; btn.innerHTML = '⏳'; btn.disabled = true; }
    else { btn.innerHTML = btn.dataset.orig || btn.innerHTML; btn.disabled = false; }
}
const _guards = new Set();
function guardDouble(key) {
    if (_guards.has(key)) { showToast('Opération en cours…','warning'); return false; }
    _guards.add(key);
    setTimeout(() => _guards.delete(key), 3000);
    return true;
}
function sanitizeNum(v, min=0, max=Infinity) {
    const n = parseFloat(v);
    if (isNaN(n) || n < min || n > max) return null;
    return n;
}
function detectSession() {
    const h = new Date().getHours();
    if (h >= 5  && h < 10) return 'Matin';
    if (h >= 10 && h < 14) return 'Midi';
    if (h >= 14 && h < 19) return 'PM';
    return 'Nuit';
}
function _dateAujourd_hui() { return new Date().toISOString().split('T')[0]; }

/* ════════════════════════════════════════════
   ÉTAGE 3 — SÉCURITÉ & SESSION
════════════════════════════════════════════ */
function isSessionValid() {
    if (!App.token || !App.loginTime) return false;
    return (Date.now() - App.loginTime) < SESSION_MS;
}
function handleExpired() {
    showToast('Session expirée. Reconnectez-vous.','error',4000);
    setTimeout(() => {
        ['av_token','av_lt'].forEach(k => localStorage.removeItem(k));
        App.token = null; App.loginTime = 0; location.reload();
    }, 2500);
}
let _warnedExpiry = false;
setInterval(() => {
    if (!App.loginTime) return;
    const remaining = SESSION_MS - (Date.now() - App.loginTime);
    if (remaining < 3_600_000 && !_warnedExpiry) { _warnedExpiry = true; showToast("⚠️ Session expire dans moins d'1h",'warning',6000); }
    if (remaining <= 0) handleExpired();
}, 60_000);

/* ════════════════════════════════════════════
   ÉTAGE 4 — RÉSEAU & API
════════════════════════════════════════════ */
async function fetchT(url, opts={}, ms=TIMEOUT_MS) {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), ms);
    try {
        const r = await fetch(url, {...opts, signal: ctrl.signal});
        clearTimeout(tid); return r;
    } catch(e) {
        clearTimeout(tid);
        if (e.name === 'AbortError') throw new Error('TIMEOUT');
        throw e;
    }
}
async function apiGet(params={}) {
    if (params.action !== 'login' && !isSessionValid()) { handleExpired(); return {success:false}; }
    const url = new URL(API);
    if (App.token) url.searchParams.set('token', App.token);
    Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
    try {
        const r = await fetchT(url.toString());
        if (!r.ok) throw new Error('HTTP '+r.status);
        const d = await r.json();
        if (d.error && d.error.includes('Session')) { handleExpired(); return {success:false}; }
        return d;
    } catch(e) {
        if (e.message === 'TIMEOUT') showToast('Connexion lente — données en cache','warning');
        return (App.data && App.data.success) ? App.data : {success:false, error:e.message};
    }
}
async function apiPost(payload) {
    if (!isSessionValid()) { handleExpired(); return {success:false}; }
    payload.token = App.token;
    if (!App.isOnline) { queueRequest(payload); return {success:true, queued:true}; }
    for (let i = 1; i <= MAX_RETRY; i++) {
        try {
            const r = await fetchT(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
            if (!r.ok) throw new Error('HTTP '+r.status);
            const d = await r.json();
            if (d.error && d.error.includes('Session')) { handleExpired(); return {success:false}; }
            return d;
        } catch(e) {
            if (i < MAX_RETRY) { showToast('Réseau lent · Tentative '+(i+1)+'/'+MAX_RETRY+'…','warning',2000); await new Promise(res=>setTimeout(res,1500*i)); }
        }
    }
    queueRequest(payload); return {success:true, queued:true};
}
function queueRequest(payload) {
    const p = {...payload}; delete p.token;
    App.offlineQueue.push({payload:p, ts:Date.now()});
    localStorage.setItem('av_queue', JSON.stringify(App.offlineQueue));
    updateOffline(); showToast('📴 Donnée sauvegardée localement','warning');
}
async function processQueue() {
    if (!App.offlineQueue.length || !App.isOnline || App.isSyncing) return;
    if (!isSessionValid()) { showToast('Session expirée — reconnectez-vous pour sync','warning',5000); return; }
    App.isSyncing = true;
    const failed = [];
    for (const item of App.offlineQueue) {
        try {
            const r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({...item.payload, token:App.token})});
            const d = await r.json();
            if (!d.success) failed.push(item);
        } catch { failed.push(item); }
    }
    App.offlineQueue = failed;
    localStorage.setItem('av_queue', JSON.stringify(failed));
    App.isSyncing = false; updateOffline();
    if (!failed.length) showToast('✅ Toutes les données synchronisées','success');
    else showToast(failed.length+' élément(s) en attente','warning');
}
function updateOffline() {
    const b = document.getElementById('offline-badge');
    if (b) b.classList.toggle('show', !App.isOnline);
}
window.addEventListener('online',  () => { App.isOnline=true;  updateOffline(); showToast('🌐 Connexion rétablie','success'); processQueue(); });
window.addEventListener('offline', () => { App.isOnline=false; updateOffline(); showToast('📴 Mode hors ligne activé','warning'); });

/* ════════════════════════════════════════════
   ÉTAGE 5 — NAVIGATION
════════════════════════════════════════════ */
const Nav = {
    stack: [],
    push(fn, params) { Nav.stack.push({fn, params}); Nav._run(fn, params); Nav._upBtn(); },
    back() {
        if (Nav.stack.length <= 1) { Nav.stack=[]; renderHome(); Nav._upBtn(); return; }
        Nav.stack.pop();
        const prev = Nav.stack[Nav.stack.length-1];
        Nav._run(prev.fn, prev.params); Nav._upBtn();
    },
    home() { Nav.stack=[]; renderHome(); Nav._upBtn(); },
    replace(fn, params) {
        if (Nav.stack.length) Nav.stack[Nav.stack.length-1]={fn,params};
        else Nav.stack.push({fn,params});
        Nav._run(fn, params); Nav._upBtn();
    },
    _run(fn, params) {
        try {
            if (typeof window[fn]==='function') {
                const res = window[fn](params);
                if (res && typeof res.catch==='function') res.catch(e => { console.error('Nav async error ('+fn+'):', e); showToast("Erreur d'affichage",'error'); });
            } else { console.error('Nav: fonction inconnue:', fn); renderHome(); }
        } catch(e) { console.error('Nav error ('+fn+'):', e); showToast("Erreur d'affichage",'error'); }
    },
    _upBtn() {
        const btn = document.getElementById('btn-back');
        if (btn) btn.style.display = Nav.stack.length > 1 ? 'inline-block' : 'none';
    }
};
function zone() { return document.getElementById('app-container'); }

/* ════════════════════════════════════════════
   ÉTAGE 6 — LOGIN (PIN + rôle)
════════════════════════════════════════════ */
let _pin = '';
let _loginBusy = false;

function choisirRole(role) {
    const labels = {GERANT:'🧑‍💼 Gérant — entrez votre PIN', AGENT:'👷 Agent — entrez votre PIN', PARTENAIRE:'🤝 Partenaire — entrez votre PIN'};
    const el = document.getElementById('pin-label');
    if (el) el.textContent = labels[role] || 'Entrez votre PIN';
    _pin = ''; _updateDots();
    document.getElementById('key-ok').classList.remove('ready');
    _hideErr();
    document.getElementById('screen-role').classList.add('hidden');
    document.getElementById('screen-pin').classList.remove('hidden');
}

function pinTap(digit) {
    if (_loginBusy || _pin.length >= 4) return;
    _pin += digit; _updateDots();
    if (_pin.length === 4) document.getElementById('key-ok').classList.add('ready');
    _hideErr();
}
function pinDel() {
    if (_loginBusy || !_pin.length) return;
    _pin = _pin.slice(0, -1);
    document.getElementById('key-ok').classList.remove('ready');
    _updateDots(); _hideErr();
}
function _updateDots() {
    for (let i=0; i<4; i++) {
        const d = document.getElementById('dot-'+i);
        if (d) d.classList.toggle('filled', i < _pin.length);
    }
}
function _showErr(msg) {
    const e = document.getElementById('pin-err'), d = document.getElementById('pin-display');
    if (e) { e.textContent = msg; e.classList.add('show'); }
    if (d) { d.classList.add('shake'); setTimeout(()=>d.classList.remove('shake'), 450); }
}
function _hideErr() {
    const e = document.getElementById('pin-err');
    if (e) e.classList.remove('show');
}

async function doLogin() {
    if (_loginBusy) return;
    if (_pin.length !== 4) { _showErr('Saisissez 4 chiffres'); return; }
    if (!guardDouble('login')) return;
    _loginBusy = true;
    document.getElementById('pin-loading').classList.add('show');
    try {
        const res = await fetchT(API+'?action=login&pin='+_pin);
        if (!res.ok) throw new Error('HTTP '+res.status);
        const d = await res.json();
        if (d.success) {
            App.token=d.token; App.role=d.role; App.nom=d.nom||'';
            App.idPart=d.idPartenaire||''; App.loginTime=Date.now();
            localStorage.setItem('av_token',d.token);
            localStorage.setItem('av_role',d.role);
            localStorage.setItem('av_nom',d.nom||'');
            localStorage.setItem('av_idpart',d.idPartenaire||'');
            localStorage.setItem('av_lt',String(App.loginTime));
            document.getElementById('screen-pin').classList.add('hidden');
            document.getElementById('app-main').style.display = 'block';
            startApp();
        } else {
            _showErr(d.error || 'PIN incorrect');
            _pin = ''; _updateDots();
            document.getElementById('key-ok').classList.remove('ready');
        }
    } catch(e) {
        _showErr('Erreur réseau — réessayez');
        console.error('doLogin:', e);
    } finally {
        _loginBusy = false;
        document.getElementById('pin-loading').classList.remove('show');
    }
}
async function doLogout() {
    try { await apiGet({action:'logout'}); } catch(_) {}
    ['av_token','av_role','av_nom','av_idpart','av_lt'].forEach(k => localStorage.removeItem(k));
    App.token=null; App.role=null; App.nom=''; App.loginTime=0; location.reload();
}
async function doLogoutFromRole() {
    if (App.token) {
        try { await apiGet({action:'logout'}); } catch(_) {}
        ['av_token','av_role','av_nom','av_idpart','av_lt'].forEach(k => localStorage.removeItem(k));
        App.token=null; App.role=null; App.nom=''; App.loginTime=0;
    }
    setTimeout(() => location.reload(), 400);
}

/* ════════════════════════════════════════════
   ÉTAGE 7 — FONCTIONS MÉTIER
   ─────────────────────────────────────────
   7.1  Messagerie inter-rôles (API-based)
   7.2  Système de tâches
   7.3  Gérant
   7.4  Agent
   7.5  Partenaire
════════════════════════════════════════════ */

function _majTopbar() {
    const r = document.getElementById('tb-role'), n = document.getElementById('tb-name');
    if (r) r.textContent = App.role || '--';
    if (n) n.textContent = App.nom  || '--';
}

/* ══════════════════════════════════════════
   7.1  MESSAGERIE INTER-RÔLES (localStorage
        cross-device via clé partagée horodatée)
   NOTE : dans un vrai déploiement multi-appareil,
   les messages doivent passer par le backend.
   Ici, on stocke dans localStorage ET on signale
   au prochain apiGet. Le backend stocke l'état
   dans les tâches (TERMINEE → attente validation).
══════════════════════════════════════════ */

/** Stocke une alerte pour l'agent (tâche créée par le gérant) */
function _notifierAgent(titre, type, bande) {
    const key  = 'av_notif_agent_' + _dateAujourd_hui();
    const msgs = JSON.parse(localStorage.getItem(key) || '[]');
    msgs.push({ titre, type, bande: bande || App.activeBande,
                gerant: App.nom,
                heure: new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
                ts: Date.now(), lu: false });
    localStorage.setItem(key, JSON.stringify(msgs));
}

/** Retourne le nb de notifications non lues pour l'agent */
function _nbNotifsAgent() {
    const key = 'av_notif_agent_' + _dateAujourd_hui();
    return JSON.parse(localStorage.getItem(key) || '[]').filter(m => !m.lu).length;
}

/** Marque les notifs agent comme lues */
function _marquerNotifsAgentLues() {
    const key  = 'av_notif_agent_' + _dateAujourd_hui();
    const msgs = JSON.parse(localStorage.getItem(key) || '[]').map(m => ({...m, lu:true}));
    localStorage.setItem(key, JSON.stringify(msgs));
}

/** Stocke une notification de tâche accomplie pour le gérant */
function _notifierGerantTacheAccomplie(tacheId, titre, bande) {
    const key  = 'av_notif_gerant_' + _dateAujourd_hui();
    const msgs = JSON.parse(localStorage.getItem(key) || '[]');
    msgs.push({ tacheId, titre, bande: bande || App.activeBande,
                agent: App.nom,
                heure: new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
                ts: Date.now(), lu: false, valide: false });
    localStorage.setItem(key, JSON.stringify(msgs));
}

/** Retourne le nb de tâches accomplies non validées (vue gérant) */
function _nbTachesAValider() {
    const key = 'av_notif_gerant_' + _dateAujourd_hui();
    return JSON.parse(localStorage.getItem(key) || '[]').filter(m => !m.valide).length;
}

/** Bannière agent — résultats de validation du gérant (accepté/rejeté) */
function _banniereAgentValidations() {
    const key  = 'av_notif_validation_' + _dateAujourd_hui();
    const msgs = JSON.parse(localStorage.getItem(key) || '[]').filter(m => !m.lu);
    if (!msgs.length) return '';
    const nbAcceptes = msgs.filter(m => m.statut === 'ACCEPTE').length;
    const nbRejetes  = msgs.filter(m => m.statut === 'REJETE').length;
    return `
    <div class="banniere ${nbRejetes > 0 ? 'banniere-validation' : ''}"
         style="background:${nbRejetes > 0 ? 'rgba(255,68,68,.1)' : 'rgba(0,200,150,.1)'};
                border:2px solid ${nbRejetes > 0 ? 'rgba(255,68,68,.4)' : 'rgba(0,200,150,.4)'};
                border-radius:14px;padding:14px 16px;margin-bottom:12px;cursor:pointer"
         onclick="_voirValidationsAgent()">
        <div style="display:flex;align-items:center;gap:10px">
            <div style="font-size:26px">${nbRejetes > 0 ? '❌' : '✅'}</div>
            <div style="flex:1">
                <div style="font-size:14px;font-weight:800;
                    color:${nbRejetes > 0 ? 'var(--red)' : 'var(--green)'}">
                    Retour du gérant sur vos tâches
                </div>
                <div style="font-size:11px;color:var(--text2);margin-top:3px">
                    ${nbAcceptes > 0 ? nbAcceptes + ' acceptée' + (nbAcceptes > 1 ? 's' : '') : ''}
                    ${nbAcceptes > 0 && nbRejetes > 0 ? ' · ' : ''}
                    ${nbRejetes > 0 ? nbRejetes + ' rejetée' + (nbRejetes > 1 ? 's' : '') : ''}
                </div>
            </div>
            <div style="font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;
                background:${nbRejetes > 0 ? 'rgba(255,68,68,.2)' : 'rgba(0,200,150,.2)'};
                color:${nbRejetes > 0 ? 'var(--red)' : 'var(--green)'}">VOIR</div>
        </div>
    </div>`;
}

function _voirValidationsAgent() {
    const key  = 'av_notif_validation_' + _dateAujourd_hui();
    const msgs = JSON.parse(localStorage.getItem(key) || '[]');
    // Marquer comme lus
    localStorage.setItem(key, JSON.stringify(msgs.map(m => ({...m, lu: true}))));
    const z = zone(); if (!z) return;
    z.innerHTML = `
        <div class="section-title">📋 Retour du gérant — Aujourd'hui</div>

const _tacheTimers = {};

/** Premier appui — état intermédiaire "Confirmer ?" */
function _tachePremierAppui(idTache, titre) {
    const btn = document.getElementById('btn-fait-'+idTache);
    if (!btn) return;
    if (btn.dataset.confirming === 'true') { _tacheDeuxiemeAppui(idTache, titre); return; }
    btn.dataset.confirming = 'true';
    btn.classList.add('confirmer');
    btn.textContent = '✅ Confirmer ? (3s)';
    let countdown = 3;
    const iv = setInterval(() => {
        countdown--;
        if (btn.dataset.confirming === 'true' && countdown > 0)
            btn.textContent = `✅ Confirmer ? (${countdown}s)`;
        else clearInterval(iv);
    }, 1000);
    _tacheTimers[idTache] = setTimeout(() => {
        clearInterval(iv);
        if (btn && btn.dataset.confirming === 'true') {
            btn.dataset.confirming = 'false';
            btn.classList.remove('confirmer');
            btn.textContent = 'À FAIRE';
        }
        delete _tacheTimers[idTache];
    }, 3000);
}

/** Deuxième appui — envoi backend + verrou + notif gérant */
async function _tacheDeuxiemeAppui(idTache, titre) {
    if (_tacheTimers[idTache]) { clearTimeout(_tacheTimers[idTache]); delete _tacheTimers[idTache]; }
    const btn  = document.getElementById('btn-fait-'+idTache);
    const card = document.getElementById('tcard-'+idTache);
    if (btn)  { btn.dataset.confirming='false'; btn.classList.remove('confirmer'); btn.classList.add('done'); btn.textContent='✅ FAIT'; btn.onclick=null; }
    if (card) card.classList.add('accomplie');
    localStorage.setItem('av_done_'+idTache, 'true');
    const r = await apiPost({action:'AGENT_TERMINE', idRow: idTache});
    if (r.queued) showToast('📴 Tâche sauvegardée — envoi dès retour en ligne','warning',4000);
    else if (r.success) showToast('✅ Tâche marquée comme faite — gérant notifié','success');
    else showToast(r.error || 'Erreur envoi tâche','error');
    // Notifier le gérant in-app
    _notifierGerantTacheAccomplie(idTache, titre, App.activeBande);
}

/* ════════════════════════════════════════════
   VALIDATION TÂCHE GÉRANT
   — Tâches sans impact comptable (mortalité,
     température, hygro) : validation simple
   — Tâches avec impact comptable (aliment,
     eau, produits vétérinaires) : saisie du
     prix unitaire → dépense auto dans journal
════════════════════════════════════════════ */

// Catégories qui génèrent une dépense dans le journal
const TACHES_AVEC_DEPENSE = [
    'aliment', 'eau', 'litre', 'vétérinaire', 'veterinaire',
    'produit', 'vaccin', 'traitement', 'litière', 'intrant'
];

function _tacheNecessitePrix(titre) {
    const t = titre.toLowerCase();
    return TACHES_AVEC_DEPENSE.some(mot => t.includes(mot));
}

function _validerTacheGerant(tacheId, titre) {
    // Marquer localement
    const btn = document.getElementById('btnval-'+tacheId);
    const key = 'av_notif_gerant_' + _dateAujourd_hui();
    const msgs = JSON.parse(localStorage.getItem(key) || '[]').map(m =>
        m.tacheId === tacheId ? {...m, valide:true} : m
    );
    localStorage.setItem(key, JSON.stringify(msgs));

    if (_tacheNecessitePrix(titre)) {
        // Saisie du prix unitaire avant validation
        _afficherSaisiePrix(tacheId, titre, btn);
    } else {
        // Validation simple — pas d'impact comptable
        _finaliserValidation(tacheId, titre, btn, null, null, null);
    }
}

function _afficherSaisiePrix(tacheId, titre, btnRef) {
    const z = zone(); if (!z) return;
    // Déterminer l'unité probable selon le titre
    const t = titre.toLowerCase();
    const unite = t.includes('aliment') ? 'kg'
                : t.includes('eau') || t.includes('litre') ? 'litre'
                : t.includes('vaccin') || t.includes('vétérinaire') || t.includes('produit') ? 'dose'
                : 'unité';

    z.innerHTML = `
        <div class="card" style="margin-top:20px">
            <div class="card-title" style="color:var(--orange)">💰 Saisie du prix — Impact journal</div>
            <div style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6;
                        background:rgba(255,157,0,.08);border:1px solid rgba(255,157,0,.2);
                        border-radius:12px;padding:12px">
                La tâche <strong style="color:var(--text)">"${esc(titre)}"</strong> génère
                une dépense dans le journal. Saisis le prix unitaire pour calculer le montant.
            </div>
            <label class="f-label">Quantité saisie par l'agent</label>
            <input class="f-input" type="number" id="vt-qte" placeholder="Ex: 50"
                   inputmode="numeric" style="background:rgba(0,200,150,.06);border-color:rgba(0,200,150,.3)">
            <label class="f-label">Unité</label>
            <select class="f-input" id="vt-unite">
                <option value="${esc(unite)}" selected>${esc(unite)}</option>
                <option value="kg">kg</option>
                <option value="litre">litre</option>
                <option value="sac">sac</option>
                <option value="dose">dose</option>
                <option value="flacon">flacon</option>
                <option value="forfait">forfait</option>
            </select>
            <label class="f-label">Prix unitaire (FCFA)</label>
            <input class="f-input" type="number" id="vt-pu" placeholder="Ex: 250"
                   inputmode="numeric">
            <div id="vt-preview" style="background:var(--bg3);border-radius:12px;padding:12px;
                                        margin-bottom:14px;display:none">
                <div style="font-size:11px;color:var(--text2)">Montant calculé</div>
                <div id="vt-montant" style="font-size:20px;font-weight:800;color:var(--red)"></div>
            </div>
            <button class="btn-action btn-orange"
                    onclick="_calculerMontantValidation('${esc(tacheId)}')">
                🔢 Calculer le montant
            </button>
            <button class="btn-action btn-green" id="btn-vt-valider" style="display:none"
                    onclick="_finaliserAvecDepense('${esc(tacheId)}','${esc(titre)}')">
                ✅ Valider et enregistrer dans le journal
            </button>
            <button class="btn-action btn-ghost"
                    onclick="_finaliserValidation('${esc(tacheId)}','${esc(titre)}',null,null,null,null)">
                Valider sans enregistrer de dépense
            </button>
        </div>`;
    Nav.stack.push({fn:'_afficherSaisiePrix', params:tacheId}); Nav._upBtn();
}

function _calculerMontantValidation(tacheId) {
    const qte = parseFloat(document.getElementById('vt-qte')?.value);
    const pu  = parseFloat(document.getElementById('vt-pu')?.value);
    if (!qte || qte <= 0) { showToast('Saisissez la quantité','warning'); return; }
    if (!pu  || pu  <= 0) { showToast('Saisissez le prix unitaire','warning'); return; }
    const montant = Math.round(qte * pu);
    const preview  = document.getElementById('vt-preview');
    const montantEl= document.getElementById('vt-montant');
    const btnVal   = document.getElementById('btn-vt-valider');
    if (preview)   preview.style.display   = 'block';
    if (montantEl) montantEl.textContent   = '−' + montant.toLocaleString('fr') + ' FCFA';
    if (btnVal)    btnVal.style.display    = 'flex';
    // Stocker temporairement pour finalisation
    App._validationEnCours = { tacheId, qte, pu, montant };
}

async function _finaliserAvecDepense(tacheId, titre) {
    const v = App._validationEnCours;
    if (!v || v.tacheId !== tacheId) { showToast('Erreur de validation','error'); return; }
    const unite = document.getElementById('vt-unite')?.value || 'unité';

    // 1. Marquer la tâche terminée dans le backend
    await apiPost({action:'AGENT_TERMINE', idRow: tacheId});

    // 2. Enregistrer la dépense dans le journal
    const r = await apiPost({
        action       : 'ECRITURE_JOURNAL',
        idBande      : App.activeBande,
        typeEcriture : 'DEPENSE',
        categorie    : titre,
        libelle      : titre + ' (validé par gérant)',
        unite        : unite,
        quantite     : v.qte,
        prixUnitaire : v.pu,
        montant      : v.montant,
        beneficiaire : 'Agent terrain'
    });

    if (r.success || r.queued) {
        // 3. Notifier l'agent — validation acceptée
        _notifierAgentValidation(tacheId, titre, 'ACCEPTE');
        showToast('✅ Tâche validée — dépense de ' + v.montant.toLocaleString('fr') + ' FCFA enregistrée', 'success', 5000);
        App._validationEnCours = null;
        Nav.home();
    } else {
        showToast(r.error || 'Erreur enregistrement journal', 'error');
    }
}

async function _finaliserValidation(tacheId, titre, btn, qte, pu, montant) {
    // Validation simple sans dépense
    if (btn) { btn.classList.add('validated'); btn.textContent = '✅ Validé'; }
    await apiPost({action:'AGENT_TERMINE', idRow: tacheId});
    _notifierAgentValidation(tacheId, titre, 'ACCEPTE');
    showToast('✅ Tâche validée', 'success');
    if (Nav.stack.length > 1) Nav.back();
}

async function _validerTacheBackend(id, titre) {

const TACHES_QUOTIDIENNES = [

/** Envoie les tâches quotidiennes pour une date cible */
async function envoyerTachesQuotidiennes(idBande, dateStr) {
    if (!idBande) { showToast('Aucune bande active','warning'); return; }
    if (_tachesDejaEnvoyees(dateStr, idBande)) {
        showToast('Tâches déjà envoyées pour cette date','warning'); return;
    }
    if (!guardDouble('envoi_taches')) return;

    const z = zone(); if (!z) return;
    // Affichage de confirmation avant envoi
    const dateLabel = dateStr === _dateAujourd_hui()
        ? "aujourd'hui"
        : "le " + dateStr.split('-').reverse().join('/');

    z.innerHTML = `
        <div class="card" style="margin-top:20px">
            <div class="card-title" style="color:var(--blue)">📤 Envoyer les tâches quotidiennes</div>

                à l'agent pour <strong style="color:var(--blue)">${dateLabel}</strong>.
            </div>
            <div style="background:var(--bg3);border-radius:12px;padding:12px;margin-bottom:16px">
                ${TACHES_QUOTIDIENNES.map(t => `

async function _confirmerEnvoiTaches(idBande, dateStr) {
    const btn = document.getElementById('btn-confirmer-envoi');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Envoi en cours…'; }
    let nb = 0;
    for (const t of TACHES_QUOTIDIENNES) {
        const r = await apiPost({action:'CREER_TACHE', titre:t.titre, date:dateStr, idBande, typeTache:t.typeTache});
        if (r.success) nb++;
    }
    localStorage.setItem('av_taches_envoyees_' + idBande + '_' + dateStr, 'true');
    _notifierAgent('📋 ' + nb + ' tâches du ' + dateStr.split('-').reverse().join('/') + ' envoyées par le gérant', 'QUOTIDIEN', idBande);
    showToast('✅ ' + nb + ' tâches envoyées à l'agent','success', 4000);
    Nav.home();
}

/** Calcule la date de demain au format YYYY-MM-DD */
function _dateDemain() {
    const d = new Date();
    d.setDate(d.getDate() + 1);
    return d.toISOString().split('T')[0];
}

async function validerCreerTache(type) {
    const titre = document.getElementById('tache-titre')?.value.trim();
    const date  = document.getElementById('tache-date')?.value;
    const bande = document.getElementById('tache-bande')?.value;
    if (!titre) { showToast('Le titre est obligatoire','warning'); return; }
    if (!date)  { showToast('La date est obligatoire','warning'); return; }
    if (!bande) { showToast('Sélectionnez une bande','warning'); return; }
    const r = await apiPost({action:'CREER_TACHE', titre, date, idBande:bande, typeTache:type});
    if (r.success) {
        _notifierAgent(titre, type, bande);
        showToast('✅ Tâche créée — agent notifié','success');
        Nav.back();
    } else showToast(r.error||'Erreur création tâche','error');
}

   Colonnes : Date · Type · Libellé · PU · Unité · Qté · Montant · Solde

    const z=zone(); if(!z) return;

    // Calcul solde cumulé

        const mnt = parseFloat(l.montant)||0;

    const totalRec = lignes.filter(l=>l.typeEcriture==='RECETTE').reduce((s,l)=>s+(parseFloat(l.montant)||0),0);

    const lignesHTML = lignesAvecSolde.length ? lignesAvecSolde.map(l => {
        const isDep = l.typeEcriture==='DEPENSE';
        const soldeC = l.solde >= 0 ? 'var(--green)' : 'var(--red)';
        return `
        <div style="border-bottom:1px solid var(--border);padding:10px 0">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
                <div style="flex:1;min-width:0">
                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
                        <span style="font-size:9px;font-weight:800;padding:2px 6px;border-radius:6px;
                            background:${isDep?'rgba(255,68,68,.15)':'rgba(0,200,150,.15)'};
                            color:${isDep?'var(--red)':'var(--green)'}">
                            ${isDep?'DEP':'REC'}

                        <span style="font-size:12px;font-weight:700;color:var(--text)">${esc(l.libelle||l.categorie)}</span>

/* ── Nouvelle écriture (Dépense ou Recette) — 5 étapes ── */
function renderNouvelleEcriture(type) {
    const z=zone(); if(!z) return;
    App._saisie = {type, libelle:'', categorie:'', unite:'', qte:null, pu:null, montant:null, benef:''};

    const categories = type==='DEPENSE'
        ? ['Aliment','Poussin','Vaccin/Médicament','Main d\'œuvre','Eau','Électricité','Transport','Vente aliment','Fabrication aliment','Autre dépense']
        : ['Vente poulet vif','Vente poulet abattu','Vente gésier/foie','Vente têtes/pattes','Remboursement','Autre recette'];

    z.innerHTML=`
        <div class="card">
            <div class="card-title" style="color:${type==='DEPENSE'?'var(--red)':'var(--green)'}">
                ${type==='DEPENSE'?'📤 Nouvelle dépense':'📥 Nouvelle recette'}
            </div>
            <div class="stepper">${[1,2,3,4,5].map(i=>`<div class="step-dot ${i===1?'active':''}" id="es-${i}"></div>`).join('')}</div>

            <!-- Étape 1 : Catégorie -->
            <div class="form-step active" id="ef-1">
                <div class="form-step-title">Étape 1 — Catégorie</div>
                <div style="display:flex;flex-direction:column;gap:8px">
                    ${categories.map(c=>`
                        <button class="choice-btn" style="padding:12px 16px;text-align:left;font-size:13px"
                                onclick="ecritureChoisirCat('${esc(c)}')">${esc(c)}</button>`).join('')}
                </div>
            </div>

            <!-- Étape 2 : Libellé -->
            <div class="form-step" id="ef-2">
                <div class="form-step-title">Étape 2 — Libellé / Description</div>
                <label class="f-label">Détail de l'opération</label>
                <input class="f-input" type="text" id="e-libelle" placeholder="Ex: Achat maïs jaune">
                <label class="f-label">Bénéficiaire / Fournisseur (optionnel)</label>
                <input class="f-input" type="text" id="e-benef" placeholder="Ex: Moussa Traoré">
                <button class="btn-action btn-blue" onclick="ecritureStep(3)">Suivant →</button>
            </div>

            <!-- Étape 3 : Unité -->
            <div class="form-step" id="ef-3">
                <div class="form-step-title">Étape 3 — Unité de mesure</div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
                    ${['kg','sac','litre','sujet','forfait','prestation','autre'].map(u=>`
                        <button class="choice-btn" style="padding:12px 8px;font-size:11px"
                                onclick="ecritureChoisirUnite('${u}')">${u}</button>`).join('')}
                </div>
            </div>

            <!-- Étape 4 : Quantité + Prix -->
            <div class="form-step" id="ef-4">
                <div class="form-step-title">Étape 4 — Quantité & Prix</div>
                <label class="f-label">Quantité</label>
                <input class="f-input" type="number" id="e-qte" placeholder="Ex: 10" inputmode="numeric">
                <label class="f-label">Prix unitaire (FCFA)</label>
                <input class="f-input" type="number" id="e-pu" placeholder="Ex: 15 000" inputmode="numeric">
                <div style="text-align:center;margin:6px 0 10px;font-size:11px;color:var(--text2)">— ou saisir directement —</div>
                <label class="f-label">Montant total (FCFA)</label>
                <input class="f-input" type="number" id="e-montant" placeholder="Ex: 150 000" inputmode="numeric">
                <button class="btn-action btn-blue" onclick="ecritureStep(5)">Voir le résumé →</button>
            </div>

            <!-- Étape 5 : Résumé + Validation -->
            <div class="form-step" id="ef-5">
                <div class="form-step-title">Étape 5 — Confirmation</div>
                <div id="e-resume" class="card" style="background:var(--bg3);margin-bottom:14px"></div>
                <button class="btn-action btn-green" onclick="ecritureValider()">✅ Enregistrer dans le journal</button>
                <button class="btn-action btn-ghost" onclick="ecritureStep(1)">↩ Recommencer</button>
            </div>
        </div>`;
}

function ecritureChoisirCat(cat) {
    App._saisie.categorie = cat;
    App._saisie.libelle   = cat; // pré-rempli, modifiable à l'étape 2
    const el = document.getElementById('e-libelle');
    if (el) el.value = cat;
    ecritureStep(2);
}
function ecritureChoisirUnite(u) { App._saisie.unite = u; ecritureStep(4); }

function ecritureStep(n) {
    for(let i=1;i<=5;i++){
        const f=document.getElementById('ef-'+i), d=document.getElementById('es-'+i);
        if(f) f.classList.toggle('active', i===n);
        if(d){ d.classList.remove('active','done'); if(i===n) d.classList.add('active'); else if(i<n) d.classList.add('done'); }
    }
    if(n===5) _ecriBuildResume();
}

function _ecriBuildResume() {
    const s = App._saisie;
    const q = parseFloat(document.getElementById('e-qte')?.value||'0');
    const p = parseFloat(document.getElementById('e-pu')?.value||'0');
    const m = parseFloat(document.getElementById('e-montant')?.value||'0');
    s.qte     = q||null;
    s.pu      = p||null;
    s.montant = m || (q*p) || 0;
    s.libelle = document.getElementById('e-libelle')?.value || s.categorie;
    s.benef   = document.getElementById('e-benef')?.value  || '';
    const isDep = s.type==='DEPENSE';
    const el = document.getElementById('e-resume'); if(!el) return;
    el.innerHTML=`
        <div class="rapport-ligne"><span>Type</span><span style="color:${isDep?'var(--red)':'var(--green)'};font-weight:800">${s.type}</span></div>
        <div class="rapport-ligne"><span>Catégorie</span><span>${esc(s.categorie)}</span></div>
        <div class="rapport-ligne"><span>Libellé</span><span>${esc(s.libelle)}</span></div>
        <div class="rapport-ligne"><span>Unité</span><span>${esc(s.unite)}</span></div>
        ${s.qte?`<div class="rapport-ligne"><span>Quantité</span><span>${s.qte}</span></div>`:''}
        ${s.pu?`<div class="rapport-ligne"><span>Prix unitaire</span><span>${fmt(s.pu)} FCFA</span></div>`:''}
        <div class="rapport-ligne">
            <span>Montant</span>
            <span style="color:${isDep?'var(--red)':'var(--green)'};font-size:16px;font-weight:800">
                ${isDep?'−':'+'}${fmt(s.montant)} FCFA
            </span>
        </div>
        ${s.benef?`<div class="rapport-ligne"><span>Bénéficiaire</span><span>${esc(s.benef)}</span></div>`:''}`;
}

async function ecritureValider() {
    const s = App._saisie;
    if(!s.montant||s.montant<=0) { showToast('Montant invalide','warning'); return; }
    if(!guardDouble('ecriture')) return;
    const r = await apiPost({
        action       : 'ECRITURE_JOURNAL',
        idBande      : App.activeBande,
        typeEcriture : s.type,
        categorie    : s.categorie,
        libelle      : s.libelle,
        unite        : s.unite,
        quantite     : s.qte||1,
        prixUnitaire : s.pu||0,
        montant      : s.montant,
        beneficiaire : s.benef
    });
    if(r.success) { showToast('✅ Écriture enregistrée','success'); Nav.back(); }
    else showToast(r.error||'Erreur','error');
}

/* ── Contre-écriture (correction) ── */
function renderContreEcriture() {
    const z=zone(); if(!z) return;
    z.innerHTML=`
        <div class="card">
            <div class="card-title" style="color:var(--orange)">↩ Contre-écriture — Correction</div>
            <div style="font-size:12px;color:var(--text2);margin-bottom:16px;background:rgba(255,157,0,.08);
                        border:1px solid rgba(255,157,0,.2);border-radius:12px;padding:12px;line-height:1.6">
                ℹ️ Une contre-écriture annule une opération précédente en créant une écriture inverse
                de même montant. L'écriture originale reste visible dans le journal pour traçabilité.
            </div>
            <label class="f-label">Type de l'écriture à corriger</label>
            <select class="f-input" id="ce-type">
                <option value="DEPENSE">DÉPENSE (contre-écriture = Recette)</option>
                <option value="RECETTE">RECETTE (contre-écriture = Dépense)</option>
            </select>
            <label class="f-label">Libellé de la correction</label>
            <input class="f-input" type="text" id="ce-libelle" placeholder="Ex: Annulation achat aliment du 12/05">
            <label class="f-label">Montant à annuler (FCFA)</label>
            <input class="f-input" type="number" id="ce-montant" placeholder="Ex: 150 000" inputmode="numeric">
            <button class="btn-action btn-orange" onclick="contreEcritureValider()">↩ Créer la contre-écriture</button>
            <button class="btn-action btn-ghost" onclick="Nav.back()">Annuler</button>
        </div>`;
}

async function contreEcritureValider() {
    const typeOriginal = document.getElementById('ce-type')?.value;
    const libelle      = document.getElementById('ce-libelle')?.value.trim();
    const montant      = parseFloat(document.getElementById('ce-montant')?.value);
    if(!libelle) { showToast('Libellé obligatoire','warning'); return; }
    if(!montant||montant<=0) { showToast('Montant invalide','warning'); return; }
    // La contre-écriture est l'inverse du type original
    const typeCorrection = typeOriginal==='DEPENSE' ? 'RECETTE' : 'DEPENSE';
    if(!guardDouble('contre-ecriture')) return;
    const r = await apiPost({
        action       : 'ECRITURE_JOURNAL',
        idBande      : App.activeBande,
        typeEcriture : typeCorrection,
        categorie    : 'Correction',
        libelle      : '↩ ' + libelle,
        unite        : 'forfait',
        quantite     : 1,
        prixUnitaire : montant,
        montant      : montant,
        beneficiaire : 'Correction gérant'
    });
    if(r.success) { showToast('✅ Contre-écriture enregistrée','success'); Nav.back(); }
    else showToast(r.error||'Erreur','error');
}

/* ════════════════════════════════════════════
   RAPPORT PAR BANDE
   Alimenté par le journal uniquement
   Total dépenses · Total recettes · Solde
   Consultable en temps réel
════════════════════════════════════════════ */
async function renderRapportBande() {
    const z=zone(); if(!z) return;
    if(!App.activeBande) { showToast('Aucune bande active','warning'); return; }
    z.innerHTML=`<div style="text-align:center;padding:40px"><div class="spinner"></div></div>`;

    const d = await apiGet({action:'getJournal', idBande:App.activeBande});
    const lignes = d.success ? (d.ecritures||[]) : [];

    const totalDep = lignes.filter(l=>l.typeEcriture==='DEPENSE').reduce((s,l)=>s+(parseFloat(l.montant)||0),0);
    const totalRec = lignes.filter(l=>l.typeEcriture==='RECETTE').reduce((s,l)=>s+(parseFloat(l.montant)||0),0);
    const solde    = totalRec - totalDep;
    const soldeColor = solde >= 0 ? 'var(--green)' : 'var(--red)';

    // Regrouper par catégorie
    const parCat = {};
    lignes.forEach(l => {
        const cat = l.categorie || 'Autre';
        if(!parCat[cat]) parCat[cat] = {dep:0, rec:0};
        if(l.typeEcriture==='DEPENSE') parCat[cat].dep += parseFloat(l.montant)||0;
        else parCat[cat].rec += parseFloat(l.montant)||0;
    });

    const detailHTML = Object.entries(parCat)
        .sort((a,b) => (b[1].dep+b[1].rec)-(a[1].dep+a[1].rec))
        .map(([cat, v]) => `
            <div class="rapport-ligne">
                <span style="color:var(--text2)">${esc(cat)}</span>
                <span>
                    ${v.dep>0?`<span style="color:var(--red)">−${fmt(v.dep)}</span> `:' '}
                    ${v.rec>0?`<span style="color:var(--green)">+${fmt(v.rec)}</span>`:''}
                </span>
            </div>`).join('');

    // Données zootechnie depuis le dashboard
    const dash = App.data?.performance || {};
    const terrain = App.data?.terrain  || {};

    z.innerHTML=`
        <div class="bande-header">
            <div class="bande-name">📊 Rapport — ${esc(App.activeBande)}</div>
            <div class="bande-meta">Code bande · Mis à jour en temps réel · ${lignes.length} écriture${lignes.length>1?'s':''}</div>
        </div>

        <!-- Solde principal -->
        <div class="card" style="text-align:center;margin-bottom:12px;border:2px solid ${soldeColor}">
            <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Solde actuel</div>
            <div style="font-size:32px;font-weight:800;color:${soldeColor}">
                ${solde>=0?'+':''}${fmt(solde)} FCFA
            </div>
        </div>

        <!-- Total dépenses / recettes -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
            <div class="card" style="text-align:center;border-left:3px solid var(--red)">
                <div style="font-size:11px;color:var(--text2);margin-bottom:6px">📤 Total dépenses</div>
                <div style="font-size:18px;font-weight:800;color:var(--red)">−${fmt(totalDep)}</div>
                <div style="font-size:10px;color:var(--text2)">FCFA</div>
            </div>
            <div class="card" style="text-align:center;border-left:3px solid var(--green)">
                <div style="font-size:11px;color:var(--text2);margin-bottom:6px">📥 Total recettes</div>
                <div style="font-size:18px;font-weight:800;color:var(--green)">+${fmt(totalRec)}</div>
                <div style="font-size:10px;color:var(--text2)">FCFA</div>
            </div>
        </div>

        <!-- Détail par catégorie -->
        <div class="card" style="margin-bottom:12px">
            <div class="card-title">Détail par catégorie</div>
            ${detailHTML || '<div style="color:var(--text2);font-size:13px">Aucune écriture</div>'}
        </div>

        <button class="btn-action btn-green" onclick="partagerWhatsApp()">📲 Partager sur WhatsApp</button>`;
}

async function partagerWhatsApp(){
    const d = await apiGet({action:'getJournal', idBande:App.activeBande});
    const lignes = d.success ? (d.ecritures||[]) : [];
    const dep = lignes.filter(l=>l.typeEcriture==='DEPENSE').reduce((s,l)=>s+(parseFloat(l.montant)||0),0);
    const rec = lignes.filter(l=>l.typeEcriture==='RECETTE').reduce((s,l)=>s+(parseFloat(l.montant)||0),0);
    const sol = rec - dep;
    const perf = App.data?.performance || {};
    const today = new Date().toLocaleDateString('fr-FR');
    const txt = encodeURIComponent(
        '🐔 RAPPORT ' + App.activeBande + ' | 📅 ' + today + '\n\n'
        + '📊 FINANCE\n'
        + 'Dépenses : ' + fmt(dep) + ' FCFA\n'
        + 'Recettes  : ' + fmt(rec) + ' FCFA\n'
        + 'Solde     : ' + (sol>=0?'+':'') + fmt(sol) + ' FCFA\n\n'
        + '🐥 ZOOTECHNIE\n'
        + 'Effectif  : ' + (perf.effectif||'--') + ' sujets\n'
        + 'J+' + (perf.ageJours||0) + ' | ' + App.activeBande
    );
    window.open('https://wa.me/?text='+txt,'_blank');
}

async function renderAgent() {
    _majTopbar();

    z.innerHTML = `<div style="text-align:center;padding:60px 20px"><div class="spinner" style="width:36px;height:36px"></div><div style="color:var(--text2);font-size:14px;margin-top:12px">Chargement…</div></div>`;

    if (!App.activeBande) await chargerBandeActive();
    if (!App.activeBande) {
        z.innerHTML=`<div style="text-align:center;padding:40px 20px"><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-weight:800;font-size:15px;margin-bottom:8px">Aucune bande active</div><div style="color:var(--text2);font-size:13px;margin-bottom:20px">Le gérant n'a pas encore créé de bande en cours.</div><button class="btn-action btn-blue" onclick="renderAgent()">🔄 Actualiser</button></div>`;

        z.innerHTML=`<div style="text-align:center;padding:40px 20px"><div style="font-size:36px;margin-bottom:12px">📡</div><div style="font-weight:800;font-size:15px;margin-bottom:8px">Connexion impossible</div><div style="color:var(--text2);font-size:13px;margin-bottom:20px">${esc(d.error||'Vérifiez votre connexion réseau')}</div><button class="btn-action btn-blue" onclick="renderAgent()">🔄 Réessayer</button></div>`;
        return;
    }
    App.data = d;
    const perf    = d.performance     || {};
    const terrain = d.terrain         || {};
    const alertes = d.alertes         || [];
    const taches  = d.tachesAgent     || [];
    const sessionActive = d.sessionActuelle || detectSession();
    const sessionsCompletees = d.sessionsCompletees || [];

    const sessions=[
        {id:'Matin',label:'Matin', heure:'5H – 10H', icon:'🌅',nb:6},
        {id:'Midi', label:'Midi',  heure:'10H – 14H',icon:'☀️', nb:3},
        {id:'PM',   label:'PM',    heure:'14H – 19H',icon:'🌤️',nb:3},
        {id:'Nuit', label:'Nuit',  heure:'19H – 5H', icon:'🌙',nb:4},
    ];
    function progSession(sid) {
        if (_verrouSessionExists(sid)) return 'TERMINE';
        if (sessionsCompletees.includes(sid)) return 'TERMINE';
        if (sid === sessionActive) return 'EN_COURS';
        return 'ATTENTE';
    }
    const progIcon={TERMINE:'✅',EN_COURS:'⏳',ATTENTE:'○'};
    const progCls ={TERMINE:'var(--green)',EN_COURS:'var(--orange)',ATTENTE:'var(--text2)'};

    const tachesUrgentes     = taches.filter(t=>t.typeTache==='ABATTAGE'&&t.statut!=='TERMINEE'&&t.statut!=='COMPTABILISEE');
    const tachesOrdinaires   = taches.filter(t=>t.typeTache!=='ABATTAGE');
    const alertesCritiques   = alertes.filter(a=>a.niveau==='CRITIQUE');
    const mortColor = terrain.mortaliteJour>5?'var(--red)':terrain.mortaliteJour>0?'var(--orange)':'var(--green)';
    const stockColor= (perf.stockSacs||0)<=5?'var(--red)':'var(--green)';

    const sessionsHTML = sessions.map(s=>{
        const prog  = progSession(s.id);
        const actif = s.id === sessionActive;

            </div>
            <div style="font-size:20px;color:${progCls[prog]}">${progIcon[prog]}</div>
        </div>`;
    }).join('');

    const tachesOrdHTML = tachesOrdinaires.length ? `
        <div class="section-title">📋 Tâches assignées</div>
        ${tachesOrdinaires.map(t=>{
            const done = t.statut==='TERMINEE'||t.statut==='COMPTABILISEE'||localStorage.getItem('av_done_'+t.id)==='true';
            const c = t.typeTache==='HEBDO'?'orange':'blue';

            <div class="tache-card ${done?'accomplie':''}" id="tcard-${esc(t.id)}">
                <div class="tache-dot dot-${c}"></div>
                <div style="flex:1">
                    <div class="tache-titre">${esc(t.titre)}</div>
                    <div class="tache-meta">${esc(t.idBande)} · ${esc(t.date)}</div>
                </div>
                ${done
                    ? `<button class="btn-fait done">✅ FAIT</button>`
                    : `<button class="btn-fait" id="btn-fait-${esc(t.id)}"
                               onclick="_tachePremierAppui('${esc(t.id)}','${esc(t.titre)}')">À FAIRE</button>`}
            </div>`;
        }).join('')}` : '';

    z.innerHTML = `
        ${_banniereAgentValidations()}
        ${_banniereAgentNouvellesTaches()}
        ${alertesCritiques.length ? `
            <div class="section-title" style="color:var(--red)">🔴 Alertes critiques</div>
            ${alertesCritiques.map(a=>`
                <div class="alerte critique">
                    <div>🔴</div>
                    <div><div class="alerte-kpi">${esc(a.kpi)}</div><div class="alerte-msg">${esc(a.message)}</div></div>
                </div>`).join('')}` : ''}
        ${tachesUrgentes.length ? `
            <div class="section-title" style="color:var(--red)">⚠️ Urgent</div>
            ${tachesUrgentes.map(t=>`
                <div class="tache-card urgente" onclick="Nav.push('renderAbattage','${esc(t.id)}')" style="cursor:pointer">
                    <div class="tache-dot dot-red"></div>
                    <div style="flex:1"><div class="tache-titre">${esc(t.titre)}</div><div class="tache-meta">Appuyer pour commencer</div></div>
                    <span class="tache-badge tb-abattage">🔪 ABATTAGE</span>
                </div>`).join('')}` : ''}
        <div class="section-title">🐔 ${esc(App.activeBande)} · J${perf.ageJours||0}</div>
        <div class="kpi-row" style="margin-bottom:14px">
            <div class="kpi-box"><span class="kpi-val">${(perf.effectif||0).toLocaleString('fr')}</span><span class="kpi-label">Effectif</span></div>
            <div class="kpi-box"><span class="kpi-val" style="color:${stockColor}">${perf.stockSacs||0}</span><span class="kpi-label">Sacs stock</span></div>
            <div class="kpi-box"><span class="kpi-val" style="color:${mortColor}">${terrain.mortaliteJour||0}</span><span class="kpi-label">💀 Morts/jour</span></div>
        </div>
        <div class="section-title">Sessions du jour</div>
        ${sessionsHTML}
        ${tachesOrdHTML}`;
}
