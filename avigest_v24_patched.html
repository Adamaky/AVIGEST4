<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1b2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AviGest v24</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#0d1b2a; --bg2:#142233; --bg3:#1a2d40;
            --border:rgba(255,255,255,0.08); --text:#f0f4f8; --text2:#8fa8c0;
            --green:#00c896; --blue:#0099ff; --orange:#ff9d00; --red:#ff4444; --purple:#c084fc;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Lexend',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

        /* LOGIN */
        #login-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000}
        .login-logo{font-size:48px;margin-bottom:8px}
        .login-title{font-size:28px;font-weight:800;color:var(--text);letter-spacing:-0.5px}
        .login-subtitle{font-size:12px;color:var(--text2);margin-top:4px;margin-bottom:32px;text-transform:uppercase;letter-spacing:1.5px}
        .pin-display{display:flex;gap:14px;margin-bottom:36px}
        .pin-dot{width:18px;height:18px;border-radius:50%;background:var(--bg3);border:2px solid var(--border);transition:background 0.15s,border-color 0.15s,transform 0.15s}
        .pin-dot.filled{background:var(--blue);border-color:var(--blue);transform:scale(1.2)}
        .pin-pad{display:grid;grid-template-columns:repeat(3,72px);grid-template-rows:repeat(4,72px);gap:12px}
        .pin-key{width:72px;height:72px;border-radius:50%;border:none;background:var(--bg2);color:var(--text);font-family:'Lexend',sans-serif;font-size:22px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:background 0.12s,transform 0.1s;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none}
        .pin-key:active,.pin-key.pressed{background:var(--bg3);transform:scale(0.91)}
        .pin-key.key-clear{background:rgba(255,68,68,0.12);color:var(--red);font-size:16px}
        .pin-key.key-clear:active,.pin-key.key-clear.pressed{background:rgba(255,68,68,0.25)}
        .pin-key.key-ok{background:rgba(0,200,150,0.15);color:var(--green);font-size:16px;font-weight:800}
        .pin-key.key-ok:active,.pin-key.key-ok.pressed{background:rgba(0,200,150,0.3)}
        .pin-key.key-ok.ready{background:var(--green);color:#0d1b2a;box-shadow:0 0 20px rgba(0,200,150,0.4)}
        .pin-key.key-empty{background:transparent;cursor:default;pointer-events:none}
        .toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);color:var(--text);padding:12px 22px;border-radius:40px;font-size:13px;font-weight:600;z-index:99999;border:1px solid var(--border);opacity:0;transition:opacity 0.25s,transform 0.25s;white-space:nowrap;max-width:90vw;text-align:center}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
        .toast.error{background:var(--red);color:white;border-color:transparent}
        .toast.success{background:var(--green);color:#0d1b2a;border-color:transparent}
        .toast.warning{background:var(--orange);color:#0d1b2a;border-color:transparent}
        .login-loading{display:none;flex-direction:column;align-items:center;gap:16px;position:absolute}
        .login-loading.show{display:flex}
        .spinner{width:40px;height:40px;border:3px solid var(--bg3);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading-text{font-size:13px;color:var(--text2)}
        .pin-error-msg{height:20px;font-size:12px;color:var(--red);text-align:center;margin-top:-20px;margin-bottom:16px;opacity:0;transition:opacity 0.2s}
        .pin-error-msg.show{opacity:1}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
        .pin-display.shake{animation:shake 0.4s ease}

        /* APP */
        #app-main{display:none;min-height:100vh}
        .header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
        .header-left{display:flex;align-items:center;gap:8px}
        #btn-back{display:none;background:rgba(255,255,255,0.08);border:none;color:var(--text);font-size:22px;line-height:1;cursor:pointer;padding:4px 10px;border-radius:8px;font-family:inherit;transition:background 0.15s}
        #btn-back:active{background:rgba(255,255,255,0.18)}
        #tb-role{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px}
        #tb-name{font-size:14px;font-weight:700}
        .offline-indicator{display:none;background:var(--red);color:white;font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px}
        .offline-indicator.visible{display:inline-block}
        #btn-logout{background:rgba(255,68,68,0.12);border:1px solid rgba(255,68,68,0.35);color:var(--red);border-radius:10px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.15s,border-color 0.15s;-webkit-tap-highlight-color:transparent}
        #btn-logout:active{background:rgba(255,68,68,0.28);border-color:var(--red)}

        /* ROLE SCREEN */
        #role-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10001;padding:24px}
        .role-logo{font-size:48px;margin-bottom:8px}
        .role-title{font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px}
        .role-sub{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:40px}
        .role-btns{display:flex;gap:20px;margin-bottom:48px}
        .role-btn{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:transform 0.15s}
        .role-btn:active{transform:scale(0.92)}
        .role-btn-circle{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;border:2px solid transparent;transition:box-shadow 0.2s,border-color 0.2s}
        .role-btn-circle.gerant{background:rgba(96,165,250,0.15);border-color:rgba(96,165,250,0.35)}
        .role-btn-circle.agent{background:rgba(74,222,128,0.15);border-color:rgba(74,222,128,0.35)}
        .role-btn-circle.partenaire{background:rgba(192,132,252,0.15);border-color:rgba(192,132,252,0.35)}
        .role-btn-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px}
        .role-btn-sortir{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:transform 0.15s;opacity:0.7}
        .role-btn-sortir:active{transform:scale(0.92);opacity:1}
        .role-btn-sortir-circle{width:56px;height:56px;border-radius:50%;background:rgba(255,68,68,0.12);border:2px solid rgba(255,68,68,0.3);display:flex;align-items:center;justify-content:center;font-size:22px}
        .role-btn-sortir-label{font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:0.8px}

        /* SESSION ACTIVE */
        .tuile-session-active{border-color:rgba(0,153,255,0.5)!important;box-shadow:0 0 0 1px rgba(0,153,255,0.25),0 0 18px rgba(0,153,255,0.18);animation:session-glow 2.5s ease-in-out infinite}
        @keyframes session-glow{0%,100%{box-shadow:0 0 0 1px rgba(0,153,255,0.25),0 0 18px rgba(0,153,255,0.18)}50%{box-shadow:0 0 0 2px rgba(0,153,255,0.45),0 0 32px rgba(0,153,255,0.32)}}
        .session-active-badge{display:inline-block;font-size:9px;font-weight:800;color:#0d1b2a;background:var(--blue);padding:2px 8px;border-radius:20px;margin-left:8px;text-transform:uppercase;letter-spacing:0.5px;animation:pulse-badge 2s infinite}

        #app-container{padding:12px;max-width:500px;margin:0 auto;padding-bottom:24px}

        /* COMPOSANTS */
        .tuile{border-radius:18px;padding:18px 20px;margin-bottom:10px;display:flex;align-items:center;gap:16px;cursor:pointer;border:1px solid rgba(255,255,255,0.07);transition:transform 0.15s,opacity 0.15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}
        .tuile:active{transform:scale(0.97);opacity:0.85}
        .tuile-icon{font-size:28px;flex-shrink:0}
        .tuile-label{font-size:16px;font-weight:800}
        .tuile-sub{font-size:11px;opacity:0.7;margin-top:2px}
        .tuile-arrow{margin-left:auto;font-size:18px;opacity:0.4}
        .t-superviser{background:linear-gradient(135deg,#0d2240,#0a3060);border-color:rgba(96,165,250,0.2)}
        .t-planifier{background:linear-gradient(135deg,#0d2a1a,#0a3320);border-color:rgba(74,222,128,0.2)}
        .t-compta{background:linear-gradient(135deg,#2a1f0d,#3a2800);border-color:rgba(251,191,36,0.2)}
        .t-analyser{background:linear-gradient(135deg,#1e0d2a,#2a1040);border-color:rgba(192,132,252,0.2)}
        .t-bandes{background:linear-gradient(135deg,#2a0d1a,#3a1028);border-color:rgba(249,168,212,0.2)}
        .badge-alerte{background:var(--red);color:white;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;margin-left:8px;animation:pulse-badge 2s infinite}
        @keyframes pulse-badge{0%,100%{opacity:1}50%{opacity:0.6}}
        .section-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1.2px;margin:20px 4px 10px}
        .card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px}
        .card-title{font-size:13px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px}
        .bat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .bat-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:14px 12px;text-align:center;cursor:pointer;transition:transform 0.15s;-webkit-tap-highlight-color:transparent}
        .bat-card:active{transform:scale(0.95)}
        .bat-card.libre{border-style:dashed;opacity:0.6}
        .bat-card.encours{background:rgba(0,200,150,0.08);border-color:rgba(0,200,150,0.3)}
        .bat-card.cloture{background:rgba(255,157,0,0.08);border-color:rgba(255,157,0,0.3)}
        .bat-num{font-size:10px;color:var(--text2);font-weight:600;margin-bottom:4px}
        .bat-icon{font-size:22px;margin-bottom:4px}
        .bat-name{font-size:12px;font-weight:700}
        .bat-info{font-size:10px;color:var(--text2);margin-top:3px}
        .bat-statut{font-size:10px;font-weight:700;margin-top:4px}
        .bat-statut.encours{color:var(--green)}
        .bat-statut.libre{color:var(--text2)}
        .bat-statut.cloture{color:var(--orange)}
        .kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
        .kpi-box{background:var(--bg3);border-radius:12px;padding:12px 8px;text-align:center;border:1px solid var(--border)}
        .kpi-val{font-size:20px;font-weight:800;display:block}
        .kpi-label{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;margin-top:3px;display:block}
        .prog-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:6px}
        .prog-fill{height:100%;border-radius:3px;background:var(--green);transition:width 0.5s}
        .prog-fill.orange{background:var(--orange)}
        .prog-fill.red{background:var(--red)}
        .tache-card{background:var(--bg3);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;border:1px solid var(--border)}
        .tache-card.urgente{border-color:rgba(255,68,68,0.35);background:rgba(255,68,68,0.05)}
        .tache-card.done{opacity:0.5}
        .tache-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
        .tache-dot.red{background:var(--red)}
        .tache-dot.orange{background:var(--orange)}
        .tache-dot.green{background:var(--green)}
        .tache-dot.blue{background:var(--blue)}
        .tache-titre{font-size:13px;font-weight:700;flex:1}
        .tache-meta{font-size:10px;color:var(--text2);margin-top:2px}
        .tache-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;white-space:nowrap}
        .tache-badge.abattage{background:rgba(255,68,68,0.2);color:var(--red)}
        .tache-badge.quotidien{background:rgba(0,153,255,0.2);color:var(--blue)}
        .tache-badge.hebdo{background:rgba(255,157,0,0.2);color:var(--orange)}
        .tache-badge.cloture{background:rgba(192,132,252,0.2);color:var(--purple)}
        .alerte{border-radius:12px;padding:11px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;font-size:12px}
        .alerte.critique{background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.25)}
        .alerte.warning{background:rgba(255,157,0,0.08);border:1px solid rgba(255,157,0,0.25)}
        .alerte-kpi{font-weight:800;font-size:11px}
        .alerte.critique .alerte-kpi{color:var(--red)}
        .alerte.warning .alerte-kpi{color:var(--orange)}
        .alerte-msg{color:var(--text2);margin-top:2px;line-height:1.4}
        .btn-action{width:100%;padding:14px;border:none;border-radius:14px;font-family:'Lexend',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;transition:opacity 0.15s,transform 0.1s;-webkit-tap-highlight-color:transparent}
        .btn-action:active{transform:scale(0.97);opacity:0.85}
        .btn-green{background:var(--green);color:#0d1b2a}
        .btn-blue{background:var(--blue);color:white}
        .btn-orange{background:var(--orange);color:#0d1b2a}
        .btn-red{background:var(--red);color:white}
        .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
        .journal-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px}
        .journal-row:last-child{border-bottom:none}
        .journal-cat{color:var(--text2);flex:1}
        .journal-mont{font-weight:800}
        .journal-mont.dep{color:var(--red)}
        .journal-mont.rec{color:var(--green)}
        .form-step{display:none}
        .form-step.active{display:block}
        .form-step-title{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;font-weight:700}
        .form-choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
        .choice-btn{padding:20px 12px;border-radius:16px;border:2px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Lexend',sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:border-color 0.15s,background 0.15s;-webkit-tap-highlight-color:transparent}
        .choice-btn:active,.choice-btn.selected{border-color:var(--blue);background:rgba(0,153,255,0.1)}
        .choice-btn .choice-icon{font-size:24px;display:block;margin-bottom:6px}
        .f-input{width:100%;padding:13px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Lexend',sans-serif;font-size:15px;margin-bottom:10px;outline:none;transition:border-color 0.15s}
        .f-input:focus{border-color:var(--blue)}
        .f-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.8px;font-weight:700;margin-bottom:6px;display:block}
        .stepper{display:flex;gap:6px;margin-bottom:20px}
        .step-dot{flex:1;height:3px;border-radius:2px;background:var(--bg3);transition:background 0.3s}
        .step-dot.active{background:var(--blue)}
        .step-dot.done{background:var(--green)}
        .rapport-section{margin-bottom:16px}
        .rapport-titre{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
        .rapport-ligne{display:flex;justify-content:space-between;font-size:13px;padding:5px 0}
        .rapport-ligne span:last-child{font-weight:700}
        .bande-header{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px}
        .bande-name{font-size:18px;font-weight:800}
        .bande-meta{font-size:11px;color:var(--text2);margin-top:4px}
        .user-item{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--bg3);border-radius:12px;margin-bottom:6px;border:1px solid var(--border)}
        .user-name{font-size:13px;font-weight:700}
        .user-pin{font-size:10px;color:var(--text2);font-family:monospace;margin-top:2px}
        .user-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:8px}
        .badge-actif{background:rgba(0,200,150,0.2);color:var(--green)}
        .badge-inactif{background:rgba(255,68,68,0.2);color:var(--red)}
        .badge-gerant{background:rgba(96,165,250,0.2);color:#60a5fa}
        .badge-agent{background:rgba(74,222,128,0.2);color:#4ade80}
        .badge-partenaire{background:rgba(192,132,252,0.2);color:var(--purple)}
        .vente-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
        .vente-top{display:flex;justify-content:space-between;align-items:center}
        .vente-nom{font-size:13px;font-weight:700}
        .vente-mont{font-size:15px;font-weight:800;color:var(--green)}
        .vente-meta{font-size:10px;color:var(--text2);margin-top:4px}
        .vente-statut{font-size:9px;font-weight:700;padding:2px 8px;border-radius:8px;margin-top:6px;display:inline-block}
        .vs-solde{background:rgba(0,200,150,0.2);color:var(--green)}
        .vs-partiel{background:rgba(255,157,0,0.2);color:var(--orange)}
        .vs-attente{background:rgba(0,153,255,0.2);color:var(--blue)}
        .vs-retard{background:rgba(255,68,68,0.2);color:var(--red)}
        .fab-ligne{display:flex;gap:8px;margin-bottom:8px;align-items:center}
        .fab-ligne .f-input{margin-bottom:0;flex:1}
        .fab-total{display:flex;justify-content:space-between;padding:12px;background:var(--bg3);border-radius:12px;margin-top:8px;font-weight:700}
        .phase-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg3);border-radius:12px;margin-bottom:8px;border:1px solid var(--border)}
        .phase-icon{font-size:20px;flex-shrink:0}
        .phase-name{font-size:13px;font-weight:700}
        .phase-date{font-size:10px;color:var(--text2);margin-top:2px}
        .phase-statut-badge{margin-left:auto;font-size:9px;font-weight:700;padding:3px 9px;border-radius:8px}
        .ps-validee{background:rgba(0,200,150,0.2);color:var(--green)}
        .ps-encours{background:rgba(0,153,255,0.2);color:var(--blue)}
        .ps-attente{background:rgba(255,255,255,0.06);color:var(--text2)}
        .chart-placeholder{background:var(--bg3);border:1px solid var(--border);border-radius:14px;height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text2);font-size:12px;margin-bottom:10px}
        .chart-placeholder span:first-child{font-size:28px}
    </style>
</head>
<body>

<!-- ÉCRAN SÉLECTION RÔLE -->
<div id="role-screen">
    <div class="role-logo">🐔</div>
    <div class="role-title">AviGest</div>
    <div class="role-sub">Qui êtes-vous ?</div>
    <div class="role-btns">
        <div class="role-btn" onclick="choisirRole('GERANT')">
            <div class="role-btn-circle gerant">🧑‍💼</div>
            <span class="role-btn-label">Gérant</span>
        </div>
        <div class="role-btn" onclick="choisirRole('AGENT')">
            <div class="role-btn-circle agent">👷</div>
            <span class="role-btn-label">Agent</span>
        </div>
        <div class="role-btn" onclick="choisirRole('PARTENAIRE')">
            <div class="role-btn-circle partenaire">🤝</div>
            <span class="role-btn-label">Partenaire</span>
        </div>
    </div>
    <div class="role-btn-sortir" onclick="doLogoutFromRole()">
        <div class="role-btn-sortir-circle">🚪</div>
        <span class="role-btn-sortir-label">Sortir</span>
    </div>
</div>

<!-- ÉCRAN LOGIN PIN -->
<div id="login-screen" style="display:none">
    <div class="login-logo">🐔</div>
    <div class="login-title">AviGest</div>

        <button class="pin-key" onclick="pinTap('5')">5</button>
        <button class="pin-key" onclick="pinTap('6')">6</button>
        <button class="pin-key" onclick="pinTap('7')">7</button>

<!-- APP PRINCIPALE -->
<div id="app-main">
    <div class="header">
        <div class="header-left">
            <button id="btn-back" onclick="Nav.back()">‹</button>
            <div>
                <div id="tb-role">--</div>
                <div id="tb-name">--</div>
            </div>
        </div>
        <div>
            <span class="offline-indicator" id="offline-badge">📴 HORS LIGNE</span>
        </div>
        <button id="btn-logout" onclick="doLogout()">🚪 Sortir</button>
    </div>
    <div id="app-container"></div>
</div>

<div class="toast" id="toast-global"></div>

<script>
'use strict';

/* ════════════════════════════════════════════
   ÉTAGE 1 — VARIABLES GLOBALES
════════════════════════════════════════════ */
const API         = 'https://script.google.com/macros/s/AKfycbxN3dVH77nGS4YWzHtryqmeVQKf8inqBlyIp7tV6-VJZ2Y0Pt1rG1UkWujQIP7dIESV-g/exec';
const SESSION_MS  = 12 * 3600 * 1000;
const TIMEOUT_MS  = 10000;
const MAX_RETRY   = 3;

const App = {
    token:       localStorage.getItem('av_token')  || null,
    role:        localStorage.getItem('av_role')   || null,
    nom:         localStorage.getItem('av_nom')    || '',
    idPart:      localStorage.getItem('av_idpart') || '',
    loginTime:   parseInt(localStorage.getItem('av_lt') || '0'),
    activeBande: localStorage.getItem('av_bande')  || '',
    data:        {},
    clients:     [],
    batiments:   [],
    isOnline:    navigator.onLine,
    offlineQueue: JSON.parse(localStorage.getItem('av_queue') || '[]'),
    _saisie:     {},
    _fabLignes:  [],
    _session:    { id: null, etapeIdx: 0, reponses: {} },
    _abattage:   { etape: 1, poidsEntier: null, poidsGesier: null, nbAbattu: null },
    _pavBuffers: {}
};

/* ════════════════════════════════════════════
   ÉTAGE 2 — UTILITAIRES PURS
════════════════════════════════════════════ */
function esc(t) {
    if (t == null) return '';
    return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                    .replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/\//g,'&#x2F;');
}
function fmt(n) {
    return Math.round(n||0).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'\u00a0');
}
let _toastTimer = null;
function showToast(msg, type='info', duration=3000) {
    const el = document.getElementById('toast-global');
    if (!el) return;
    if (_toastTimer) clearTimeout(_toastTimer);
    el.textContent = msg;
    el.className   = 'toast ' + type + ' show';
    _toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}
function setLoad(btn, loading) {
    if (!btn) return;
    if (loading) { btn.dataset.orig = btn.innerHTML; btn.innerHTML = '⏳'; btn.disabled = true; }
    else { btn.innerHTML = btn.dataset.orig || btn.innerHTML; btn.disabled = false; }
}
const _guards = new Set();
function guardDouble(key) {
    if (_guards.has(key)) { showToast('Opération en cours…','warning'); return false; }
    _guards.add(key);
    setTimeout(() => _guards.delete(key), 3000);
    return true;
}
function sanitizeNum(v, min=0, max=Infinity) {
    const n = parseFloat(v);
    if (isNaN(n) || n < min || n > max) return null;
    return n;
}
function detectSession() {
    const h = new Date().getHours();
    if (h >= 5  && h < 10) return 'Matin';
    if (h >= 10 && h < 14) return 'Midi';
    if (h >= 14 && h < 19) return 'PM';
    return 'Nuit';
}

/* ════════════════════════════════════════════
   ÉTAGE 3 — SÉCURITÉ & SESSION
════════════════════════════════════════════ */
function isSessionValid() {
    if (!App.token || !App.loginTime) return false;
    return (Date.now() - App.loginTime) < SESSION_MS;
}
function handleExpired() {
    showToast('Session expirée. Reconnectez-vous.','error',4000);
    setTimeout(() => {
        localStorage.removeItem('av_token'); localStorage.removeItem('av_lt');
        App.token = null; App.loginTime = 0; location.reload();
    }, 2500);
}
let _warnedExpiry = false;
setInterval(() => {
    if (!App.loginTime) return;
    const remaining = SESSION_MS - (Date.now() - App.loginTime);
    if (remaining < 3_600_000 && !_warnedExpiry) { _warnedExpiry = true; showToast("⚠️ Session expire dans moins d'1h",'warning',6000); }
    if (remaining <= 0) handleExpired();
}, 60_000);

/* ════════════════════════════════════════════
   ÉTAGE 4 — RÉSEAU & API
════════════════════════════════════════════ */
async function fetchT(url, opts={}, ms=TIMEOUT_MS) {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), ms);
    try { const r = await fetch(url, {...opts, signal: ctrl.signal}); clearTimeout(tid); return r; }
    catch(e) { clearTimeout(tid); if (e.name==='AbortError') throw new Error('TIMEOUT'); throw e; }
}
async function apiGet(params={}) {
    if (params.action !== 'login' && !isSessionValid()) { handleExpired(); return {success:false}; }
    const url = new URL(API);
    if (App.token) url.searchParams.set('token', App.token);
    Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
    try {
        const r = await fetchT(url.toString());
        if (!r.ok) throw new Error('HTTP '+r.status);
        const d = await r.json();
        if (d.error && d.error.includes('Session')) { handleExpired(); return {success:false}; }
        return d;
    } catch(e) {
        if (e.message==='TIMEOUT') showToast('Connexion lente — données en cache','warning');
        return (App.data && App.data.success) ? App.data : {success:false, error:e.message};
    }
}
async function apiPost(payload) {
    if (!isSessionValid()) { handleExpired(); return {success:false}; }
    payload.token = App.token;
    if (!App.isOnline) { queueRequest(payload); return {success:true, queued:true}; }
    for (let i = 1; i <= MAX_RETRY; i++) {
        try {
            const r = await fetchT(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
            if (!r.ok) throw new Error('HTTP '+r.status);
            const d = await r.json();
            if (d.error && d.error.includes('Session')) { handleExpired(); return {success:false}; }
            return d;
        } catch(e) {
            if (i < MAX_RETRY) { showToast('Réseau lent · Tentative '+(i+1)+'/'+MAX_RETRY+'…','warning',2000); await new Promise(res=>setTimeout(res,1500*i)); }
        }
    }
    queueRequest(payload); return {success:true, queued:true};
}
function queueRequest(payload) {
    const p = {...payload}; delete p.token;
    App.offlineQueue.push({payload:p, ts:Date.now()});
    localStorage.setItem('av_queue', JSON.stringify(App.offlineQueue));
    updateOffline(); showToast('📴 Donnée sauvegardée localement','warning');
}
async function processQueue() {
    if (!App.offlineQueue.length || !App.isOnline || App.isSyncing) return;
    if (!isSessionValid()) { showToast('Session expirée — reconnectez-vous pour sync','warning',5000); return; }
    App.isSyncing = true;
    showToast('Synchronisation de '+App.offlineQueue.length+' enregistrement(s)…','info');
    const failed = [];
    for (const item of App.offlineQueue) {
        try {
            const r = await fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({...item.payload, token:App.token})});
            const d = await r.json();
            if (!d.success && d.error && d.error.includes('Session')) failed.push(item);
        } catch { failed.push(item); }
    }
    App.offlineQueue = failed; localStorage.setItem('av_queue', JSON.stringify(failed));
    App.isSyncing = false; updateOffline();
    if (!failed.length) showToast('✅ Toutes les données synchronisées','success');
    else showToast(failed.length+' élément(s) en attente','warning');
}
function updateOffline() {
    const badge = document.getElementById('offline-badge');
    if (badge) badge.className = 'offline-indicator'+(App.isOnline?'':' visible');
}
window.addEventListener('online',  () => { App.isOnline=true;  updateOffline(); showToast('🌐 Connexion rétablie','success'); processQueue(); });
window.addEventListener('offline', () => { App.isOnline=false; updateOffline(); showToast('📴 Mode hors ligne activé','warning'); });

/* ════════════════════════════════════════════
   ÉTAGE 5 — NAVIGATION
════════════════════════════════════════════ */
const Nav = {
    stack: [],
    push(fn, params) { Nav.stack.push({fn,params}); Nav._run(fn,params); Nav._upBtn(); },
    back() {
        if (Nav.stack.length <= 1) { Nav.stack=[]; renderHome(); Nav._upBtn(); return; }
        Nav.stack.pop(); const prev = Nav.stack[Nav.stack.length-1];
        Nav._run(prev.fn, prev.params); Nav._upBtn();
    },
    home() { Nav.stack=[]; renderHome(); Nav._upBtn(); },
    replace(fn, params) {
        if (Nav.stack.length) Nav.stack[Nav.stack.length-1]={fn,params}; else Nav.stack.push({fn,params});
        Nav._run(fn,params); Nav._upBtn();
    },
    _run(fn, params) {
        try { if (typeof window[fn]==='function') window[fn](params); else { console.error('Nav: fonction inconnue:',fn); renderHome(); } }
        catch(e) { console.error('Nav error ('+fn+'):', e); showToast("Erreur d'affichage",'error'); }
    },
    _upBtn() { const btn=document.getElementById('btn-back'); if(btn) btn.style.display=Nav.stack.length>1?'inline-block':'none'; }
};
function zone() { return document.getElementById('app-container'); }

/* ════════════════════════════════════════════
   ÉTAGE 6 — LOGIN
════════════════════════════════════════════ */
let _pin = '';
let _loginBusy = false;

function pinTap(digit) {
    if (_loginBusy || _pin.length >= 4) return;
    _pin += digit; _updateDots();
    if (_pin.length === 4) document.getElementById('key-ok').classList.add('ready');
    _hideError();
}
function pinDel() {
    if (_loginBusy || !_pin.length) return;
    _pin = _pin.slice(0,-1);
    document.getElementById('key-ok').classList.remove('ready');
    _updateDots(); _hideError();
}
function _updateDots() {
    for (let i=0;i<4;i++) { const d=document.getElementById('dot-'+i); if(d) d.classList.toggle('filled',i<_pin.length); }
}
function _showError(msg) {
    const e=document.getElementById('pin-error-msg'), d=document.getElementById('pin-display');
    if(e){e.textContent=msg;e.classList.add('show');}
    if(d){d.classList.add('shake');setTimeout(()=>d.classList.remove('shake'),450);}
}
function _hideError() { const e=document.getElementById('pin-error-msg'); if(e) e.classList.remove('show'); }

async function doLogin() {
    if (_loginBusy) return;
    if (_pin.length !== 4) { _showError('Saisissez 4 chiffres'); return; }
    if (!guardDouble('login')) return;
    _loginBusy = true;
    document.getElementById('login-loading').classList.add('show');
    try {
        const res = await fetchT(API+'?action=login&pin='+_pin);
        if (!res.ok) throw new Error('HTTP '+res.status);
        const d = await res.json();
        if (d.success) {
            App.token=d.token; App.role=d.role; App.nom=d.nom||''; App.idPart=d.idPartenaire||''; App.loginTime=Date.now();
            localStorage.setItem('av_token',d.token); localStorage.setItem('av_role',d.role);
            localStorage.setItem('av_nom',d.nom||''); localStorage.setItem('av_idpart',d.idPartenaire||'');
            localStorage.setItem('av_lt',String(App.loginTime));
            document.getElementById('login-screen').style.display='none';
            document.getElementById('app-main').style.display='block';
            startApp();
        } else { _showError(d.error||'PIN incorrect'); _pin=''; _updateDots(); document.getElementById('key-ok').classList.remove('ready'); }
    } catch(e) { _showError('Erreur réseau — réessayez'); console.error('doLogin error:',e); }
    finally { _loginBusy=false; document.getElementById('login-loading').classList.remove('show'); }
}
async function doLogout() {
    try { await apiGet({action:'logout'}); } catch(_) {}
    ['av_token','av_role','av_nom','av_idpart','av_lt'].forEach(k=>localStorage.removeItem(k));
    App.token=null; App.role=null; App.nom=''; App.loginTime=0; location.reload();
}
function choisirRole(role) {
    const labels={GERANT:'🧑‍💼 Gérant — entrez votre PIN',AGENT:'👷 Agent — entrez votre PIN',PARTENAIRE:'🤝 Partenaire — entrez votre PIN'};
    const labelEl=document.getElementById('login-role-label');
    if(labelEl) labelEl.textContent=labels[role]||'Entrez votre PIN';
    _pin=''; _updateDots(); document.getElementById('key-ok').classList.remove('ready');
    document.getElementById('role-screen').style.display='none';
    document.getElementById('login-screen').style.display='flex';
}
async function doLogoutFromRole() {
    if (App.token) {
        try { await apiGet({action:'logout'}); } catch(_) {}
        ['av_token','av_role','av_nom','av_idpart','av_lt'].forEach(k=>localStorage.removeItem(k));
        App.token=null; App.role=null; App.nom=''; App.loginTime=0; showToast('✅ Déconnecté','success',2000);
    }
    setTimeout(()=>location.reload(), 400);
}

/* ════════════════════════════════════════════
   ÉTAGE 7 — FONCTIONS MÉTIER
════════════════════════════════════════════ */

/* ── Navigation principale ── */
function _majTopbar() {
    const r=document.getElementById('tb-role'), n=document.getElementById('tb-name');
    if(r) r.textContent=App.role||'--';
    if(n) n.textContent=App.nom||'--';
}
function renderHome() {
    _majTopbar();
    const fn = App.role==='GERANT' ? 'renderGerant' : App.role==='AGENT' ? 'renderAgent' : 'renderPartenaire';
    Nav.stack=[{fn,params:null}]; Nav._upBtn();
    window[fn]();
}

/* ════════════════════════════════════════════
   GÉRANT — ACCUEIL (données API réelles)
   PATCH v24 : branché sur apiGet dashboard
════════════════════════════════════════════ */
async function renderGerant() {
    _majTopbar();
    const z = zone(); if (!z) return;

    if (!App.batiments.length) {
        const bd = await apiGet({action:'getBatiments'});
        if (bd.success) App.batiments = bd.batiments || [];
    }

    let idBande = App.activeBande;
    if (!idBande && App.batiments.length) {
        const enc = App.batiments.find(b => b.statut === 'EN COURS');
        if (enc) { idBande = enc.idBande; App.activeBande = idBande; localStorage.setItem('av_bande', idBande); }
    }

    let kpis = { effectif:0, mortJour:0, stockSacs:'—', margeNette:0 };
    let nbAlertes = 0, nbTaches = 0;

    if (idBande) {
        const d = await apiGet({action:'dashboard', idBande:idBande});
        if (d.success) {
            App.data      = d;
            kpis.effectif  = d.performance?.effectif     || 0;
            kpis.mortJour  = d.terrain?.mortaliteJour    || 0;
            kpis.stockSacs = d.performance?.stockSacs    ?? '—';
            kpis.margeNette= d.finance?.solde            || 0;
            nbAlertes      = (d.alertes||[]).filter(a=>a.niveau==='CRITIQUE').length;
            nbTaches       = (d.tachesAgent||[]).filter(t=>t.statut==='A FAIRE').length;
        }
    }

    const mortColor  = kpis.mortJour > 5 ? 'var(--red)' : kpis.mortJour > 0 ? 'var(--orange)' : 'var(--text)';
    const margeColor = kpis.margeNette >= 0 ? 'var(--green)' : 'var(--red)';
    const stockColor = (typeof kpis.stockSacs==='number' && kpis.stockSacs<=5) ? 'var(--red)' : 'var(--text)';

    z.innerHTML = `
        <div class="section-title">Tableau de bord — ${esc(idBande||'Aucune bande active')}</div>

        <div class="kpi-row">
            <div class="kpi-box">
                <span class="kpi-val">${kpis.effectif.toLocaleString('fr')}</span>
                <span class="kpi-label">Effectif</span>
            </div>
            <div class="kpi-box">
                <span class="kpi-val" style="color:${mortColor}">${kpis.mortJour}</span>
                <span class="kpi-label">💀 Morts/jour</span>
            </div>
            <div class="kpi-box">
                <span class="kpi-val" style="color:${stockColor}">${kpis.stockSacs}</span>
                <span class="kpi-label">Sacs stock</span>
            </div>
        </div>
        <div class="kpi-row" style="margin-bottom:16px">
            <div class="kpi-box" style="grid-column:span 3">
                <span class="kpi-val" style="color:${margeColor}">
                    ${kpis.margeNette>=0?'+':''}${fmt(kpis.margeNette)} FCFA
                </span>
                <span class="kpi-label">Marge nette</span>
            </div>
        </div>

        <div class="section-title">Actions</div>

        <div class="tuile t-superviser" onclick="Nav.push('renderSuperviser',null)">
            <div class="tuile-icon">👁️</div>
            <div>
                <div class="tuile-label">Superviser
                    ${nbAlertes>0?`<span class="badge-alerte">${nbAlertes} alerte${nbAlertes>1?'s':''}</span>`:''}
                </div>
                <div class="tuile-sub">Terrain · Mortalité · Alertes · Tâches</div>
            </div>
            <div class="tuile-arrow">›</div>
        </div>

        <div class="tuile t-planifier" onclick="Nav.push('renderPlanifier',null)">
            <div class="tuile-icon">📋</div>
            <div>
                <div class="tuile-label">Planifier
                    ${nbTaches>0?`<span class="badge-alerte" style="background:var(--blue)">${nbTaches}</span>`:''}
                </div>
                <div class="tuile-sub">Créer tâches · Abattage · Clôture</div>
            </div>
            <div class="tuile-arrow">›</div>
        </div>

        <div class="tuile t-compta" onclick="Nav.push('renderCompta',null)">
            <div class="tuile-icon">💰</div>
            <div>
                <div class="tuile-label">Comptabilité</div>
                <div class="tuile-sub">Journal · Ventes · Fabrication · Rapport</div>
            </div>
            <div class="tuile-arrow">›</div>
        </div>

        <div class="tuile t-analyser" onclick="Nav.push('renderAnalyser',null)">
            <div class="tuile-icon">📈</div>
            <div>
                <div class="tuile-label">Analyser</div>
                <div class="tuile-sub">Coûts · Croissance · Coût/kg</div>
            </div>
            <div class="tuile-arrow">›</div>
        </div>

        <div class="tuile t-bandes" onclick="Nav.push('renderGererBandes',null)">
            <div class="tuile-icon">🐔</div>
            <div>
                <div class="tuile-label">Gérer les bandes</div>
                <div class="tuile-sub">6 poulaillers · Utilisateurs · Partenaires</div>
            </div>
            <div class="tuile-arrow">›</div>
        </div>`;
}

/* ════════════════════════════════════════════
   GÉRANT — SUPERVISER (données API réelles)
   PATCH v24 : mortalité détaillée matin/soir
════════════════════════════════════════════ */
async function renderSuperviser() {
    const z = zone(); if (!z) return;
    z.innerHTML = `<div style="text-align:center;padding:40px 20px"><div style="font-size:28px">⏳</div><div style="color:var(--text2);font-size:13px;margin-top:8px">Chargement supervision…</div></div>`;

    let idBande = App.activeBande;
    if (!idBande && App.batiments.length) {
        const enc = App.batiments.find(b=>b.statut==='EN COURS');
        if (enc) idBande = enc.idBande;
    }
    if (!idBande) { z.innerHTML=`<div style="padding:20px;color:var(--text2);text-align:center">Aucune bande EN COURS.</div>`; return; }

    const d = await apiGet({action:'dashboard', idBande:idBande});
    if (!d.success) { z.innerHTML=`<div style="padding:20px;color:var(--red);text-align:center">Erreur : ${esc(d.error||'Connexion impossible')}</div>`; return; }

    App.data = d;
    const terrain = d.terrain     || {};
    const perf    = d.performance || {};
    const alertes = d.alertes     || [];
    const taches  = d.tachesAgent || [];
    const tachesG = d.tachesGestion || [];

    const mortJour  = terrain.mortaliteJour  || 0;
    const mortMatin = terrain.mortaliteMatin || 0;
    const mortSoir  = terrain.mortaliteSoir  || 0;
    const mortColor = mortJour > 5 ? 'var(--red)' : mortJour > 0 ? 'var(--orange)' : 'var(--green)';

    const alertesHTML = alertes.map(a=>`
        <div class="alerte ${a.niveau.toLowerCase()}">
            <div>${a.niveau==='CRITIQUE'?'🔴':'🟡'}</div>
            <div>
                <div class="alerte-kpi">${esc(a.kpi)}</div>
                <div class="alerte-msg">${esc(a.message)}</div>
            </div>
        </div>`).join('');

    const tachesHTML = taches.map(t=>{
        const done = t.statut==='TERMINEE'||t.statut==='COMPTABILISEE';
        const c    = t.typeTache==='ABATTAGE'?'red':t.typeTache==='HEBDO'?'orange':'blue';
        return `
        <div class="tache-card ${t.typeTache==='ABATTAGE'?'urgente':''} ${done?'done':''}">
            <div class="tache-dot ${c}"></div>
            <div style="flex:1">
                <div class="tache-titre">${esc(t.titre)}</div>
                <div class="tache-meta">${esc(t.idBande)} · ${esc(t.date)}</div>
            </div>
            <span class="tache-badge ${t.typeTache.toLowerCase()}">${esc(t.typeTache)}</span>
        </div>`;

async function validerCreerTache(type) {
    const titre = document.getElementById('tache-titre')?.value.trim();
    const date  = document.getElementById('tache-date')?.value;
    const bande = document.getElementById('tache-bande')?.value;
    if (!titre) { showToast('Le titre est obligatoire','warning'); return; }
    if (!date)  { showToast('La date est obligatoire','warning'); return; }
    if (!bande) { showToast('Sélectionnez une bande','warning'); return; }
    const r = await apiPost({action:'CREER_TACHE', titre, date, idBande:bande, typeTache:type});
    if (r.success) { showToast('✅ Tâche créée','success'); Nav.back(); }
    else showToast(r.error||'Erreur création tâche','error');
}

function jrnChoisirType(type) {
    App._saisie.type=type;
    document.getElementById('jchoix-dep')?.classList.toggle('selected',type==='DEPENSE');
    document.getElementById('jchoix-rec')?.classList.toggle('selected',type==='RECETTE');
    jrnStep(2);
}
function jrnChoisirUnite(u) { App._saisie.unite=u; jrnStep(4); }
function jrnStep(n) {
    for(let i=1;i<=5;i++){
        const f=document.getElementById('jstep-form-'+i), d=document.getElementById('jstep-'+i);
        if(f) f.classList.toggle('active',i===n);
        if(d){ d.classList.remove('active','done'); if(i===n) d.classList.add('active'); else if(i<n) d.classList.add('done'); }
    }
    if(n===5) _jrnBuildResume();
}
function _jrnBuildResume() {
    const s=App._saisie;
    const q=parseFloat(document.getElementById('jrn-qte')?.value||'0');
    const p=parseFloat(document.getElementById('jrn-pu')?.value||'0');
    const m=parseFloat(document.getElementById('jrn-montant')?.value||'0');
    s.montant=m||(q*p)||0; s.libelle=document.getElementById('jrn-libelle')?.value||'';
    const el=document.getElementById('jrn-resume'); if(!el) return;
    el.innerHTML=`
        <div class="rapport-ligne"><span>Type</span><span>${esc(s.type)}</span></div>
        <div class="rapport-ligne"><span>Libellé</span><span>${esc(s.libelle)}</span></div>
        <div class="rapport-ligne"><span>Unité</span><span>${esc(s.unite)}</span></div>
        <div class="rapport-ligne"><span>Montant</span>
            <span style="color:${s.type==='DEPENSE'?'var(--red)':'var(--green)'};font-size:16px">
                ${s.type==='DEPENSE'?'−':'+'}${fmt(s.montant)} FCFA
            </span>
        </div>`;
}

    const s=App._saisie;

    const benef=document.getElementById('jrn-benef')?.value||'';
    const r=await apiPost({action:'ECRITURE_JOURNAL',idBande:App.activeBande,typeEcriture:s.type,categorie:s.libelle,unite:s.unite,montant:s.montant,beneficiaire:benef});

}

function fabAjouterLigne(){App._fabLignes.push({nom:'',qte:'',pu:''});_renderFabForm();}
function fabCalculer(){
    let kg=0,f=0;App._fabLignes.forEach(l=>{const q=parseFloat(l.qte)||0,p=parseFloat(l.pu)||0;kg+=q;f+=q*p;});
    const el=document.getElementById('fab-total');
    if(el) el.innerHTML=`<span>${fmt(kg)} kg</span><span>${fmt(f)} FCFA · ${kg>0?fmt(Math.round(f/kg)):'—'} F/kg</span>`;
    showToast('Calcul mis à jour','success');
}
async function fabValider(){
    const stade=document.getElementById('fab-stade')?.value;
    const bande=document.getElementById('fab-bande')?.value||App.activeBande;
    let kg=0,f=0;App._fabLignes.forEach(l=>{const q=parseFloat(l.qte)||0,p=parseFloat(l.pu)||0;kg+=q;f+=q*p;});
    if(!kg||!f){showToast('Ajoutez au moins un ingrédient avec quantité et prix','warning');return;}
    const lignes=App._fabLignes.filter(l=>l.nom&&parseFloat(l.qte)>0).map(l=>({nom:l.nom,typeLigne:'INGREDIENT',unite:'kg',quantite:parseFloat(l.qte),prixUnitaire:parseFloat(l.pu)||0}));
    const r=await apiPost({action:'CREER_LOT_FAB',idBande:bande,stade,kgTotal:kg,lignes});
    if(r.success){showToast('✅ Lot enregistré — '+r.coutParKg+' FCFA/kg','success');Nav.back();}
    else showToast(r.error||'Erreur','error');
}

/* ════════════════════════════════════════════
   AGENT — AUTO-SÉLECTION BANDE + DASHBOARD API
   PATCH v24 : remplace DEMO_AGENT entier
════════════════════════════════════════════ */

// Utilitaire date
function _dateAujourd_hui() { return new Date().toISOString().split('T')[0]; }
function _verrouSessionExists(sessionId) {
    return localStorage.getItem(`av_lock_${App.activeBande}_${sessionId}_${_dateAujourd_hui()}`) === 'true';
}
function _poserVerrouSession(sessionId) {
    localStorage.setItem(`av_lock_${App.activeBande}_${sessionId}_${_dateAujourd_hui()}`, 'true');
}

async function renderAgent() {
    _majTopbar();
    const z = zone(); if (!z) return;
    z.innerHTML = `<div style="text-align:center;padding:60px 20px"><div style="font-size:32px;margin-bottom:12px">⏳</div><div style="color:var(--text2);font-size:14px">Chargement du tableau de bord…</div></div>`;

    // Auto-sélection bande si pas encore faite
    if (!App.activeBande) await chargerBandeActive();

    if (!App.activeBande) {
        z.innerHTML = `
            <div style="text-align:center;padding:40px 20px">
                <div style="font-size:48px;margin-bottom:16px">⚠️</div>
                <div style="font-weight:800;font-size:15px;margin-bottom:8px">Aucune bande active</div>
                <div style="color:var(--text2);font-size:13px;margin-bottom:20px">
                    Le gérant n'a pas encore créé de bande en cours.
                </div>
                <button class="btn-action btn-blue" onclick="renderAgent()">🔄 Actualiser</button>
            </div>`;
        return;
    }

    const d = await apiGet({action:'dashboard', idBande:App.activeBande});
    if (!d.success) {
        z.innerHTML = `
            <div style="text-align:center;padding:40px 20px">
                <div style="font-size:36px;margin-bottom:12px">📡</div>
                <div style="font-weight:800;font-size:15px;margin-bottom:8px">Connexion impossible</div>
                <div style="color:var(--text2);font-size:13px;margin-bottom:20px">${esc(d.error||'Vérifiez votre connexion réseau')}</div>
                <button class="btn-action btn-blue" onclick="renderAgent()">🔄 Réessayer</button>
            </div>`;
        return;
    }

    App.data = d;
    const perf    = d.performance     || {};
    const terrain = d.terrain         || {};
    const alertes = d.alertes         || [];
    const taches  = d.tachesAgent     || [];
    const sessionActive = d.sessionActuelle || detectSession();
    const sessionsCompletees = d.sessionsCompletees || [];

    const sessions = [
        {id:'Matin',label:'Matin', heure:'5H – 10H', icon:'🌅',nb:6},
        {id:'Midi', label:'Midi',  heure:'10H – 14H',icon:'☀️', nb:3},
        {id:'PM',   label:'PM',    heure:'14H – 19H',icon:'🌤️',nb:3},
        {id:'Nuit', label:'Nuit',  heure:'19H – 5H', icon:'🌙',nb:4},
    ];

    function progSession(sid) {
        if (_verrouSessionExists(sid)) return 'TERMINE';
        if (sessionsCompletees.includes(sid)) return 'TERMINE';
        if (sid === sessionActive) return 'EN_COURS';
        return 'ATTENTE';
    }
    const progIcon = {TERMINE:'✅', EN_COURS:'⏳', ATTENTE:'○'};
    const progCls  = {TERMINE:'var(--green)', EN_COURS:'var(--orange)', ATTENTE:'var(--text2)'};

    // Tâches abattage urgentes
    const tachesUrgentes = taches.filter(t=>t.typeTache==='ABATTAGE'&&t.statut!=='TERMINEE'&&t.statut!=='COMPTABILISEE');
    const tachesOrdinaires = taches.filter(t=>t.typeTache!=='ABATTAGE');

    // Alertes critiques
    const alertesCritiques = alertes.filter(a=>a.niveau==='CRITIQUE');

    const mortJour  = terrain.mortaliteJour || 0;
    const mortColor = mortJour > 5 ? 'var(--red)' : mortJour > 0 ? 'var(--orange)' : 'var(--green)';
    const stockSacs = perf.stockSacs || 0;
    const stockColor= stockSacs <= 5 ? 'var(--red)' : 'var(--green)';

    const urgentesHTML = tachesUrgentes.length ? `
        <div class="section-title" style="color:var(--red)">⚠️ Urgent</div>
        ${tachesUrgentes.map(t=>`
            <div class="tache-card urgente" onclick="Nav.push('renderAbattage','${esc(t.id)}')" style="cursor:pointer">
                <div class="tache-dot red"></div>
                <div style="flex:1">
                    <div class="tache-titre">${esc(t.titre)}</div>
                    <div class="tache-meta">Appuyer pour commencer</div>
                </div>
                <span class="tache-badge abattage">🔪 ABATTAGE</span>
            </div>`).join('')}` : '';

    const alertesHTML = alertesCritiques.length ? `
        <div class="section-title" style="color:var(--red)">🔴 Alertes</div>
        ${alertesCritiques.map(a=>`
            <div class="alerte critique">
                <div>🔴</div>
                <div><div class="alerte-kpi">${esc(a.kpi)}</div><div class="alerte-msg">${esc(a.message)}</div></div>
            </div>`).join('')}` : '';

    const sessionsHTML = sessions.map(s=>{
        const prog  = progSession(s.id);
        const actif = s.id === sessionActive;
        return `
        <div class="tuile${actif?' tuile-session-active':''}" style="background:var(--bg2)"
             onclick="Nav.push('renderSession','${s.id}')">
            <div class="tuile-icon">${s.icon}</div>
            <div style="flex:1">
                <div class="tuile-label">${s.label}
                    ${actif?'<span class="session-active-badge">▶ En cours</span>':''}
                </div>
                <div class="tuile-sub">${s.heure} · ${s.nb} étapes</div>
            </div>
            <div style="font-size:20px;color:${progCls[prog]}">${progIcon[prog]}</div>
        </div>`;
    }).join('');

    const tachesOrdHTML = tachesOrdinaires.length ? `
        <div class="section-title">📋 Tâches assignées</div>
        ${tachesOrdinaires.map(t=>`
            <div class="tache-card">
                <div class="tache-dot ${t.typeTache==='HEBDO'?'orange':'blue'}"></div>
                <div style="flex:1">
                    <div class="tache-titre">${esc(t.titre)}</div>
                    <div class="tache-meta">${esc(t.idBande)} · ${esc(t.date)}</div>
                </div>
                <span class="tache-badge ${t.typeTache.toLowerCase()}">${esc(t.typeTache)}</span>
            </div>`).join('')}` : '';

    z.innerHTML = `
        ${alertesHTML}
        ${urgentesHTML}

        <div class="section-title">🐔 ${esc(App.activeBande)} · J${perf.ageJours||0}</div>
        <div class="kpi-row" style="margin-bottom:14px">
            <div class="kpi-box">
                <span class="kpi-val">${(perf.effectif||0).toLocaleString('fr')}</span>
                <span class="kpi-label">Effectif</span>
            </div>
            <div class="kpi-box">
                <span class="kpi-val" style="color:${stockColor}">${stockSacs}</span>
                <span class="kpi-label">Sacs stock</span>
            </div>
            <div class="kpi-box">
                <span class="kpi-val" style="color:${mortColor}">${mortJour}</span>
                <span class="kpi-label">💀 Morts/jour</span>
            </div>
        </div>

        <div class="section-title">Sessions du jour</div>
        ${sessionsHTML}
        ${tachesOrdHTML}`;

/* ── Pavé numérique inline ── */
function _pavHTML(bufferId, displayId, unite) {
    return `
    <div style="text-align:center;margin-bottom:8px">
        <div style="background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:inline-flex;align-items:baseline;gap:8px;min-width:160px;justify-content:center">
            <span id="disp-${displayId}" style="font-size:36px;font-weight:800;color:var(--text);min-width:80px;text-align:right">—</span>
            <span style="font-size:14px;color:var(--text2)">${esc(unite)}</span>
        </div>
    </div>
    <div class="pin-pad" style="margin:0 auto 8px;grid-template-rows:repeat(4,60px);grid-template-columns:repeat(3,60px);gap:10px">
        ${['1','2','3','4','5','6','7','8','9'].map(d=>`<button class="pin-key" style="width:60px;height:60px;font-size:18px" onclick="_pavTap('${bufferId}','${displayId}','${d}')">${d}</button>`).join('')}
        <button class="pin-key key-clear" style="width:60px;height:60px;font-size:13px" onclick="_pavDel('${bufferId}','${displayId}')">⌫</button>
        <button class="pin-key" style="width:60px;height:60px;font-size:18px" onclick="_pavTap('${bufferId}','${displayId}','0')">0</button>
        <button class="pin-key" style="width:60px;height:60px;font-size:13px" onclick="_pavTap('${bufferId}','${displayId}','.')">.</button>
    </div>`;
}
function _pavTap(bufferId,displayId,digit){
    let buf=App._pavBuffers[bufferId]||'';
    if(digit==='.'&&buf.includes('.')) return;
    if(digit==='.'&&buf==='') buf='0';
    buf+=digit; App._pavBuffers[bufferId]=buf;
    const el=document.getElementById('disp-'+displayId); if(el) el.textContent=buf;
}
function _pavDel(bufferId,displayId){
    let buf=App._pavBuffers[bufferId]||'';
    buf=buf.slice(0,-1); App._pavBuffers[bufferId]=buf;
    const el=document.getElementById('disp-'+displayId); if(el) el.textContent=buf||'—';
}
function _pavGet(bufferId){ return parseFloat(App._pavBuffers[bufferId]||'')||null; }

/* ── Handlers réponses ── */
function _repBool(idx,label){ _etapeSuivante(idx===0?1:0,label); }
function _repLitiere(score,etapeId){
    App._session._litiereScore=score;
    for(let i=1;i<=5;i++){const btn=document.getElementById('lit-'+i);if(btn) btn.style.borderColor=i===score?'var(--blue)':'var(--border)';}
}
function _validerAmbiance(etapeId){
    const temp=_pavGet('temp'), hygro=_pavGet('hygro');
    if(temp===null){showToast('Saisissez la température','warning');return;}
    if(hygro===null){showToast("Saisissez l'hygrométrie",'warning');return;}
    if(App._session._litiereScore===null){showToast("Sélectionnez l'état de la litière",'warning');return;}
    App._session.reponses[etapeId]={temp,hygro,litiere:App._session._litiereScore};
    delete App._pavBuffers['temp']; delete App._pavBuffers['hygro'];
    App._session.etapeIdx++; _renderEtape();
}
function _repNumber(etapeId,unite,min,max){
    const val=_pavGet('val_'+etapeId);
    if(val===null){showToast('Saisissez une valeur','warning');return;}
    const vMin=sanitizeNum(val,min,max);
    if(vMin===null){showToast(`Valeur invalide (${min}–${max} ${unite})`,'warning');return;}
    App._session.reponses[etapeId]=val;
    delete App._pavBuffers['val_'+etapeId];
    _etapeSuivante(val,val+' '+unite);
}
function _repPesee(){
    const val=_pavGet('pesee_val');
    if(val===null){showToast('Saisissez le poids moyen','warning');return;}
    App._session.reponses['pesee']=val;
    delete App._pavBuffers['pesee_val'];
    _etapeSuivante(val,val+' g');
}
function _selectSante(score){
    App._session._santeScore=score;
    for(let i=1;i<=5;i++){const btn=document.getElementById('sante-'+i);if(btn){btn.style.borderColor=i===score?'var(--blue)':'var(--border)';btn.style.background=i===score?'rgba(0,153,255,0.15)':'var(--bg3)';}}
}
function _repSante(){
    if(App._session._santeScore===null){showToast('Sélectionnez un score santé (1–5)','warning');return;}
    const obs=document.getElementById('sante-obs')?.value||'';
    App._session.reponses['sante']={score:App._session._santeScore,obs};
    _etapeSuivante(App._session._santeScore,'Score '+App._session._santeScore+'/5');
}
function _etapeSuivante(valeur,label){
    const sid=App._session.id, idx=App._session.etapeIdx;
    const e=(SESSION_ETAPES[sid]||[])[idx];
    if(e) App._session.reponses[e.id]=valeur;
    App._session.etapeIdx++; _renderEtape();
}

function _renderSessionResume(){
    const z=zone(); if(!z) return;
    const sid=App._session.id, rep=App._session.reponses;
    const etapes=SESSION_ETAPES[sid]||[];
    const labels={Matin:'🌅 Matin',Midi:'☀️ Midi',PM:'🌤️ PM',Nuit:'🌙 Nuit'};

    // Vérifier verrou
    if(_verrouSessionExists(sid)){

                <button class="btn-action btn-ghost" onclick="Nav.home()">← Retour à l'accueil</button>

    const lignesHTML=etapes.map(e=>{

            else if(e.type==='sante') affiche=`${val.score}/5${val.obs?' — '+val.obs.slice(0,30):''}`;
            else affiche=String(val);
        }
        return `
        <div class="journal-row">
            <span class="journal-cat">${esc(e.label)}</span>
            <span style="font-size:12px;font-weight:700;color:var(--text)">${esc(String(affiche))}</span>
        </div>`;
    }).join('');

    z.innerHTML=`
        <div class="card">
            <div class="card-title" style="color:var(--orange)">⚠️ Vérification avant envoi</div>
            <div style="font-size:13px;color:var(--text2);margin-bottom:16px;background:rgba(255,157,0,0.08);border:1px solid rgba(255,157,0,0.2);border-radius:12px;padding:12px;">
                📌 <strong style="color:var(--text)">Attention :</strong> Une fois confirmées, ces données seront verrouillées.<br>
                Seul le <strong style="color:var(--blue)">gérant</strong> pourra les corriger si nécessaire.

            ✅ Je confirme — Envoyer au gérant
        </button>
        <button class="btn-action btn-ghost" onclick="Nav.back()">
            ↩ Revenir et corriger
        </button>`;
}

async function _confirmerEtEnvoyer(){
    const sid=App._session.id, rep=App._session.reponses, etapes=SESSION_ETAPES[sid]||[];
    const z=zone(); if(!z) return;
    z.innerHTML=`<div style="text-align:center;padding:60px 20px"><div style="font-size:32px;margin-bottom:12px">⏳</div><div style="color:var(--text2);font-size:14px">Envoi en cours…</div></div>`;

    const catMap={mortalite_m:'MortaliteMatin',mortalite_n:'MortaliteSoir',eau_m:'EauMatin',eau_n:'EauSoir',aliment_kg:'Alimentation',pesee:'PoidsMoyen'};
    const envois=[];

    etapes.forEach(e=>{
        const val=rep[e.id];
        if(val===null||val===undefined) return;
        if(e.type==='ambiance'){
            envois.push(apiPost({action:'SAISIE_TECH',idBande:App.activeBande,cat:'Temperature', val1:val.temp,   note:sid}));
            envois.push(apiPost({action:'SAISIE_TECH',idBande:App.activeBande,cat:'Hygrometrie', val1:val.hygro,  note:sid}));
            envois.push(apiPost({action:'SAISIE_TECH',idBande:App.activeBande,cat:'Litiere',     val1:val.litiere,note:sid}));
        } else if(e.type==='sante'){
            envois.push(apiPost({action:'SAISIE_TECH',idBande:App.activeBande,cat:'SanteGeneral',val1:val.score,  note:val.obs||sid}));
        } else if(e.type==='number'){
            const cat=catMap[e.id];
            if(cat) envois.push(apiPost({action:'SAISIE_TECH',idBande:App.activeBande,cat,val1:val,note:sid}));
        } else if(e.type==='pesee'&&val!==null){
            envois.push(apiPost({action:'SAISIE_TECH',idBande:App.activeBande,cat:'PoidsMoyen',val1:val,note:sid}));
        } else if(e.type==='bool'&&e.id.startsWith('aliment')){
            envois.push(apiPost({action:'SAISIE_TECH',idBande:App.activeBande,cat:'AlimentStatut',val1:val,note:e.id}));
        }
    });

    // Marquer tâches ordinaires terminées
    (App.data?.tachesAgent||[]).filter(t=>t.typeTache!=='ABATTAGE').forEach(t=>{
        envois.push(apiPost({action:'AGENT_TERMINE',idRow:t.id}));
    });

    try {
        await Promise.all(envois);
    } catch(_) {}

    _poserVerrouSession(sid);
    showToast('✅ Session verrouillée et envoyée au gérant','success',4000);
    Nav.home();
}

function _nextAbattage(etape,bufferId){

        </div>
        <button class="btn-action btn-red" onclick="_envoyerAbattage()">✅ Je confirme — Envoyer au gérant</button>
        <button class="btn-action btn-ghost" onclick="renderAbattage('${esc(ab.idTache||'')}')">↩ Recommencer la saisie</button>`;
}
async function _envoyerAbattage(){
    const ab=App._abattage;
    if(!ab.idTache){showToast('Envoi des données abattage…','info');Nav.home();return;}
    z_placeholder:
    // Note : la validation prix reste chez le gérant (validerAbattage POST)
    // L'agent envoie juste les données terrain
    showToast('✅ Données abattage envoyées au gérant pour validation','success');
    Nav.home();
}

async function renderPartenaire(){
    const z=zone(); if(!z) return;
    z.innerHTML=`<div style="text-align:center;padding:60px 20px"><div style="font-size:32px;margin-bottom:12px">⏳</div><div style="color:var(--text2);font-size:14px">Chargement de vos bandes…</div></div>`;
    const d=await apiGet({action:'getPartenaireBandes'});
    if(!d.success){
        z.innerHTML=`<div style="text-align:center;padding:40px 20px"><div style="font-size:36px;margin-bottom:12px">⚠️</div><div style="font-weight:800;font-size:15px;margin-bottom:8px">Erreur de chargement</div><div style="color:var(--text2);font-size:13px;margin-bottom:20px">${esc(d.error||'Connexion impossible')}</div><button class="btn-action btn-blue" onclick="renderPartenaire()">🔄 Réessayer</button></div>`;
        return;
    }
    const bandes=d.bandes||[];
    if(!bandes.length){
        z.innerHTML=`<div style="text-align:center;padding:60px 20px"><div style="font-size:48px;margin-bottom:16px">🐔</div><div style="font-weight:800;font-size:16px;margin-bottom:8px">Aucune bande assignée</div><div style="color:var(--text2);font-size:13px">Le gérant n'a pas encore associé votre compte à une bande.</div></div>`;
        return;
    }
    const cartes=bandes.map(b=>{
        const sc=b.statut==='EN COURS'?'var(--green)':b.statut==='CLOTURE'?'var(--orange)':'var(--text2)';
        const si=b.statut==='EN COURS'?'🟢':b.statut==='CLOTURE'?'⏳':'⬜';
        return `
        <div class="card" style="margin-bottom:12px;cursor:pointer" onclick="Nav.push('renderPartenaireBande','${esc(b.idBande)}')">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
                <div style="font-weight:800;font-size:15px">${esc(b.idBande)}</div>
                <span style="font-size:12px;color:${sc};font-weight:600">${si} ${esc(b.statut)}</span>
            </div>
            <div style="display:flex;gap:16px;font-size:13px;color:var(--text2)">
                <span>🏠 ${esc(b.batiment)}</span>
                <span>📅 J+${b.ageJours}</span>
                <span style="color:var(--purple);font-weight:600">🤝 ${b.quotePart}%</span>
            </div>
        </div>`;
    }).join('');
    z.innerHTML=`
        <div style="padding:16px">
            <div style="margin-bottom:20px">
                <div style="font-weight:800;font-size:17px;margin-bottom:4px">👋 Bonjour ${esc(App.nom)}</div>
                <div style="color:var(--text2);font-size:13px">${bandes.length} bande(s) dans votre portefeuille</div>
            </div>
            ${cartes}
        </div>`;
}
function renderPartenaireBande(idBande){
    if(!idBande){Nav.back();return;}
    const z=zone(); if(!z) return;
    z.innerHTML=`
        <div style="padding:16px">
            <div style="font-weight:800;font-size:17px;margin-bottom:4px">${esc(idBande)}</div>
            <div style="color:var(--text2);font-size:13px;margin-bottom:20px">Choisissez une section</div>
            <div class="card" style="margin-bottom:12px;cursor:pointer;border-left:3px solid var(--purple)" onclick="Nav.push('renderPartenaireResultats','${esc(idBande)}')">
                <div style="font-size:22px;margin-bottom:6px">📊</div>
                <div style="font-weight:800;font-size:15px;margin-bottom:4px">Résultats financiers</div>
                <div style="color:var(--text2);font-size:13px">Dépenses · Recettes · Marge</div>
            </div>
            <div class="card" style="margin-bottom:12px;cursor:pointer;border-left:3px solid var(--green)" onclick="Nav.push('renderPartenaireEtat','${esc(idBande)}')">
                <div style="font-size:22px;margin-bottom:6px">🐔</div>
                <div style="font-weight:800;font-size:15px;margin-bottom:4px">État du lot</div>
                <div style="color:var(--text2);font-size:13px">Effectif · Mortalité · Poids · Âge</div>
            </div>
            <div class="card" style="cursor:pointer;border-left:3px solid var(--orange)" onclick="Nav.push('renderPartenaireCreances','${esc(idBande)}')">

                <div style="font-weight:800;font-size:15px;margin-bottom:4px">Mes créances</div>
                <div style="color:var(--text2);font-size:13px">Clients en attente de paiement</div>
            </div>
        </div>`;
}
async function renderPartenaireResultats(idBande){
    const z=zone(); if(!z) return;
    z.innerHTML=`<div style="text-align:center;padding:60px 20px"><div style="font-size:28px">⏳</div></div>`;
    const d=await apiGet({action:'dashboard',idBande});
    if(!d.success||!d.finance){z.innerHTML=`<div style="text-align:center;padding:40px"><div style="font-size:28px">⚠️</div><div style="color:var(--text2);font-size:13px;margin-top:8px">${esc(d.error||'Données indisponibles')}</div></div>`;return;}
    const f=d.finance, qp=f.quotePart||'?', soldeC=f.solde>=0?'var(--green)':'var(--red)';
    z.innerHTML=`
        <div style="padding:16px">
            <div style="margin-bottom:16px">
                <div style="font-weight:800;font-size:16px">📊 Résultats — ${esc(idBande)}</div>
                <div style="color:var(--purple);font-size:12px;margin-top:4px">Quote-part : ${qp}%</div>
            </div>
            <div class="card" style="text-align:center;margin-bottom:16px">
                <div style="font-size:13px;color:var(--text2);margin-bottom:6px">Marge nette (votre part)</div>
                <div style="font-size:28px;font-weight:800;color:${soldeC}">${f.solde>=0?'+':''}${fmt(f.solde)} FCFA</div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">

                    <div style="font-size:16px;font-weight:800;color:var(--red)">${fmt(f.totalDepenses)}</div>
                </div>
                <div class="card" style="text-align:center">
                    <div style="font-size:11px;color:var(--text2);margin-bottom:4px">📥 Recettes</div>
                    <div style="font-size:16px;font-weight:800;color:var(--green)">${fmt(f.recettes)}</div>
                </div>
            </div>
        </div>`;
}
async function renderPartenaireEtat(idBande){
    const z=zone(); if(!z) return;
    z.innerHTML=`<div style="text-align:center;padding:60px 20px"><div style="font-size:28px">⏳</div></div>`;
    const d=await apiGet({action:'dashboard',idBande});
    if(!d.success){z.innerHTML=`<div style="text-align:center;padding:40px"><div style="font-size:28px">⚠️</div><div style="color:var(--text2);font-size:13px;margin-top:8px">${esc(d.error||'Données indisponibles')}</div></div>`;return;}
    const p=d.performance, t=d.terrain;
    const surv=p.effectifInitial>0?Math.round(((p.effectifInitial-p.morts-p.sorties)/p.effectifInitial)*1000)/10:0;
    const sC=surv>=97?'var(--green)':surv>=94?'var(--orange)':'var(--red)';
    z.innerHTML=`
        <div style="padding:16px">
            <div style="font-weight:800;font-size:16px;margin-bottom:16px">🐔 État du lot — ${esc(idBande)}</div>
            <div class="card" style="margin-bottom:12px">
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
                    <div><div style="font-size:10px;color:var(--text2);margin-bottom:4px">Initial</div><div style="font-size:18px;font-weight:800">${p.effectifInitial.toLocaleString('fr')}</div></div>
                    <div><div style="font-size:10px;color:var(--red);margin-bottom:4px">Morts</div><div style="font-size:18px;font-weight:800;color:var(--red)">${p.morts}</div></div>
                    <div><div style="font-size:10px;color:var(--green);margin-bottom:4px">Présents</div><div style="font-size:18px;font-weight:800;color:var(--green)">${Math.max(0,p.effectifInitial-p.morts-p.sorties).toLocaleString('fr')}</div></div>
                </div>
            </div>
            <div class="card" style="text-align:center;margin-bottom:12px">
                <div style="font-size:12px;color:var(--text2);margin-bottom:6px">Taux de survie</div>
                <div style="font-size:32px;font-weight:800;color:${sC}">${surv}%</div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                <div class="card" style="text-align:center">
                    <div style="font-size:11px;color:var(--text2);margin-bottom:4px">⚖️ Poids moyen</div>
                    <div style="font-size:18px;font-weight:800">${t.poidsMoyen||'–'} g</div>
                </div>
                <div class="card" style="text-align:center">
                    <div style="font-size:11px;color:var(--text2);margin-bottom:4px">📊 IC</div>
                    <div style="font-size:18px;font-weight:800">${t.ic||'–'}</div>
                </div>
            </div>
        </div>`;
}
async function renderPartenaireCreances(idBande){
    const z=zone(); if(!z) return;
    z.innerHTML=`<div style="text-align:center;padding:60px 20px"><div style="font-size:28px">⏳</div></div>`;
    const d=await apiGet({action:'getVentes',idBande});
    if(!d.success){z.innerHTML=`<div style="text-align:center;padding:40px"><div style="font-size:28px">⚠️</div></div>`;return;}
    const creances=(d.ventes||[]).filter(v=>v.montantRestant>0);
    if(!creances.length){
        z.innerHTML=`<div style="padding:16px;text-align:center"><div style="font-size:40px;margin-bottom:12px">✅</div><div style="font-weight:700;font-size:15px">Aucune créance en cours</div></div>`;
        return;
    }
    const total=Math.round(creances.reduce((s,v)=>s+v.montantRestant,0));
    z.innerHTML=`
        <div style="padding:16px">
            <div style="margin-bottom:16px">
                <div style="font-weight:800;font-size:16px">💳 Mes créances — ${esc(idBande)}</div>
                <div style="color:var(--text2);font-size:12px;margin-top:4px">${creances.length} client(s) en attente</div>
            </div>
            <div class="card" style="text-align:center;margin-bottom:16px;background:rgba(255,157,0,0.08)">
                <div style="font-size:12px;color:var(--text2);margin-bottom:6px">💰 Total à recevoir</div>
                <div style="font-size:26px;font-weight:800;color:var(--orange)">${fmt(total)} FCFA</div>
            </div>
            ${creances.map(v=>`
            <div class="card" style="margin-bottom:10px">
                <div style="display:flex;justify-content:space-between;margin-bottom:6px">
                    <div style="font-weight:700;font-size:14px">${esc(v.idClient)}</div>
                    <span style="font-size:11px;color:var(--orange)">${v.statutPaiement}</span>
                </div>
                <div style="font-size:14px;font-weight:700;color:var(--orange)">${fmt(v.montantRestant)} FCFA restants</div>
            </div>`).join('')}
        </div>`;
}

async function chargerBandeActive() {
    try {
        const d=await apiGet({action:'getBatiments'});
        if(!d.success) return;
        App.batiments=d.batiments||[];
        const enCours=App.batiments.filter(b=>b.statut==='EN COURS');
        if(enCours.length>=1){
            App.activeBande=enCours[0].idBande;
            localStorage.setItem('av_bande',App.activeBande);
        }
    } catch(e){ console.error('chargerBandeActive:',e); }
}

async function startApp() {
    updateOffline();
    _majTopbar();
    // Pour l'agent : auto-sélection de la bande active
    if(App.role==='AGENT') await chargerBandeActive();
    renderHome();
}

window.onload = function(){
    if(App.token && isSessionValid()){
        document.getElementById('role-screen').style.display='none';
        document.getElementById('login-screen').style.display='none';
        document.getElementById('app-main').style.display='block';
        startApp();
    } else if(App.token && !isSessionValid()){
        localStorage.removeItem('av_token'); localStorage.removeItem('av_lt');
        App.token=null; App.loginTime=0;
        showToast('Session expirée — reconnectez-vous','warning',4000);
    }
};
